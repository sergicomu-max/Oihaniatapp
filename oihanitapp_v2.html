 servicio opcional para quienes no dispongan de seguro privado.","C":"Limitarse a la atención administrativa y la gestión de bajas laborales.","D":"Ser la base estratégica que cohesione y sustente todo el sistema de salud vasco."},"c":"D"},{"id":647,"q":"En relación con la Línea Estratégica 06 sobre \"Cronicidad\" del Pacto Vasco de Salud, ¿qué objetivo se persigue primordialmente?","o":{"A":"Institucionalizar a todas las personas con enfermedades crónicas en centros especializados.","B":"Reforzar la autonomía y corresponsabilidad de las personas con enfermedades crónicas.","C":"Sustituir las consultas médicas presenciales por seguimiento telefónico automático.","D":"Reducir la cobertura de medicamentos para patologías de larga duración."},"c":"B"},{"id":648,"q":"La Línea Estratégica 07 sobre \"Atención Sociosanitaria\" del Pacto Vasco de Salud subraya la necesidad de:","o":{"A":"Separar definitivamente las competencias de Salud de las de Servicios Sociales.","B":"Mejorar la coordinación y el tránsito de las personas entre el sistema sanitario y el social.","C":"Eliminar las ayudas a la dependencia para fomentar el ahorro público.","D":"Obligar a las personas pacientes a elegir entre atención médica o apoyo social."},"c":"B"},{"id":649,"q":"Respecto a la \"Salud Mental\" (Línea 11), el Pacto Vasco de Salud pone el foco en:","o":{"A":"La promoción del bienestar emocional y la detección precoz, especialmente en jóvenes.","B":"El aislamiento preventivo de las personas con trastornos mentales graves.","C":"La medicalización sistemática de cualquier malestar emocional de la ciudadanía.","D":"La reducción de la plantilla de psicología en los centros de salud primaria."},"c":"A"},{"id":650,"q":"La Línea Estratégica 18 sobre \"Digitalización en Salud\" del Pacto Vasco de Salud busca la transformación digital para:","o":{"A":"Reemplazar al personal sanitario por sistemas de inteligencia artificial autónomos.","B":"Eliminar el papel de todos los archivos históricos sin digitalizar previamente.","C":"Facilitar la accesibilidad, la personalización de la atención y la eficiencia organizativa.","D":"Crear una base de datos pública con el historial clínico de toda la ciudadanía."},"c":"C"},{"id":651,"q":"¿Cuál es el Objetivo General establecido para la “Estrategia de Seguridad del Paciente 20 -30”?","o":{"A":"Reducir a cero los eventos adversos mediante la incorporación de tecnología robótica.","B":"Mejorar la calidad asistencial del sistema sanitario vasco.","C":"Promover el máximo nivel de seguridad posible, minimizando la probabilidad de ocurrencia de incidentes de seguridad en el transcurso de la asistencia sanitaria.","D":"Centralizar la gestión de riesgos en un único organismo fuera de Osakidetza."},"c":"C"},{"id":652,"q":"El principio hipocrático al que se hace referencia en la “Estrategia de Seguridad del Paciente 20 -30”, y que la ciudadanía asume que se verifica en el transcurso de la actividad asistencial, es:","o":{"A":"Salus populi suprema lex esto (l a salud del pueblo es la ley suprema).","B":"Corpus sanum in mente sana (m ente sana en cuerpo sano).","C":"Lex artis ad hoc (l ey del arte para el caso).","D":"Primum non nocere (p rimero no hacer daño)."},"c":"D"},{"id":653,"q":"¿Cuáles son las dos nuevas Líneas de Acción incorporadas en la “Estrategia de Seguridad del Paciente 20 -30” que responden a una necesidad percibida por las personas expertas?","o":{"A":"Seguridad en Pediatría y Buenas Prácticas en el Uso de Biológicos.","B":"Atención en Cuidados Paliativos y Seguridad Domiciliaria.","C":"La Seguridad de Paciente en Emergencias y la Prevención del Suicidio.","D":"Seguridad en Salud Mental y Prevención de las Úlceras por Presión."},"c":"C"},{"id":654,"q":"De acuerdo con la “Estrategia de Seguridad del Paciente 20 -30”, ¿cómo se denomina al incidente de seguridad que, a diferencia del incidente sin daño, sí ocasiona algún tipo de daño a las personas atendidas?","o":{"A":"Error no evitable.","B":"Circunstancia notificable.","C":"Fallo latente.","D":"Evento Adverso."},"c":"D"},{"id":655,"q":"¿Cuál es el enfoque principal de la Línea de Acción Corporativa L2 de la “Estrategia de Seguridad del Paciente 20 -30”?","o":{"A":"Implicación de pacientes en su seguridad.","B":"Conciliación de la medicación.","C":"Atención a las segundas y terceras víctimas.","D":"Gestión de los incidentes de seguridad."},"c":"C"},{"id":656,"q":"¿Cuál de los siguientes es el Objetivo Específico número 1 de la “Estrategia de Seguridad del Paciente 20 -30”, enfocado en el cambio interno?","o":{"A":"Garantizar la continuidad de las líneas de acción y proyectos previamente implantados.","B":"Impulsar la cultura de seguridad de p aciente en las organizaciones de servicios de Osakidetza, promoviendo la formación y sensibilización como aspectos clave.","C":"Optimizar la prescripción de pruebas diagnósticas que utilizan radiación ionizante.","D":"Implantar un sistema de identificación inequívoca de pacientes en todas las fases del proceso asistencial."},"c":"B/A"},{"id":657,"q":"La Línea de Acción Corporativa L8 de la “Estrategia de Seguridad del Paciente 20 -30” está dedicada a:","o":{"A":"Conciliación de la medicación.","B":"Prevención y control de las infecciones relacionadas con la asistencia sanitaria.","C":"Seguridad en el proceso asistencial gestación -parto -puerperio.","D":"Seguridad transfusional."},"c":"B"},{"id":658,"q":"¿Qué documento se menciona en la “Estrategia de Seguridad del Paciente 20 - 30” como el que determinó que las personas atendidas por un sistema medicalizado (tipo 061/112) presentan un mayor porcentaje de incidentes de seguridad en el entorno de Emergencias?","o":{"A":"Estudio Nacional de Efectos Adversos en centros hospitalarios (ENEAS).","B":"Estudio APEAS.","C":"Estudio EVADUR.","D":"Informe del Instituto de Medicina de los Estados Unidos (IOM)."},"c":"C"},{"id":659,"q":"El capítulo de Formación de la “Estrategia de Seguridad del Paciente 20 -30” señala que, además de impulsar el desarrollo de prácticas seguras, las organizaciones comprometidas orientan sus esfuerzos a aumentar la formación en los llamados:","o":{"A":"Factores humanos o factores no técnicos.","B":"Factores biomédicos y patofisiológicos.","C":"Factores económicos y de sostenibilidad.","D":"Factores organizativos de Osakidetza."},"c":"A"},{"id":660,"q":"¿Cuál de las siguientes Líneas de Acción de la “Estrategia de Seguridad del Paciente 20 -30” NO está relacionada con el sistema de utilización del medicamento?","o":{"A":"L5. Conciliación de la medicación.","B":"L14. Buenas prácticas asociadas a la utilización de medicación.","C":"L6. Optimización en la prescripción de pruebas diagnósticas que utilizan radiación ionizante.","D":"L7. Seguridad transfusional (Nota: la seguridad transfusional se considera una línea separada, aunque implica la administración de productos sanguíneos)."},"c":"C"},{"id":661,"q":"Según el diagnóstico del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza, ¿qué porcentaje de mujeres y hombres, respectivamente, componía la plantilla total de Osakidetza en enero de 2025?","o":{"A":"60% mujeres y 40% hombres","B":"75% mujeres y 25% hombres","C":"80% mujeres y 20% hombres","D":"90% mujeres y 10% hombres"},"c":"C"},{"id":662,"q":"Una de las metas del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza es la “CAPACITACIÓN EN IGUALDAD”. ¿Cuál es su objetivo principal?","o":{"A":"Reducir la brecha de género en investigación en un 4%.","B":"Conseguir que todas las personas trabajadoras de Osakidetza conozcan el Plan y el Protocolo de Acoso.","C":"Reducir a la mitad las categorías con brecha retributiva superior al 5%.","D":"Garantizar la formación básica, progresiva, permanente y obligatoria de todo el personal de Osakidetza."},"c":"D"},{"id":663,"q":"¿Qué institución aprueba el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025 -2028)?","o":{"A":"Mesa Sectorial de Sanidad.","B":"Emakunde.","C":"Consejo de Administración de Osakidetza.","D":"Dirección General de Osakidetza."},"c":"C"},{"id":664,"q":"De acuerdo con el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025 -2028), ¿qué concepto define, dentro del diagnóstico de la organización, la dificultad invisible que encuentran las mujeres para acceder a puestos de mayor responsabilidad y toma de decisiones?","o":{"A":"Segregación horizontal.","B":"Suelo pegajoso.","C":"Brecha salarial técnica","D":"Techo de cristal."},"c":"D"},{"id":665,"q":"Una de las Metas del II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025 -2028) es “CORRESPONSABILIDAD”. ¿Cuál es el objetivo específico asociado a esta meta?","o":{"A":"Reducir el porcentaje de hombres en puestos de dirección.","B":"Reducir a la mitad la brecha de género en investigación.","C":"Reducir, al menos, en un 2% la brecha de género existente en las medidas de conciliación para cuidados.","D":"Aumentar el número de investigaciones con perspectiva de género interseccional en un 4%."},"c":"C"},{"id":666,"q":"¿Cuál fue el objetivo del I Plan de Igualdad, teniendo en cuenta su condición de primer plan estratégico de Osakidetza en esta materia?","o":{"A":"Consolidar los avances logrados y profundizar el proceso transformador.","B":"Establecer unos cimientos sólidos para garantizar el cumplimiento de la legislación y la alineación a los marcos estratégicos.","C":"Reducir la brecha salarial a la mitad en todas las categorías profesionales.","D":"Lograr la aprobación por parte del Consejo de Dirección de Osakidetza en julio de 2025."},"c":"B"},{"id":667,"q":"¿Cuál es la Meta 5 establecida en el II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025 -2028)?","o":{"A":"Reducir la brecha de género existente en las medidas de conciliación para cuidados.","B":"Capacitación en Igualdad, garantizando la formación progresiva del personal.","C":"Igualdad Salarial, con el objetivo de reducir a la mitad las categorías que tienen una brecha retributiva > 5%.","D":"Investigación, aumentando el número de investigaciones con perspectiva de género."},"c":"C"},{"id":668,"q":"En relación con la violencia machista contra las mujeres, el Plan II Plan para la Igualdad de Mujeres y Hombres en Osakidetza (2025 -2028) establece como línea de actuación prioritaria:","o":{"A":"El refuerzo de la prevención, la detección precoz y la mejora de la respuesta asistencial integrada desde el sistema de salud.","B":"La derivación inmediata de cualquier caso detectado a servicios jurídicos externos, sin intervención del personal sanitario.","C":"La creación de un registro anónimo donde las personas profesionales puedan denunciar conductas sin seguimiento posterior.","D":"La limitación de la atención asistencial únicamente a las consecuencias físicas derivadas de la violencia."},"c":"A"},{"id":669,"q":"El III Plan de Normalización del Uso del Euskera en Osakidetza 2022 -2028 establece respecto a los mensajes audiovisuales que:","o":{"A":"Deben emitirse en la lengua que decidan las personas responsable de las unidades que utilizan estos sistemas audiovisuales.","B":"Deben emitirse en las dos lenguas oficiales, primero en castellano y luego en euskera.","C":"Deben emitirse en las dos lenguas oficiales, primero en euskera y luego en castellano.","D":"Deben emitirse en una de las dos lenguas oficiales."},"c":"C"},{"id":670,"q":"De acuerdo con el III Plan de Normalización del Uso del Euskera en Osakidetza 2022 -2028, señale la respuesta correcta:","o":{"A":"Por aplicación de la Ley Orgánica de Protección de Datos Personales y garantía de los derechos digitales no puede constar en los datos personales de cada paciente de Osakidetza su idioma de preferencia para las comunicaciones con Osakidetza.","B":"El signo azul con la letra e indica que la persona paciente no tiene competencia para comunicarse en un idioma que no sea el euskera para las comunicaciones orales con Osakidetza.","C":"En los datos personales de cada paciente, se registrará su idioma de preferencia para las comunicaciones orales con Osakidetza .","D":"A las personas que elijan el euskera como lengua prioritaria en sus comunicaciones con Osakidetza solo se les deberá ofrecer servicios en euskera."},"c":"C"},{"id":671,"q":"En atención al III Plan de Normalización del Uso del Euskera en Osakidetza 2022 -2028, señale la respuesta correcta:","o":{"A":"“Aukeratu zeure hizkuntza/Elige tu lengua” es el lema de la campaña de activación del registro de la lengua preferente de cada paciente llevada a cabo en 2017.","B":"Se atribuye a todas las direcciones y gerencias de Osakidetza la responsabilidad de realizar la campaña con el lema “Aukeratu zeure hizkuntza/Elige tu lengua”.","C":"“Aukeratu zeure hizkuntza/Elige tu lengua” es el lema de la campaña de activación del registro de la lengua preferente de cada paciente que realizará Osakidetza durante el primer año de planificación.","D":"“Aukeratu zeure hizkuntza/Elige tu lengua” es el lema de la campaña de activación del registro de la lengua preferente de cada paciente que realizará Osakidetza durante el tercer año de planificación."},"c":"C/A"},{"id":672,"q":"El III Plan de Normalización del Uso del Euskera en Osakidetza 2022 -2028 contempla que tanto en los servicios de recepción y admisión, como en las unidades asistenciales y administrativas a toda la ciudadanía vascohablante debe garantizarse:","o":{"A":"La recepción en euskera.","B":"La recepción en euskera solo cuando la comunicación oral con pacientes y personas usuarias sea de modo presencial.","C":"La recepción en euskera solo cuando la comunicación con pacientes y personas usuarias sea telefónicamente.","D":"La recepción en euskera solo por las y los empleados que sepan en euskera."},"c":"A"},{"id":673,"q":"El III Plan de Normalización del Uso del Euskera en Osakidetza 2022 -2028 establece que, en los escritos individualizados de respuesta a solicitudes y reclamaciones de pacientes o personas usuarias de Osakidetza se utilizará:","o":{"A":"La lengua utilizada por cada ciudadano o ciudadana.","B":"Siempre el euskera como lengua preferente.","C":"Siempre las dos lenguas oficiales independientemente de la lengua utilizada por cada ciudadano o ciudadana.","D":"Ambas lenguas oficiales, siendo los escritos contestados primero en euskera y luego en castellano."},"c":"A"},{"id":674,"q":"Siguiendo lo previsto en el III Plan de Normalización del Uso del Euskera en Osakidetza 2022 -2028, señale la respuesta que no es correcta:","o":{"A":"Se pondrá a disposición del personal bilingüe que lo desee diferentes elementos identificativos portadores del circulo azul con la letra e, signo que invita a relacionarse en euskera.","B":"El signo azul y la letra e solo se utilizará para la identificación individual del personal bilingüe.","C":"En los centros de salud, consultorios y unidades hospitalarias, deberá estar colocado, de modo visible, el cartel que explica a las personas usuarias el significado del signo identificativo con la letra e.","D":"Se estudiará introducir una variante del círculo azul con la letra e para el personal dispuesto a que le hablen en euskera pero que muestra dificultades para expresarse en ciertas situaciones."},"c":"B"},{"id":675,"q":"En atención a lo previsto en el III Plan de Normalización del Uso del Euskera en Osakidetza 2022 -2028, en todos los centros de atención primaria ha de ponerse en marcha un procedimiento para que, en la medida de las posibilidades, se propongan servicios en euskera a las personas pacientes que hayan registrado esta lengua como preferente y que aún reciban los citados servicios en castellano. Señale a qué servicios se refiere el citado Plan:","o":{"A":"Medicina familiar, pediatría, enfermería y salud mental.","B":"Pediatría, medicina familiar y salud mental.","C":"Medicina familiar, pediatría, enfermería y matrona.","D":"Todas las anteriores respuestas son correctas."},"c":"C"},{"id":676,"q":"Conforme al III Plan de Normalización del Uso del Euskera en Osakidetza 2022 -2028:","o":{"A":"En los casos de los mensajes SMS que se envían a los teléfonos móviles de personas trabajadoras o candidatas, estarán escritos en las dos lenguas oficiales, primero en castellano y luego en euskera.","B":"Los escritos individualizados de respuesta a solicitudes y reclamaciones de las personas trabajadoras deberán redactarse en las dos lenguas oficiales.","C":"Osakidetza ha de garantizar que la información y los servicios ofrecidos tanto al personal empleado como a personas candidatas a través de las tecnologías de la comunicación estén en las dos lenguas oficiales, con el fin de que cada persona haga uso de la lengua de su preferencia.","D":"Las informaciones y comunicaciones no personalizadas dirigidas al personal deberán redactarse en las dos lenguas oficiales y se dará prioridad al castellano."},"c":"C"},{"id":677,"q":"Según el Resumen Ejecutivo del Plan Oncológico Integral de Euskadi (POIE) 2025 -2030, ¿de qué porcentaje de los fallecimientos en Euskadi fue responsable el cáncer en el año 2023?","o":{"A":"22,3%","B":"Menos del 15%","C":"33,8%","D":"0.28"},"c":"D"},{"id":678,"q":"Según el Resumen Ejecutivo del Plan Oncológico Integral de Euskadi (POIE) 2025 -2030, ¿cuáles fueron las dos localizaciones de cáncer más frecuentes en Euskadi en el periodo 2015 -2019, consideradas separadamente por sexo?","o":{"A":"Cáncer colorrectal y cáncer de pulmón.","B":"Cáncer de mama en mujeres y cáncer de próstata en hombres.","C":"Cáncer de páncreas y cáncer de pulmón.","D":"Leucemia y Linfoma de Hodgkin."},"c":"B"},{"id":679,"q":"¿Cuál de las siguientes es una de las aspiraciones definidas en la VISIÓN del Plan Oncológico Integral de Euskadi (POIE) 2025 -2030?","o":{"A":"Mejorar la calidad de vida de las personas: de pacientes, supervivientes y de sus familiares y personas cuidadoras.","B":"Aumentar la cuota de mercado de Osakidetza en el sector oncológico privado.","C":"Garantizar la presencia equilibrada de ambos sexos en los órganos de gestión sanitaria.","D":"Establecer la telemedicina como la única forma de seguimiento oncológico."},"c":"A"},{"id":680,"q":"La Misión del Plan Oncológico Integral de Euskadi (POIE) 2025 -2030 busca generar valor a la ciudadanía vasca en términos de:","o":{"A":"Mayor financiación externa para I+D.","B":"Menores listas de espera y más personal asistencial.","C":"Mejores resultados en salud.","D":"Una mayor supervivencia a los 10 años en todos los tumores."},"c":"C"},{"id":681,"q":"En el Plan Oncológico Integral de Euskadi (POIE) 2025 -2030, la “Centralidad de la persona y humanización” como Principio Rector incluye la incorporación de la perspectiva de género y la atención a:","o":{"A":"La telemonitorización avanzada.","B":"La diversidad.","C":"El personal profesional no implicado directamente.","D":"Las redes sociales."},"c":"B"},{"id":682,"q":"Teniendo en cuenta la introducción y el contexto del Plan Oncológico Integral de Euskadi 2025 -2030. ¿Cuál fue una de las principales áreas de mejora identificadas en la evaluación del Plan Oncológico de Euskadi (POE) 2018 - 2023?","o":{"A":"La excesiva visibilidad del plan entre profesionales sin implicación.","B":"La necesidad de aumentar el número de Comités de Tumores.","C":"La necesidad de reforzar la atención a colectivos específicos (infancia, mayores, personas largas supervivientes).","D":"La ausencia total de un modelo asistencial común."},"c":"C"},{"id":683,"q":"Según el listado de acrónimos del Plan Oncológico Integral de Euskadi (POIE) 2025 -2030, ¿a qué hacen referencia las siglas PROMs?","o":{"A":"Plan de Resultados Oncológicos y Metodología de Seguimiento.","B":"Plan de Riesgos Ocupacionales en Medicina Sanitaria.","C":"Programa de Rehabilitación Oncológica y Mejora de la Supervivencia.","D":"Medidas de Resultados Reportadas por los y las Pacientes."},"c":"D"},{"id":684,"q":"El Plan Oncológico Integral de Euskadi (POIE) 2025 -2030 se alinea con el Plan de Salud de Euskadi 2030. ¿Cuál de las siguientes es una de las prioridades estratégicas de dicho Plan de Salud mencionadas en el documento?","o":{"A":"Creación de una red de servicios privados de salud.","B":"Aumentar la esperanza de vida a 90 años.","C":"Reducir la morbimortalidad evitable y disminuir las desigualdades en salud","D":"Eliminación total del cáncer infantil antes de 2030."},"c":"C"},{"id":685,"q":"¿Cuál es el objeto fundamental de la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, según su Artículo 1?","o":{"A":"Regular los cuidados paliativos avanzados en el Sistema Nacional de Salud.","B":"Modificar el Código Penal para despenalizar la asistencia al suicidio.","C":"Regular el derecho de toda persona a solicitar y recibir la prestación de ayuda para morir y la obligación de las Administraciones de garantizarla.","D":"Establecer el registro de las voluntades anticipadas y testamentos vitales."},"c":"C"},{"id":686,"q":"Conforme al Artículo 5 de la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿qué requisito de nacionalidad se exige para poder recibir la prestación de ayuda para morir?","o":{"A":"Tener la ciudadanía española con residencia legal ininterrumpida de al menos 10 años.","B":"Tener la nacionalidad española o tener residencia legal en España de al menos 5 años.","C":"Ser mayor de edad y tener la nacionalidad española, residencia legal o certificado de empadronamiento que acredite un tiempo de permanencia superior a 12 meses en territorio español.","D":"Tener la nacionalidad española y residencia en el mismo municipio durante los últimos 2 años."},"c":"C"},{"id":687,"q":"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿qué concepto define la ley como la \"administración directa a la persona paciente de una sustancia por parte del personal sanitario competente\"?","o":{"A":"Suicidio médicamente asistido.","B":"Sedación paliativa profunda.","C":"Eutanasia.","D":"Asistencia para morir."},"c":"D/C"},{"id":688,"q":"Según el Artículo 5 de la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿cuál es la condición que debe padecer la persona paciente para solicitar la prestación de ayuda para morir?","o":{"A":"Padecer una enfermedad incurable en fase terminal o un deterioro funcional grave.","B":"Sufrir una enfermedad que limite gravemente su autonomía.","C":"Padecer una enfermedad grave e incurable o un padecimiento grave, crónico e imposibilitante, causantes de un sufrimiento intolerable.","D":"Sufrir un dolor físico o psíquico que no puede ser tratado con paliativos."},"c":"C"},{"id":689,"q":"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿cuál debe ser la periodicidad mínima con la que el personal facultativo responsable debe consultar a la persona paciente, una vez presentada la solicitud, para confirmar si manti ene su deseo?","o":{"A":"Al menos cada 7 días.","B":"Al menos cada 15 días, debiendo dejarse constancia en la historia clínica.","C":"Al menos cada 30 días, si el procedimiento se extiende.","D":"Una única vez antes de la prestación."},"c":"B/ NULA"},{"id":690,"q":"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿cuál es el derecho que asiste al personal sanitario directamente implicado en la prestación de ayuda para morir?","o":{"A":"Derecho a la reubicación en un puesto de trabajo diferente.","B":"Derecho a un incremento salarial por la complejidad de la prestación.","C":"Derecho a la objeción de conciencia.","D":"Derecho a recibir asistencia jurídica de oficio."},"c":"C"},{"id":691,"q":"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿qué define como \"padecimiento grave, crónico e imposibilitante\"?","o":{"A":"Aquel que implica la existencia de sufrimiento físico o psíquico constante.","B":"Aquel que genera una limitación que incide directamente sobre la autonomía física y capacidad de expresar su voluntad de la persona paciente.","C":"La dependencia de otra persona para la realización de al menos dos actividades básicas de la vida diaria.","D":"Una dolencia que ha sido declarada irreversible y con un pronóstico de vida inferior a seis meses."},"c":"B/A"},{"id":692,"q":"Según la Ley Orgánica 3/2021, de 24 de marzo, de regulación de la eutanasia, ¿cuál es el plazo que tiene la persona facultativa responsable para comunicar la resolución favorable a la Comisión de Garantía y Evaluación para su posterior verificación?","o":{"A":"Dentro de las 24 horas siguientes a la resolución.","B":"Dentro del día siguiente natural a la resolución.","C":"7 días desde la resolución favorable.","D":"No existe un plazo establecido para esta comunicación."},"c":"NULA?"},{"id":693,"q":"¿Cuál es el principio general que establece la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas?","o":{"A":"La libre acumulación de empleos públicos.","B":"La incompatibilidad para desempeñar más de un puesto en el sector público, salvo excepciones.","C":"La compatibilidad automática entre empleo público y privado.","D":"La compatibilidad solo en el ámbito sanitario."},"c":"B"},{"id":694,"q":"Con carácter general, el personal comprendido en la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, podrá desempeñar:","o":{"A":"Dos puestos públicos si uno es a tiempo parcial.","B":"Un segundo puesto público únicamente con autorización previa y en los supuestos previstos por la Ley.","C":"Cualquier actividad privada sin limitación.","D":"Dos puestos públicos si pertenecen a distinta Administración."},"c":"B"},{"id":695,"q":"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, ¿qué requisito es imprescindible para autorizar la compatibilidad con una actividad privada?","o":{"A":"Que la actividad sea sanitaria.","B":"Que no se supere la jornada ordinaria establecida.","C":"Que no se comprometa la imparcialidad o independencia del personal público.","D":"Que lo autorice la jefatura inmediata sin más trámites."},"c":"C"},{"id":696,"q":"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, ¿puede percibirse más de una remuneración con cargo a los presupuestos públicos?","o":{"A":"Sí, siempre que no superen el salario mínimo.","B":"No, salvo en los casos expresamente previstos en la Ley.","C":"Sí, sin limitación alguna.","D":"Solo si se trata de diferentes Administraciones autonómicas."},"c":"B"},{"id":697,"q":"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, ¿qué ocurre si se desempeña una actividad incompatible sin autorización?","o":{"A":"No ocurre nada si es fuera del horario laboral.","B":"Se considera falta leve.","C":"Puede dar lugar a responsabilidad disciplinaria.","D":"Solo se devuelve la remuneración percibida."},"c":"C"},{"id":698,"q":"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, ¿qué actividades están exceptuadas del régimen general de incompatibilidades?","o":{"A":"Las actividades docentes o de investigación en determinados supuestos.","B":"Cualquier actividad privada.","C":"Solo actividades artísticas.","D":"Actividades comerciales propias sin límite."},"c":"A"},{"id":699,"q":"Según la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, para que se autorice la compatibilidad para un segundo puesto público es necesario que:","o":{"A":"Sea en el mismo centro de trabajo.","B":"Sea la jornada completa.","C":"Sea en los supuestos tasados y no se modifique la jornada y horario del puesto principal.","D":"Lo apruebe el personal trabajador del servicio."},"c":"C"},{"id":700,"q":"La finalidad principal de la Ley 53/1984, de 26 de diciembre, de Incompatibilidades del personal al servicio de las Administraciones Públicas, es:","o":{"A":"Incrementar los ingresos del personal público.","B":"Garantizar la dedicación y la imparcialidad en el servicio público.","C":"Permitir la pluriactividad generalizada.","D":"Reducir el número de personal público."},"c":"B"}];

// ── STATE ──
let state = { mode: 'all', queue: [], idx: 0, answered: false, streak: 0 };
let bannerTimeout = null;

// ── THEME ──
function initTheme() {
  const saved = localStorage.getItem('fc_theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('theme-checkbox').checked = saved === 'dark';
}
function toggleTheme() {
  const isDark = document.getElementById('theme-checkbox').checked;
  const theme = isDark ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('fc_theme', theme);
}

// ── STORAGE ──
const STORAGE_KEY = 'fc_data_v3';
let db = loadDB();

function loadDB() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { history: [], qStats: {}, streak: 0, maxStreak: 0, todayAnswers: 0, todayDate: null, _todayStats: null };
}
function saveDB() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); } catch(e) {} }
function todayStr() { return new Date().toISOString().slice(0,10); }

function ensureToday() {
  const today = todayStr();
  if (db.todayDate !== today) {
    if (db.todayDate && db._todayStats) db.history.push({ date: db.todayDate, ...db._todayStats });
    db.todayDate = today;
    db._todayStats = { correct: 0, wrong: 0, skipped: 0 };
    db.todayAnswers = 0;
  }
  if (!db._todayStats) db._todayStats = { correct: 0, wrong: 0, skipped: 0 };
}

function recordAnswer(qId, isCorrect) {
  ensureToday();
  if (!db.qStats[qId]) db.qStats[qId] = { correct: 0, wrong: 0 };
  if (isCorrect) {
    db.qStats[qId].correct++;
    db._todayStats.correct++;
    db.streak++;
    db.maxStreak = Math.max(db.maxStreak, db.streak);
  } else {
    db.qStats[qId].wrong++;
    db._todayStats.wrong++;
    db.streak = 0;
    hideBanner();
  }
  db.todayAnswers++;
  state.streak = db.streak;
  saveDB();
  updateHeaderStats();

  // Banner at streak of 3, then every 5 after
  if (isCorrect && db.streak === 3) showBanner(3);
  else if (isCorrect && db.streak > 3 && db.streak % 5 === 0) showBanner(db.streak);
}

function recordSkip(qId) {
  ensureToday();
  db._todayStats.skipped++;
  db.streak = 0; state.streak = 0;
  db.todayAnswers++;
  saveDB(); updateHeaderStats();
  hideBanner();
}

// ── VIEW ──
function showView(v, btn) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(v + '-view').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (v === 'analytics') renderAnalytics();
}

// ── MODE ──
function setMode(m, btn) {
  state.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  buildQueue(); loadCard();
}

function buildQueue() {
  let pool;
  if (state.mode === 'wrong') {
    pool = QUESTIONS.filter(q => { const s = db.qStats[q.id]; return s && s.wrong > 0; });
    if (!pool.length) { pool = QUESTIONS; showToast('Sin preguntas con errores, mostrando todas'); }
  } else if (state.mode === 'random') {
    pool = [...QUESTIONS].sort(() => Math.random() - 0.5).slice(0, 30);
  } else {
    const hard = QUESTIONS.filter(q => { const s = db.qStats[q.id]; if(!s) return false; const t=s.correct+s.wrong; return t>=2 && s.wrong/t>=0.5; });
    const rest = QUESTIONS.filter(q => !hard.includes(q));
    pool = [...hard, ...rest];
  }
  state.queue = pool; state.idx = 0;
  updateProgress();
}

// ── CARD ──
function loadCard() {
  const q = state.queue[state.idx];
  if (!q) {
    document.getElementById('q-text').textContent = '¡Has completado todas las preguntas! 🎉';
    document.getElementById('options-container').innerHTML = '';
    document.getElementById('q-number').textContent = 'Completado';
    return;
  }
  state.answered = false;
  const card = document.getElementById('main-card');
  card.classList.remove('flipped');
  document.getElementById('btn-next').classList.remove('visible');
  const back = document.getElementById('card-back');
  back.className = 'card-face card-back';

  const s = db.qStats[q.id];
  const badge = document.getElementById('difficult-badge');
  if (s) { const t=s.correct+s.wrong; badge.style.display = t>=2 && s.wrong/t>=0.5 ? 'inline-flex' : 'none'; }
  else badge.style.display = 'none';

  document.getElementById('q-number').textContent = `Pregunta ${q.id} · ${QUESTIONS.length} totales`;
  document.getElementById('q-text').textContent = q.q;

  const container = document.getElementById('options-container');
  container.innerHTML = '';
  container.classList.add('slide-up');
  setTimeout(() => container.classList.remove('slide-up'), 400);

  const correctAnswers = q.c.split('/').map(x => x.trim());
  Object.entries(q.o).forEach(([letter, text]) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${letter}</span><span>${text}</span>`;
    btn.onclick = () => selectAnswer(letter, correctAnswers, q.id);
    container.appendChild(btn);
  });
  updateProgress();
}

function selectAnswer(chosen, correctAnswers, qId) {
  if (state.answered) return;
  state.answered = true;
  const isCorrect = correctAnswers.includes(chosen);
  const container = document.getElementById('options-container');
  container.querySelectorAll('.opt-btn').forEach(btn => {
    btn.disabled = true;
    const l = btn.querySelector('.opt-letter').textContent;
    if (correctAnswers.includes(l)) btn.classList.add('correct-opt');
    if (l === chosen && !isCorrect) btn.classList.add('wrong-opt');
  });

  const back = document.getElementById('card-back');
  const icon = document.getElementById('result-icon');
  const text = document.getElementById('result-text');
  const answer = document.getElementById('result-answer');
  if (isCorrect) {
    back.classList.add('correct-back');
    icon.textContent = '✓'; text.className = 'result-text correct'; text.textContent = '¡Correcto!'; answer.textContent = '';
  } else {
    back.classList.add('wrong-back');
    icon.textContent = '✗'; text.className = 'result-text wrong'; text.textContent = 'Incorrecto';
    const ct = correctAnswers.map(l => `${l}: ${state.queue[state.idx].o[l]||''}`).join(' / ');
    answer.innerHTML = `Respuesta correcta: <strong>${ct}</strong>`;
  }

  setTimeout(() => document.getElementById('main-card').classList.add('flipped'), 200);
  recordAnswer(qId, isCorrect);
  document.getElementById('btn-next').classList.add('visible');

  if (isCorrect) {
    const pill = document.getElementById('streak-pill');
    pill.classList.add('streak-pop');
    setTimeout(() => pill.classList.remove('streak-pop'), 400);
  }
}

function nextQuestion() { state.idx++; if(state.idx >= state.queue.length){ if(state.mode==='all') state.idx=0; else buildQueue(); } loadCard(); }
function skipQuestion() { const q=state.queue[state.idx]; if(q&&!state.answered) recordSkip(q.id); nextQuestion(); }

// ── BANNER ──
function showBanner(n) {
  const banner = document.getElementById('streak-banner');
  document.getElementById('banner-streak-num').textContent = n;
  banner.classList.add('visible');
  spawnConfetti();
  clearTimeout(bannerTimeout);
  bannerTimeout = setTimeout(hideBanner, 5000);
}
function hideBanner() {
  document.getElementById('streak-banner').classList.remove('visible');
  clearTimeout(bannerTimeout);
}
function closeBanner() { hideBanner(); }

// ── CONFETTI ──
function spawnConfetti() {
  const container = document.getElementById('confetti-container');
  container.innerHTML = '';
  const colors = ['#5fa855','#e8a84a','#d96060','#60a8d9','#a855d9','#f7f5f0'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + '%';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = Math.random() * 0.8 + 's';
    el.style.width = el.style.height = (6 + Math.random() * 6) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(el);
  }
  setTimeout(() => { container.innerHTML = ''; }, 4000);
}

// ── HEADER ──
function updateHeaderStats() {
  ensureToday();
  document.getElementById('streak-count').textContent = db.streak;
  document.getElementById('today-count').textContent = db.todayAnswers;
  const pill = document.getElementById('streak-pill');
  if (db.streak >= 3) pill.classList.add('streak-active'); else pill.classList.remove('streak-active');
  const all = Object.values(db.qStats);
  const total = all.reduce((s,x) => s+x.correct+x.wrong, 0);
  const correct = all.reduce((s,x) => s+x.correct, 0);
  document.getElementById('accuracy-pct').textContent = total > 0 ? Math.round(correct/total*100)+'%' : '—';
}

function updateProgress() {
  const total = state.queue.length, pct = total > 0 ? Math.round(state.idx/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${state.idx} / ${total}`;
  document.getElementById('queue-info').textContent =
    state.mode==='wrong' ? `${total} con errores` : state.mode==='random' ? `30 aleatorias` : `${total} preguntas`;
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── ANALYTICS ──
function renderAnalytics() {
  ensureToday();
  const allStats = Object.entries(db.qStats);
  const totalAnswered = allStats.reduce((s,[,x]) => s+x.correct+x.wrong, 0);
  const totalCorrect = allStats.reduce((s,[,x]) => s+x.correct, 0);
  const totalWrong = allStats.reduce((s,[,x]) => s+x.wrong, 0);
  const uniqueQ = allStats.length;
  const accuracy = totalAnswered > 0 ? Math.round(totalCorrect/totalAnswered*100) : 0;

  document.getElementById('analytics-subtitle').textContent = `${uniqueQ} preguntas practicadas · Actualizado ahora`;

  document.getElementById('metrics-grid').innerHTML = [
    { label: 'Respuestas totales', value: totalAnswered, sub: 'desde el inicio' },
    { label: 'Precisión global', value: accuracy+'%', sub: `${totalCorrect} correctas` },
    { label: 'Racha máxima', value: db.maxStreak, sub: 'respuestas seguidas' },
    { label: 'Hoy', value: db.todayAnswers, sub: 'respuestas hoy' },
    { label: 'Preguntas vistas', value: uniqueQ, sub: `de ${QUESTIONS.length} totales` },
    { label: 'Fallos totales', value: totalWrong, sub: 'para repasar' },
  ].map(m => `<div class="metric-card"><div class="metric-label">${m.label}</div><div class="metric-value">${m.value}</div><div class="metric-sub">${m.sub}</div></div>`).join('');

  const days = [];
  for (let i=6; i>=0; i--) { const d=new Date(); d.setDate(d.getDate()-i); days.push(d.toISOString().slice(0,10)); }
  const weekData = days.map(date => {
    const entry = date===db.todayDate ? db._todayStats : db.history.find(h=>h.date===date);
    return { date, correct: entry?.correct||0, wrong: entry?.wrong||0 };
  });
  const maxVal = Math.max(...weekData.map(d=>d.correct+d.wrong), 1);
  const dayNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  document.getElementById('weekly-chart').innerHTML = weekData.map(d => {
    const total=d.correct+d.wrong, pct=Math.round(total/maxVal*100);
    const name=dayNames[new Date(d.date+'T12:00:00').getDay()];
    return `<div class="bar-col"><div class="bar-val">${total||''}</div><div class="bar-outer"><div class="bar-inner" style="height:${pct}%"></div></div><div class="bar-label">${name}</div></div>`;
  }).join('');

  const difficult = allStats.map(([id,s]) => { const t=s.correct+s.wrong, rate=t>0?s.wrong/t:0; return {id:parseInt(id),...s,total:t,rate}; })
    .filter(x=>x.total>=2&&x.rate>=0.4).sort((a,b)=>b.rate-a.rate).slice(0,10);

  const dl = document.getElementById('difficult-list');
  if (!difficult.length) {
    dl.innerHTML = `<div class="empty-state"><div class="big">✨</div>¡Sin preguntas difíciles aún!</div>`;
  } else {
    dl.innerHTML = `<div class="difficult-header"><span style="font-size:13px;font-weight:600;color:var(--text2)">Pregunta</span><span style="font-size:13px;font-weight:600;color:var(--text2)">Tasa de error</span></div>` +
      difficult.map(d => { const q=QUESTIONS.find(x=>x.id===d.id); const qt=q?q.q.slice(0,100)+(q.q.length>100?'...':''):`Pregunta ${d.id}`; return `<div class="difficult-item"><span class="difficult-num">#${d.id}</span><span class="difficult-q">${qt}</span><span class="difficult-rate">${Math.round(d.rate*100)}% error</span></div>`; }).join('');
  }

  const allDays = [...db.history];
  if (db.todayDate && db._todayStats) allDays.push({ date: db.todayDate, ...db._todayStats });
  const recentDays = allDays.slice(-14).reverse();
  const bd = document.getElementById('daily-breakdown');
  if (!recentDays.length) {
    bd.innerHTML = `<div class="empty-state"><div class="big">📅</div>¡Empieza a estudiar!</div>`;
  } else {
    bd.innerHTML = recentDays.map(d => {
      const total=(d.correct||0)+(d.wrong||0)+(d.skipped||0), acc=total>0?Math.round((d.correct||0)/total*100):0;
      const dl=d.date===todayStr()?'Hoy':new Date(d.date+'T12:00:00').toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'});
      return `<div class="daily-row"><span class="daily-date">${dl}</span><div class="daily-pills"><span class="pill-gray">${total} resp.</span><span class="pill-green">✓ ${d.correct||0}</span><span class="pill-red">✗ ${d.wrong||0}</span>${total>0?`<span class="pill-gray">${acc}%</span>`:''}</div></div>`;
    }).join('');
  }
}

// ── INIT ──
initTheme();
ensureToday();
db.streak = db.streak||0; db.maxStreak = db.maxStreak||0;
state.streak = db.streak;
buildQueue(); loadCard(); updateHeaderStats();
</script>
