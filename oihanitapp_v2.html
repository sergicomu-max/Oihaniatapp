 hepática.","B":"Disminuir el aporte de sodio y prevenir el empeoramiento del edema y la ascitis.","C":"Evitar la absorción de grasas saturadas y colesterol.","D":"Prevenir déficits de vitaminas hidrosolubles."},"c":"B"},{"id":101,"q":"En relación con la fisiopatología de la pancreatitis aguda, señale la afirmación FALSA:","o":{"A":"La activación intrapancreática de enzimas digestivas contribuye al daño tisular local y a la respuesta inflamatoria inicial.","B":"La liberación de mediadores inflamatorios desde el páncreas puede participar en el desarrollo de alteraciones sistémicas y fallo multiorgánico.","C":"En la pancreatitis aguda asociada a litiasis biliar, la obstrucción del sistema de conductos pancreáticos puede favorecer l a activación enzimática.","D":"La necrosis pancreática constituye un requisito fisiopatológico previo para que se inicie la activación de las enzimas digestivas."},"c":"D"},{"id":102,"q":"Tras la inserción de una sonda nasogástrica destinada a aspiración gástrica en un paciente adulto, ¿cuál de las siguientes actuaciones es la opción VERDADERA para identificar de forma correcta su colocación antes de utilizarla?","o":{"A":"Insuflar aire con una jeringa y auscultar el epigastrio en busca de borborigmos, como se ha hecho tradicionalmente.","B":"Comprobar que el paciente no presenta tos, disnea ni cambios en la saturación de oxígeno tras la inserción.","C":"Aspirar contenido a través de la sonda y valorar sus características junto con la medición del pH.","D":"Verificar que la longitud externa de la sonda coincide con la medida estimada previamente."},"c":"C"},{"id":103,"q":"En un paciente portador de una ileostomía reciente, ¿cuál es la recomendación dietética CORRECTA durante las primeras cuatro semanas tras la cirugía para reducir el riesgo de obstrucción intestinal?","o":{"A":"Priorizar el consumo de frutas y verduras crudas bien masticadas desde el inicio para favorecer la motilidad intestinal.","B":"Consumir frutas y verduras en puré y seguir una dieta baja en residuos.","C":"Mantener una dieta sin restricciones específicas siempre que no aparezcan molestias abdominales.","D":"Introducir los alimentos ricos en fibra junto con un aumento de la ingesta hídrica."},"c":"B"},{"id":104,"q":"Un paciente con resección extensa del duodeno presenta cansancio progresivo, palidez cutáneo -mucosa y glositis. ¿Qué alteración nutricional explica mejor este cuadro clínico?","o":{"A":"Déficit de vitamina B₁₂ por alteración de la absorción ileal.","B":"Déficit de hierro por alteración de su absorción intestinal.","C":"Déficit de vitamina D con alteración del metabolismo óseo.","D":"Déficit de ácido fólico secundario a malabsorción yeyunal distal."},"c":"B"},{"id":105,"q":"¿Cuál de los siguientes medicamentos puede alterar los resultados de una prueba tiroidea?","o":{"A":"Amoxicilina.","B":"Amiodarona.","C":"Paracetamol.","D":"Metformina."},"c":"B"},{"id":106,"q":"En relación con el metabolismo basal disminuido en el hipotiroidismo, ¿cuál de las siguientes combinaciones de signos clínicos es más coherente con el estado metabólico de estos pacientes?","o":{"A":"Pérdida de peso con aumento del apetito.","B":"Pérdida rápida de masa muscular con hiperreflexia generalizada.","C":"Bradicardia, gasto cardiaco disminuido y fatiga fácil al esfuerzo mínimo.","D":"Aumento del consumo de oxígeno en reposo y disnea por aumento del trabajo respiratorio."},"c":"C"},{"id":107,"q":"¿Cuál de los siguientes valores cumple criterios diagnósticos de diabetes mellitus en una persona asintomática, siempre que se confirme en una segunda determinación?","o":{"A":"Glucemia plasmática en ayunas de 110 mg/dl tras 6 horas de ayuno.","B":"Hemoglobina A1c del 6,6 %.","C":"Glucemia plasmática a las 2 horas de una Prueba de Tolerncia Oral de la Glucosa de 180 mg/dl.","D":"Glucemia plasmática aleatoria de 180 mg/dl sin síntomas."},"c":"B"},{"id":108,"q":"En las dietas para personas con diabetes mellitus, ¿cuál es el límite de calorías procedentes de grasas saturadas?","o":{"A":"Menos del 10 % de las calorías totales.","B":"Menos del 20 % de las calorías totales.","C":"Hasta el 30 % de las calorías totales.","D":"No existe un límite específico si se controla el colesterol total."},"c":"A"},{"id":109,"q":"En relación con la fibra dietética en personas con diabetes mellitus, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"La fibra soluble acelera el vaciamiento gástrico y la absorción de la glucosa.","B":"El aumento de la fibra dietética incrementa la necesidad de insulina exógena.","C":"La relevancia clínica de la fibra dietética en el control glucémico es insignificante.","D":"Se recomienda una ingesta diaria mínima de 25 g de fibra."},"c":"D"},{"id":110,"q":"¿Cuál de las siguientes insulinas se caracteriza por un inicio de acción de 10 – 15 minutos, un pico máximo aproximado de 1 hora y una duración de 2 a 4 horas?","o":{"A":"Insulina lispro.","B":"Insulina regular.","C":"Insulina NPH.","D":"Insulina glargina."},"c":"A"},{"id":111,"q":"¿Cuál de las siguientes características corresponde al fenómeno del alba como causa de hiperglucemia matutina?","o":{"A":"Hipoglucemia nocturna seguida de hiperglucemia de rebote al despertar.","B":"Glucemia normal hasta aproximadamente las 3:00 a. m., con aumento posterior.","C":"Incremento progresivo de la glucemia desde la hora de acostarse hasta las primeras horas de la mañana.","D":"Descenso de la glucemia nocturna por exceso de insulina vespertina."},"c":"B"},{"id":112,"q":"Paciente con diabetes mellitus tipo 2 presenta glucemias en ayunas dentro de objetivos, pero picos repetidos de hiperglucemia posprandial tras las comidas. ¿Qué grupo farmacológico sería el más adecuado para actuar sobre este mecanismo?","o":{"A":"Biguanidas.","B":"Tiazolidinedionas.","C":"Inhibidores de la α -glucosidasa.","D":"Secretagogos de insulina."},"c":"C"},{"id":113,"q":"Paciente de 72 años con diabetes mellitus tipo 2 tratado con insulina NPH por la tarde acude a urgencias tras presentar desorientación y dificultad para despertar durante la madrugada. A su llegada, la glucemia capilar es de 38 mg/dL. En relación con este caso, ¿cuál de las siguientes afi rmaciones es VERDADERA?","o":{"A":"El cuadro clínico es compatible con hipoglucemia moderada, que puede tratarse exclusivamente con hidratos de carbono por vía oral.","B":"La causa más probable es el fenómeno del alba, caracterizado por hiperglucemia progresiva desde las 3:00 a. m.","C":"En este contexto, está indicada la administración de glucagón por vía intramuscular si el paciente no puede deglutir.","D":"Una vez corregida la glucemia y recuperado el nivel de conciencia, no es necesaria vigilancia posterior si el paciente se encuentra estable."},"c":"C"},{"id":114,"q":"Paciente de 24 años con diabetes mellitus tipo 1 acude a urgencias por vómitos, dolor abdominal y respiración profunda y rápida. Presenta poliuria, polidipsia y aliento afrutado. La glucemia ca pilar es de 520 mg/dL y el pH arterial es de 7,18. En relación con este cuadro clínico, ¿cuál de las siguientes afirmaciones es VERDADERA?","o":{"A":"La cetoacidosis diabética se produce por un exceso de insulina que favorece la hipoglucemia y la alcalosis metabólica.","B":"En la cetoacidosis diabética, la administración de bicarbonato intravenoso es una medida de primera línea para corregir la acidosis metabólica","C":"La respiración de Kussmaul representa un mecanismo compensador frente a la acidosis metabólica producida por la acumulación de cuerpos cetónicos.","D":"Este cuadro clínico es más compatible con un síndrome hiperosmolar hiperglucémico, caracterizado por ausencia de acidosis y de cuerpos cetónicos."},"c":"C"},{"id":115,"q":"En relación con las intervenciones de enfermería en el síndrome hiperosmolar hiperglucémico, ¿cuál de las siguientes intervenciones NO es correcta?","o":{"A":"Vigilar de forma estrecha el estado hídrico y el gasto urinario debido al alto riesgo de deshidratación grave.","B":"Administrar líquidos intravenosos y ajustar su composición según las cifras de sodio y la gravedad de la pérdida de volumen.","C":"Priorizar la corrección rápida de la hiperglucemia mediante insulina intravenosa para revertir la acidosis metabólica.","D":"Monitorizar con frecuencia los electrolitos séricos y el estado cardiovascular durante el tratamiento."},"c":"C"},{"id":116,"q":"En la valoración y prevención del pie diabético en personas con diabetes, ¿cuál de las siguientes intervenciones es CORRECTA?","o":{"A":"Realizar una exploración completa de los pies al menos una vez al año, incluyendo la valoración de la sensibilidad protectora.","B":"Limitar la exploración del pie a los pacientes que refieren dolor o molestias.","C":"Utilizar el monofilamento de Semmes -Weinstein únicamente en presencia de úlceras visibles.","D":"Recomendar el corte curvo de las uñas para evitar la presión sobre el lecho ungueal."},"c":"A"},{"id":117,"q":"Paciente de 68 años con diabetes mellitus tipo 2 desde hace 12 años acude a consulta de enfermería. No presenta lesiones visibles en los pies. En la exploración, no percibe el estímulo del monofilamento en zonas plantares de apoyo y se observan callosidades. Pulsos periféricos palpables. En relación con este caso, ¿cuál de las siguientes actu aciones es la más adecuada?","o":{"A":"Clasificar al paciente como de bajo riesgo al no presentar úlceras ni signos de infección activa.","B":"Mantener una revisión anual del pie, sin aumentar la frecuencia, al conservar la integridad cutánea.","C":"Derivar al podólogo para el abordaje de las zonas de presión y prevenir la aparición de úlceras.","D":"Iniciar tratamiento antibiótico profiláctico para evitar la infección de las callosidades."},"c":"C"},{"id":118,"q":"En relación con la regulación del flujo sanguíneo cerebral, ¿cuál de las siguientes afirmaciones es FALSA?","o":{"A":"La autorregulación cerebral permite mantener un flujo sanguíneo cerebral relativamente constante pese a variaciones de la presión arterial sistémica.","B":"El flujo sanguíneo cerebral regional puede variar de forma importante en respuesta a cambios metabólicos locales.","C":"El aumento de la presión parcial de dióxido de carbono en sangre produce vasodilatación cerebral y aumento del flujo sanguíneo cerebral.","D":"Cuando la presión arterial media desciende por debajo del límite inferior de autorregulación, el flujo sanguíneo cerebral pasa a depender principalmente de los mecanismos metabólicos locales."},"c":"D"},{"id":119,"q":"Paciente de 70 años es trasladado a urgencias tras un inicio brusco de síntomas neurológicos. La tomografía computarizada craneal confirma un ictus hemorrágico. En relación con este diagnóstico, ¿cuál de los siguientes signos o síntomas NO se corresponde habitualmente con un ictus hemorrágico?","o":{"A":"Dete rioro progresivo del nivel de conciencia.","B":"Vómitos secundarios al aumento de la presión intracraneal","C":"Cefalea intensa de inicio súbito.","D":"Hipotensión arterial mantenida."},"c":"D"},{"id":120,"q":"En relación con la cascada isquémica que se produce en el ictus cerebrovascular isquémico, ¿cuál de las siguientes afirmaciones es FALSA?","o":{"A":"La disminución del flujo sanguíneo cerebral obliga a las neuronas a recurrir a la respiración anaerobia, con producción de ácido láctico y descenso del pH.","B":"El fallo en la producción de ATP provoca alteraciones en las bombas de membrana y desequilibrio iónico celular.","C":"La penumbra isquémica corresponde a una zona de tejido cerebral irrecuperable que evoluciona inevitablemente a necrosis.","D":"El aumen to del calcio intracelular y la liberación de glutamato activan vías que conducen a la lesión y muerte celular."},"c":"C"},{"id":121,"q":"En el contexto de un ictus, pueden verse afectadas diversas funciones cerebrales. ¿Cuál de las siguientes definiciones es CORRECTA?","o":{"A":"Hemiparesia: Parálisis completa de la cara, el brazo y la pierna en un mismo lado del cuerpo (por una lesión en el hemisferio contrario)","B":"Disartria: alteración del lenguaje que impide comprender o expresar palabras.","C":"Apraxia: pérdida de la coordinación y del equilibrio que se manifiesta como marcha inestable y movimientos imprecisos.","D":"Hemianopsia homónima: pérdida de la misma mitad del campo visual (derecha/izquierda) en ambos ojos."},"c":"D"},{"id":122,"q":"En relación con el envejecimiento cognitivo normal, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"Con la edad, la memoria a corto plazo se deteriora de forma marcada incluso cuando no se exige una alta demanda de procesamiento.","B":"Las personas mayores muestran un deterioro similar en tareas de recuerdo libre y en tareas de reconocimiento.","C":"El envejecimiento cognitivo normal se asocia a una mayor afectación de los procesos de recuperación de la información que de los procesos de codificación.","D":"El envejecimiento cognitivo normal implica una pérdida generalizada de la capacidad intelectual y del funcionamiento cognitivo global."},"c":"C"},{"id":123,"q":"En relación con los principales síndromes de demencia progresiva, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"La enfermedad de Alzheimer se caracteriza por una atrofia cortical predominante en los lóbulos parietal y temporal.","B":"La demencia frontotemporal se manifiesta inicialmente por un deterioro predominante de la memoria episódica, similar al observado en la enfermedad de Alzheimer.","C":"La demencia vascular cursa de forma uniforme y progresiva, sin relación con eventos cerebrovasculares focales.","D":"La demencia con cuerpos de Lewy se asocia a la acumulación predominante de amiloide β como principal mecanismo fisiopatológico."},"c":"A"},{"id":124,"q":"En la valoración neurológica de un paciente con sospecha de ictus, se emplean distintas escalas clínicas. ¿Cuál de los siguientes ítems forma parte de la Escala NIHSS?","o":{"A":"Respuesta motora a estímulos dolorosos.","B":"Nivel de independencia funcional para las actividades básicas de la vida diaria.","C":"Evaluación de la desviación de la mirada conjugada.","D":"Valoración de la orientación temporal y espacial mediante preguntas estructuradas."},"c":"C"},{"id":125,"q":"En relación con las crisis convulsivas, la epilepsia y el estado epiléptico, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"El estado epiléptico puede incluir convulsiones clínicas o eléctricas continuas que persisten durante al menos 30 minutos, incluso sin recuperación completa del estado de conciencia entre episodios.","B":"La epilepsia se diagnostica cuando una convulsión generalizada se acompaña de alteración del estado de conciencia y actividad motora bilateral.","C":"Las convulsiones generalizadas se originan de forma característica en un hemisferio cerebral y posteriormente se propagan al resto del encéfalo.","D":"Las convulsiones secundarias a causas metabólicas agudas se clasifican como epilepsia cu ando se repiten durante un mismo episodio clínico."},"c":"A"},{"id":126,"q":"Durante la exploración neurológica, una enfermera solicita al paciente que cierre los ojos con fuerza, muestre los dientes y eleve las cejas para valorar la simetría facial. ¿Qué nervio craneal se está explorando?","o":{"A":"V par craneal.","B":"VII par craneal.","C":"III par craneal.","D":"XI par craneal."},"c":"B"},{"id":127,"q":"Una mujer de 32 años, diagnosticada de esclerosis múltiple hace 8 años, presentó inicialmente episodios de visión borrosa y debilidad en extremidades con recuperación casi completa tras cada brote. Desde hace aproximadamente 2 años, refiere un empeoramiento neurológico progresivo y continuo, con aumento de la dificultad para la marcha y la fatiga, independientemente de la apari ción de nuevos brotes. Según esta evolución clínica, ¿cuál es el tipo de esclerosis múltiple más probable?","o":{"A":"Esclerosis múltiple progresiva primaria.","B":"Esclerosis múltiple remitente -recurrente.","C":"Esclerosis múltiple progresiva secundaria.","D":"Esclerosis múltiple progresiva recurrente."},"c":"C"},{"id":128,"q":"Un paciente de 72 años consulta en urgencias por cefalea de inicio reciente, localizada en la región temporal derecha, acompañada de fatiga generalizada y pérdida de peso no intencionada. Refiere dolor al masticar y presenta hipersensibilidad al palpar la arteria temporal. Desde la perspectiva de la valoración enfermera, ¿cuál de las siguientes interpretaciones es la MÁS adecuada?","o":{"A":"Cefalea primaria de tipo tensional.","B":"Migraña con aura.","C":"Cefalea secundaria compatible con arteritis craneal.","D":"Cefalea trigémino -autonómica."},"c":"C"},{"id":129,"q":"Un varón de 79 años, previamente autónomo para las actividades básicas, ingresa por una fractura de cadera tras una caída. A las 48 horas del ingreso comienza a presentar desorientación intermitente, dificultad para mantener la atención durante la entrevista y alternancia entre periodos de somnolencia y agitación, especialmente por la noche. En algunos momentos responde de forma cohere nte y en otros no reconoce el lugar ni la fecha. No constan antecedentes de deterioro cognitivo previo. Desde la perspectiva de la valoración enfermera, ¿ante cuál de las siguientes situaciones clínicas es MÁS probable que nos encontremos?","o":{"A":"Demen cia tipo Alzheimer en fase inicial.","B":"Demencia vascular.","C":"Envejecimiento cognitivo normal, con alteraciones leves de la memoria sin afectación de la atención.","D":"Delírium."},"c":"D"},{"id":130,"q":"Durante la valoración neurológica de un paciente ingresado por traumatismo craneoencefálico, la enfermera aplica la escala de coma de Glasgow. Respecto a esta escala, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"La escala de coma de Glasgow evalúa exclusivamente el nivel de conciencia mediante la valoración de las pupilas, la respuesta verbal y motora.","B":"La mejor respuesta motora tiene un rango de puntuación de \"1\" a \"6\", siendo “obedece órdenes” la puntuación más alta.","C":"Una puntuación total de \"0\" indica un estado de coma profundo con ausencia de respuesta a estímulos.","D":"La escala de coma de Glasgow incluye la valoración de reflejos del tronco encefálico como parte de su puntuación total."},"c":"B"},{"id":131,"q":"En relación con los cuidados de enfermería y las recomendaciones al paciente tras la colocación de una escayola de yeso húmeda, señale la opción INCORRECTA:","o":{"A":"Debe evitarse la carga de peso sobre la escayola hasta que esté completamente seca, lo cual suele ocurrir en un período aproximado de 48 –72 horas.","B":"Se debe informar al paciente de que, durante el proceso de fraguado y secado del yeso, puede experimentar sensación de calor local.","C":"Se recomienda el empleo de medios artificiales (por ejemplo, secador de pelo o aire caliente) para acelerar el secado del yeso y prevenir deformidades.","D":"Tras su colocación, la extremidad debe mantenerse elevada por encima del nivel del corazón, apoyando la escayola sobre almohadas para favorecer el retorno venoso."},"c":"C"},{"id":132,"q":"En un paciente con fractura de cadera a la espera de intervención quirúrgica, ¿qué tipo de tracción se utiliza clásicamente como medida temporal para alineación e inmovilización del miembro afectado?","o":{"A":"Tracción de Dunlop.","B":"Tracción tipo Russell.","C":"Tracción de Bryant.","D":"Tracción de Buck."},"c":"D"},{"id":133,"q":"En el contexto de un paciente adulto con fractura abierta de tibia tratada mediante fijación externa, durante la valoración de enfermería se observa secreción en la zona de inserción de las agujas del fijador. En relación con los cuidados de enfermería y el mantenimiento del aparato de fijación externa, especialmente en los puntos de entrada de las agujas, señale la afirmación correcta:","o":{"A":"La presencia de drenaje graso en el trayecto de la aguja debe interpretarse siempre como un signo de infección activa y requiere antibioterapia inmediata.","B":"El drenaje graso que puede observarse en la superficie de contacto entre el fijador y el tejido adiposo, especialmente con el movimiento del tejido alrededor de la aguja, no debe confundirse con exudado purulento.","C":"La aparición de cualquier tipo de exudado en la zona de inserción de las agujas es indicación absoluta de retirada inmediata del aparato de fijación externa.","D":"La presencia de exudado en la zona de inserción de las agujas indica siempre una complicación infecciosa, por lo que está indicado realizar curas con antisépticos varias veces al día."},"c":"B"},{"id":134,"q":"En relación con la movilización y posicionamiento del paciente en el postoperatorio inmediato tras una artroplastia total de rodilla, señale la afirmación correcta:","o":{"A":"Se debe ayudar al paciente a adoptar una posición cómoda, pudiendo realizar cambios posturales y ajustar la cabecera de la cama, ya que el riesgo de desplazamiento de la prótesis es bajo.","B":"El dispositivo de movimiento pasivo continuo (CPM) debe iniciarse de forma estándar a 60º y aumentar rápidamente hasta alcanzar 120º de flexión en las primeras 48 horas.","C":"Para facilitar la adaptación al CPM, se recomienda mantener la rodilla en flexión mantenida con una almohada bajo la articulación entre sesiones.","D":"El CPM debe iniciarse únicamente cuando se retire el drenaje y el paciente presente control completo del dolor sin analgesia pautada."},"c":"A"},{"id":135,"q":"En relación con la clasificación de los esguinces según el grado de lesión ligamentosa, señale la afirmación correcta:","o":{"A":"El esguince de primer grado se caracteriza por el desgarro de algunas fibras del ligamento y la posible aparición de un hematoma leve y localizado, acompañado de dolor leve y edema.","B":"El esguince de primer grado implica un desgarro parcial del ligamen to y se asocia típicamente a inestabilidad articular y pérdida parcial de la función.","C":"El esguince de segundo grado se produce cuando existe rotura completa del ligamento, con dolor intenso, edema máximo y movimiento articular anómalo.","D":"El esguince de tercer grado se caracteriza por la distensión leve del ligamento, con edema mínimo y ausencia de limitación funcional significativa."},"c":"A"},{"id":136,"q":"En relación con el acrónimo PRICE , utilizado en el abordaje inicial de lesiones musculoesqueléticas agudas (p. ej., esguinces), ¿cuál de las siguientes opciones indica correctamente el significado de sus letras?","o":{"A":"Protección – Reposicionamiento – Inmovilización – Compresión – Ejercicio.","B":"Protección – Reposo – Ice (hielo) – Compresión – Elevación.","C":"Prevención – Rehabilitación – Inmovilización – Control del dolor – Elevación.","D":"Protección – Reducción de la inflamación – Inmovilización – Compresión – Estiramientos."},"c":"B"},{"id":137,"q":"En relación con la osteoporosis y sus manifestaciones clínicas, señale la afirmación INCORRECTA:","o":{"A":"La osteoporosis se caracteriza por la disminución de la masa ósea, deterioro de la matriz y reducción de la fortaleza arquitectónica del hueso.","B":"En la osteoporosis el recambio óseo se altera, de modo que la resorción ósea mantenida por los osteoblastos es mayor que la formación ósea llevada a cabo por los osteoclastos, produciendo una menor masa ósea total.","C":"Como consecuencia, los huesos se tornan progresivamente más porosos, quebradizos y frágiles, pudiendo fracturarse ante esfuerzos que no afectarían a un hueso normal.","D":"Las fracturas por fragilidad asociadas a osteoporosis afectan con frecuencia a la columna torácica y l umbar, cadera y muñeca, pudiendo constituir la primera manifestación clínica."},"c":"B"},{"id":138,"q":"En relación con los factores de riesgo para el desarrollo de osteoporosis, señale la afirmación INCORRECTA:","o":{"A":"Índice de masa corporal alto.","B":"Alteraciones de malabsorción (p. ej., enfermedad celíaca o cirugía bariátrica).","C":"Tratamiento con corticoesteroides sistémicos durante más de 3 meses.","D":"Hombres mayores de 60 años."},"c":"A"},{"id":139,"q":"Respecto al vendaje compresivo para reducción y modelado del muñón tras una amputación de extremidad inferior, señale la afirmación INCORRECTA:","o":{"A":"Tras el lavado con agua y jabón, conviene asegurar un secado completo antes de vendar.","B":"El objetivo es favorecer un muñón cónico, especialmente en amputación por encima de la rodilla.","C":"El vendaje debe generar un gradiente de presión, siendo mayor en el extremo distal.","D":"La venda debe aplicarse con vueltas circulares horizontales, evitando los recorridos diagonales, para asegurar una presión uniforme."},"c":"D"},{"id":140,"q":"En relación con la clasificación de las fracturas abiertas , señale la afirmación correcta :","o":{"A":"El tipo II se caracteriza por una herida grande con avulsión extensa y riesgo elevado de amputación traumática.","B":"El tipo I corresponde a una herida contaminada de más de 1 cm y con daño extenso de tejidos blandos.","C":"El tipo III se asocia a herida muy contaminada y extenso daño de tejidos blandos.","D":"El tipo I se define por una herida limpia de más de 2 cm y sin afectación de tejidos blandos."},"c":"C"},{"id":141,"q":"En relación con la artritis reumatoide, señale la afirmación correcta:","o":{"A":"Afecta con mayor frecuencia a hombres.","B":"Se asocia a predisposición genética y respuesta inmune mediada por células T.","C":"La inflamación sinovial no suele producir alteración estructural articular relevante.","D":"Se caracteriza por disminución de citocinas y ausencia de autoanticuerpos."},"c":"B"},{"id":142,"q":"Ante un paciente con artritis reumatoide, ¿cuál de estos síntomas podría encontrar?","o":{"A":"Inicio brusco con fiebre alta.","B":"Fatiga, pérdida de peso y rigidez generalizada.","C":"Dolor localizado sin rigidez y con síntomas sistémicos.","D":"Episodios autolimitados sin exacerbaciones ni remisiones."},"c":"B"},{"id":143,"q":"Según las directrices de la Organización Mundial de la Salud sobre osteoporosis, ¿en cuál de las siguientes situaciones se recomienda iniciar tratamiento en mujeres posmenopáusicas y hombres >50 años?","o":{"A":"Fractura previa de cadera o vértebra.","B":"Probabilidad mayor del 30% de una fractura importante relacionada con osteoporosis a 10 años.","C":"Probabilidad de fractura de cadera a 10 años mayor del 1%.","D":"T-score entre −1,5 y −3,5 y con antecedente familiar de osteoporosis."},"c":"A"},{"id":144,"q":"Nos encontramos ante una gestante de 28 semanas que presenta cifras de hematocrito discretamente disminuidas respecto a valores pregestacionales. Este dato se explica primordialmente por:","o":{"A":"Aumento desproporcionado del volumen plasmático.","B":"Déficit de hierro por aumento del consumo fetal.","C":"Aumento de la destrucción eritrocitaria.","D":"Disminución de la eritropoyesis."},"c":"A"},{"id":145,"q":"¿Cuál de los siguientes cambios respiratorios es característico del embarazo normal?","o":{"A":"Hipoventilación fisiológica.","B":"Aumento de la PaCO₂.","C":"Aumento del ángulo subcostal y expansión de la caja costal.","D":"Alcalosis respiratoria descompensada."},"c":"C"},{"id":146,"q":"La aparición de cetonuria en una gestante con ingesta insuficiente de hidratos de carbono se explica porque:","o":{"A":"Disminuye la absorción de grasa.","B":"Se incrementa la movilización lipídica.","C":"Aumenta el uso de proteínas fetales.","D":"Se reduce el metabolismo basal."},"c":"B"},{"id":147,"q":"En una mujer con IMC normal antes del embarazo, el aumento de peso recomendado es:","o":{"A":"6-8 kg.","B":"8,1-11,3 kg.","C":"11,4–15,9 kg.","D":">16 kg."},"c":"C"},{"id":148,"q":"En la gestación, el estreñimiento se relaciona con:","o":{"A":"Relajación de la musculatura lisa intestinal y aumento del peristaltismo.","B":"Relajación de la musculatura lisa intestinal y aumento de la secreción gástrica.","C":"Relajación de la musculatura lisa intestinal y pirosis.","D":"Relajación de la musculatura lisa intestinal."},"c":"D"},{"id":149,"q":"¿Qué signo de peligro en el embarazo debe ser comunicado inmediatamente?","o":{"A":"Ptialismo.","B":"Leucorrea.","C":"Síndrome del túnel carpiano.","D":"Hiperemesis gravídica."},"c":"D"},{"id":150,"q":"Durante los primeros días del puerperio es normal encontrar:","o":{"A":"Loquios rubra.","B":"Hematoma.","C":"Ausencia de sangrado.","D":"Útero atónico."},"c":"A"},{"id":151,"q":"En el postparto, a todas las mujeres Rh negativas que cumplen unos requisitos específicos:","o":{"A":"Hay que administrarles globulina inmunitaria Rh (RhoROL) en las 24 horas posteriores al parto para prevenir la sensibilización por la transfusión materno -fetal de hematíes fetales Rh positivos.","B":"Hay que administrarles globulina inmunitaria Rh (RhoIGM) en las 72 horas posteriores al parto para preve nir la sensibilización por la transfusión materno - fetalde hematíes fetales Rh positivos.","C":"Hay que administrarles globulina inmunitariaRh (RhoGAM) en las 72 horas posteriores al parto para prevenir la sensibilización por la transfusión materno - fetalde hematíes fetales Rh positivos.","D":"Hay que administrarles globulina inmunitariaRh (RhoGAM) en las 24 horas posteriores al parto para prevenir la sensibilización por la transfusión materno - fetalde hematíes fetales Rh positivos."},"c":"C"},{"id":152,"q":"En relación con la alimentación durante el embarazo, es correcto afirmar que:","o":{"A":"Se deben duplicar las calorías ingeridas.","B":"Se recomienda la suplementación con ácido fólico y hierro.","C":"Las mayores necesidades de vitaminas y minerales pueden cubrirse mediante. suplementación.","D":"Se recomienda una dieta equilibrada adaptada estacionalmente."},"c":"B"},{"id":153,"q":"Las contracciones de Braxton Hicks se caracterizan por ser:","o":{"A":"Contracciones uterinas intermitentes no dolorosas que aparecen cada 10 ó 20 minutos. Se presentan con mayor frecuencia hacia el término de la gestación, y a veces se confunden con verdaderos signos de parto.","B":"Contracciones uterinas intermitentes dolorosas que aparecen cada 10 ó 20 minutos. Se presentan con mayor frecuencia hacia el inicio de la gestación, y a veces se confunden con verdaderos signos de parto.","C":"Contracciones uterinas intermitentes no dolorosas que aparecen cada 10 ó 20 minutos. Se presentan con mayor frecuencia hacia el término de la gestación , y no se confunden con verdaderos signos de parto.","D":"Contracciones uterinas intermitentes dolorosas que aparecen cada 10 ó 20 minutos. Se presentan con mayor frecuencia hacia la mitad de la gestación, y a veces se confunden con verdaderos signos de p arto."},"c":"A"},{"id":154,"q":"Señale la afirmación CORRECTA sobre la miocardiopatía perinatal.","o":{"A":"Su tratamiento incluye digoxina, adrenérgicos, los vasodilatadores necesarios, hemorreológicos, y un estricto reposo en cama.","B":"Los síntomas son semejantes a los de la insuficiencia respiratoria adquirida en la comunidad: disnea, ortopnea, cansancio, tos, dolor torácico y edema.","C":"No está desaconsejado un nuevo embarazo porque la enfermedad no tiende a recidivar durante la gestación.","D":"Consiste en una disfunción del ventrículo izquierdo que se produce en el último mes de la gestación o en los 5 primeros meses del puerperio."},"c":"D"},{"id":155,"q":"Se consideran las principales causas de depresión posparto:","o":{"A":"Adaptaciones psicológicas y los factores hormonales.","B":"La fatiga, la incomodidad.","C":"La incomodidad y la sobreestimulación.","D":"Factores hormonales y la sobreestimulación."},"c":"A"},{"id":156,"q":"Son cambios maternales correspondientes a las 24 semanas de gestación:","o":{"A":"El feto desciende a la pelvis materna (encajamiento). La placenta es casi cuatro veces más gruesa que hace 20 semanas y pesa casi 10 kg. La madre está deseando parir, puede tener accesos finales de energía. Aumentan las lumbalgias y la frecuencia urinaria. Las contracciones de Braxton Hicks se intensifican mientras el cérvix y el segmento uterino inferior se preparan para el parto. La pareja puede visitar las salas de dilatación y de parto.","B":"El fondo uterino llega a la altura del ombligo. Las mamas empiezan a secretar calostro. La bolsa amniótica contiene unos400 mL de líquido. La mujer puede marearse y desvanecerse, especialmente al cambiar bruscamente de postura. Pueden empezar a aparecer varices venosas. La mujer percibe los mo vimientos del feto y el embarazo puede parecerle “más real” de repente. Las aréolas se oscurecen. Puede aparecer congestión nasal. Pueden empezar a producirse calambres en las piernas. Puede producirse estreñimiento.","C":"El fondo uterino alcanza la apófisis xifoides; las mamas están hinchadas y sensibles. Puede reaparecer la polaquiuria. Pueden hincharse los tobillos y aparecer problemas para dormir. Puede producirse disnea.","D":"El fondo uterino se sitúa por encima del ombligo. Puede producirse lum balgia y calambres en las piernas. La piel puede sufrir cambios, como estrías gravídicas, cloasma, línea negra, acné, eritema palmar y plantar. Pueden producirse hemorragias nasales. El crecimiento del útero puede provocar prurito abdominal; seguirá hasta el término de la gestación."},"c":"D/B"},{"id":157,"q":"En relación a los principales mecanismos fisiológicos de regulación renal. ¿Cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"La regulación de la excreción de agua depende principalmente de la aldosterona, que ajusta el volumen urinario en función de la ingesta hídrica diaria.","B":"La regulación de la excreción de solutos implica que, en condiciones normales, la cantidad de electrolitos excretados diariamente es igual a la cantidad ingerida, estando el sodio bajo control hormonal de la aldosterona.","C":"La regulación del equilibrio ácido -base se basa fundamentalmente en la eliminación pulmonar del dióxido de carbono, siendo mínima la participación renal en la excreción de ácidos.","D":"La regulación de la presión arterial renal se produce por vasodilatación directa de los glomérulos en respuesta al aumento de la presión arterial sistémica, sin participación hormonal."},"c":"B"},{"id":158,"q":"Durante la valoración de enfermería, se identifican antecedentes personales que pueden aumentar el riesgo de alteraciones renales o urológicas. ¿Cuál de las siguientes asociaciones entre enfermedad sistémica y complicación renal es CORRECTA?","o":{"A":"Lupus eritematoso sistémico → Nefritis y enfermedad renal crónica.","B":"Embarazo → Incontinencia urinaria permanente por daño neurológico.","C":"Esclerosis múltiple → Insuficiencia renal aguda por hipoperfusión renal.","D":"Radioterapia de la pelvis → Formación de cálculos renales de oxalato cálcico."},"c":"A"},{"id":159,"q":"Un paciente con insuficiencia renal crónica avanzada presenta deterioro progresivo del estado mental, dificultades de concentración y alteraciones del nivel de conciencia compatibles con encefalopatía urémica crónica. Desde la perspectiva del tratamiento, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"La encefalopatía urémica crónica se trata fundamentalmente mediante la restricción hídrica y el ajuste dietético, sin necesidad de terapia de reemplazo renal.","B":"El tratamiento de elección consiste en la administración intravenosa de bicarbonato para corregir la acidosis metabólica y mejorar el estado neurológico.","C":"La hemodiálisis solo está indicada en casos de encefalopatía aguda, no siendo útil en alteraciones neurológicas crónicas asociadas a uremia.","D":"La diálisis actúa como tratamiento de soporte vital al eliminar productos de desecho y desequilibrios electrolíticos responsables de la encefalopatía urémica."},"c":"D"},{"id":160,"q":"En pacientes con insuficiencia renal crónica en tratamiento con hemodiálisis, ¿cuál de las siguientes afirmaciones sobre el manejo de las proteínas en la dieta es CORRECTA?","o":{"A":"Debe restringirse de forma estricta, independientemente del tratamiento sustitutivo, para evitar la acumulación de productos nitrogenados.","B":"Debe aumentarse la ingesta proteica para prevenir la desnutrición proteico - energética asociada a la uremia y a las pérdidas durante la diálisis.","C":"Debe basarse preferentemente en proteínas vegetales, ya que aportan un mayor valor biológico que las proteínas animales.","D":"Puede reducirse la ingesta proteica siempre que el aporte calórico total de la dieta sea suficiente."},"c":"B"},{"id":161,"q":"Un paciente de 68 años ingresa por vómitos y diarrea de varios días de evolución. En la analítica se observa aumento de urea y creatinina, con una relación urea/creatinina claramente elevada. La diuresis está disminuida. En el estudio de orina se objetivan sodio urinario < 20 mEq/L, osmolalidad urinaria elevada y sedimento urinario sin alteraciones significativas. Según estos datos, ¿qué tipo de lesión renal aguda es la más probable?","o":{"A":"Lesión renal aguda intrarrenal.","B":"Lesión renal aguda posrenal.","C":"Lesión renal aguda prerrenal.","D":"Lesión renal aguda por daño parenquimatoso tubular."},"c":"C"},{"id":162,"q":"¿Cuál de las siguientes NO corresponde a una causa de insuficiencia renal prerrenal?","o":{"A":"Pérdidas gastrointestinales por vómitos y diarrea.","B":"Hemorragia aguda.","C":"Insuficiencia cardiaca con disminución del gasto cardíaco.","D":"Obstrucción de las vías urinarias por hiperplasia prostática benigna."},"c":"D"},{"id":163,"q":"En relación con los ejercicios de los músculos pélvicos en el tratamiento de la incontinencia urinaria, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"Los ejercicios de Kegel fortalecen exclusivamente la musculatura del suelo pélvico en mujeres y no se recomiendan en hombres.","B":"Los ejercicios de Kegel deben realizarse únicamente durante fases activas de contracción, sin periodos de reposo, para ser eficaces.","C":"Los ejercicios de Kegel consisten en contracciones voluntarias de 5 –10 segundos seguidas de fases de reposo, y deben realizarse varias veces al día durante al menos 6 semanas.","D":"La eficacia de los ejercicios de Kegel depende principalmente de la estimulación eléctrica asociada, siendo poco útiles cuando se realizan de forma aislada."},"c":"C"},{"id":164,"q":"En relación con los tipos de incontinencia urinaria, señale la afirmación FALSA:","o":{"A":"Incontinencia urinaria de esfuerzo: pérdida involuntaria de orina a través de una uretra intacta asociada a aumentos de la presión abdominal, como al toser, estornudar o cambiar de posición, relacionada con un menor soporte del suelo pélvico.","B":"Incontinencia urinaria de urgencia: pérdida involuntaria de orina asociada a un deseo urgente de orinar que no puede ser suprimido, generalmente precipitada por una contracción no inhibida del detrusor, incluso en ausencia de disfunción neurológica evident e.","C":"Incontinencia urinaria funcional: pérdida involuntaria de orina causada por alteraciones estructurales de la vejiga o la uretra, con vías urinarias inferiores intactas pero incapacidad del esfínter para mantener la continencia.","D":"Incontinencia urinaria iatrogénica: pérdida involuntaria de orina secundaria a factores médicos externos, especialmente fármacos, que alteran los mecanismos de cierre uretral o aumentan la presión intravesical."},"c":"C"},{"id":165,"q":"En relación con los factores de riesgo de la incontinencia urinaria, señale la opción FALSA:","o":{"A":"Demencia.","B":"Inmovilidad.","C":"Furosemida.","D":"Ejercicio aeróbico."},"c":"D"},{"id":166,"q":"Durante el sondaje vesical permanente, la enfermera debe aplicar medidas para reducir el riesgo de infección urinaria asociada a la sonda. ¿Cuál de las siguientes actuaciones NO es correcta?","o":{"A":"Mantener la bolsa colectora por debajo del nivel de la vejiga.","B":"Irrigar la sonda de forma rutinaria para evitar obstrucciones.","C":"Realizar higiene de manos antes y después de manipular el sistema.","D":"Mantener el sistema de drenaje cerrado y sin desconexiones innecesarias."},"c":"B"},{"id":167,"q":"En relación con la estimación clínica del llenado de la vejiga, ¿cuál de las siguientes afirmaciones NO es correcta?","o":{"A":"La vejiga normalmente no es palpable hasta que contiene más de 150 ml de orina.","B":"La percusión suprapúbica suele producir un sonido hueco en condiciones normales.","C":"Cuando la vejiga contiene aproximadamente 500 ml, puede apreciarse un abultamiento suprapúbico.","D":"El dolor aparece de forma precoz, antes de alcanzar la capacidad total vesical."},"c":"B/D"},{"id":168,"q":"Durante la revisión del plan de cuidados enfermeros en un paciente con sonda urinaria permanente, te encuentras revisando las intervenciones dirigidas a prevenir la infección urinaria asociada a la sonda. ¿Cuál de las siguientes actuaciones NO es correcta según las recomendaciones actuales?","o":{"A":"Cambiar la sonda urinaria cuando exista obstrucción del flujo para corregir problemas de filtración.","B":"Sustituir la bolsa colectora cada 8 horas de forma sistemática para reducir la carga bacteriana.","C":"Mantener el tubo de drenaje sin acodamientos para asegurar un flujo continuo de orina.","D":"Evitar la irrigación rutinaria de la sonda salvo indicación clínica específica."},"c":"B"},{"id":169,"q":"Durante la realización de un sondaje vesical, la enfermera debe adaptar la técnica según las diferencias anatómicas entre hombres y mujeres. ¿Cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"En la mujer, la menor longitud de la uretra permite un sondaje más rápido y con menor riesgo de lesión.","B":"En el varón, la menor longitud de la uretra permite un sondaje más rápido y con menor riesgo de lesión.","C":"En la mujer, se recomienda inflar el balón inmediatamente tras la aparición de orina.","D":"En el varón, es necesario avanzar la sonda varios centímetros después de la aparición de orina antes de inflar el balón."},"c":"D"},{"id":170,"q":"El sitio más frecuente para la epistaxis es el tabique anterior. ¿Cuál de los siguientes vasos sanguíneos NO está implicado en este tipo de epistaxis?","o":{"A":"Arteria etmoidal anterior.","B":"Rama septal de la arteria labial superior.","C":"Arteria palatina mayor.","D":"Arteria esfenopalatina en la region postoinferior."},"c":"D"},{"id":171,"q":"En relación con el manejo inicial de la epistaxis anterior, ¿cuál de las siguientes medidas NO es correcta?","o":{"A":"Colocar al paciente en posición sentada, con la cabeza inclinada hacia adelante.","B":"Aplicar presión directa comprimiendo la parte dura externa de la nariz contra el tabique nasal.","C":"Mantener la compresión nasal continua durante al menos 5 –10 minutos.","D":"Utilizar un descongestionante nasal en aerosol, como la fenilefrina, para favorecer la vasoconstricción."},"c":"B"},{"id":172,"q":"Tras un episodio de epistaxis, la enfermera realiza educación sanitaria orientada a prevenir nuevos sangrados. ¿Cuál de las siguientes recomendaciones SÍ debe incluirse en la capacitación del paciente sobre su autocuidado?","o":{"A":"Reanudar el ejercicio físico intenso a las 24 horas si no reaparece el sangrado.","B":"Aplicar calor local sobre el dorso nasal para favorecer la vasodilatación y la cicatrización.","C":"Evitar alimentos calientes y el consumo de tabaco durante varios días tras el episodio.","D":"Sonarse la nariz con fuerza para eliminar coágulos residuales y prevenir recurrencias."},"c":"C"},{"id":173,"q":"Durante una valoración auditiva, una enfermera revisa el resultado de una audiometría tonal de un paciente adulto. El informe muestra una pérdida auditiva de 10 dB en el oído derecho. Según la clasificación por decibelios, ¿cómo debe interpretarse este hallazgo?","o":{"A":"Audición normal","B":"Pérdida auditiva leve.","C":"Pérdida auditiva moderada.","D":"Pérdida auditiva grave."},"c":"A"},{"id":174,"q":"Durante la valoración de un paciente con sospecha de pérdida auditiva conductiva, la enfermera repasa posibles causas relacionadas con el oído externo y medio. ¿Cuál de las siguientes NO se asocia a una pérdida auditiva conductiva?","o":{"A":"Tapones de cerumen","B":"Otitis externa","C":"Otosclerosis del oído medio","D":"Daño del nervio vestíbulo -coclear"},"c":"D"},{"id":175,"q":"En relación con la otitis externa, señale la afirmación CORRECTA:","o":{"A":"Es una infección del oído medio caracterizada por dolor retroauricular y perforación timpánica.","B":"Se produce principalmente por infecciones bacterianas (Aspergillus).","C":"Se presenta con prurito, dolor al movilizar el pabellón auricular, exudado y posible disminución de la audición.","D":"Se recomienda limpiar el conducto auditivo externo con hisopos de algodón."},"c":"C"},{"id":176,"q":"En la valoración de un paciente con dolor de oído, la enfermera debe diferenciar entre otitis externa y otitis media aguda. ¿Cuál de las siguientes afirmaciones es CORRECTA según las características clínicas de ambo s cuadros clínicos ?","o":{"A":"En la otitis media, aparece otalgia que se alivia cuando se rompe la membrana timpánica.","B":"En la otitis media aguda cursa con edema del conducto auditivo externo.","C":"En la otitis externa es habitual la presencia de fiebre y síntomas de infección respirato ria alta.","D":"La pérdida auditiva es de tipo neurosensorial en la otitis media aguda y conductiva en la otitis externa."},"c":"A"},{"id":177,"q":"Tras una cirugía de oído medio o mastoides, la enfermera proporciona educación sanitaria al paciente sobre los cuidados postoperatorios. ¿Cuál de las siguientes intervenciones NO es correcta?","o":{"A":"Evitar sonarse la nariz durante las primeras 2 –3 semanas tras la cirugía.","B":"Estornudar y toser con la boca abierta durante varias semanas después de la intervención.","C":"Considerar normales las sensaciones de chasquido o crepitación en el oído intervenido durante los primeros días.","D":"Irrigar el oído intervenido con suero fisiológico si aparece sensación de taponamiento."},"c":"D"},{"id":178,"q":"En relación con la otitis media aguda (OMA) en lactantes, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"La principal causa de OMA en lactantes es la inmadurez del sistema inmunitario, independientemente de la anatomía de la trompa de Eustaquio.","B":"La trompa de Eustaquio más corta, horizontal y ancha en los lactantes facilita el reflujo de líquido y bacterias desde la nasofaringe al oído medio.","C":"La alimentación con biberón reduce el riesgo de OMA al favorecer una deglución más eficaz en posición supina.","D":"La posición horizontal del lactante durante el sueño disminuye la posibilidad de que la infección alcance el oído medio."},"c":"B"},{"id":179,"q":"En relación con el colesteatoma como complicación de la otitis media, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"Se trata de una lesión del oído medio, generalmente asociada a otitis media crónica, que puede producir erosión ósea progresiva y pérdida auditiva.","B":"Es una complicación aguda de la otitis media que cursa típicamente con dolor intenso, fiebre elevada y otorrea purulenta de inicio brusco.","C":"Su desarrollo depende fundamentalmente de infecciones virales repetidas del oído medio y suele resolverse con tratamiento antibiótico sistémico prolongado.","D":"Es una lesión inflamatoria benigna que rara vez produce complicaciones locales o intracraneales y no requiere tratamiento quirúrgico."},"c":"A"},{"id":180,"q":"En relación con los trastornos del equilibrio y del oído interno, señale la definición INCORRECTA:","o":{"A":"Laberintitis: inflamación del laberinto del oído interno, de origen viral o bacteriano, que puede afectar tanto a la audición como al equilibrio y, en ocasiones, aparecer como complicación de una otitis media.","B":"Enfermedad de Ménière: trastorno del oído interno caracterizado por un desequilibrio en los líquidos endolinfáticos, con aumento de la presión endolinfática, que provoca episodios de vértigo, alteraciones auditivas y acúfenos.","C":"Vértigo: percepción errónea o ilusión de movimiento de la pe rsona o de su entorno, que suele describirse como una sensación de giro y se asocia a alteraciones del sistema vestibular.","D":"Mareo: alteración del equilibrio causada por una lesión inflamatoria del laberinto del oído interno, que provoca sensación rota toria intensa."},"c":"D"},{"id":181,"q":"En relación con la enfermedad de Ménière, ¿cuál de las siguientes combinaciones de síntomas es la CORRECTA?","o":{"A":"Vértigo episódico, hipoacusia fluctuante y acúfenos.","B":"Mareo continuo, otalgia intensa y fiebre.","C":"Inestabilidad postural, diplopía y cefalea persistente.","D":"Pérdida auditiva conductiva, vértigo y dolor auricular."},"c":"A"},{"id":182,"q":"Una mujer de 52 años diagnosticada de enfermedad de Ménière acude a consulta de enfermería para reforzar las recomendaciones dietéticas. Refiere que ha reducido la sal “de mesa”, pero continúa con síntomas fluctuantes. ¿Cuál de las siguientes intervenciones NO es adecuada dentro del plan educativo enfermero?","o":{"A":"Recomendar la distribución regular de comida s y tentempiés a lo largo del día para evitar cambios bruscos en el volumen de líquidos del oído interno.","B":"Aconsejar limitar alimentos procesados y enlatados por su alto contenido en potasio.","C":"Evitar el consumo de cafeína y bebidas carbonatadas por su efecto diurético.","D":"Advertir sobre el consumo de alimentos ricos en glutamato monosódico, por su posible relación con el empeoramiento de los síntomas."},"c":"B"},{"id":183,"q":"En relación con el mantenimiento de un catéter periférico corto, ¿cuál de las siguientes actuaciones es la más adecuada para disminuir el riesgo de infección y complicaciones asociadas al acceso venoso periférico?","o":{"A":"Cambiar el bioconector siempre que se cambie el catéter o, como máximo, cada 7 días.","B":"Limpiar siempre el bioconector con solución de Clorhexidina alcohólica >2% en alcohol isopropílico al 75% o alcohol isopropílico de 75%.","C":"Observar el punto de inserción al menos una vez al día y realizar cura inmediata si el apósito está sucio, mojado o despegado.","D":"Si se exterioriza parcialmente el catéter periférico corto, puede reintroducirse con técnica aséptica si la salida es inferior a 0,5 cm."},"c":"A/C"},{"id":184,"q":"¿En cuál de estos casos NO está indicada la vía venosa periférica?","o":{"A":"Paciente con capital venoso preservado.","B":"Terapia intravenosa prevista inferior a 7 días.","C":"Administración de sustancias no vesicantes ni irritantes con pH entre 5 y 9.","D":"Administración de soluciones con osmolaridad inferior a 600 mOsm/L."},"c":"D"},{"id":185,"q":"Según las características de los catéteres centrales de inserción periférica (PICC), ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"El PICC de punta abierta con válvula proximal impide el reflujo sanguíneo hacia la punta del catéter y no puede util izarse para monitorización de la presión venosa central.","B":"El PICC Groshong (punta cerrada con válvula distal) es apto para medición de PVC.","C":"El PICC de punta abierta no valvulado (con pinza) no permite monitorización de PVC.","D":"Los PICC de silicona tienen paredes más finas que los de poliuretano, por lo que aumentan la luz interna para el mismo French (Fr)."},"c":"A/B"},{"id":186,"q":"En relación con los cuidados extraluminales e intraluminales de los catéteres centrales de inserción periférica (PICC), ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"En PICC en reposo, el lavado intraluminal debe realizarse diariamente con 5 ml de suero fisiológico para mantener la permeabilidad.","B":"En infusión continua, no se recomienda el lavado intraluminal hasta finalizar el tratamiento, dado que el flujo continuo evita obstrucciones.","C":"Se recomienda que todos los PICC dispongan de bioconector, incluso en perfusión continua.","D":"En infusión intermitente, el lavado intraluminal se realizará únicamente al final del día, independientemente del número de usos."},"c":"C"},{"id":187,"q":"A la hora de realizar la cura de una herida con sutura (puntos), el/la profesional de enfermería deberá:","o":{"A":"Cortar el hilo de sutura por debajo del punto , alejado del nudo .","B":"Cortar el hilo de sutura por debajo del punto y lo más próximo posible al nudo .","C":"Cortar el hilo de sutura por encima del punto , alejado del nudo.","D":"Cortar el hilo de sutura por encima del punto y lo más próximo posible al nudo ."},"c":"B/A"},{"id":188,"q":"En la fase preoperatoria de un/a paciente quirúrgico/a, se realizan diversas intervenciones orientadas a la preparación y verificación clínica. ¿Cuál de las siguientes intervenciones NO se lleva a cabo en dicha fase?","o":{"A":"Anamnesis.","B":"Revisión de pruebas de laboratorio.","C":"Verbalización formal del protocolo “paciente correcto, procedimiento correcto, sitio correcto”.","D":"Evaluación física."},"c":"C"},{"id":189,"q":"Según el sistema de puntuación de recuperación postanestesia de Aldrete, ¿en cuál de los siguientes escenarios el/la paciente cumple criterios para el alta de la Unidad de Recuperación Postanestésica (URPA), considerando que se requiere una puntuación total igual o mayor a 9?","o":{"A":"Paciente que mueve voluntariame nte las cuatro extremidades, presenta tensión arterial dentro de ± 20 mmHg del valor preanestésico, está totalmente despierto, mantiene una spO2 >92% con aire ambiente y respira normalmente sin dificultad.","B":"Paciente que mueve voluntariamente dos extremidades, presenta tensión arterial dentro de ± 40 mmHg del valor preanestésico, se despierta al llamarlo, requiere de oxígeno suplementario para mantener spO2 >90% y presenta respiración superficial.","C":"Pacie nte que mueve voluntariamente las cuatro extremidades, presenta tensión arterial > 50 mmHg del valor preanestésico, se despierta al llamarlo, requiere de oxígeno suplementario para mantener spO2 >90% y presenta respiración superficial.","D":"Paciente que mueve voluntariamente dos extremidades, presenta tensión arterial dentro de ± 45 mmHg del valor preanestésico, se despierta al llamarlo, requiere de oxígeno suplementario y respira normalmente sin dificultad."},"c":"A"},{"id":190,"q":"Durante el seguimiento clínico del paciente en la sala de recuperación postanestésica, ¿cuál es la secuencia correcta para el control de las constantes vitales y la valoración del dolor tras la cirugía?","o":{"A":"Control cada 30 minutos hasta la estabilización, posteriormente cada hora durante 6 horas y después cada 8 horas durante 48 horas.","B":"Valoración cada 10 minutos durante la primera hora, posteriormente cada 2 horas durante 12 horas y después cada 6 horas durante 72 horas.","C":"Monitorización continua durante las primeras 4 horas, seguida de controles cada 2 horas durante las siguientes 24 horas.","D":"Evaluación cada 15 minutos hasta la estabilización, posteriormente cada 30 minutos durante 2 horas, cada hora durante 4 horas y, finalmente, cada 4 horas durante 24 – 48 horas."},"c":"D"},{"id":191,"q":"Al realizar un balance hídrico de un paciente y considerando los aportes y pérdidas medias diarias de líquidos en un adulto sano, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Las pérdidas urinarias habituales representan aproximadamente 800 ml al día, siendo el principal mecanismo de eliminación hídrica.","B":"La producción endógena de agua derivada del catabolismo de proteínas, carbohidratos y grasas aporta aproximadamente 300 ml diarios.","C":"Las pérdidas a través de la piel son inferiores a 200 ml diarios en condiciones normales.","D":"La eliminación hídrica por vía fecal constituye la principal fuente de pérdida de líquidos, superando los 600 ml diarios."},"c":"B"},{"id":192,"q":"El denominado “tercer espacio” se refiere al desplazamiento del líquido desde el espacio extracelular hacia compartimentos no funcionales, donde no contribuye al equilibrio hídrico entre el líquido intracelular y extracelular. En este contexto, ¿cuál de los siguientes conjuntos de signos y síntomas es más indicativo de la formación de tercer espacio?","o":{"A":"Aumento del volumen urinario, hipertensión arterial, elevación de la presión venosa central y pérdida de peso.","B":"Disminución de la frecuencia cardíaca, aumento de la presión arterial, edemas y balance hídrico positivo.","C":"Oliguria, hipotensión, disminución de la presión venosa central, edema y aumento ponderal.","D":"Poliuria, hipotensión, disminución de la presión venosa central, bradicardia y desequilibrio entre ingresos y egresos de líquidos."},"c":"C"},{"id":193,"q":"Durante la administración de anestesia general en el contexto quirúrgico, el personal de enfermería debe conocer las características clínicas de cada una de sus etapas para garantizar la seguridad del paciente. ¿Cuál de las siguientes afirmaciones describe correctamente las manifestaciones y cuidados prioritarios en cada fase anestésica?","o":{"A":"En la etapa I predominan la inconsciencia profunda y la inmovilidad.","B":"La etapa II se caracteriza por agitación psicomotriz que incluye manifestaciones variables como gritos, risa o llanto.","C":"Durante la etapa III el paciente presenta midriasis fija, pulso débil y riesgo elevado de paro respiratorio.","D":"La etapa IV el paciente presenta sudoración profusa, sialorrea, hipertensión y taquipnea."},"c":"B"},{"id":194,"q":"Durante la administración y el seguimiento de un paciente sometido a anestesia raquídea, ¿cuál de las siguientes afirmaciones describe correctamente sus características clínicas y los cuidados posteriores más relevantes?","o":{"A":"La anestesia raquídea se administra habitualmente en el espacio subaracnoideo a nivel de L2 –L3 y produce un bloqueo progresivo descendente desde el abdomen hacia las extremidades inferiores.","B":"La cefalea posterior a la anestesia raquídea se previene fundamentalmente mediante la sedestación precoz y la estimulación de la deambulación temprana.","C":"La colocación del paciente en posición semisentada inmediatamente tras la punción favorece un mayor nivel de bloqueo y reduce las complicaciones neurológicas.","D":"Tras la punción subaracnoidea lumbar, el bloqueo suele iniciarse en los dedos y el perineo, progresa hacia las extremidades inferiores y el abdomen."},"c":"D"},{"id":195,"q":"En el contexto de las técnicas de anestesia regional empleadas en el ámbito quirúrgico, ¿cuál de las siguientes afirmaciones describe correctamente una característica propia de la anestesia epidural?","o":{"A":"La anestesia epidural se administra en el espacio subaracnoideo tras atravesar la duramadre, utilizando dosis bajas de anestésico local.","B":"La anestesia epidural produce exclusivamente bloqueo sensitivo, sin afectar la función motora ni autonómica.","C":"La anestesia epidural requiere dosis más elevadas que la anestesia raquídea y presenta menor riesgo de cefalea postpunción.","D":"La anestesia epidural se caracteriza por un inicio inmediato del bloqueo debido al contacto directo del anestésico con la médula espinal."},"c":"C"},{"id":196,"q":"¿Qué característica define mejor a la enfermedad neoplásica maligna?","o":{"A":"Crecimiento lento y encapsulado.","B":"Regresión espontánea.","C":"Dependencia hormonal exclusiva.","D":"Capacidad de invasión y metástasis."},"c":"D"},{"id":197,"q":"En la administración de quimioterapia vesicante prolongada se recomienda:","o":{"A":"Vía intramuscular.","B":"Vía subcutánea.","C":"Vía oral.","D":"Catéter venoso central."},"c":"D"},{"id":198,"q":"¿Cuál es un efecto secundario frecuente derivado de la mielosupresión?","o":{"A":"Trombocitopenia.","B":"Hipertensión.","C":"Hiperglucemia.","D":"Retención urinaria."},"c":"A"},{"id":199,"q":"¿Qué equipo es obligatorio para preparar quimioterapia?","o":{"A":"Doble guante de nitrilo.","B":"Cabina de flujo laminar convencional.","C":"Gabinete de seguridad biológica clase II o III.","D":"Mascarilla quirúrgica simple."},"c":"C"},{"id":200,"q":"Durante la primera hora de infusión de citostáticos, suelen aparecer:","o":{"A":"Daño renal.","B":"Necrosis tisular.","C":"Reacciones de hipersensibilidad.","D":"Náuseas, vómitos intensos, diarrea y mucositis."},"c":"C"},{"id":201,"q":"La estomatitis asociada a quimioterapia requiere:","o":{"A":"Cepillado agresivo.","B":"Enjuagues alcohólicos.","C":"Ayuno prolongado.","D":"Exploración bucal diaria."},"c":"D"},{"id":202,"q":"¿Qué complicación trombótica es frecuente en pacientes oncológicos?","o":{"A":"Tromboembolia venosa.","B":"Trombocitosis.","C":"Hemofilia adquirida.","D":"Púrpura trombótica."},"c":"A"},{"id":203,"q":"Un objetivo clave de enfermería en radioterapia es:","o":{"A":"Evitar toda actividad física.","B":"Aplicar cremas alcohólicas.","C":"Regular la exposición solar.","D":"Cuidar de la piel irradiada."},"c":"D"},{"id":204,"q":"La ropa contaminada con citostáticos debe:","o":{"A":"Colocarse en contenedores específicos.","B":"Reutilizarse tras lavado.","C":"Desecharse como residuo común.","D":"Lavarse en casa."},"c":"A"},{"id":205,"q":"Es una característica de las neoplasias malignas:","o":{"A":"Presenta células bien diferenciadas, parecidas a las células normales del tejido del que se originó el tumor.","B":"El tumor crece por expansión y no infiltra los tejidos circundantes.","C":"Su velocidad de crecimiento es, casi siempre, lenta.","D":"Crece en la periferia y emite prolongaciones que infiltran e invaden los tejidos circundantes."},"c":"D"},{"id":206,"q":"Señala el cáncer con influencia genética de carácter autosómico recesivo:","o":{"A":"Síndrome de Cowden.","B":"Síndrome de Lynch (cáncer de colon hereditario sin poliposis).","C":"Síndrome de melanoma familiar.","D":"Síndrome de Li -Fraumeni."},"c":"A/B/C"},{"id":207,"q":"Los interferones, son:","o":{"A":"Citocinas producidas por subconjuntos de linfocitos T,células citolíticas naturales y células dendríticas.","B":"Citocinas con propiedades antivíricas, antitumorales e inmunomoduladoras (inhibición o estimulación del sistema inmunitario).","C":"Sustancia que causa inflamación, daño y necrosis tisulares cuando se extravasa y hay contacto con los tejidos.","D":"Sustancias que contienen porciones de células malignas, solas o combinadas."},"c":"B"},{"id":208,"q":"¿Qué EPI es correcto al manipular citostáticos?","o":{"A":"Doble guante específico para quimioterapia.","B":"Doble guante estéril quirúrgico.","C":"Doble guante de nitrilo.","D":"Doble guante de poliisopreno."},"c":"C/A"},{"id":209,"q":"En los cuidados al final de la vida, existen ciertas claves que nos permiten escuchar de forma eficaz: SEÑALE LA INCORRECTA.","o":{"A":"Evitar las respuestas estereotípicas, como “sé cómo se siente”.","B":"Hacer preguntas.","C":"Alentar con gentileza: “¿Necesitan más tiempo para pensarlo?”.","D":"Rellenar con cualquier charla el “espacio vacío” en la comunicación."},"c":"D"},{"id":210,"q":"El acrónimo COMFORT sirve de marco para la comunicación en cuidados paliativos, sus letras se refieren a:","o":{"A":"Comunicación, Orientacion, Convencerse,Familia,Oportunidades,Relacionarse y Trabajo en equipo.","B":"Comunicación, Orientacion, Consciencia,Familia,Oportunidades,Relacionarse y Trabajo en equipo.","C":"Comunicación, Orientacion,Convencerse,Familia,Oportunidades,Relajarse y Trabajo en equipo.","D":"Comunicación, Orientacion, Consciencia,Familia,Oportunidades,Relacionarse y Terapia farmacológica."},"c":"B"},{"id":211,"q":"¿Cuál sería una respuesta adecuada ante una persona en situación grave que pregunta al personal de enfermería sobre si se está muriendo?","o":{"A":"En esta situación, está permitido dar respuestas inútiles que desacrediten las preocupaciones reales del enfermo o releguen el problema a otro profesional de la salud mejor preparado.","B":"Se escucha con atención, se hacen preguntas adicionales de aclaración y se tranquiliza al enfermo sólo cuando él sea realista.","C":"Se debe establecer una declaración o pregunta cerrada (“¿Piensa usted en la muerte?”).","D":"Se debe evitar el contacto visual, favoreciendo el contacto físico y comenzar con una declaración que reconozca los temores del paciente."},"c":"B"},{"id":212,"q":"Son signos de muerte próxima:","o":{"A":"La visión y la audición pueden estar disminuidos y el habla puede ser difícil de comprender.","B":"Es posible que las secreciones se acumulen en la parte posterior de la garganta y se escuche un borboteo cuando el paciente respira por la boca.","C":"La respir ación puede volverse irregular, con períodos sin respiración (apnea).","D":"a),b) y c) son correctas."},"c":"D"},{"id":213,"q":"¿Cuál de los siguientes es un fármaco de elección para el exceso de secreciones bucales y respiratorias cuando la muerte es inminente?","o":{"A":"Adrenalina.","B":"Salbutamol.","C":"Escopolamina.","D":"Bromuro de ipratropio."},"c":"C"},{"id":214,"q":"¿Cuál de las siguientes expresiones asocia a la etapa de Negociación del duelo de Kübler -Ross?","o":{"A":"“No sé cómo se las van a arreglar mis hijos cuando yo no esté”.","B":"“He tenido una buena vida y no lamento nada”.","C":"“Esto no puede ser cierto”.","D":"“Sólo quiero ver el nacimiento de mi nieto, entonces voy a estar listo...”."},"c":"D"},{"id":215,"q":"El dolor como consecuencia del cáncer relacionado con órganos es:","o":{"A":"Dolor visceral.","B":"Dolor neuropatica.","C":"Dolor somático.","D":"Dolor simpático."},"c":"A"},{"id":216,"q":"La Escala visual del dolor revisada:","o":{"A":"Utiliza diferentes palabras o frases para describir la intensidad del dolor, como “sin dolor, leve, moderado, grave, muy intenso y el peor posible”.","B":"Tiene seis rostros para que sea congruente con otras escalas que emplean la métrica de 0 a 10. Los rostros van desde una expresión facial neutra a una de dolor intenso y están numeradas con 0, 2, 4, 6, 8 y 10.","C":"Consiste en una línea horizontal (a veces vertical) de 10 cm con referencias de palabras en los extremos, como “sin dolor” en un extremo y “dolor tan grave como sea posible” o “peor dolor posible” en el otro extremo.","D":"Consta de seis caras de dibujos con descriptores por escrito, que van desde un rostro sonriente a la derecha para “sin dolor” a un rostro con ceño fruncido lloroso a la izquierda para “el peor dolor”."},"c":"B"},{"id":217,"q":"¿Cuál de las siguientes es una característica del fentanilo?","o":{"A":"Produce efectos adversos hemodinámicos mínimos.","B":"Tiene un inicio lento pero una acción de larga duración.","C":"Es un opiáceo lipófobo, a diferencia de la morfina.","D":"Tiene un inicio rápido y una acción de larga duración."},"c":"A"},{"id":218,"q":"Entre los procesos clave del duelo que permiten a las personas adaptarse a la pérdida de manera sana NO se encuentra:","o":{"A":"Replicar los antiguos vínculos con la persona fallecida.","B":"Reaccionar a la separación, experimentar y expresar el dolor de la pérdida.","C":"Recordar y re experimentar al difunto, la relación y los sentimientos implicados.","D":"Reajustarse para adaptarse al nuevo mundo sin olvidar el antiguo."},"c":"A"},{"id":219,"q":"Durante la sedación paliativa, el personal de enfermería: SEÑALE LA INCORRECTA.","o":{"A":"Brinda apoyo emocional al paciente y su familia.","B":"Decide el momento de inicio del tratamiento farmacológico.","C":"Ofrece atención física centrada en el bienestar.","D":"Actúa como colaborador del equipo interdisciplinar."},"c":"B"},{"id":220,"q":"La atención paliativa, como concepto más amplio que el de cuidados paliativos, es una estrategia de atención que pretende:","o":{"A":"La prevención y el alivio del sufrimiento, intervienen y alivian el dolor, trabajar con los temas sobre la muerte y duelo, crear vínculos espirituales y psicológicos para la familia y el paciente.","B":"Ayudar a las personas con enfermedades graves a sentirse mejor al prevenir o tratar los síntomas y efectos secundarios de la enfermedad y el tratamiento.","C":"Prevenir y aliviar el sufrimiento y mantener lo mejor posible la calidad de vida delos pacientes y sus familias, cualquiera que sea la etapa de la enfermedad o la necesidad de otr os tratamientos.","D":"Un enfoque que mejora la calidad de vida de pacientes y familias que se enfrentan a los problemas asociados con enfermedades amenazantes para la vida, a través de la prevención y alivio del sufrimiento por medio de la identificación temprana e impecable e valuación y tratamiento del dolor y otros problemas, físicos, psicológicos y espirituales."},"c":"C"},{"id":221,"q":"Cicely Saunders, reconocida como la fundadora del movimiento hospice moderno y pionera de los cuidados paliativos a nivel mundial. Revolucionó la atención al final de la vida al fundar en 1967 el:","o":{"A":"Royal Trinity Hospice.","B":"St Andrew's Hospice.","C":"St Catherine's Hospice.","D":"St. Christopher’s Hospice."},"c":"D"},{"id":222,"q":"¿Qué significa tener un envejecimiento activo y saludable?","o":{"A":"Aumentar la esperanza de vida exclusivamente mediante una buena alimentación.","B":"Realizar actividad física diaria.","C":"Mantenerse libre de enfermedades que permitan que perdure la actividad laboral.","D":"Participar en la sociedad aprovechando las capacidades físicas, emocionales y sociales."},"c":"D"},{"id":223,"q":"¿Cuál es la recomendación general de actividad física diaria para mejorar la salud en personas mayores de 65 años?","o":{"A":"1 hora diaria de actividad intensa.","B":"30 minutos diarios de actividad física.","C":"1 hora diaria de ejercicio aeróbico.","D":"Actividad física dos veces por semana practicando algún deporte."},"c":"B"},{"id":224,"q":"La valoración social de una persona anciana requiere:","o":{"A":"La aplicación del índice de Katz.","B":"La aplicación de la escala OARS.","C":"La aplicación de la escala Yesavage.","D":"La aplicación de la escala Zarit."},"c":"B"},{"id":225,"q":"Entre los objetivos principales de la Valoración Geriátrica Integral NO encontramos:","o":{"A":"Establecer un diagnostico multidimensional.","B":"Planificar los cuidados de la mejor manera posible.","C":"Definir cuál es la localización más adecuada para el paciente anciano.","D":"Rentabilizar al máximo los recursos sanitarios."},"c":"D/A"},{"id":226,"q":"En las personas mayores sin patología tiroidea, la valoración de la función tiroidea se caracteriza por:","o":{"A":"Valores de TSH normales con T4 libre y T3 libre aumentadas.","B":"Valores de TSH bajos con T4 libre y T3 libre también bajos.","C":"Valores de TSH normales con T4 libre y T3 libre normales.","D":"Valores de TSH altos con T4 libre y T3 libre bajos."},"c":"C"},{"id":227,"q":"La incontinencia urinaria más común en mujeres ancianas y probablemente el tipo de incontinencia establecida más frecuente en mujeres menores de 75 años es:","o":{"A":"Incontinencia funcional.","B":"Incontinencia de esfuerzo.","C":"Incontinencia mixta.","D":"Incontinencia por hiperactividad vesical."},"c":"B"},{"id":228,"q":"Señale cuál de los siguientes, corresponde con un cambio fisiológico relacionado con el envejecimiento:","o":{"A":"Aumento de agua extracelular.","B":"Incontinencia urinaria.","C":"Incremento de masa grasa.","D":"Afección selectiva para los tonos de frecuencia baja en la audición."},"c":"C"},{"id":229,"q":"¿Cómo se interpreta una puntuación de 50 en el Índice de Barthel?","o":{"A":"Dependiente moderado para las actividades básicas de la vida diaria.","B":"Dependiente severo para las actividades básicas de la vida diaria.","C":"Dependiente leve para las actividades básicas de la vida diaria.","D":"Dependiente para las actividades instrumentales de la vida diaria."},"c":"A/B"},{"id":230,"q":"El Mini Mental State Examination (MMSE) utiliza la copia de un dibujo (dos pentágonos en intersección)para valorar:","o":{"A":"Atención y cálculo.","B":"Lenguaje y praxis constructiva.","C":"Fijación.","D":"Memoria."},"c":"B"},{"id":231,"q":"El CAM (Confusion Assessment Method) es un instrumento útil para el diagnóstico del delirium y evalúa cuatro criterios fundamentales. De las siguientes opciones, ¿cuál es FALSA?","o":{"A":"Alteración del nivel de consciencia.","B":"Alteración de la orientación.","C":"Comienzo agudo y curso fluctuante.","D":"Pensamiento desorganizado."},"c":"B"},{"id":232,"q":"Señale un instrumento de utilización frecuente en la valoración de la postura y la marcha en las personas mayores.","o":{"A":"Test de Pfeiffer.","B":"Escala Plutchik.","C":"Test de Tinneti.","D":"Escala de Gramorgan."},"c":"C"},{"id":233,"q":"En la Valoración funcional de la persona mayor, no debemos olvidar que la capacidad funcional no está influenciada únicamente por su estado físico, sino también por su capacidad mental y entorno social y ambiental. En este caso,¿ cuando hablamos del Grado de autonomía, nos referimos a?:","o":{"A":"Es la necesidad de asistencia física o verbal a través de dispositivos o terceras personas para realizar ciertos actos.","B":"La capacidad funcional de un individuo para realizar, por propia iniciativa y sin ayuda externa, las tareas elementales de autocuidado y funcionamiento físico necesarias para subsistir, tales como comer, vestirse, asearse, usar el baño y moverse. Implica la toma de decisiones personales sobre el propio estilo de vida y el control sobre las acciones diarias.","C":"El estado permanente de limitación física, psíquica o intelectual por el que una persona necesita ayuda importante o asistencia de terceros para realizar las tareas elementales de autocuidado.","D":"Es la capacidad de la persona de decidir por sí mismo su conducta, la orientación de sus actos y la realización de diversas actividades."},"c":"D/B"},{"id":234,"q":"¿Señala el grado CORRECTO que establece la Ley 39/2006 de Promoción de la Autonomía Personal y Atención a las personas en situación de dependencia?","o":{"A":"Dependencia moderada, la persona necesita ayuda para realizar varias actividades de la vida diaria, por lo menos dos veces al día.","B":"Dependencia severa, la persona precisa ayuda para realizar varias actividades de la vida cotidiana tres veces al día, pero no requiere la presencia permanente de la persona cuidadora.","C":"Gran dependencia, la persona precisa ayuda para realizar varias actividades básicas de la vida diaria varias veces al día, y necesita la presencia indispensable y continua de otra persona.","D":"Gran discapacidad, la persona eta ante una situación de incapacidad permanente absoluta que requiere la asistencia de otra persona para las necesidades básicas de la vida diaria."},"c":"C/B"},{"id":235,"q":"El baño del recién nacido a término sano en contexto de alta precoz:","o":{"A":"Debe evitarse siempre hasta pasadas 24 horas.","B":"Puede realizarse con seguridad tras completar la valoración al ingreso.","C":"Solo se permite tras retirar el pinzamiento del cordón.","D":"Debe realizarse fuera del área térmica (estufa radiante) para estimular la adaptación."},"c":"B"},{"id":236,"q":"La administración de Fitonadiona al recién nacido se indica para:","o":{"A":"Prevenir la hipertensión pulmonar persistente.","B":"Prevenir la hipoglucemia neonatal.","C":"Prevenir la enfermedad hemorrágica por niveles bajos de protrombina.","D":"Prevenir el riesgo de sepsis por Neisseria gonorrhoeae."},"c":"C"},{"id":237,"q":"En un recién nacido en las primeras horas de vida, ¿cuál de los siguientes hallazgos clínicos es más sugerente de hernia diafragmática congénita?","o":{"A":"Dificultad respiratoria con aleteo nasal y sonidos respiratorios ausentes en el lado izquierdo.","B":"Distensión abdominal marcada con timpanismo generalizado y expansión torácica asimétrica.","C":"Respiración entrecortada con sonidos ausentes unilateralmente y sonidos cardíacos desplazados hacia la izquierda.","D":"Dificultad para comenzar la respiración con aleteo nasal y expansión torácica simétrica."},"c":"A/C"},{"id":238,"q":"Ante la identificación de ritmo de galope en un recién nacido, la actuación indicada es:","o":{"A":"Registrarlo a pesar de considerarlo fisiológico en el primer mes de vida.","B":"Remitir a consulta e iniciar estudio cardíaco.","C":"Repetir auscultación y reevaluar pasadas 12 horas y al alta.","D":"Registrar el hallazgo y mantener vigilancia clínica, sin remisión inmediata, si el recién nacido no presenta cianosis ni signos de dificultad respiratoria."},"c":"B/D"},{"id":239,"q":"¿Cuál de los siguientes hallazgos se considera patológico en la valoración del recién nacido?","o":{"A":"Perlas de Epstein.","B":"Reflejo de Moro presente.","C":"Perímetro torácico 1 -2 cm menor que el cefálico.","D":"Pólipos cutáneos preauriculares."},"c":"D"},{"id":240,"q":"Para que la prueba de fenilcetonuria del recién nacido sea válida, debe realizarse:","o":{"A":"Antes de iniciar cualquier ingesta oral.","B":"Tras al menos 24 de haber iniciado tomas habituales (leche materna o fórmula).","C":"Solo tras las 72 de vida.","D":"Durante el expulsivo para reducir falsos negativos."},"c":"B"},{"id":241,"q":"En relación con el inicio de la respiración y la reabsorción del líquido pulmonar en el recién nacido sano a término, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"El inicio de la respiración neonatal depende exclusivamente de estímulos químicos.","B":"La mayor parte del líquido pulmonar fetal se elimina por vía alveolar y su reabsorción se completa en las primeras 2 horas de vida.","C":"Durante el parto, la compresión torácica fetal incrementa la presión intratorácica y facilita la expulsión de aproximadamente un tercio del líquido pulmonar.","D":"En el recién nacido a término, el líquido pulmonar pasa directamente al torrente circulatorio, completándose la r eabsorción antes de la primera hora."},"c":"C"},{"id":242,"q":"Tras la administración de la profilaxis ocular neonatal ¿cuál de los siguientes hallazgos es esperable y no necesariamente indicativo de patología?","o":{"A":"Eritema conjuntival leve con lagrimeo discreto y edema palpebral mínimo, autolimitado en la primera hora, atribuible al contacto con secreciones del canal del parto.","B":"Secreción conjuntival serosa transitoria sin hiperemia, que persiste hasta el tercer día de vida y se asocia de forma típi ca a obstrucción del conducto nasolagrimal.","C":"Hiperemia conjuntival bilateral con edema moderado y sin secreción purulenta, cuya persistencia hasta las 72 horas se considera un hallazgo normal tras profilaxis y no requiere seguimiento.","D":"Conjuntivitis química transitoria, secundaria a la profilaxis ocular, que puede resolverse espontáneamente en 24 –48 horas."},"c":"D"},{"id":243,"q":"En relación con las necesidades dietéticas recomendadas desde el nacimiento hasta los 6 meses, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Las necesidades calóricas del recién nacido se sitúan en torno a 105 –108 kcal/kg/día, distribuidas entre proteínas, hidratos de carbono y grasas.","B":"Las necesidades calóricas del recién nacido se sitúan aproximadamente en 80 –90 kcal/kg/día, dado que el metabolismo basal neonatal es inferior al del adulto.","C":"Las necesidades calóricas del recién nacido se sitúan en torno a 100 –104 kcal/kg/día, distr ibuidas entre proteínas, hidratos de carbono y grasas, vitaminas y minerales.","D":"Las necesidades calóricas del recién nacido se sitúan aproximadamente en 90 -95– 90 kcal/kg/día, dado que el metabolismo basal neonatal es inferior al del adulto."},"c":"A"},{"id":244,"q":"Dentro de la educación a la familia durante el periodo neonatal uno de los objetivos es que los progenitores:","o":{"A":"Interpreten las vocalizaciones del recién nacido como conducta voluntaria intencional desde el nacimiento.","B":"Ajusten sus expectativas considerando que el recién nacido debe mantener ciclos regulares de sueño -vigilia desde los primeros días, y que el llanto persistente suele indicar siempre enfermedad orgánica.","C":"Verbalicen expectativas conductuales adecuadas en relación con el desarrollo del recién nacido y conozcan la asistencia continuada en atención primaria.","D":"Reconozcan que el patrón conductual del recién nacido es completamente predecible si se establece una rutina estricta, por lo que la variabilidad en respuestas y estados de alerta se considera un signo de mala adaptación."},"c":"C"},{"id":245,"q":"¿Cuál de las siguientes afirmaciones es correcta en relación a
