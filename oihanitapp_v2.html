<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oihanitapp</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── LIGHT THEME (default) ── */
  :root, [data-theme="light"] {
    --bg: #f7f5f0;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --surface3: #e8e4db;
    --text: #1a1814;
    --text2: #6b6560;
    --text3: #9e998f;
    --accent: #2d5a27;
    --accent-light: #e8f0e7;
    --wrong: #8b2020;
    --wrong-light: #f5e8e8;
    --border: #e0dbd2;
    --streak: #c4822a;
    --streak-light: #fdf3e7;
    --header-bg: #ffffff;
    --shadow: 0 2px 20px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
    --toggle-bg: #e0dbd2;
    --toggle-thumb: #6b6560;
    --banner-bg: linear-gradient(135deg, #fff7ed 0%, #fef3c7 100%);
    --banner-border: #f59e0b;
    --banner-text: #92400e;
  }

  /* ── DARK THEME ── */
  [data-theme="dark"] {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --surface2: #242220;
    --surface3: #2e2c29;
    --text: #f0ede6;
    --text2: #a09b92;
    --text3: #6b6560;
    --accent: #5fa855;
    --accent-light: #1a2e18;
    --wrong: #d96060;
    --wrong-light: #2e1a1a;
    --border: #2e2c29;
    --streak: #e8a84a;
    --streak-light: #2e2210;
    --header-bg: #141311;
    --shadow: 0 2px 20px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
    --toggle-bg: #3a3835;
    --toggle-thumb: #f0ede6;
    --banner-bg: linear-gradient(135deg, #2e2210 0%, #2e2410 100%);
    --banner-border: #e8a84a;
    --banner-text: #fde68a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
    transition: background 0.3s, color 0.3s;
  }

  .app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.3s, border-color 0.3s;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 20px; color: var(--text);
    letter-spacing: -0.3px;
    transition: color 0.3s;
  }
  .logo span { color: var(--accent); }

  .header-right { display: flex; align-items: center; gap: 12px; }
  .header-stats { display: flex; gap: 10px; align-items: center; }

  .stat-pill {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text2);
    background: var(--surface2);
    padding: 5px 12px;
    border-radius: 20px;
    transition: all 0.3s;
  }
  .stat-pill.streak-active { background: var(--streak-light); color: var(--streak); }
  .stat-pill .icon { font-size: 15px; }

  /* ── THEME TOGGLE ── */
  .theme-toggle {
    position: relative; width: 44px; height: 24px;
    cursor: pointer; flex-shrink: 0;
  }
  .theme-toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--toggle-bg);
    border-radius: 12px;
    transition: background 0.3s;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 5px;
    font-size: 11px;
  }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: var(--toggle-thumb);
    border-radius: 50%;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1), background 0.3s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  [data-theme="dark"] .toggle-thumb { transform: translateX(20px); }

  .nav-btn {
    background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 14px;
    font-size: 13px; font-weight: 500; color: var(--text2);
    cursor: pointer; transition: all 0.2s;
    font-family: inherit;
  }
  .nav-btn:hover { background: var(--surface2); color: var(--text); }
  .nav-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── VIEWS ── */
  .view { display: none; }
  .view.active { display: flex; flex-direction: column; }

  /* ── STUDY VIEW ── */
  #study-view {
    padding: 32px 24px;
    max-width: 720px;
    margin: 0 auto;
    width: 100%;
    gap: 24px;
  }

  .progress-bar-wrap { display: flex; align-items: center; gap: 12px; }
  .progress-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; transition: background 0.3s; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s ease, background 0.3s; }
  .progress-label { font-size: 12px; color: var(--text3); white-space: nowrap; }

  /* ── STREAK BANNER ── */
  .streak-banner {
    display: none;
    background: var(--banner-bg);
    border: 2px solid var(--banner-border);
    border-radius: 14px;
    padding: 18px 24px;
    text-align: center;
    animation: bannerIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }
  .streak-banner.visible { display: block; }
  .streak-banner::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(255,255,255,0.05) 10px,
      rgba(255,255,255,0.05) 20px
    );
  }
  .banner-emoji { font-size: 36px; margin-bottom: 6px; display: block; animation: bounce 0.6s ease infinite alternate; }
  .banner-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px; color: var(--banner-text);
    margin-bottom: 4px;
  }
  .banner-sub { font-size: 13px; color: var(--banner-text); opacity: 0.8; }
  .banner-close {
    position: absolute; top: 10px; right: 14px;
    background: none; border: none; font-size: 18px;
    color: var(--banner-text); cursor: pointer; opacity: 0.6;
    line-height: 1; padding: 4px;
  }
  .banner-close:hover { opacity: 1; }
  @keyframes bannerIn {
    from { opacity: 0; transform: scale(0.85) translateY(-10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to { transform: translateY(-6px); }
  }

  /* ── CARD ── */
  .card-scene { perspective: 1200px; min-height: 340px; }
  .card {
    width: 100%; min-height: 340px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    padding: 32px;
    background: var(--surface);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .card-back {
    transform: rotateY(180deg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 12px;
  }
  .card-back.correct-back { background: var(--accent-light); border-color: var(--accent); }
  .card-back.wrong-back { background: var(--wrong-light); border-color: var(--wrong); }

  .q-number { font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 16px; }
  .q-difficult-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; color: var(--wrong);
    background: var(--wrong-light); padding: 3px 8px; border-radius: 4px; margin-bottom: 12px;
  }
  .q-text { font-family: 'DM Serif Display', serif; font-size: 18px; line-height: 1.45; color: var(--text); transition: color 0.3s; }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt-btn {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1.5px solid transparent;
    border-radius: 10px;
    cursor: pointer; text-align: left;
    font-family: inherit; font-size: 14px; color: var(--text);
    transition: all 0.18s;
    line-height: 1.4;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--border); background: var(--surface3); transform: translateX(2px); }
  .opt-btn:disabled { cursor: default; }
  .opt-letter {
    flex-shrink: 0; width: 24px; height: 24px;
    border-radius: 6px; background: var(--border); color: var(--text2);
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.18s;
  }
  .opt-btn.selected .opt-letter { background: var(--text); color: var(--bg); }
  .opt-btn.correct-opt { background: var(--accent-light); border-color: var(--accent); }
  .opt-btn.correct-opt .opt-letter { background: var(--accent); color: white; }
  .opt-btn.wrong-opt { background: var(--wrong-light); border-color: var(--wrong); }
  .opt-btn.wrong-opt .opt-letter { background: var(--wrong); color: white; }

  .result-icon { font-size: 52px; line-height: 1; }
  .result-text { font-family: 'DM Serif Display', serif; font-size: 28px; }
  .result-text.correct { color: var(--accent); }
  .result-text.wrong { color: var(--wrong); }
  .result-correct-answer { font-size: 13px; color: var(--text2); text-align: center; max-width: 400px; }
  .result-correct-answer strong { color: var(--text); }

  /* ── CONTROLS ── */
  .controls { display: flex; gap: 12px; justify-content: space-between; align-items: center; }
  .btn-skip {
    background: none; border: 1px solid var(--border); border-radius: 10px;
    padding: 10px 20px; font-family: inherit; font-size: 14px; font-weight: 500;
    color: var(--text2); cursor: pointer; transition: all 0.2s;
  }
  .btn-skip:hover { background: var(--surface2); color: var(--text); }
  .btn-next {
    background: var(--text); color: var(--bg); border: none; border-radius: 10px;
    padding: 10px 28px; font-family: inherit; font-size: 14px; font-weight: 600;
    cursor: pointer; transition: all 0.2s; display: none;
  }
  .btn-next:hover { opacity: 0.85; }
  .btn-next.visible { display: block; }

  .mode-selector { display: flex; gap: 8px; }
  .mode-btn {
    font-size: 12px; padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text2);
    cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.2s;
  }
  .mode-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* ── ANALYTICS VIEW ── */
  #analytics-view { padding: 32px 24px; max-width: 800px; margin: 0 auto; width: 100%; gap: 28px; flex-direction: column; }

  .section-title { font-family: 'DM Serif Display', serif; font-size: 22px; color: var(--text); margin-bottom: 4px; transition: color 0.3s; }
  .section-sub { font-size: 13px; color: var(--text3); }

  .analytics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: background 0.3s, border-color 0.3s; }
  .metric-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 8px; }
  .metric-value { font-family: 'DM Serif Display', serif; font-size: 32px; color: var(--text); }
  .metric-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

  .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; transition: background 0.3s, border-color 0.3s; }
  .chart-title { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 20px; }
  .bar-chart { display: flex; gap: 8px; align-items: flex-end; height: 120px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .bar-outer { width: 100%; flex: 1; background: var(--surface2); border-radius: 4px 4px 0 0; display: flex; align-items: flex-end; }
  .bar-inner { width: 100%; border-radius: 4px 4px 0 0; background: var(--accent); transition: height 0.6s ease, background 0.3s; }
  .bar-label { font-size: 10px; color: var(--text3); }
  .bar-val { font-size: 11px; font-weight: 600; color: var(--text2); }

  .difficult-list { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; transition: background 0.3s, border-color 0.3s; }
  .difficult-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .difficult-item { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; align-items: flex-start; }
  .difficult-item:last-child { border-bottom: none; }
  .difficult-num { font-size: 11px; font-weight: 700; color: var(--wrong); background: var(--wrong-light); padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
  .difficult-q { font-size: 13px; color: var(--text); line-height: 1.4; flex: 1; }
  .difficult-rate { font-size: 12px; font-weight: 600; color: var(--wrong); white-space: nowrap; }

  .daily-breakdown { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: background 0.3s, border-color 0.3s; }
  .daily-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .daily-row:last-child { border-bottom: none; }
  .daily-date { color: var(--text2); }
  .daily-pills { display: flex; gap: 8px; }
  .pill-green { background: var(--accent-light); color: var(--accent); padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .pill-red { background: var(--wrong-light); color: var(--wrong); padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .pill-gray { background: var(--surface2); color: var(--text2); padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
  .empty-state .big { font-size: 40px; margin-bottom: 12px; }

  /* ── CONFETTI PARTICLES ── */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 200; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 8px; height: 8px; top: -10px;
    animation: confettiFall linear forwards;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  @keyframes streakPop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .streak-pop { animation: streakPop 0.4s ease; }

  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .slide-up { animation: slideUp 0.35s ease; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    padding: 10px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 999; white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    header { padding: 0 14px; gap: 8px; }
    #study-view, #analytics-view { padding: 20px 16px; }
    .q-text { font-size: 16px; }
    .card-face { padding: 22px; }
    .header-stats .stat-pill:nth-child(3) { display: none; }
    .logo { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Oihanit<span>app</span></div>
    <div class="header-right">
      <div class="header-stats">
        <div class="stat-pill" id="streak-pill">
          <span class="icon">🔥</span>
          <span id="streak-count">0</span> racha
        </div>
        <div class="stat-pill" id="today-pill">
          <span class="icon">📅</span>
          <span id="today-count">0</span> hoy
        </div>
        <div class="stat-pill">
          <span class="icon">✅</span>
          <span id="accuracy-pct">—</span>
        </div>
      </div>

      <!-- Theme toggle -->
      <label class="theme-toggle" title="Cambiar tema">
        <input type="checkbox" id="theme-checkbox" onchange="toggleTheme()">
        <div class="toggle-track">
          <span>☀️</span>
          <span>🌙</span>
        </div>
        <div class="toggle-thumb"></div>
      </label>

      <div style="display:flex;gap:8px">
        <button class="nav-btn active" id="nav-study" onclick="showView('study', this)">Estudiar</button>
        <button class="nav-btn" id="nav-analytics" onclick="showView('analytics', this)">Análisis</button>
      </div>
    </div>
  </header>

  <!-- STUDY VIEW -->
  <div id="study-view" class="view active">
    <!-- Streak Banner -->
    <div class="streak-banner" id="streak-banner">
      <button class="banner-close" onclick="closeBanner()">×</button>
      <span class="banner-emoji">🌟</span>
      <div class="banner-title">¡Buena Rachita Oihanita!</div>
      <div class="banner-sub">¡Sigue así! 🔥 Ya van <span id="banner-streak-num">3</span> seguidas</div>
    </div>

    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div class="mode-selector">
          <button class="mode-btn active" onclick="setMode('all',this)">Todas</button>
          <button class="mode-btn" onclick="setMode('wrong',this)">Errores</button>
          <button class="mode-btn" onclick="setMode('random',this)">Aleatorio</button>
        </div>
        <span style="font-size:12px;color:var(--text3)" id="queue-info"></span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <span class="progress-label" id="progress-label">0 / 0</span>
      </div>
    </div>

    <div class="card-scene">
      <div class="card" id="main-card">
        <div class="card-face card-front" id="card-front">
          <div class="q-number" id="q-number">Pregunta —</div>
          <div id="difficult-badge" class="q-difficult-badge" style="display:none">⚠️ Pregunta difícil</div>
          <div class="q-text" id="q-text">Cargando...</div>
        </div>
        <div class="card-face card-back" id="card-back">
          <div class="result-icon" id="result-icon">✓</div>
          <div class="result-text" id="result-text"></div>
          <div class="result-correct-answer" id="result-answer"></div>
        </div>
      </div>
    </div>

    <div class="options" id="options-container"></div>

    <div class="controls">
      <button class="btn-skip" onclick="skipQuestion()">Saltar →</button>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()">Siguiente →</button>
    </div>
  </div>

  <!-- ANALYTICS VIEW -->
  <div id="analytics-view" class="view">
    <div>
      <div class="section-title">Análisis de rendimiento</div>
      <div class="section-sub" id="analytics-subtitle">Cargando estadísticas...</div>
    </div>
    <div class="analytics-grid" id="metrics-grid"></div>
    <div class="chart-wrap">
      <div class="chart-title">Respuestas por día (últimos 7 días)</div>
      <div class="bar-chart" id="weekly-chart"></div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div>
          <div class="section-title" style="font-size:18px">Preguntas difíciles</div>
          <div class="section-sub">Con ≥2 fallos y tasa de error alta</div>
        </div>
      </div>
      <div class="difficult-list" id="difficult-list"></div>
    </div>
    <div>
      <div class="section-title" style="font-size:18px;margin-bottom:14px">Historial diario</div>
      <div class="daily-breakdown" id="daily-breakdown"></div>
    </div>
  </div>
</div>

<div class="confetti-container" id="confetti-container"></div>
<div class="toast" id="toast"></div>

<script>
const QUESTIONS = [{"id":1,"q":"La definición de enfermería de Virginia Henderson, publicada por el International Council of Nurses (ICN) en 1961 es:","o":{"A":"La función específica de la enfermera es ayudar a la persona, enferma o sana, a la realización de actividades que contribuyan a la salud o a su rehabilitación e inserción (o a una muerte tranquila) que realizaría sin ayuda si tuviera la fuerza, la voluntad o los conocimientos necesarios, y a hacerlo de tal manera que la ayude a ganar la independencia l o más rápidamente posible.","B":"La enfermería es una profesión esencial del sistema de salud dedicada al cuidado integral de personas, familias y comunidades, promoviendo la salud, previniendo enfermedades y asistiendo en la recuperación, abarcando aspect os físicos, mentales y sociales desde el nacimiento hasta la muerte, con un enfoque colaborativo y centrado en las personas que intervienen en el proceso.","C":"La función específica de la enfermera es ayudar a la persona, enferma o sana, a la realización de actividades que contribuyan a la salud o a su recuperación (o a una muerte tranquila) que realizaría sin ayuda si tuviera la fuerza, la voluntad o los conocimientos necesarios, y a hacerlo de tal manera que la ayude a ganar la independencia lo más rápid amente posible.","D":"La enfermería es una profesión esencial del sistema de salud dedicada al cuidado integral de personas, familias y comunidades, promoviendo la salud, previniendo enfermedades y asistiendo en la recuperación, abarcando aspectos físicos, mentales y sociales desde el nacimiento hasta la muerte, con un enfoque colaborativo y centrado en el paciente."},"c":"C"},{"id":2,"q":"La teoría de Florence Nightingale se centró en el entorno, aun cuando ella en sus escritos prefirió el término alrededores. Definió y describió los conceptos de:","o":{"A":"Ventilación, calidez, luz, dieta, limpieza y ruido.","B":"Ventilación, calidez, luz, dieta, limpieza y descanso.","C":"Ventilación, humores, luz, dieta, limpieza y descanso.","D":"Ventilación, calidez, efluvios, alimentación, limpieza y ruido."},"c":"A"},{"id":3,"q":"La obra de Nightingale es clara y fácil de comprender. Abordo tres tipos de relaciones principales, SEÑALE LA INCORRECTA:","o":{"A":"Entorno -paciente.","B":"Enfermera -entorno.","C":"Entorno -Cuidados.","D":"Enfermera -paciente."},"c":"C"},{"id":4,"q":"¿Cuál de los siguientes NO es un Modelo Conceptual en enfermería?","o":{"A":"Modelo de la conservación.","B":"Modelo de promoción de la salud.","C":"Modelo del sistema conductual.","D":"Modelo de adaptación."},"c":"B"},{"id":5,"q":"Dorothea Orem afirmó que:","o":{"A":"El autocuidado son las actividades que las personas realizan para mantener su salud y bienestar, pero cuando estas actividades exceden la capacidad de la persona, surge una \"Disminución para mejorar la capacidad de autocuidado\" y el personal sanitario debe intervenir para suplir esa falta mediante educación y apoyo, basándose en su teoría central, el Modelo del Déficit de Autocuidado.","B":"La enfermería pertenece a la familia de los servicios sanitarios que se organizan para prestar asistencia directa a personas con necesidades legítimas de diferentes formas de atención directa por sus estados de salud o por la naturaleza de sus necesidades de asistencia sanitaria.","C":"El autocuidado son las actividades que las personas realizan para mantener su salud y bienestar, pero cuando estas actividades exceden la capacidad de la persona, surge un \"déficit de cuidado\" y el personal sanitario debe intervenir para suplir esa falta mediante educación y apoyo, basándose en la teoría del Modelo de insuficiencia de Autocuidado.","D":"La enfermería pertenece a la familia de los servicios sanitarios y sociales que se organizan para prestar asistencia directa a personas con necesidades legítimas de diferentes formas de atención directa por sus estados de salud o por la naturaleza de sus necesidades de asistencia sanitaria."},"c":"B"},{"id":6,"q":"¿Cuál de las siguientes teorías NO forma parte de la teoría general del déficit de autocuidado?","o":{"A":"La teoría de autocuidado.","B":"La teoría de procedimientos enfermeros.","C":"La teoría del déficit de autocuidado.","D":"La teoría del cuidado dependiente."},"c":"B"},{"id":7,"q":"Los requisitos de autocuidado de desarrollo (RACD) estaban separados de los requisitos de autocuidado universales en la segunda edición de Nursing: Concepts of Practice de Orem. Se identificaron tres conjuntos de RACD, señálelos:","o":{"A":"Provisión de condiciones que fomentan el desarrollo, Implicación en el autodesarrollo y Prevenir o vencer los efectos de las condiciones humanas y de las situaciones vitales que pueden afectar de manera negativa al desarrollo humano.","B":"Provisión de condiciones que fomentan el desarrollo, Implicación en la adaptación a los cambios sobrevenidos y Prevenir o vencer los efectos de las condiciones humanas y de las situaciones vitales que pueden afectar de manera negativa al desarrollo humano.","C":"Provis ión de condiciones que fomentan el desarrollo, Implicación en la adaptación al entorno y Prevenir o vencer los efectos de las condiciones humanas y de las situaciones vitales que pueden afectar de manera negativa al desarrollo humano.","D":"Provisión de co ndiciones que fomentan el desarrollo, Implicación en el autodesarrollo y Prevenir o vencer los efectos de las condiciones de la relación entorno -paciente -enfermera y de las situaciones vitales que pueden afectar de manera negativa al desarrollo humano."},"c":"A"},{"id":8,"q":"¿Cuál es una característica general de los modelos conceptuales de enfermería?","o":{"A":"Establecen el significado de los fenómenos de enfermería a través del análisis, el razonamiento y la presentación lógica.","B":"Cada uno aborda los conceptos metaparadigmáticos de persona, entorno, salud y enfermería.","C":"Contribuyeron al desarrollo del conocimiento proporcionando una directriz o una base para los posteriores desarrollos.","D":"Reflejan métodos y enfoques científicos contemporáneos."},"c":"B"},{"id":9,"q":"¿Cuál de las siguientes teorías de enfermería se considera una Teoría de nivel medio en enfermería?","o":{"A":"Teoría de las transiciones.","B":"Teoría de la diversidad y de la universalidad de los cuidados culturales.","C":"Teoría del duelo disfuncional.","D":"Teoría bioética sinfonológica."},"c":"A/C"},{"id":10,"q":"¿Qué representación gráfica creo Florence Nightingale para representar los fallecimientos innecesarios en la Guerra de Crimea?","o":{"A":"Diagrama de Gantt.","B":"Diagrama de tela de araña.","C":"Diagrama de rosa de los vientos.","D":"Diagrama de área polar."},"c":"D"},{"id":11,"q":"NO es un criterio para el desarrollo del estatus de profesional de enfermería.","o":{"A":"Aplica su corpus de conocimiento en servicios prácticos cruciales para el bienestar social y humano.","B":"Aumenta constantemente el corpus de conocimiento que utiliza y mejora sus técnicas de educación y servicio mediante el uso del método científico.","C":"Atrae a individuos con cualidades intelectuales y personales que ensalzan el servicio por encima del beneficio personal y que reconocen la ocupación que han escogido como un trabajo de por vida.","D":"Funciona de manera interdependiente para formular estrategias profesionales y, por tanto, controlar la actividad profesi onal."},"c":"D"},{"id":12,"q":"Es considerada la madre de la enfermería psiquiátrica:","o":{"A":"Nancy Roper.","B":"Hildegard E. Peplau.","C":"Madeleine M. Leininger.","D":"Callista Roy."},"c":"B"},{"id":13,"q":"Para Sor Callista Roy, la adaptación se refiere:","o":{"A":"Al proceso de ajustar el comportamiento, estructura o funcionamiento para acomodarse a un entorno o situación cambiante, permitiendo la estabilidad y el éxito en un ambiente determinado.","B":"Al proceso y al resultado por los que las personas, que tienen la capacidad de pensar, actuar y de sentir, como individuos, son conscientes y escogen integrar el ser humano con su entorno.","C":"Al proceso de ajustar el comportamiento, estructura o funcionamiento para acomodarse a un entorno o situación estable, per mitiendo la supervivencia y el éxito en un ambiente determinado.","D":"Al proceso y al resultado por los que las personas, que tienen la capacidad de pensar y de sentir, como individuos o en grupos, son conscientes y escogen integrar el ser humano con su e ntorno."},"c":"D"},{"id":14,"q":"La descripción breve de factor relacionado es:","o":{"A":"Evidencias o inferencias observables, que se agrupan como manifestaciones de diagnósticos, focalizados en problemas de promoción de la salud o síndromes.","B":"Factor antecedente que aumenta la susceptibilidad de una persona, cuidador, cuidadora, familia o comunidad a una respuesta humana indeseable.","C":"Factor antecedente que parece mostrar algún tipo de patrón de relación con la respuesta humana.","D":"Grupos de per sonas que comparten características socio demográficas, antecedentes de salud/familiares, estados de crecimiento/desarrollo o exposición a ciertos eventos/experiencias que hacen que todos los individuos sean susceptibles de una respuesta humana particular."},"c":"C"},{"id":15,"q":"¿Cuál de las siguientes, se corresponde con una etiqueta diagnóstica nueva de la edición 2024 -2026 de Diagnósticos enfermeros?","o":{"A":"Deterioro de la bipedestación.","B":"Riesgo de lesión.","C":"Salud deficiente de la comunidad.","D":"Disposición para mejorar el patrón del sueño."},"c":"D/A"},{"id":16,"q":"¿Que engloba un diagnóstico enfermero?","o":{"A":"La culminación de los conocimientos disciplinares, enfermeros y el razonamiento clínico.","B":"Las observaciones realizadas y la consiguiente anotación de signos, síntomas y comportamientos específicos.","C":"La representación y codificación de las afecciones médicas que tratan.","D":"Una etiqueta derivada de los resultados de una valoración exhaustiva, basada en la comprensión de los conceptos cruciales dentro de la disciplina enfermera."},"c":"D"},{"id":17,"q":"¿Cuál es el dominio en el que se encuentra el diagnóstico de “Hipertermia”?","o":{"A":"Confort.","B":"Principios vitales.","C":"Seguridad/protección.","D":"Eliminación/intercambio."},"c":"C"},{"id":18,"q":"Una de las funciones que puede tener de la taxonomía II de NANDA I es:","o":{"A":"Identificar diagnósticos enfermeros fuera de su área de experiencia.","B":"Registrar más datos.","C":"Distinguir los datos relevantes de los irrelevantes.","D":"Puede ayudar a los profesionales sanitarios a desarrollar el currículo de formación de enfermería."},"c":"A/D/C"},{"id":19,"q":"La taxonomía II de NANDA -I se organiza en:","o":{"A":"13 Dominios, 47 clases y 277 diagnósticos.","B":"12 Dominios, 48 clases y 277 diagnósticos.","C":"13 Dominios, 47 clases y 277 diagnósticos.","D":"13 Dominios, 48 clases y 277 diagnósticos."},"c":"D"},{"id":20,"q":"¿En qué dominio “encaja” la clase 4; Función respiratoria?","o":{"A":"Actividad/reposo.","B":"Eliminación/intercambio.","C":"Principios vitales.","D":"Necesidad de respirar."},"c":"B"},{"id":21,"q":"La definición del diagnóstico (00030), Deterioro del intercambio de gases es:","o":{"A":"Sensación exagerada y sostenida, de agotamiento y disminución de la capacidad para el trabajo físico y mental habitual.","B":"Exceso o déficit en la oxigenación y/o eliminación de dióxido de carbono.","C":"Dificultad para mantener una ventilación adecuada durante la inspiración y/o la expiración.","D":"Incapacidad para iniciar, y o mantener la respiración, independientemente para el mantenimiento de la vida."},"c":"B"},{"id":22,"q":"Es un marco de valoración basado en la evidencia, recomendado según la declaración de posición de la NANDA -I.","o":{"A":"14 Necesidades básicas de Virginia Henderson.","B":"11 Patrones Funcionales de Salud.","C":"13 Dominios de la taxonomía NANDA -I.","D":"Conjunto mínimo básico de datos."},"c":"B"},{"id":23,"q":"Según la estructura axial de NANDA -I, en el eje 2: sujeto del cuidado, se define al “paciente” como:","o":{"A":"Individuo, cuidador principal y familia.","B":"Individuo y familia.","C":"Individuo, cuidadores y comunidad.","D":"Individuo, familia y comunidad."},"c":"D"},{"id":24,"q":"Señale la respuesta correcta en referencia a la obtención de datos subjetivos.","o":{"A":"Se refiere a las creencias o sentimientos que recoge la enfermera.","B":"Denotan hechos, observados por la enfermera u otros profesionales de la salud.","C":"Proceden de los informes verbales del paciente, que abarcan sus percepciones y pensamientos sobre diversos aspectos de la salud, la vida cotidiana, la comodidad, la relaciones y otros.","D":"Engloban las observaciones realizadas por las enfermeras sobre el paciente, recogidas mediante exploraciones físicas y resultados de pruebas diagnósticas."},"c":"C"},{"id":25,"q":"“Una configuración de conductas que se produce secuencialmente largo del tiempo”, es la definición de:","o":{"A":"Patrón de M. Gordon.","B":"Necesidades de Maslow.","C":"Necesidad de autorrealización.","D":"Niveles de adquisición de habilidades clínicas en enfermería de P. Benner."},"c":"A"},{"id":26,"q":"La secuencia ordenada de principio a final de los diversos componentes del Proceso Enfermero es:","o":{"A":"Valoración -Planificación -Diagnosticar -Implementar -Evaluar.","B":"Diagnosticar -Valoración -Planificación -Implementar -Evaluar.","C":"Observación -Diagnosticar -Planificación -Implementar -Evaluar.","D":"Valoración -Diagnosticar -Planificación -Implementar -Evaluar."},"c":"D"},{"id":27,"q":"En relación con los axiomas de la comunicación formulados por Watzlawick, señale la afirmación VERDADERA:","o":{"A":"La comunicación solo se produce cuando existe una intención consciente de transmitir un mensaje.","B":"El nivel de contenido de un mensaje es independiente del tipo de relación existente entre los interlocutores.","C":"La manera en que cada interlocutor puntúa la secuencia comunicativa influye en la naturaleza de la relación.","D":"Las interacciones complementarias se caracterizan siempre por relaciones patológicas de dependencia."},"c":"C"},{"id":28,"q":"En relación con la formación de la primera impresión en la comunicación interpersonal, ¿cuál de las siguientes afirmaciones es la CORRECTA?","o":{"A":"La primera impresión refleja de forma directa la intención comunicativa del emisor cuando el mensaje verbal es claro.","B":"La primera impresión depende exclusivamente de los elementos no verbales observables en el interlocutor.","C":"La primera impresión se construye a partir de la interpretación del receptor, que no siempre coincide con la intención comunicativa del emisor .","D":"La primera impresión puede controlarse completamente mediante la planificación consciente del discurso verbal."},"c":"C"},{"id":29,"q":"En el ámbito de la comunicación interpersonal, ¿cuál de las siguientes definiciones se corresponde CORRECTAMENTE con la distancia personal lejana?","o":{"A":"Distancia limitada aproximadamente a la extensión del brazo, que marca el límite del dominio físico y suele utilizarse en interacciones personales sin contacto íntimo.","B":"Distancia propia de conversaciones formales con grupos o audiencias, en la que el interlocutor se sitúa claramente fuera del espacio personal.","C":"Distancia caracterizada por el contacto físico frecuente y la percepción del olor y la temperatura corporal.","D":"Distancia habitual en conversaciones informales entre personas que comparten un entorno laboral y mantienen una relación cotidiana."},"c":"A"},{"id":30,"q":"En el contexto de la relación terapéutica, ¿cuál de las siguientes afirmaciones define de forma más precisa la actitud empática del profesional sanitario?","o":{"A":"Tendencia a experimentar una respuesta de lástima ante el sufrimiento del paciente, acompañada del deseo de protegerlo o aliviar su malestar.","B":"Capacidad de compartir emocionalmente el sufrimiento del paciente, viviéndolo como propio y reduciendo la distancia emocional entre ambos.","C":"Capacidad de comprender y percibir con precisión la experiencia emocional del paciente, comunicándole esa comprensión y manteniendo un límite claro entre el “yo” profesional y el “tú” del pacien te.","D":"Actitud de preocupación afectiva orientada principalmente a consolar y aliviar el malestar del paciente, sin necesidad de explorar ni devolver de forma explícita su vivencia emocional."},"c":"C"},{"id":31,"q":"Según la escala de Carkhuff para medir el nivel de autenticidad del profesional, ¿qué característica define mejor el NIVEL 4 de autenticidad?","o":{"A":"El profesional escucha al paciente, pero evita implicarse por temor a que la relación terapéutica se deteriore.","B":"El profesional responde de forma estereotipada, no se compromete con el paciente y desconoce su estado emocional.","C":"El profesional abandona una actitud rígida, muestra empatía hacia el paciente y facilita que este hable de lo que le ocurre, comprometiéndose a ayudarle.","D":"El profesional se compromete totalmente, comunica de forma empática y anima al paciente a una revelación profunda de su yo auténtico."},"c":"C"},{"id":32,"q":"En la resolución de conflictos, ¿qué estilo se caracteriza por un equilibrio entre asertividad y cooperación, en el que ambas partes ceden parcialmente y ninguna obtiene plenamente lo que desea?","o":{"A":"Evitación.","B":"Compromiso.","C":"Colaboración.","D":"Acomodación."},"c":"B"},{"id":33,"q":"En relación con la capacidad del profesional sanitario para desconectar y no llevarse consigo los problemas de los pacientes, ¿cuál de las siguientes afirmaciones es la MÁS ajustada a una práctica profesional saludable?","o":{"A":"Implicarse plenamente en el aquí y ahora con el paciente, delimitando conscientemente el momento en que finaliza la relación asistencial para poder reorientarse a otras actividades sin culpa.","B":"Reducir la implicación emocional durante la atención para evitar el desgaste profesional, manteniendo una distancia afectiva constante con todos los pacientes .","C":"Compartir de forma habitual con familiares o personas cercanas las vivencias emocionales intensas del trabajo como principal estrategia de descarga.","D":"Evitar reflexionar sobre las situaciones vividas con los pacientes una vez finalizada la jornada laboral para impedir la aparición de malestar emocional."},"c":"A"},{"id":34,"q":"Una paciente expresa durante la entrevista: “Me siento muy sola últimamente. Desde que falleció mi marido no tengo ganas de salir ni de ver a nadie; creo que eso es lo que me está provocando esta tristeza constante”. Según las fases de la relación de ayuda, ¿en cuál de las siguientes se sitúa principalmente este momento del proceso?","o":{"A":"Configuración del encuentro personal: acogida y orientación.","B":"Exposición, clarificación, identificación y definición del problema.","C":"Confrontación y reestructuración del problema.","D":"Iniciación al plan de acción: definición de objetivos y planificación de actividades."},"c":"B"},{"id":35,"q":"Durante una sesión grupal, una profesional de enfermería recibe feedback de sus compañeras sobre un tono autoritario del que ella no era consciente y que puede estar influyendo negativamente en la comunicación con los pacientes. Según el modelo de la ventana de Johari, ¿en qué área se s ituaba inicialmente este aspecto de su conducta?","o":{"A":"Área abierta o libre.","B":"Área oculta.","C":"Área ciega.","D":"Área desconocida."},"c":"C"},{"id":36,"q":"Cuando un paciente llega agresivo a la consulta, ¿cuál es la intervención MÁS adecuada desde el punto de vista de la comunicación terapéutica?","o":{"A":"Manifestarle que nos preocupa su agresividad, explorando a qué se debe y qué cree que le ayudaría a sentirse mejor.","B":"Desde el primer momento mostrarle firmeza, estableciendo límites claros mediante mensajes directos como “no toleramos que nos grite o nos falte al respeto”.","C":"Decirle que lo atenderemos cuando se calme, interrumpiendo la interacción hasta que modifique su conducta.","D":"Responder a la agresividad con un tono igualmente firme y autoritario para recuperar el control de la situación."},"c":"A"},{"id":37,"q":"En el contexto de la comunicación terapéutica, el feedback se define como:","o":{"A":"Reflejar literalmente al paciente lo que nos ha dicho, sin añadir ni modificar ningún contenido.","B":"Devolver al paciente lo que hemos comprendido de su mensaje, integrando tanto el contenido como los aspectos emocionales percibidos.","C":"Interpretar el discurso del paciente desde el marco teórico del profesional para explicarle el origen de su problema.","D":"Resumir la información aportada por el paciente con el objetivo principal de agilizar la entrevista clínica."},"c":"B"},{"id":38,"q":"En el contexto de la relación de ayuda, el profesional que actúa como receptor eficaz es aquel que:","o":{"A":"Se comporta en todo momento de forma auténtica, priorizando la expresión de sus propias vivencias personales durante la interacción con el paciente.","B":"Sabe disimular adecuadamente las situaciones difíciles para evitar que el paciente se sienta incó modo.","C":"Sabe interpretar correctamente los mensajes verbales y no verbales del paciente, devolviéndolos de forma comprensible y ajustada.","D":"Mantiene una actitud distante y neutral para no implicarse emocionalmente en los problemas del paciente."},"c":"C"},{"id":39,"q":"En la fase de confrontación de la relación de ayuda, el profesional debe decidir qué aspectos confrontar para favorecer la toma de conciencia del paciente. Señale la opción FALSA:","o":{"A":"Las incongruencias entre lo que el paciente dice y lo que hace.","B":"Los mecanismos de defensa que dificultan la autoexploración","C":"La responsabilidad del paciente en la persistencia de su problema.","D":"Los rasgos de personalidad del paciente para que los modifique."},"c":"D"},{"id":40,"q":"La definición de la categoría III de las lesiones por presión, se corresponde con:","o":{"A":"La pérdida de espesor parcial de la dermis se presenta como una úlcera abierta poco profunda con un lecho de la herida rojo -rosado, sin esfacelos.","B":"El tejido subcutáneo o hipodermis puede ser visible, pero los huesos, tendones o músculos no están expuestos, pudiendo presentar cavitaciones y tunelizaciones.","C":"Pérdida del espesor total de los tejidos donde la profundidad real de la lesión por presión está completamente cubierta por esfacelos y/o escaras en el lecho de la herida.","D":"Piel intacta con enrojecimiento que no palidece al presionar en un área localizada generalmente sobre una prominencia ósea."},"c":"B"},{"id":41,"q":"Señale la respuesta CORRECTA relacionada con la prevención de lesiones por presión relacionadas con uso de dispositivos sanitarios.","o":{"A":"Revisa al menos 2 veces/día la piel bajo los dispositivos sanitarios.","B":"Considere usar apósitos reguladores de metaloproteasas para la prevención de lesiones cutáneas.","C":"Evite la presión directa sobre las prominencias óseas del cuerpo y aplíquela sobre dispositivos.","D":"Realice cambios posturales cada 2h."},"c":"A"},{"id":42,"q":"Las localizaciones más frecuentes de lesiones por presión en la posición de decúbito lateral, son:","o":{"A":"Maléolos, los trocánteres, las costillas, los hombros, las orejas, los pómulos, las crestas ilíacas y la cara interna y lateral de las rodillas.","B":"Maléolos, los trocánteres, las costillas, los hombros, las orejas, los pómulos, las mamas, las crestas ilíacas y la cara interna y lateral de las rodillas.","C":"Maléolos, los trocánteres, las costillas, los hombros, las orejas, las crestas ilíacas y la cara interna y lateral de las rodillas.","D":"Maléolos, los trocánteres, las costillas, los hombros, las orejas, los omoplatos, las crestas ilíacas y la cara interna y lateral de las rodillas."},"c":"C"},{"id":43,"q":"Osakidetza ha establecido consideraciones especiales, tanto para la valoración inicial como para la revaluación del riesgo de lesiones por presión. SEÑALE LA CORRECTA.","o":{"A":"En ingresos inferiores a 24h es obligatorio valorar el riesgo en las primeras 2 horas.","B":"En intervenciones quirúrgicas programadas se debe realizar la valoración pre y post cirugía.","C":"En hospitalización a domicilio, la valoración del riesgo debe realizarse en las primeras 72h tras el ingreso.","D":"Es obligatorio valorar el riesgo de lesión por presion a las mujeres que ingresan en obstetricia para parto o cesárea."},"c":"C"},{"id":44,"q":"En Atención Hospitalaria, la primera valoración del riesgo de lesiones por presión debe realizarse al ingreso. La frecuencia de la valoración de una persona sin riesgo, ingresada en una Unidad de Cuidados Intensivos es:","o":{"A":"c/ 7 días.","B":"Diaria.","C":"c/ 4 días.","D":"c/ 2 días."},"c":"B"},{"id":45,"q":"En la prevención de lesiones por presión, en las posiciones de decúbito lateral y a fin de evitar apoyar el peso sobre los trocánteres:","o":{"A":"Se recomienda sobrepasar los 30º de lateralización.","B":"No se recomienda sobrepasar los 60º de lateralización.","C":"Se recomienda sobrepasar los 60º de lateralización.","D":"No se recomienda sobrepasar los 30º de lateralización."},"c":"D"},{"id":46,"q":"Señale la respuesta CORRECTA relacionada con la prevención de lesiones por presión en personas que permanecen sentadas.","o":{"A":"Utilice flotadores o rodetes cuando la persona esté en sedestación.","B":"Recomiende que efectúe pulsiones cada 15 minutos. Si no se puede movilizar, se le realizarán cambios posturales al menos cada hora.","C":"Limite el tiempo que la persona pasa sentado en una silla con alivio de presión.","D":"Ponga los pies de la persona sobre una silla anexa cuando éstos no llegan a tocar el suelo."},"c":"B"},{"id":47,"q":"Ante una persona que presenta mayor riesgo de desarrollar lesión por presión y no sea factible realizar cambios posturales, se debe utilizar:","o":{"A":"Superficie especial de manejo de presión estática.","B":"Colchones -cojines viscoelásticos.","C":"Colchonetas -cojines estáticos de aire.","D":"Superficie especial de manejo de presión activa."},"c":"D"},{"id":48,"q":"En el interior de heridas, como material de relleno, ya que tienen gran capacidad de absorción de exudado, se recomienda utilizar:","o":{"A":"Alginatos e hidrofibras gelificantes.","B":"Apósitos con plata.","C":"Espuma de poliuretano como apósito secundario.","D":"a) y c) son correctas."},"c":"A/D"},{"id":49,"q":"Señale una propiedad de los Ácidos Grasos Hiperoxigenados.","o":{"A":"Forman una película transparente e impermeable a líquidos.","B":"Restablecen el film hidro -lipídico de la piel.","C":"Mejoran la hidratación de la piel, aumentando su resistencia a la humedad.","D":"Preserva el nivel de oxigenación de los tejidos de apoyo, disminuyendo la microcirculación sanguínea y evitando las lesiones por presión."},"c":"B"},{"id":50,"q":"Señale la afirmación CORRECTA relacionada con la prevención de lesiones por presión.","o":{"A":"Utilice dispositivos que eleven y descarguen el talón completamente de tal manera que distribuyan el peso de la pierna a lo largo del tríceps sural, presionando el talón de Aquiles.","B":"Proteja la piel del exceso de humedad con productos barrera (cremas con base de zinc o películas barrera)","C":"Utilice ácidos grasos hiperoxigenados (AGHO) hasta su absorción para hidratar a la persona en riesgo.","D":"Los apósitos recomendados para el alivio de presión son los apósitos de espuma de poliuretano."},"c":"D/B"},{"id":51,"q":"Una puntuación de 7 en la escala de Braden, corresponde con:","o":{"A":"Percepción sensorial: Muy limitada. Exposición a la Humedad: Constantemente húmeda. Actividad: Encamado. Movilidad: Completamente inmóvil. Nutrición: Probablemente inadecuada. Roce y peligro de lesiones: No existe problema aparente.","B":"Percepción sensorial: Completamente limitada. Exposición a la Humedad: Constantemente húmeda. Actividad: Encamado. Movilidad: Completamente inmóvil. Nutrición: Probablemente inadecuada. Roce y peligro de lesiones: No existe problema aparente.","C":"Percepción sensorial: Completamente limitada. Exposición a la Humedad: Constantemente húmeda. Actividad: Encamado. Movilidad: Completamente inmóvil. Nutrición: Muy pobre. Roce y peligro de lesiones: P roblema.","D":"Percepción sensorial: Completamente limitada. Exposición a la Humedad: Constantemente húmeda. Actividad: Encamado. Movilidad: Completamente inmóvil. Nutrición: Probablemente inadecuada. Roce y peligro de lesiones: Problema."},"c":"D"},{"id":52,"q":"En la escala Resvech 2.0, ¿Cómo se define el exudado “mojado”?","o":{"A":"Hay pequeñas cantidades de líquido visibles cuando se retira el apósito; el apósito primario se encuentra muy manchado, pero no hay paso de exudado; la frecuencia de cambio del apósito resulta adecuada para el tipo de apósito.","B":"Los apósitos se encuentran saturados y hay fugas de exudado de los apósitos primario y secundario hacia las ropas o más allá; se requiere una frecuencia de cambio del apósito mucho mayor de la habitua l para este tipo de apósito.","C":"El apósito primario se encuentra mojado y hay traspaso de exudado; se requiere una frecuencia de cambio del apósito mayor de la habitual para este tipo de apósito; la piel perilesional puede encontrarse macerada.","D":"Hay pequeñas cantidades de líquido visibles cuando se retira el apósito; el apósito primario puede estar ligeramente manchado; la frecuencia de cambio del apósito resulta adecuada para el tipo de apósito."},"c":"A"},{"id":53,"q":"En el adulto, las necesidades energéticas totales se determinan principalmente por tres compartimentos del gasto energético. ¿Cuál de las siguientes opciones NO corresponde a uno de esos compartimentos principales?","o":{"A":"Termogénesis.","B":"Índice de masa corporal.","C":"Metabolismo basal.","D":"Ejercicio físico."},"c":"B"},{"id":54,"q":"Durante la evaluación del estado nutricional de un paciente adulto, el profesional debe ajustar la recomendación dietética conforme a las Ingestas Nutricionales de Referencia (INR). Según la Agencia Española de Seguridad Alimentaria y Nutrición, ¿cuál de las siguientes recomendaciones se ajusta correctamente a dichas INR en población adulta?","o":{"A":"Hidratos de carbono: 45 –60% del valor energético total.","B":"Proteínas: 1,2 g/kg de peso/día.","C":"Grasas: 15 -20% del valor energético total.","D":"Fibra: 15 g/día."},"c":"A"},{"id":55,"q":"En un paciente adulto en el que el cribado nutricional ha detectado riesgo nutricional, el profesional debe elaborar un plan de cuidados nutricionales individualizado. ¿Cuál de los siguientes aspectos NO debe incluirse obligatoriamente en dicho plan?","o":{"A":"Cálculo de requerimientos.","B":"Determinación sistemática de perfil lipídico.","C":"Función del tubo digestivo.","D":"Posibilidades de utilizar la vía oral."},"c":"B"},{"id":56,"q":"¿Cuál de las siguientes situaciones NO constituye una indicación para la prescripción de una dieta de textura líquida?","o":{"A":"Transición entre nutrición parenteral/sueroterapia e inicio de vía oral.","B":"Preparación para exploración gastrointestinal o cirugía intestinal.","C":"Intervención dietética avanzada en paciente con estreñimiento funcional sin otra patología digestiva.","D":"Reintroducción dietética tras mejoría de procesos digestivos agudos."},"c":"C"},{"id":57,"q":"¿Cuál de las siguientes definiciones corresponde correctamente a una dieta con bajo contenido en residuo?","o":{"A":"Dieta destinada a reducir exclusivamente el aporte de sustancias vegetales no digeribles con el fin de disminuir el débito fecal.","B":"Dieta destinada a reducir la ingesta de sustancias vegetales no digeribles y no absorbibles que contribuyen a incrementar el débito fecal.","C":"Dieta dirigida a disminuir la irritación mecánica intestinal mediante la supresión de alimentos integrales, semillas y vegetales crudos.","D":"Dieta orientada a reducir el contenido intestinal endoluminal no absorbido presente en heces tras la digestión."},"c":"D/B"},{"id":58,"q":"En el diseño de una dieta hipercalórica, es fundamental ajustar el aporte energético al gasto energético total (GET) para evitar el riesgo de sobrealimentación. ¿Cuál de las siguientes afirmaciones es correcta respecto al cálculo del GET en un paciente candidato a dieta hipercalórica?","o":{"A":"Tras estimar o medir el gasto energético en reposo el GET se obtiene aplicando un factor de estrés y un factor de actividad física.","B":"Para medir el GET, la calorimetría indirecta se considera la técnica gold standard.","C":"El GET se calcula directamente a partir del peso corporal y la edad.","D":"Las ecuaciones predictivas permiten establecer directamente el aporte calórico total sin necesidad de realizar ajustes posteriores."},"c":"A"},{"id":59,"q":"¿Cuál de las siguientes afirmaciones describe de forma más adecuada el concepto actual de obesidad?","o":{"A":"La obesidad se define exclusivamente como un aumento del peso corporal debido a un balance energético positivo mantenido.","B":"La obesidad es un proceso agudo y reversible cuyo origen depende principalmente de factores psicológicos.","C":"La obesidad se explica principalmente por la epigenética, siendo un fenómeno adquirido sin participación significativa de la genética.","D":"La obesidad es una enfermedad crónica caracterizada por acumulación excesiva/anormal de tejido adiposo y disfunción del mismo."},"c":"D"},{"id":60,"q":"¿Cuál de las siguientes afirmaciones es correcta respecto a la interpretación de los pliegues cutáneos en la evaluación de obesidad?","o":{"A":"Se considera obesidad si al menos un pliegue cutáneo está por encima de 4 desviación típica (DT) según edad y sexo.","B":"Se considera obesidad si al menos un pliegue cutáneo está por encima de 1 desviación típica (DT) según edad y sexo.","C":"Se considera obesidad si al menos un pliegue cutáneo está por encima de 2 desviación típica (DT) según edad y sexo.","D":"Se considera obesidad si al menos un pliegue cutáneo está por encima de 5 desviación típica (DT) según edad y sexo."},"c":"C"},{"id":61,"q":"¿Cuál de las siguientes afirmaciones es correcta respecto al tipo de fibra recomendada en distintas situaciones clínicas?","o":{"A":"Dislipemia: únicamente fibra insoluble.","B":"Diabetes: principalmente fibra insoluble.","C":"Enfermedad cardiovascular: únicamente fibra insoluble.","D":"Enfermedad inflamatoria intestinal: Principalmente fibra soluble."},"c":"D"},{"id":62,"q":"¿Cuál de los siguientes hallazgos en el aspirado obtenido a través de una sonda nasogástrica es más compatible con una correcta colocación en el estómago?","o":{"A":"Aspirado con pH ≤ 5, color verdoso o claro, con presencia de fragmentos de mucosidad amarillenta.","B":"Aspirado con pH entre 6 y 7, color amarillo -dorado a verde amarronado, de consistencia espesa.","C":"Aspirado con pH ≥ 6, color amarillo pálido y consistencia acuosa.","D":"Aspirado con pH 7, color verdoso y de consistencia líquida."},"c":"A"},{"id":63,"q":"En relación con las diferentes vías de acceso para la nutrición enteral, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"La sonda nasogástrica puede utilizarse de forma segura durante periodos prolongados superiores a un mes.","B":"La sonda nasointestinal requiere infusión continua y no se recomienda la alimentación intermitente debido a la respuesta osmótica del intestino delgado.","C":"La yeyunostomía permite la administración de nutrición en bolos sin riesgo de intolerancia digestiva.","D":"La yeyunostomía se asocia a una menor incidencia de complicaciones gastrointestinales, como cólicos y vómitos."},"c":"B"},{"id":64,"q":"En relación con la administración de la nutrición parenteral total (NPT), ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Una velocidad de infusión elevada de la NPT mejora el aporte calórico y nitrogenado sin producir efectos adversos significativos.","B":"Una velocidad de infusión excesivamente rápida puede provocar diuresis hiperosmolar y, en casos graves, convulsiones, coma y muerte.","C":"Una velocidad de infusión lenta de la NPT incrementa el riesgo de sobrecarga metabólica y complicaciones neurológicas.","D":"La administración de la NPT a velocidad reducida garantiza una mejor tolerancia metabólica y un mayor aprovechamiento nutricional."},"c":"B"},{"id":65,"q":"En la infusión de lípidos intravenosos en un adulto, ¿cuál de las siguientes pautas de administración debe tenerse en cuenta durante el primer día de tratamiento?","o":{"A":"Administración de lípidos al 10% hasta 250 ml en 2 –3 horas, con un máximo de 4 g/kg/día.","B":"Infusión de lípidos al 20% hasta 750 ml en 8 horas, con un límite de 3 g/kg/día.","C":"Administración de lípidos al 10% hasta 500 ml en 4 –6 horas, con un máximo de 2,5 g/kg de peso corporal al día.","D":"Infusión de lípidos al 10% hasta 1000 ml en 10 –12 horas, sin restricción según el peso corporal."},"c":"C"},{"id":66,"q":"Durante la exploración física respiratoria, al realizar la auscultación pulmonar, se identifican roncus. ¿Cuál de las siguientes opciones describe correctamente sus características?","o":{"A":"Sonidos continuos, de tono bajo, producidos por la obstrucción parcial de la vía aérea.","B":"Sonidos discontinuos, de tono bajo, asociados a broncoconstricción o estrechamiento de las vías respiratorias.","C":"Sonidos continuos, de tono alto, audibles tanto en inspiración como en espiración.","D":"Sonidos discontinuos, de tono alto, audibles pri ncipalmente durante la espiración."},"c":"A"},{"id":67,"q":"En pacientes con afecciones respiratorias, la oxigenoterapia se indica principalmente para aumentar la presión parcial de oxígeno arterial (PaO₂) y alcanzar valores normales para el individuo. Según la curva de disociación de la oxihemoglobina, ¿qué combinación de PaO₂ y saturación de oxígeno arterial (SaO₂) corresponde a esos rangos considerados normales?","o":{"A":"PaO₂ 55 –80 mmHg y SaO₂ 88 –96%.","B":"PaO₂ 70 –100 mmHg y SaO₂ 90 –99%.","C":"PaO₂ 60 –95 mmHg y SaO₂ 80 –98%.","D":"PaO₂ 50 –90 mmHg y SaO₂ 85 –97%."},"c":"B/C"},{"id":68,"q":"Un paciente con insuficiencia respiratoria recibe oxigenoterapia con FiO₂ >50% durante más de 24 horas. Posteriormente comienza con clínica respiratoria progresiva. ¿Cuál de los siguientes conjuntos de signos y síntomas es más compatible con toxicidad por oxígeno con daño pulmonar?","o":{"A":"Malestar subesternal, parestesias, disnea, inquietud, fatiga, hipoxemia persistente y atelectasia alveolar.","B":"Tos productiva purulenta, leucocitosis marcada, dolor pleurítico e hiperinsuflación pulmonar bilateral.","C":"Dolor torácico opresivo, diaforesis, disnea, hipoxemia, elevación del segmento ST y bradicardia.","D":"Disnea súbita con hemoptisis, taquicardia, hipotensión, hipocapnia y signos de sobrecarga ventricular derecha en ECG."},"c":"A"},{"id":69,"q":"Respecto a la mascarilla Venturi utilizada en oxigenoterapia, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Proporciona una concentración variable de oxígeno, dependiente principalmente del patrón ventilatorio (profundidad y frecuencia) del paciente.","B":"Emplea el principio de Bernoulli, generando arrastre de aire ambiental, lo que permite administrar una FiO₂ precisa y constante.","C":"Utiliza un reservorio con reinhalación parcial de CO₂, aumentando progresivamente la FiO₂ conforme se incrementa el volumen corriente.","D":"Emplea el principio de Venturi -Laplace, que crea un efecto de vacío intramascarilla para aumentar automáticamente la FiO₂ según la demanda ventilatoria del paciente."},"c":"B"},{"id":70,"q":"En relación con la espirometría de incentivo y las recomendaciones de enfermería para su correcta utilización, ¿cuál de las siguientes afirmaciones es INCORRECTA?","o":{"A":"Se recomienda que el paciente adopte una posición semi -Fowler o erecta antes de iniciar el procedimiento.","B":"El paciente debe colocar firmemente la boquilla en la boca, inspirar a través de la boca y mantener una apnea inspiratoria de al menos 5 segundos para mantener el indicador entre las líneas.","C":"La espirometría de incentivo debe realizarse 10 respiraciones consecutivas cada hora durante las horas de vigilia; entre intentos se aconsejan varias respiraciones normales para evitar la fatiga.","D":"En el espirómetro incentivo de flujo , la esfera o pesa se eleva en función de la intensidad del aire inspirado."},"c":"B"},{"id":71,"q":"En relación con el drenaje postural y las recomendaciones de enfermería para su realización correcta y segura, ¿cuál de las siguientes afirmaciones es INCORRECTA?","o":{"A":"Antes del drenaje postural, se recomienda que el paciente inhale broncodilatadores y mucolíticos, si están prescritos, ya que facilitan el drenaje del árbol bronquial.","B":"Se indica al paciente permanecer en cada posición aproximadamente 10 –15 minutos, realizando una respiración controlada.","C":"Durante cada posición el paciente debe inspirar lentamente por la nariz y espirar despacio con los labios fruncidos, con el fin de mantener las vías respiratorias abiertas y favore cer el drenaje de secreciones.","D":"En pacientes con tos ineficaz o incapacidad para toser, el drenaje postural debe evitarse, ya que la retención de secreciones aumenta el riesgo de atelectasia."},"c":"D"},{"id":72,"q":"¿Cuál de las siguientes opciones incluye complicaciones reconocidas asociadas a la traqueostomía, tanto inmediatas como a largo plazo?","o":{"A":"Rotura del tronco arterial braquiocefálico, disfagia, dilatación e isquemia laríngea y hemorragia.","B":"Broncoaspiración, infección, estenosis traqueal y embolia grasa.","C":"Desplazamiento de la sonda, neumotórax, broncoaspiración y enfisema subcutáneo o mediastínico.","D":"Desintubación accidental, daño en el nervio traqueal y fístula traqueoesofágica."},"c":"C"},{"id":73,"q":"Según la clasificación clínica habitual, la neumonía puede dividirse en cuatro tipos principales. ¿Cuál de las siguientes opciones incluye correctamente dichas categorías?","o":{"A":"Neumonía lobar, bronconeumonía, neumonía intersticial y neumonía necrotizante.","B":"Neumonía bacteriana, neumonía vírica, neumonía fúngica y neumonía por aspiración.","C":"Neumonía aguda, neumonía crónica, neumonía recurrente y neumonía idiopática.","D":"Neumonía extrahospitalaria, neumonía asociada a la atención sanitaria, neumonía intrahospitalaria y neumonía asociada a ventilación mecánica."},"c":"D"},{"id":74,"q":"Respecto a la clasificación anatomopatológica de la neumonía según su patrón de afectación pulmonar, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Cuando una gran parte de uno o más lóbulos está afectada, se denomina neumonía lobular; la bronconeumonía corresponde a neumonía “en placas” y es más frecuente que la neumonía lobular.","B":"La neumonía lobular corresponde a lesiones parcheadas de origen bronquial y es más frecuente que la bronconeumonía.","C":"La bronconeumonía afecta típicamente un lóbulo completo y su origen se localiza en el parénquima alveolar.","D":"La neumonía lobular y la bronconeumonía presentan la misma frecuencia, diferenciándose únicamente por la etiología (vírica frente a bacteriana)."},"c":"A"},{"id":75,"q":"En relación con la tuberculosis (TB), señale la afirmación correcta:","o":{"A":"Mycobacterium tuberculosis es el principal agente causal de la TB; se trata de un bacilo acidorresistente, anaerobio y de crecimiento lento.","B":"Mycobacterium bovis y Mycobacterium avium casi nunca se relacionan con la aparición de una infección tuberculosa.","C":"La TB afecta principalmente al sistema nervioso central y raramente com promete el parénquima pulmonar.","D":"La TB no se relaciona con factores socioeconómicos."},"c":"B/A"},{"id":76,"q":"Respecto a la interpretación de la prueba de la tuberculina (PPD/Mantoux) y a la vacunación con BCG, señale la afirmación correcta:","o":{"A":"Una induración de 0 –4 mm se considera siempre significativa y compatible con infección tuberculosa previa.","B":"Una induración ≥10 mm se considera relevante únicamente en pacientes VIH positivos o contactos estrechos de TB activa.","C":"Una induración ≥5 mm s e considera positiva en cualquier persona con inmunidad normal, aun sin factores de riesgo.","D":"Una induración ≥5 mm puede considerarse significativa en personas de riesgo, como pacientes positivos al VIH."},"c":"D"},{"id":77,"q":"En relación con las manifestaciones clínicas de la insuficiencia respiratoria aguda, señale la opción que describe correctamente la progresión clínica asociada al deterioro de la oxigenación y al avance de la hipoxemia.","o":{"A":"Los signos tempranos pueden incluir inquietud, fatiga, cefalea, disnea y taquicardia; a medida que progresa la hipoxemia aparecen confusión, letargia, taquipnea, cianosis central y diaforesis.","B":"Los signos iniciales son tos productiva, fiebre y sibilancias; conforme progresa aparece edema agudo de pulmón y shock cardiogénico.","C":"Los signos iniciales incluyen cianosis central y confusión; posteriormente aparecen cefalea, inquietud, hipertensión y fatiga.","D":"Los signos tempranos se caracterizan por bradicardia e hipotensión; conforme progresa, aparecen taquicardia y diaforesis."},"c":"A"},{"id":78,"q":"En relación con la enfermedad pulmonar obstructiva crónica (EPOC), señale la afirmación que es INCORRECTA:","o":{"A":"La limitación del flujo aéreo en la EPOC es progresiva y se asocia a una respuesta inflamatoria anómala de los pulmones frente a partículas o gases nocivos.","B":"La destrucción de la pared alveolar aumenta las uniones alveolares y reduce la elasticidad pulmonar.","C":"La respuesta inflamatoria afecta tanto a vías respiratorias proximales y periféri cas como al parénquima pulmonar y la vasculatura pulmonar.","D":"En las vías respiratorias proximales puede producirse incremento de células caliciformes y crecimiento de glándulas submucosas, favoreciendo hipersecreción mucosa."},"c":"B"},{"id":79,"q":"En relación con la realización de un electrocardiograma (ECG) estándar de 12 derivaciones y la correcta colocación de los electrodos, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"El ECG estándar de 12 derivaciones requiere la colocación de 12 electrodos.","B":"Los electrodos de los miembros deben colocarse preferentemente sobre prominencias óseas, para asegurar una mejor conducción eléctrica y reducir el artefacto por movimiento.","C":"En un ECG de 12 derivaciones los electrodos de los miembros generan las derivaciones I, II, III, aVR, aVL y aVF.","D":"La colocación exacta de los electrodos torácicos no influye en la interpretación clínica del ECG, ya que el trazado puede corregi rse automáticamente por el monitor."},"c":"C"},{"id":80,"q":"Respecto a las extrasístoles auriculares, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Se caracterizan por alteración del ritmo con pausas compensatorias completas, sin cambios visibles en la morfología de la onda P, y con intervalos PP que suelen ser el doble del intervalo previo.","B":"Se observa una onda P prematura con morfología diferente, que acorta el intervalo PP y suele acompañarse de una pausa no compensatoria.","C":"Presentan ondas P negativas constantes en todas las derivaciones, con intervalo PR siempre mayor a 0,20 s y QRS ancho >0,12 s.","D":"Son exclusivas de cardiopatía estructural avanzada y no aparecen en corazones normales."},"c":"B"},{"id":81,"q":"En la valoración vascular de las extremidades inferiores mediante Doppler manual de onda continua, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Cuanto mayor es la frecuencia (MHz), mayor es la penetración del tejido y mejor la detección en profundidad.","B":"El Doppler de onda continua permite localizar de forma precisa el sitio de una estenosis y diferenciar sin dificultad flujo arterial del venoso.","C":"Para la exploración de extremidades inferiores se coloca al paciente en sedestación con las piernas en declive para favorecer el llenado arterial y mejorar la señal.","D":"Se aplica gel acústico y se coloca el transductor sobre la arteria a 45 –60°, inclinándolo lentamente hasta identificar el flujo arterial."},"c":"D"},{"id":82,"q":"Respecto al Índice Tobillo -Brazo (ITB) como método de valoración de arteriopatía periférica, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"El ITB es la relación entre la presión sistólica en el tobillo y la presión sistólica en el brazo; para su cálculo se divide la presión sistólica más alta del tobillo de cada pie por la presión sistólica braquial más alta.","B":"El ITB se calcula dividiendo la presión diastólica del tobillo entre la presión sistólica braquial, y se obtiene con Doppler en ambos valores.","C":"Para determin ar el ITB el paciente debe estar sentado al menos 5 minutos, y el manguito se coloca a nivel del maléolo lateral.","D":"Las presiones sistólicas del tobillo se obtienen únicamente en la arteria femoral superficial, ya que las arterias tibial posterior y dorsal del pie no son accesibles con Doppler."},"c":"A"},{"id":83,"q":"En relación con las úlceras venosas secundarias a insuficiencia venosa crónica, ¿cuál de las siguientes características es la más compatible con este tipo de lesión?","o":{"A":"Úlcera localizada en la región maleolar (interna o externa), generalmente grande, superficial y con exudado abundante.","B":"Úlcera pequeña, profunda y circular, localizada en la punta de los dedos o en espacios interdigitales.","C":"Lesión necrótica en la cara medial del primer dedo o lateral del quinto dedo, de bordes bien delimitados, secundaria a isquemia y presión.","D":"Úlcera distal con escaso exudado, dolor desencadenado por ejercicio y mejoría con reposo."},"c":"A"},{"id":84,"q":"En el manejo de enfermería del paciente con úlceras en extremidades inferiores, ¿cuál de las siguientes afirmaciones es INCORRECTA?","o":{"A":"En fases iniciales puede ser necesario restringir la actividad física para favorecer la cicatrización.","B":"Se debe evitar uso de almohadillas térmicas o bolsas de agua caliente ya que aumentan la demanda tisular de oxígeno.","C":"Se recomienda una dieta rica en proteínas, vitaminas D y K, hierro y cinc, para promover la cicatrización.","D":"Si el dolor limita la actividad del paciente, pueden prescribirse analgésicos para mejorar la tolerancia funcional."},"c":"C"},{"id":85,"q":"Según la tabla de clasificación de la presión arterial en adultos mayores de 18 años, ¿cuál de las siguientes opciones relaciona correctamente los valores de tensión normal, prehipertensión, hipertensión etapa 1 e hipertensión etapa 2?","o":{"A":"Normal: 120 –139/80 –89 mmHg; Prehipertensión: <120/<80 mmHg; HTA etapa 1: ≥160 o ≥100 mmHg; HTA etapa 2: 140 –159 o 90 –99 mmHg.","B":"Normal: <120/<80 mmHg; Prehipertensión: 120 –139 o 80 –89 mmHg; HTA etapa 1: 140 –159 o 90 –99 mmHg; HTA etapa 2: ≥160 o ≥100 mmHg.","C":"Normal: <120/<80 mmHg; Prehipertensión: 130 –149 o 85 –95 mmHg; HTA etapa 1: 150 –169 o 95 –104 mmHg; HTA etapa 2: ≥170 o ≥110 mmHg.","D":"Normal: <130/<85 mmHg; Prehipertensión: 130 –139 o 85 –89 mmHg; HTA etapa 1: 140 –149 o 90 –94 mmHg; HTA etapa 2: ≥150 o ≥95 mmHg."},"c":"B"},{"id":86,"q":"En relación con los factores de riesgo asociados a hipertensión arterial (HTA), señale la opción correcta:","o":{"A":"La dislipidemia asociada a HTA se caracteriza por concentraciones elevadas de HDL y disminución de LDL.","B":"El tabaquismo es una causa directa de hipertensión arterial.","C":"La prevalencia de HTA depende fundamentalmente de factores hereditarios.","D":"La HTA se asocia frecuentemente a dislipidemia, obesidad y diabetes."},"c":"D"},{"id":87,"q":"En relación con la insuficiencia cardiaca, señale la afirmación INCORRECTA.","o":{"A":"La clasificación funcional de la insuficiencia cardiaca según la New York Heart Association (NYHA) valora la limitación para la actividad física en clases I –IV.","B":"La fracción de eyección (FE) ventricular normal se sitúa habitualmente entre 45 – 60% del volumen ventricular.","C":"La diabetes mellitus se asocia a un mayor riesgo de desarrollar insuficiencia cardiaca.","D":"La ateroesclerosis de las arterias coronarias constituye una causa primaria de insuficiencia cardiaca."},"c":"B"},{"id":88,"q":"Un paciente refiere dolor torácico de aparición en reposo, acompañado de elevación reversible del segmento ST en el ECG. El cuadro se atribuye a vasoespasmo de una arteria coronaria. ¿Qué tipo de angina describe mejor esta presentación clínica?","o":{"A":"Angina estable.","B":"Angina inestable.","C":"Angina refractaria.","D":"Angina variable."},"c":"D"},{"id":89,"q":"En relación con la trombosis venosa profunda y los factores precipitantes implicados en el desarrollo de tromboembolismo venoso, ¿cuál de las siguientes combinaciones corresponde a la tríada de Virchow?","o":{"A":"Hipertensión arterial, hiperlipidemia y disfunción endotelial.","B":"Daño endotelial, estasis venosa y alteración de la coagulación.","C":"Disminución del gasto cardiaco, vasoconstricción venosa y agregación plaquetaria.","D":"Alteración endotelial, hipoxemia tisular y aumento de la presión intratorácica."},"c":"B"},{"id":90,"q":"Ante un paciente con sospecha de arritmia grave en una tira electrocardiográfica, ¿cuál es la secuencia de análisis prioritaria y correcta para identificar de forma sistemática el trastorno del ritmo?","o":{"A":"Eje eléctrico → onda T → intervalo QT.","B":"Ondas P → intervalo PR → segmento ST.","C":"Frecuencia y ritmo ventricular → QRS (duración/forma) → ondas P y relación P:QRS.","D":"Segmento ST → onda U → intervalo QT."},"c":"C"},{"id":91,"q":"Un paciente presenta angina de pecho y se instaura tratamiento médico. ¿Cuál de las siguientes afirmaciones describe mejor el tratamiento y objetivos terapéuticos de la angina?","o":{"A":"Los nitratos constituyen el tratamiento estándar para el alivio del dolor; el abordaje busca disminuir la demanda de oxígeno del miocardio y aumentar su suministro.","B":"El tratamiento estándar se basa exclusivamente en β -bloqueantes.","C":"La nitroglicerina es un vasodilatador potente que dilata principalmente arterias coronarias.","D":"El tratamiento farmacológico de la angina se orienta principalmente a incrementar el aporte de oxígeno al miocardio mediante vasodilatación arterial."},"c":"A"},{"id":92,"q":"¿Cuál es la principal acción de la colecistoquinina (CCK) en el sistema digestivo?","o":{"A":"Estimular la secreción de ácido clorhídrico y pepsinógeno.","B":"Incrementar la liberación de insulina tras comidas ricas en carbohidratos.","C":"Estimular la contracción de la vesícula biliar y la secreción de enzimas pancreáticas.","D":"Reducir la secreción de bilis y acelerar el vaciamiento gástrico."},"c":"C"},{"id":93,"q":"¿Cuál es el principal mecanismo celular responsable de la secreción de ácido clorhídrico por las células parietales gástricas?","o":{"A":"La difusión pasiva de protones a través de la membrana luminal.","B":"El co -transporte sodio -hidrógeno dependiente de gradiente electroquímico.","C":"La acción del intercambiador H⁺/K⁺ -ATPasa en la membrana luminal.","D":"La secreción directa de ácido carbónico hacia la luz gástrica."},"c":"C"},{"id":94,"q":"¿Cuál de los siguientes cambios relacionados con el envejecimiento del estómago puede provocar intolerancias alimentarias y disminución en la absorción de vitamina B12?","o":{"A":"La disminución de la motilidad y del vaciamiento gástrico.","B":"La degeneración y atrofia de las superficies mucosas gástricas con disminución de la producción de ácido clorhídrico.","C":"La reducción del tono del esfínter esofágico inferior.","D":"La disminución de la secreción de moco y de la elasticidad de la pared rec tal."},"c":"B"},{"id":95,"q":"¿Cuál de las siguientes situaciones clínicas es más coherente con un cuadro de gastritis crónica?","o":{"A":"Dolor epigástrico intenso de inicio brusco acompañado de hematemesis.","B":"Náuseas y vómitos autolimitados tras la ingesta de alimentos irritantes.","C":"Saciedad temprana, intolerancia a alimentos grasos y fatiga mantenida en el tiempo.","D":"Melena y signos de inestabilidad hemodinámica secundarios a sangrado digestivo."},"c":"C"},{"id":96,"q":"En un paciente con sospecha de hemorragia digestiva alta secundaria a una úlcera péptica, ¿cuál de las siguientes manifestaciones clínicas orienta con MAYOR probabilidad a una hemorragia de pequeña cuantía pero mantenida?","o":{"A":"Hematemesis con vómitos de sangre roja brillante.","B":"Melena o heces negras y alquitranadas sin vómitos de sangre.","C":"Hipotensión brusca con taquicardia y palidez cutánea.","D":"Vómitos en “posos de café” asociados a inestabilidad hemodinámica."},"c":"B"},{"id":97,"q":"Según los criterios diagnósticos de Roma IV, ¿cuál es el requisito temporal mínimo para establecer el diagnóstico de estreñimiento funcional?","o":{"A":"Presencia de síntomas durante al menos 3 meses, con inicio al menos 6 meses antes del diagnóstico.","B":"Presencia de síntomas durante al menos 6 meses, con inicio en los últimos 3 meses.","C":"Presencia de síntomas continuos durante 12 meses consecutivos.","D":"Presencia de síntomas intermitentes durante al menos 6 meses."},"c":"A"},{"id":98,"q":"¿Cuál de las siguientes complicaciones sistémicas se asocia con MAYOR frecuencia a la colitis ulcerosa que a la enfermedad de Crohn?","o":{"A":"Obstrucción del intestino delgado.","B":"Megacolon tóxico.","C":"Colelitiasis.","D":"Hidronefrosis derecha."},"c":"B"},{"id":99,"q":"En pacientes con disfunción hepática crónica, ¿cuál es la causa MÁS directamente relacionada con la aparición de hipoprotrombinemia y tendencia hemorrágica?","o":{"A":"Deficiencia de vitamina C.","B":"Deficiencia de vitamina K.","C":"Deficiencia de vitamina B₁ (tiamina).","D":"Deficiencia de vitamina A."},"c":"B"},{"id":100,"q":"En un paciente con cirrosis alcohólica y tendencia a la retención de líquidos, ¿cuál es el objetivo principal del asesoramiento enfermero para identificar y evitar el consumo habitual de alimentos en conserva?","o":{"A":"Reducir la ingesta de proteínas para prevenir la encefalopatía
