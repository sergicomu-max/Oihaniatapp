solicitado por el médic o prescriptor cuando detecta riesgo de incumplimiento terapéutico.","B":"Puede ser recomendado por el trabajador social en pacientes con dificultades de alfabetización.","C":"Únicamente el paciente o su familia pueden solicitar este servicio a la oficina de farmacia.","D":"Facilita la correcta administración de la medicación y contribuye a la mejora del cumplimiento terapéutico."},"c":"C"},{"id":398,"q":"En el contexto de la atención domiciliaria, el personal de enfermería desempeña un papel clave en la detección de errores en la administración de medicamentos. ¿Cuál de los siguientes conjuntos de estrategias resulta más adecuado para identificar dichos errores?","o":{"A":"Entrevista estructurada, demostraciones prácticas y supervisión de los registros de autoadmi nistración.","B":"Revisión de la historia clínica, control analítico y ajuste farmacológico.","C":"Encuestas telefónicas, revisión administrativa y control del stock domiciliario.","D":"Observación directa, valoración nutricional y evaluación del entorno físico."},"c":"A"},{"id":399,"q":"La vía sublingual permite una rápida absorción del fármaco y evita el metabolismo hepático de primer paso, lo que incrementa su biodisponibilidad y rapidez de acción. ¿Cuál de las siguientes situaciones clínicas justifica preferentemente el uso de la vía sublingual?","o":{"A":"Paciente con infección respiratoria que precisa antibioterapia oral durante 10 días.","B":"Paciente con dolor abdominal funcional y episodios recurrentes de náuseas leves, en tratamiento sintomático.","C":"Paciente con artritis reumatoide en tratamiento inmunomodulador de mantenimiento.","D":"Paciente con dolor torácico de inicio súbito compatible con isquemia miocárdica y dificultad para la deglución."},"c":"D"},{"id":400,"q":"En la administración de medicamentos por vía intramuscular en el paciente adulto, es fundamental seleccionar adecuadamente el área anatómica en función del volumen a administrar. ¿Cuál de las siguientes asociaciones entre zona de inyección intramuscular y volumen máximo recomenda do es correcta?","o":{"A":"Área deltoidea: hasta 2,5 ml.","B":"Área ventroglútea: hasta 5 ml.","C":"Área dorsoglútea: hasta 8 ml.","D":"Área del vasto lateral externo: hasta 3 ml."},"c":"B"},{"id":401,"q":"En relación con la administración de medicamentos por vía intramuscular, determinadas condiciones clínicas pueden contraindicar su utilización debido al aumento del riesgo de complicaciones locales o sistémicas. ¿Cuál de las siguientes situaciones NO constituye una contraindicación habitual para la administració n intramuscular?","o":{"A":"Trastornos de la coagulación.","B":"Edema importante en la zona de punción.","C":"Vasculopatía periférica.","D":"Panículo adiposo de gran espesor en la zona de inyección."},"c":"D"},{"id":402,"q":"Según la clasificación de los medicamentos peligrosos, establecida en función de su potencial riesgo para la salud, estos se agrupan en tres categorías principales:","o":{"A":"Grupo 1: fármacos con bajo riesgo toxicológico; Grupo 2: medicamentos de uso hospitalario; Grupo 3: fármacos de dispensación ambulatoria.","B":"Grupo 1: fármacos antineoplásicos; Grupo 2: fármacos no antineoplásicos que cumplen criterios del NIOSH; Grupo 3: fármacos con riesgo reproductivo.","C":"Grupo 1: medicamentos biológicos; Grupo 2: psicofármacos; Grupo 3: fármacos teratógenos.","D":"Grupo 1: fármacos de alto riesgo toxicológico; Grupo 2: medicamentos genéricos; Grupo 3: fármacos de uso restringido."},"c":"B"},{"id":403,"q":"En la administración de medicamentos por vía parenteral, el ángulo de inserción de la aguja varía en función de la vía utilizada, con el fin de garantizar una correcta deposición del fármaco y minimizar complicaciones. ¿Cuál de las siguientes asociaciones entre vía de administración y ángulo de inyección es correcta?","o":{"A":"Intradérmica: 10–15º / Subcutánea: 45 –90º / Intramuscular: 90º.","B":"Intradérmica: 15 -20º / Subcutánea: 35 -45º / Intramuscular: 60 -90º.","C":"Intradérmica: 10 -15º / Subcutánea: 90º / Intramuscular: 45 -90º.","D":"Intradérmica: 15 -20º / Subcutánea: 45 -60º / Intramuscular: 75 -90º."},"c":"A"},{"id":404,"q":"En relación con el procedimiento adecuado para la administración de pomadas oftálmicas, señale la afirmación que NO es correcta:","o":{"A":"El paciente debe colocarse en posición sentada o en decúbito, con la cabeza ligeramente hacia atrás.","B":"Se debe retraer el párpado inferior para exponer el saco conjuntival.","C":"Tras la aplicación, se debe indicar al paciente que parpadee una o dos veces y mantenga posteriormente los ojos cerrados.","D":"Debe aplicarse aproximadamente una tira de 0,5 cm de pomada, evitando el contacto directo con la córnea."},"c":"C"},{"id":405,"q":"En relación con el Decreto 38/2012, de 13 de marzo, sobre historia clínica y derechos y obligaciones de pacientes y profesionales de la salud en materia de documentación clínica, señale qué normativa NO está relacionada ni resulta de aplicación directa en su desarrollo o marco jurídico:","o":{"A":"Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente.","B":"Ley Orgánica 15/1999, de 13 de diciembre, de Protección de Datos de Carácter Personal.","C":"Real Decreto 1093/2010, de 3 de septiembre, por el que se aprueba el conjunto mínimo de datos de los informes clínicos en el SNS.","D":"Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias."},"c":"D"},{"id":406,"q":"Según el artículo 7 del Decreto 38/2012, sobre la cumplimentación de la historia clínica, ¿cuál de las siguientes afirmaciones sobre las anotaciones subjetivas es CORRECTA?","o":{"A":"Son datos objetivos verificables mediante pruebas complementarias y deben ser accesibles siempre al paciente.","B":"Incluyen impresiones o valoraciones personales del profesional no sustentadas directamente en datos objetivos y pueden quedar claramente identificadas para facilitar su disociación.","C":"No deben constar en la historia clínica por afectar a la intimidad del paciente.","D":"Pueden incorporar expresiones o comentarios sin relación directa con la asistencia sanitaria si aportan contexto clínico."},"c":"B"},{"id":407,"q":"En relación con el acceso a la historia clínica según el Decreto 38/2012 y la normativa básica estatal, señale la opción CORRECTA:","o":{"A":"El acceso del paciente a su historia clínica es absoluto y no puede limitarse en ningún caso.","B":"Los profesionales sanitarios pueden acceder libremente a cualquier historia clínica del centro, con independencia de que intervengan o no en la asistencia del paciente.","C":"El acceso a la historia clínica debe limitarse a los fines específicos previstos legalmente, garantizando los derechos de la persona titular de los datos.","D":"La entrega de documentación clínica no requiere identificar a la persona solicitante ni justificar la finalidad del acceso, para facilitar la transparencia asistencial."},"c":"C"},{"id":408,"q":"En relación con el acceso a la historia clínica por personal sanitario con finalidad distinta a la asistencial y por terceras personas, según el Decreto 38/2012, señale la opción CORRECTA.","o":{"A":"El personal sanitario con funciones de inspección o evaluación puede acceder libremente a toda la historia clínica sin limitación de datos ni necesidad de justificar el acceso.","B":"El acceso a la historia clínica con fines de investigación exige siempre el consentimiento expreso de la persona paciente, sin excepciones.","C":"Las compañías aseguradoras privadas pueden acceder a la historia clínica completa del paciente para fines de facturación sin necesidad de consentimiento.","D":"El acceso a la historia clínica con fines de gestión, inspección o investigación debe limitarse a los datos imprescindibles y, como norma general, garantizar la disociación o anonimización de los datos identificativos."},"c":"D"},{"id":409,"q":"Según el Decreto 38/2012, ¿cuánto tiempo debe transcurrir desde el fallecimiento de la persona paciente para que pueda destruirse la totalidad de su documentación clínica?","o":{"A":"Cinco años desde el fallecimiento.","B":"Diez años desde el fallecimiento.","C":"Quince años desde el fallecimiento.","D":"La documentación clínica no puede destruirse tras el fallecimiento."},"c":"B"},{"id":410,"q":"Según el Decreto 38/2012, antes de otorgar el consentimiento informado, ¿cuál de las siguientes NO forma parte de la información básica que debe recibir la persona paciente?","o":{"A":"La finalidad y los beneficios esperados de la intervención terapéutica.","B":"Las consecuencias relevantes o de importancia asociadas a la intervención.","C":"Los riesgos relacionados con las circunstancias personales o profesionales de la persona paciente.","D":"Los riesgos probables en condiciones normales, conforme a la experiencia del profesional que realizará el procedimiento."},"c":"D/C"},{"id":411,"q":"Según el Decreto 147/2015, sobre derechos y deberes de las personas en el sistema sanitario de Euskadi, ¿cuál de las siguientes afirmaciones es CORRECTA en relación con la negativa al tratamiento?","o":{"A":"La persona paciente puede negarse a cualquier tratamiento en todo caso, incluso cuando exista riesgo grave e inmediato para su vida.","B":"La negativa al tratamiento solo es válida si se formaliza siempre por escrito mediante consentimiento informado negativo.","C":"La persona paciente puede negarse al tratamiento, salvo en los supuestos previstos legalmente, aunque dicha negativa pueda ocasionar un perjuicio grave para su salud.","D":"La negativa al tratamiento queda anulada automáticamente cuando el profesional considera que la decisión no es beneficiosa para la persona paciente."},"c":"C"},{"id":412,"q":"Según el artículo 5 del Decreto 147/2015, relativo a los derechos de la persona paciente en la participación responsable en la gestión de su propia salud, ¿cuál de las siguientes afirmaciones es INCORRECTA?","o":{"A":"La persona paciente tiene derecho a decidir unilateralmente la organización y priorización de los recursos sanitarios públicos que se le asignen, en función de sus preferencias personales.","B":"La persona paciente puede acceder a la información contenida en su historia clínica y obtener copia de la misma, conforme a los límites y g arantías previstos en la normativa vigente.","C":"La persona paciente tiene derecho a recibir información comprensible sobre los recursos sanitarios y sociosanitarios disponibles para poder gestionar su salud con el mayor nivel de autonomía posible.","D":"La persona paciente tiene derecho a conocer la identidad, titulación y especialidad del profesional sanitario responsable de su diagnóstico y tratamiento."},"c":"A"},{"id":413,"q":"Según el artículo 6 del Decreto 147/2015, relativo a los derechos en relación con la organización y gestión del sistema sanitario de Euskadi, ¿cuál de las siguientes afirmaciones sobre los derechos lingüísticos de las personas usuarias es INCORRECTA?","o":{"A":"Las personas usuarias tienen derecho a que se garanticen sus de rechos lingüísticos conforme a la normativa vigente sobre normalización del uso del euskera en el ámbito sanitario.","B":"El sistema sanitario debe posibilitar que la persona usuaria pueda relacionarse con los servicios sanitarios en cualquiera de las lenguas oficiales de la Comunidad Autónoma del País Vasco.","C":"El ejercicio de los derechos lingüísticos por parte de la persona usuaria queda condicionado a la disponibilidad inmediata de personal sanitario bilingüe en cada centro o servicio.","D":"Los derechos lingüísticos en el sistema sanitario se fundamentan en la legislación autonómica sobre normalización del euskera y en la normativa específica aplicable a las personas consumidoras y usuarias."},"c":"C"},{"id":414,"q":"Según el artículo 7 del Decreto 147/2015, relativo a los derechos en relación con las políticas sanitarias específicas, ¿cuál de los siguientes NO se considera un colectivo vulnerable conforme a los criterios establecidos en dicho artículo?","o":{"A":"Personas con trastorno mental.","B":"Personas con enfermedades raras de origen genético.","C":"Personas inmigrantes en situación administrativa irregular.","D":"Personas con discapacidad o diversidad funcional."},"c":"B"},{"id":415,"q":"De acuerdo con el artículo 12.2 del Decreto 147/2015, la posesión de la Tarjeta Individual Sanitaria en el Sistema Sanitario de Euskadi permite el ejercicio de determinadas facultades. ¿Cuál de las siguientes NO se corresponde con una facultad reconocida en dicho artículo?","o":{"A":"Obtención de una segunda opinión médica en procesos de enfermedad que conlleven riesgo para la vida o afecten gravemente a su calidad, en los términos previstos normativamente.","B":"Elección de profesional facultativo general y pediatra, así como de centro de atención primaria y, en su caso, del hospital correspondiente.","C":"Acceso a la asistencia sanitaria en un período de tiempo razonable, con garantía de plazo máximo de respuesta en los supuestos reglamentariamente establecidos.","D":"Elección del profesional de enfermería, fisioterapia o trabajo social en el marco de la organización asistencial del sistema sanitario de Euskadi."},"c":"D"},{"id":416,"q":"En relación con las funciones de los Servicios de Atención a Pacientes y Personas Usuarias del sistema sanitario de Euskadi, según el Decreto 147/2015, señale la afirmación CORRECTA:","o":{"A":"Los Servicios de Atención a Pacientes y Personas Usuarias pueden formular propuestas de mediación, pero la resolución de la reclamación corresponde siempre al órgano competente.","B":"La mediación llevada a cabo por estos servicios tiene carácter vinculante y sustituye la resolución administrativa cuando hay conformidad de la persona usuaria.","C":"Estos servicios pueden resolver reclamaciones cuando, tras un proceso de mediación, exista acuerdo entre las partes implicadas.","D":"Cuando una reclamación es susceptible de mediación, queda excluida su posterior resolución por la Administración sanitaria."},"c":"A/C"},{"id":417,"q":"En relación con la protección de datos de carácter personal en el ámbito sanitario y las consecuencias penales derivadas de su vulneración, señale la opción CORRECTA conforme a lo dispuesto en el artículo 199 del Código Penal:","o":{"A":"La revelación de datos de salud por parte de un profesional sanitario sin consentimiento únicamente conlleva responsabilidad administrativa, al tratarse de información obtenida en el ejercicio de una función pública.","B":"El profesional sanitario que divulga datos de salud incumpliendo su deber de secreto profesional puede ser castigado con pena de prisión y multa, además de inhabilitación especial para el ejercicio de su profesión.","C":"Solo existe responsabilidad penal cuando la revelación de datos se produce con ánimo de lucro o difusión pública masiva de la información.","D":"La divulgación de datos clínicos sin consentimiento constituye delito únicamente si el paciente demuestra un perjuicio económico directo derivado de dicha revelación."},"c":"B"},{"id":418,"q":"Según la Sociedad Española de Geriatría y Gerontología, ¿cuál de los siguientes términos describe cualquier procedimiento físico o mecánico dirigido a contener, sujetar o limitar el movimiento parcial o total del cuerpo y que no pueda ser manipulado por la persona?","o":{"A":"Restricción mecánica.","B":"Sujeción mecánica.","C":"Contención mecánica.","D":"Restricción física."},"c":"C"},{"id":419,"q":"De acuerdo con el algoritmo de actuación de la Guía de recomendaciones para la prevención y reducción del uso de contenciones en personas adultas durante la atención sanitaria de Osakidetza (2024), ¿en qué momento puede valorarse la aplicación de contención mecánica?","o":{"A":"Ante la presencia inicial de agitación psicomotriz, como medida preventiva para evitar riesgos potenciales.","B":"Cuando exista riesgo de daños inminentes, de forma simultánea a la valoración inicial de la persona atendida.","C":"Siempre que la persona atendida rechace las intervenciones de acompañamiento o distracción verbal.","D":"Tras constatar que las medidas previas no coercitivas han fracasado y persiste un riesgo de daño, con prescripción facultativa y consentimiento informado si procede."},"c":"D"},{"id":420,"q":"En el contexto de desescalada verbal para la prevención de la contención mecánica, ¿cuál de los siguientes dominios debería aplicarse antes de haber iniciado el contacto verbal con la persona atendida?","o":{"A":"Respetar espacio personal.","B":"Establecer límites claros.","C":"Escucha activa.","D":"Identificar deseos y sentimientos."},"c":"A"},{"id":421,"q":"Durante un turno de noche en una unidad de hospitalización, una paciente de 88 años, orientada y con capacidad de decisión conservada, rechaza de forma reiterada la colocación de una sonda vesical, pese a que el equipo considera que facilitaría el control clínico. Ante la ins istencia del personal, la paciente vuelve a manifestar su negativa de forma expresa y comprensible. ¿Cuál es el principio bioético que se vería vulnerado si se procediera a la colocación de la sonda sin su consentimiento?","o":{"A":"Beneficencia.","B":"No maleficencia.","C":"Justicia.","D":"Autonomía."},"c":"D"},{"id":422,"q":"Una paciente de 83 años, ingresada en una unidad de agudos, presenta un episodio de agitación psicomotriz con riesgo inminente de caída. No consta documento de voluntades anticipadas y no es posible contactar con familiares en ese momento. El equipo decide aplicar una intervención inmediata para evitar daños graves. ¿Cuál es el fundamento ético que legitima esta actuación?","o":{"A":"El principio de autonomía.","B":"El principio de beneficencia.","C":"El principio de no maleficencia.","D":"El principio de justicia."},"c":"B/C"},{"id":423,"q":"Según el Código Deontológico de la profesión enfermera, ¿en cuál de los siguientes supuestos NO resulta de aplicación dicho Código?","o":{"A":"Una enfermera colegiada que ejerce su actividad profesional en un centro socio - sanitario en Donostia -San Sebastian.","B":"Una enfermera colegiada que presta servicios en el Hospital de Txagorritxu en Vitoria -Gasteiz.","C":"Una enfermera extranjera que, en virtud de un convenio internacional, ejerce ocasionalmente la profesión enfermera en el Hospital de Urduliz, Bizkaia.","D":"Una enfermera que, tras finalizar su contrato en Osakidetza hace un año, se ha trasladado a trabajar de forma estable a Edimburgo, E scocia."},"c":"D"},{"id":424,"q":"Una enfermera de atención primaria atiende a un paciente diagnosticado de una enfermedad transmisible de declaración obligatoria, que supone un riesgo grave para la salud pública. Durante la entrevista, el paciente manifiesta de forma explícita que no piensa seguir las recomendaciones sanitarias y que su intención es relacionarse con el mayor número posible de personas, siendo consciente del riesgo de contagio. Según el Código Deontológico de la profesión enfermera, ¿cuál debe ser la actuación correcta de la enfermera?","o":{"A":"Mantener el secreto profesional, ya que la confidencialidad solo puede romperse con el consentimiento expreso del paciente.","B":"Comunicar la situación a las autoridades competentes por motivos legales y de seguridad, limitando la información revelada al mínimo indispensable y al número estrictamente necesario de personas.","C":"Informar a todas las personas potencialmente expuestas para prevenir el contagio, aunque ello suponga revelar datos clínicos del paciente.","D":"Registrar la negativa del paciente en la historia clínica y respetar su decisión, al tratarse de un adulto competente."},"c":"B"},{"id":425,"q":"Según el Código Deontológico de la profesión enfermera, en relación con el medio ambiente y la salud comunitaria, ¿cuál de las siguientes afirmaciones es INCORRECTA?","o":{"A":"La participación de la enfermera en programas dirigidos a reducir la acción nociva de factores químicos, biológicos o físicos queda supeditada a la existencia de una orden expresa de la autoridad sanitaria competente.","B":"La enfermera tiene el deber de conocer, analizar y comunicar las consecuencias ecológicas de los contaminantes y sus efectos nocivos sobre la salud humana.","C":"La enfermera debe impartir educación para la salud ambiental con el objetivo de fomentar una conciencia sana de la comunidad respecto a los problemas del medio ambiente.","D":"La enfermera debe colaborar con las autoridades sanitarias en la planificación de actividades orientadas al control del medio ambiente y a la mejora de la atención a la salud comunitaria."},"c":"A"},{"id":426,"q":"En una unidad de hospitalización, una enfermera ante una elevada carga asistencial, decide pedir a un auxiliar de enfermería que administre una medicación intravenosa prescrita recientemente a un paciente, indicándole que ella estará disponible “por si surge algún problema”, ya que el auxiliar tiene experiencia en la unidad. De acuerdo con el Código Deontológico de la profesión enfermera, ¿cuál es la valoración CORRECTA de esta actuación?","o":{"A":"Es correcta, siempre que el auxiliar tenga experiencia previa y la enfermera permanezca localizable durante el procedimiento.","B":"Es incorrecta, ya que la enfermera no puede delegar funciones propias en otros profesionales que no estén debidamente capacitados, aunque exista supervisión.","C":"Es correcta si la enfermera ha informado previamente al auxiliar y ha comprobado que el paciente está estable.","D":"Es correcta si la decisión se justifica por una situación de sobrecarga asistencial y riesgo organizativo."},"c":"B"},{"id":427,"q":"Una enfermera con varios años de experiencia comienza a trabajar en una unidad donde se han incorporado nuevos procedimientos y tecnologías asistenciales. Ante algunas dudas técnicas, comenta que no ha recibido formación específica por parte del centro y que, hasta que no se la proporcionen, continuará aplicando los procedimientos “como siempre se han hecho”. De acuerdo con el Código Deontológico de la profesión enfermera, ¿quién tiene la resp onsabilidad principal de garantizar la actualización de los conocimientos necesarios para un ejercicio profesional seguro?","o":{"A":"La institución sanitaria, que debe proporcionar siempre formación previa antes de exigir cambios en la práctica clínica.","B":"La dirección de enfermería, que debe detectar las carencias formativas individuales y resolverlas.","C":"La propia enfermera, que debe identificar sus necesidades de aprendizaje y actuar de forma proactiva en su formación continua.","D":"El equipo multidisciplinar, que debe compensar las carencias formativas de sus miembros mediante el trabajo en grupo."},"c":"C"},{"id":428,"q":"En una unidad hospitalaria se incorporan estudiantes de Enfermería para realizar el prácticum. La supervisora asigna a cada estudiante una enfermera o enfermero de referencia. Una de las profesionales asignadas manifiesta su desacuerdo y afirma que no le corresponde supervisar ni enseñar, ya que en su salario no recibe compensación económica específica por ello. De acuerdo con el Código Deontológico de la profesión enfermera, ¿cuál de las siguientes actuaciones es la más adecuada?","o":{"A":"Recordar que la enfermera o el enfermero tiene la responsabilidad individual y colectiva de asumir la educación en Enfermería a todos sus n iveles, incluida la supervisión del estudiantado en prácticas.","B":"Reasignar al estudiantado exclusivamente a la supervisora o a personal docente externo, evitando la implicación del personal asistencial.","C":"Aceptar la negativa de la profesional, ya que la actividad docente solo es exigible si existe reconocimiento económico expreso.","D":"Limitar la supervisión a la observación pasiva, evitando implicación formativa directa para no interferir en la carga asistencial."},"c":"A"},{"id":429,"q":"¿Qué modelo guía la estructura y contenido de la segunda edición de la Herramienta de Implantación de guías de buenas prácticas de RNAO?","o":{"A":"Modelo de Mejora Continua.","B":"Marco de Conocimiento para la Acción.","C":"Ciclo de Deming.","D":"Modelo de Rogers."},"c":"B"},{"id":430,"q":"¿Qué instrumento se recomienda utilizar para evaluar la calidad de una guía de buenas prácticas antes de su implantación?","o":{"A":"AGREE II.","B":"PRISMA.","C":"CONSORT.","D":"GRADE."},"c":"A"},{"id":431,"q":"¿Qué se considera una parte interesada (stakeholder) según la “Herramienta de implantación de buenas prácticas”?","o":{"A":"Únicamente los pacientes.","B":"Únicamente los profesionales de salud.","C":"Individuos, grupos o instituciones con interés directo en la implantación de la guía.","D":"Únicamente los financiadores del proyecto"},"c":"C"},{"id":432,"q":"¿Qué fase del Marco de Conocimiento para la Acción se enfoca en la identificación de las partes interesadas?","o":{"A":"Identificación del problema.","B":"Evaluación de facilitadores y barrera.","C":"Monitorización del uso del conocimiento.","D":"Adaptación al contexto local."},"c":"D/A"},{"id":433,"q":"Según la “Herramienta de implantación de buenas prácticas”, ¿qué se incluye en la definición de \"auditoría y feedback\"?","o":{"A":"Una revisión de la literatura científica.","B":"Una encuesta de satisfacción del paciente.","C":"Un resumen del desempeño clínico que puede incluir recomendaciones para la acción.","D":"La observación directa del paciente."},"c":"C"},{"id":434,"q":"¿Cuál de los siguientes no es un criterio para seleccionar indicadores para monitorizar el progreso de la sostenibilidad en la institución?","o":{"A":"Validez interna.","B":"Viabilidad.","C":"Claridad y capacidad de ser entendido por los usuarios.","D":"Relevancia."},"c":"A"},{"id":435,"q":"¿Qué iniciativa de RNAO permite la recogida de datos y medición de indicadores estructurales, de proceso y de resultado relacionados con cada Guía de Buena Practica?","o":{"A":"AGREE II .","B":"BPSO.","C":"ADAPTE.","D":"NQuIRE."},"c":"D"},{"id":436,"q":"¿Qué se recomienda al involucrar a las partes interesadas con alta influencia, pero bajo apoyo?","o":{"A":"Darles mucha atención para intentar conseguir su apoyo.","B":"Ignorarlas, ya que no apoyan.","C":"Excluirlas del proceso.","D":"Solo informarles al final del proyecto."},"c":"A"},{"id":437,"q":"La implantación efectiva de las Guías de Buenas Practicas, puede alcanzar como objetivo:","o":{"A":"Mantener la base de conocimientos en enfermería.","B":"Aportar el nivel de carencias financieras en la investigación.","C":"Trasladar a la investigación la evidencia fruto de la práctica.","D":"Reducir la variabilidad en los cuidados."},"c":"D"},{"id":438,"q":"¿Qué tipo de recurso se define como \"formas de apoyo no monetarias, como el acceso a bienes y servicios\"?","o":{"A":"Recursos financieros .","B":"Recursos humanos.","C":"Recursos en especie.","D":"Recursos tecnológicos."},"c":"C"},{"id":439,"q":"Los indicadores potenciales de la categoría de Proceso, se asocian a:","o":{"A":"Qué ocurre.","B":"Cómo lo va a hacer.","C":"Qué necesitas tener.","D":"Qué vamos a hacer."},"c":"B"},{"id":440,"q":"¿Cuál es uno de los factores clave que influyen como facilitador en la implantación de una guía de buenas prácticas?","o":{"A":"Actitudes y creencias políticas del personal.","B":"Apoyo del liderazgo.","C":"Grupo de interrelación.","D":"Integración limitada de las recomendaciones de la guía en los procesos y estructuras institucionales."},"c":"B"},{"id":441,"q":"En relación con las diferencias entre los enfoques cuantitativo y cualitativo en investigación en enfermería, señale la afirmación CORRECTA:","o":{"A":"El enfoque cuantitativo parte de la idea de que la realidad es construida socialmente y depende de la interpretación de los sujetos que participan en el estudio.","B":"El enfoque cualitativo se apoya fundamentalmente en marcos positivistas y busca medir variables objetivas mediante instrumentos estandarizados.","C":"El enfoque cuantitativo asume la existencia de una realidad objetiva, externa al investigador, que puede con ocerse y medirse.","D":"El enfoque cualitativo pretende generalizar los resultados a grandes poblaciones mediante el análisis estadístico inferencial."},"c":"C"},{"id":442,"q":"Una enfermera investigadora quiere explorar cómo viven las personas con insuficiencia cardíaca avanzada la educación terapéutica recibida durante el ingreso hospitalario, con el objetivo de comprender sus percepciones, significados y experiencias. Para ello diseña un estudio cualitativo basado en entrevistas en profundidad. ¿Cuál sería la estrategia de muestreo más adecuada para este tipo de estudio?","o":{"A":"Seleccionar a las personas participantes mediante un muestreo aleatorio estratificado según edad y sexo.","B":"Incluir de forma intencional a personas que aporten información relevante, incorporando nuevas entrevistas hasta alcanzar la saturación teórica.","C":"Elegir a las personas participantes mediante muestreo por conglomerados según unidades de hospitalización.","D":"Seleccionar sistemáticamente a cada quinto paciente ingr esado en la unidad durante el periodo de estudio."},"c":"B"},{"id":443,"q":"En un diseño de investigación descriptivo -correlacional, ¿qué se analiza principalmente?","o":{"A":"Efectos causales de una intervención.","B":"Asociaciones entre variables.","C":"Diferencias entre grupos experimentales.","D":"Evolución temporal de una cohorte."},"c":"B"},{"id":444,"q":"En análisis cualitativo, ¿qué representa el proceso de triangulación?","o":{"A":"Uso exclusivo de tres investigadores.","B":"Muestreo en tres fases sucesivas.","C":"Análisis estadístico tridimensional.","D":"Convergencia de múltiples fuentes metodológicas."},"c":"D"},{"id":445,"q":"En la fase empírica, ¿cuál es la técnica cuantitativa MÁS adecuada para medir satisfacción con cuidados?","o":{"A":"Análisis de contenido temático.","B":"Observación participante no estructurada.","C":"Cuestionario validado con escala Likert.","D":"Entrevista narrativa libre."},"c":"C"},{"id":446,"q":"¿Qué validez es MÁS crítica en la fase de diseño de instrumentos de medida?","o":{"A":"Validez de constructo y contenido.","B":"Validez estadística post -hoc.","C":"Validez de difusión mediática.","D":"Validez temporal retrospectiva."},"c":"A"},{"id":447,"q":"Una enfermera investigadora quiere explorar las experiencias y percepciones de pacientes hospitalizados sobre la calidad de los cuidados recibidos tras una cirugía mayor. Para ello, decide utilizar técnicas propias de la investigación cualitativa. ¿Cuál de las siguientes NO sería una técnica cualitativa de recogida de datos adecuada para este estudio?","o":{"A":"Entrevistas semiestructuradas a pacientes durante el ingreso.","B":"Grupos focales con personas dadas de alta recientemente.","C":"Encuestas estructuradas con preguntas cerradas.","D":"Observación participante sistemática del proceso de cuidados en la unidad."},"c":"C"},{"id":448,"q":"Una enfermera investigadora realiza un estudio cualitativo basado en entrevistas en profundidad a personas cuidadoras informales, con el objetivo de analizar discursos, categorías y relaciones entre significados. Para el análisis cualitativo de los datos, revisa distintos programas informáticos. ¿Cuál de los siguientes NO es un programa adecuado para el análisis cualitativo de datos?","o":{"A":"SPSS.","B":"ATLAS.ti.","C":"Ethnograph.","D":"NVivo."},"c":"A"},{"id":449,"q":"Un equipo de enfermería quiere investigar el cuidado de personas con demencia y el impacto en sus familiares cuidadores, con el objetivo de mejorar la atención y el apoyo desde los servicios sociosanitarios. El equipo analiza entrevistas y diarios de campo de familiares cuidadores y profesionales, aplicando codificación abierta, axial y selectiva, con comparación constante de datos, para desarrollar un modelo explicativo sobre cómo evolucionan las estrategias de cuidado familiar a lo largo del curso d e la demencia. ¿A qué método cualitativo corresponde principalmente este enfoque?","o":{"A":"Teoría fundamentada.","B":"Etnografía.","C":"Fenomenología.","D":"Investigación -acción participativa."},"c":"A"},{"id":450,"q":"Un equipo de enfermería quiere investigar el cuidado de personas con demencia y el impacto en sus familiares cuidadores, con el objetivo de mejorar la atención y el apoyo desde los servicios sociosanitarios. El equipo diseña el estudio junto con familiares y personas con demencia en fas es iniciales, quienes codiseñan intervenciones, participan en la toma de decisiones y evalúan los cambios introducidos en los apoyos comunitarios, con el objetivo explícito de transformar la práctica. ¿A qué método cualitativo corresponde principalmente es te enfoque?","o":{"A":"Teoría fundamentada.","B":"Etnografía.","C":"Fenomenología.","D":"Investigación -acción participativa."},"c":"D"},{"id":451,"q":"Un equipo de enfermería quiere investigar el cuidado de personas con demencia y el impacto en sus familiares cuidadores, con el objetivo de mejorar la atención y el apoyo desde los servicios sociosanitarios. Las investigadoras se integran durante un año en centros de día, domicilios y asociaciones de familiares, observando rituales, normas implícitas, roles, leng uaje y prácticas compartidas en torno al cuidado de personas con demencia, con el fin de comprender la cultura del cuidado en distintos contextos comunitarios. ¿A qué método cualitativo corresponde principalmente este enfoque?","o":{"A":"Teoría fundamentada.","B":"Etnografía.","C":"Fenomenología.","D":"Investigación -acción participativa."},"c":"B"},{"id":452,"q":"Un equipo de enfermería quiere investigar el cuidado de personas con demencia y el impacto en sus familiares cuidadores, con el objetivo de mejorar la atención y el apoyo desde los servicios sociosanitarios. El estudio se focaliza en cómo los familiares viven y significan el cuidado cotidiano de una persona con demencia, explorando en profundidad emociones, percepciones y sentido del cuidado. ¿A qué método cualitativo corresponde principalmente este enfoque?","o":{"A":"Teoría fundamentada.","B":"Etnografía.","C":"Fenomenología.","D":"Investigación -acción participativa."},"c":"C"},{"id":453,"q":"En relación con el modelo de práctica basada en la evidencia (PBE) en enfermería, ¿cuál de los siguientes NO forma parte de los factores que influyen en dicho modelo?","o":{"A":"La mejor evidencia disponible procedente de la investigación científica.","B":"La experiencia clínica del profesional de enfermería.","C":"Las circunstancias, valores y preferencias de la persona paciente.","D":"La disponibilidad presupuestaria y la eficiencia económica del sistema sanitario."},"c":"D"},{"id":454,"q":"Una unidad de enfermería detecta una elevada tasa de úlceras por presión en pacientes inmovilizados. El equipo enfermero diseña un estudio para analizar la incidencia, identificar factores asociados y valorar la efectividad de diferentes intervenciones preventivas, con el objetivo de mejorar los cuidados y la seguridad del paciente. Desde el punto de vista conceptual, esta actuación se corresponde principalmente con:","o":{"A":"Una auditoría asistencial orientada al control interno de la calidad.","B":"La aplicación directa de la Guía BPSO de prevención de úlceras por presión.","C":"Un proceso de investigación en enfermería destinado a generar y validar conocimiento aplicable a la práctica clínica.","D":"Un programa de formación continuada sin relación con la producción de conocimiento científico."},"c":"C"},{"id":455,"q":"En relación con las formas de adquisición del conocimiento en enfermería, señale la opción CORRECTA:","o":{"A":"El modelado de roles permite la adquisición de conocimientos mediante la observación e imitación de profesionales expertos, siendo una estrategia clave en la formación práctica en enfermería.","B":"La experiencia personal constituye una fuente suficiente de conocimiento para la práctica enfermera, incluso en ausencia de evidencia científica.","C":"El conocimiento adquirido por tradición garantiza prácticas eficaces, ya que ha demostrado su validez al mantenerse estable a lo largo del tiempo.","D":"La intuición es una forma de conocimiento espontáneo sin base cognitiva ni relación con la experiencia clínica acumulada."},"c":"A"},{"id":456,"q":"En relación con la asociación entre la formación académica de los y las profesionales de enfermería y las expectativas y competencias en investigación, señale la opción INCORRECTA:","o":{"A":"En las enfermeras y enfermeros con formación de grado, no se espera ninguna implicación en actividades de investigación, lectura o valoración crítica de los estudios de investigación, limitándose su papel a la aplicación directa de cuidados asistenciales.","B":"En profesionales con formación de máster, se incluyen competencias relacionadas con la valoración crítica y síntesis de la evidencia, así como la elaboración y revisión de protocolos y guías clínicas.","C":"En profesionales con formación doctoral, se espera la generación de conocimiento científico mediante la realización de investigaciones originales y la colaboración en proyectos de investigación.","D":"En profesionales con formación postdoctoral, se asume un papel de liderazgo en investigación, incluyendo la dirección de proyectos, la obtención de financiación y la tutorización de investigadores con grado doctoral."},"c":"A"},{"id":457,"q":"Un equipo de enfermería quiere comprender en profundidad la experiencia vivida por personas cuidadoras informales de pacientes con demencia avanzada en domicilio, con el objetivo de identificar significados, percepciones y necesidades comunes que orienten futuras intervenciones de apoyo. Para responder a esta pregunta de investigación, ¿cuál es el proceso de síntesis de la evidencia más adecuado?","o":{"A":"Metaanálisis, utilizando mé todos estadísticos para estimar el efecto global del cuidado informal sobre la carga del cuidador.","B":"Metasíntesis, integrando de forma sistemática estudios cualitativos originales para desarrollar una interpretación comprensiva de los hallazgos.","C":"Revisión sistemática, combinando estudios cuantitativos y cualitativos mediante análisis estadístico.","D":"Revisión sistemática de métodos mixtos, centrada en estudios experimentales y cuasiexperimentales con análisis estadístico."},"c":"B"},{"id":458,"q":"Un grupo de enfermeras quiere actualizar un protocolo clínico sobre prevención de caídas y decide basar sus recomendaciones en el nivel más alto de evidencia científica disponible, según la pirámide de niveles de evidencia en investigación en enfermería. ¿En cuál de los siguientes niveles de evidencia se situaría la fuente más adecuada para este objetivo?","o":{"A":"Nivel I: Revisión sistemática y metaanálisis.","B":"Nivel II: Ensayo controlado aleatorizado (ECA) o estudio experimental.","C":"Nivel III: Estudios cuasiexperimentales","D":"Nivel IV: Revisión sistemática de métodos mixtos y metasíntesis."},"c":"A"},{"id":459,"q":"Una enfermera participa en un estudio experimental con modelos animales cuyo objetivo es comprender los mecanismos celulares implicados en la pérdida de masa muscular asociada al envejecimiento, sin aplicación directa e inmediata en la práctica asistencial. ¿A qué tipo de investigación corresponde este estudio?","o":{"A":"Investigación aplicada.","B":"Investigación básica.","C":"Investigación traslacional.","D":"Investigación evaluativa clínica."},"c":"B"},{"id":460,"q":"Durante la valoración crítica de un estudio de investigación en enfermería, tanto cuantitativo como cualitativo, la enfermera revisora debe aplicar una serie de principios clave para determinar la calidad y utilidad del estudio. ¿Cuál de los siguientes NO constituye un principio clave de la valoración crítica según las guías metodológicas en investigación en enfermería?","o":{"A":"Analizar la relevancia del problema estudiado para la práctica enfermera y su contribución a la práctica basada en la evidencia.","B":"Identificar los puntos fuertes y débiles del estudio, siendo objetivo y realista en su valoración.","C":"Evaluar la calidad del estudio y la coherencia de sus hallazgos con la literatura existente.","D":"Determinar si los resultados del estudio confirman la hipótesis del autor y descartar el estudio si no lo hacen."},"c":"D"},{"id":461,"q":"En el contexto de la práctica basada en la evidencia en enfermería, se utilizan diferentes bases de datos y recursos bibliográficos para localizar estudios científicos. ¿Cuál de los siguientes recursos es el que cubre de forma más específica y amplia la literatura de revistas internacionales del ámbito de la enfermería?","o":{"A":"CINAHL.","B":"MEDLINE (PubMed).","C":"PsycINFO.","D":"Biblioteca Cochrane."},"c":"A"},{"id":462,"q":"En una unidad de atención primaria se plantea revisar la evidencia disponible sobre la administración de inyecciones intramusculares en población adulta, con el objetivo de reducir complicaciones locales asociadas a la técnica. Para ello, el equipo formula una pregunta clínica utilizando el formato PICO. ¿Cuál de los siguientes elementos del PICO está incorrectamente formulado en relación con este escenario?","o":{"A":"P: Personas adultas que reciben inyecciones intramusculares en el ámbito asistencial.","B":"I: Administración de la inyección intramuscular sin aspiración, siguiendo la localización anatómica correcta.","C":"C: Administración de la inyección intramuscular con aspiración previa durante varios segundos, independientemente del lugar de punción.","D":"O: Grado de conocimiento del personal de enfermería sobre la técnica de inyección intramuscular."},"c":"D"},{"id":463,"q":"Un equipo de enfermería de un hospital comarcal de Osakidetza decide implantar la práctica basada en la evidencia (PBE) de forma estructurada para mejorar la calidad y seguridad de los cuidados. Para ello, revisan distintos modelos teóricos que guían la implementación de la PBE en la práctica clínica. ¿Cuál de los siguientes NO corresponde a un modelo o programa reconocido de práctica basada en la evidencia en enfermería?","o":{"A":"Modelo de Stetler para la implementación de la práctica basada en la evidencia.","B":"Modelo de Iowa para la práctica basada en la evidencia.","C":"Modelo Integrado de Transferencia Clínica Basada en Resultados Asistenciales (MITC -BRA).","D":"Programa Best Practice Spotlight Organization (BPSO)."},"c":"C"},{"id":464,"q":"Un grupo de enfermeras participa en un proyecto de investigación que parte de hallazgos obtenidos en estudios básicos sobre la respuesta inflamatoria al dolor postoperatorio. A partir de estos resultados, se diseña una intervención de cuidados enfermeros, se prueba en una unida d hospitalaria concreta y posteriormente se ajusta para su implantación progresiva en la práctica clínica, evaluando resultados en pacientes reales. ¿A qué tipo de investigación corresponde principalmente este enfoque?","o":{"A":"Investigación básica.","B":"Investigación aplicada.","C":"Investigación translacional.","D":"Investigación clínica descriptiva."},"c":"C"},{"id":465,"q":"Se realiza un estudio sobre la presión arterial sistólica en una muestra de 200 pacientes. Los datos siguen una distribución normal con media de 130 mmHg y desviación estándar de 15 mmHg. ¿Qué característica define a una distribución normal?","o":{"A":"Es asimétrica y presenta una cola derecha más prolongada.","B":"Es simétrica alrededor de la media y tiene forma de campana.","C":"Todos los valores tienen la misma frecuencia.","D":"La media es siempre mayor que la mediana."},"c":"B"},{"id":466,"q":"En un estudio observacional sobre tiempos de espera en urgencias, se obtienen los siguientes datos (en minutos): 5, 7, 10, 12, 15, 20, 120. ¿Cuál de las siguientes afirmaciones sobre las medidas de tendencia central es CORRECTA?","o":{"A":"La media es la medida más representativa del tiempo típico de espera.","B":"La moda es 120 minutos, coincidiendo con el valor más alto.","C":"La mediana es 12 minutos y refleja mejor el tiempo central sin influencia de valores atípicos.","D":"La media y la mediana son idénticas, por lo que ambas son igualmente válidas."},"c":"C"},{"id":467,"q":"¿Cuál de los siguientes parámetros indica la dispersión o variabilidad de los datos alrededor de la media en una distribución?","o":{"A":"La dispersión variable.","B":"El rango intercuartílico.","C":"La correlación de Pearson.","D":"La desviación estándar y la varianza."},"c":"D"},{"id":468,"q":"¿Qué representa el intervalo de confianza al 95% en una investigación?","o":{"A":"Que existe un 95% de probabilidad de que la media muestral se encuentre en ese rango.","B":"Que si repitiéramos el estudio 100 veces, aproximadamente en 95 ocasiones el parámetro poblacional estaría dentro del intervalo calculado.","C":"Que el 95% de los datos se encuentran en ese intervalo.","D":"Que el 5% de los datos son erróneos."},"c":"B/A"},{"id":469,"q":"En un ensayo clínico que contrasta la hipótesis de que una intervención educativa mejora la adherencia al tratamiento antihipertensivo (H₀: la intervención no mejora la adherencia; H₁: la intervención sí la mejora), ¿qué significa rechazar la hipótesis nula?","o":{"A":"Que la hipótesis nula es absolutamente cierta.","B":"Que se asume que la hipótesis alternativa es verdadera basándose en la evidencia obtenida.","C":"Que existe suficiente evidencia estadística para asumir que la hipótesis alternativa es verdadera.","D":"Que el estudio fue realizado incorrectamente."},"c":"C"},{"id":470,"q":"En una investigación se obtiene un valor de p = 0,03 al comparar dos métodos de cuidado de heridas. Si se fija un nivel de significación α = 0,05, ¿qué conclusión es CORRECTA?","o":{"A":"No hay diferencias significativas entre los métodos.","B":"Hay diferencias estadísticamente significativas entre los métodos.","C":"El resultado no es clínicamente significativo.","D":"Necesariamente uno de los métodos es mejor que el otro en la práctica."},"c":"B"},{"id":471,"q":"Un investigador desea comparar la media de glucosa en sangre entre dos grupos de pacientes diabéticos (grupo control y grupo intervención) en un estudio con muestras pequeñas (n = 15 en cada grupo). ¿Cuál es el test estadístico más apropiado?","o":{"A":"ANOVA.","B":"Chi cuadrado.","C":"Test t de Student para muestras independientes.","D":"Correlación de Pearson."},"c":"C"},{"id":472,"q":"En un estudio sobre la incidencia de infecciones nosocomiales, se clasificó a 250 pacientes según el tipo de infección (respiratoria, urinaria, herida quirúrgica) y la unidad hospitalaria (UCI, planta, ambulatorio). ¿Cuál es el test más apropiado para determinar si existe asociación entre estas dos variables categóricas?","o":{"A":"Test de chi cuadrado (χ²).","B":"Test t de Student.","C":"ANOVA.","D":"Test de Mann -Whitney."},"c":"A"},{"id":473,"q":"En una investigación sobre la satisfacción de pacientes con la atención de enfermería (escala Likert 1 -5), los datos NO siguen una distribución normal. ¿Cuál de los siguientes tests sería el más apropiado para comparar la satisfacción entre dos grupos?","o":{"A":"Test de Mann -Whitney (prueba NO paramétrica).","B":"ANOVA.","C":"Test t de Student.","D":"Test de correlación de Pearson."},"c":"A"},{"id":474,"q":"¿Cuál de las siguientes afirmaciones sobre el tamaño muestral es CORRECTA?","o":{"A":"Un tamaño muestral mayor siempre garantiza resultados estadísticamente significativos.","B":"El tamaño muestral no influye en la amplitud del intervalo de confianza.","C":"El tamaño muestral solo es importante en estudios cualitativos.","D":"Un tamaño muestral mayor reduce el error estándar y hace más precisa la estimación del parámetro poblacional."},"c":"D"},{"id":475,"q":"En una muestra de 80 pacientes con insuficiencia cardíaca se registra la cantidad de ingresos hospitalarios en el último año (variable de recuento). La distribución es muy asimétrica a la derecha, con pocos pacientes que han tenido muchos ingresos. ¿Qué medida de dispersión es más adecuada para acompañar a la mediana al describir esta variable?","o":{"A":"Desviación estándar.","B":"Varianza.","C":"Coeficiente de variación.","D":"Rango intercuartílico."},"c":"D"},{"id":476,"q":"En un estudio de enfermería sobre niveles de ansiedad (escala cuantitativa) se obtienen los siguientes resultados: media 30 puntos, desviación estándar 5 puntos. Asumiendo distribución aproximadamente normal, ¿qué porcentaje aproximado de pacientes se espera que tenga niveles de ansiedad entre 25 y 35 puntos?","o":{"A":"Alrededor del 50 %","B":"Alrededor del 68 %","C":"Alrededor del 95 %","D":"Alrededor del 99 %"},"c":"B"},{"id":477,"q":"Según la Guía -Manual: Uso adecuado de los guantes sanitarios, ¿qué tipo de guantes se deben utilizar para la aspiración de secreciones en la Unidad de Cuidados Intensivos?","o":{"A":"No estériles de látex.","B":"No estériles de polímero.","C":"Estériles de vinilo.","D":"Estériles de nitrilo."},"c":"D"},{"id":478,"q":"NO es una recomendación en el uso de guantes:","o":{"A":"Los guantes deben ser utilizados cuando sea necesario y el tiempo imprescindible ya que el abuso de empleo de los mismos confiere falsa seguridad y aumenta la contaminación cruzada.","B":"Las manos deben lavarse o descontaminarse antes de usar guantes, después no es necesario y estos no deben ser lavados ni reutilizados.","C":"Se deben utilizar siempre que el profesional sanitario presente cortes, heridas o lesiones cutáneas.","D":"Tener las manos libres de objetos como anillos, relojes, etc. porque pueden romper el guante, sin cremas, con las uñas cortas y sin esmalte, para facilitar una buena limpieza de material potencialmente infeccioso."},"c":"B"},{"id":479,"q":"¿Cuál es el objetivo general de la Estrategia de Seguridad del Paciente 2021 – 2030?","o":{"A":"Eliminar completamente los errores sanitarios.","B":"Minimizar los riesgos y daños evitables asociados a la atención sanitaria.","C":"Aumentar la eficiencia económica del sistema sanitario.","D":"Incrementar la satisfacción profesional del personal sanitario."},"c":"B"},{"id":480,"q":"Un evento adverso se define como:","o":{"A":"Un error profesional sin consecuencias.","B":"Un incidente que no produce daño.","C":"Un daño no intencionado relacionado con la asistencia sanitaria.","D":"Una complicación inevitable de la enfermedad."},"c":"C"},{"id":481,"q":"Las infecciones relacionadas con la asistencia sanitaria (IRAS) se caracterizan por:","o":{"A":"Aparecer durante o después de la atención sanitaria.","B":"Estar presentes siempre al ingreso.","C":"Ser inevitables.","D":"No estar relacionadas con procedimientos."},"c":"A"},{"id":482,"q":"El aislamiento por contacto está especialmente indicado en pacientes con:","o":{"A":"Infecciones por vía aérea.","B":"Neutropenia grave.","C":"Infecciones transmitidas por gotas.","D":"Microorganismos multirresistentes."},"c":"D"},{"id":483,"q":"En seguridad, ¿A quién nos referimos con el termino segundas víctimas?","o":{"A":"A la propia organización sanitaria en la que ha tenido lugar el evento adverso.","B":"Al entorno más cercano del paciente que queda traumatizado por el evento adverso.","C":"Al profesional que participa en un evento adverso y que queda traumatizado por esta experiencia.","D":"A los pacientes, constituyendo una experiencia traumática para ellos."},"c":"C"},{"id":484,"q":"La notificación de incidentes de seguridad debe ser:","o":{"A":"Obligatoria y punitiva.","B":"Obligatoria y punitiva, para cualquier evento adverso.","C":"Voluntaria y no punitiva, solo para eventos adversos con daño.","D":"Voluntaria y no punitiva."},"c":"D"},{"id":485,"q":"Las intervenciones eficaces en prevención de caídas deben ser:","o":{"A":"Estándar para todos.","B":"Restrictivas de la movilidad.","C":"Individualizadas y multifactoriales.","D":"Farmacológicas."},"c":"C"},{"id":486,"q":"En pacientes institucionalizados con alto riesgo de caídas se puede considerar:","o":{"A":"Administrar vitamina D.","B":"Uso de sujeciones.","C":"Reposo absoluto.","D":"Barandillas sistemáticas."},"c":"A"},{"id":487,"q":"La prevención de caídas NO debe basarse en:","o":{"A":"Información al paciente.","B":"Uso sistemático de sujeciones.","C":"Participación activa del paciente.","D":"Intervenciones personalizadas."},"c":"B"},{"id":488,"q":"¿Cuál es un factor de riesgo intrínseco de caídas?","o":{"A":"Suelo mojado.","B":"Alteración del equilibrio.","C":"Mala iluminación.","D":"Barreras arquitectónicas."},"c":"B"},{"id":489,"q":"¿Cómo se define la violencia sexual según la Organización Mundial de la Salud?","o":{"A":"Todo acto sexual no consentido ejercido únicamente por la pareja.","B":"Cualquier acto sexual ejercido mediante coacción, independientemente de la relación con la víctima.","C":"Únicamente los actos sexuales con penetración forzada por vía vaginal o anal.","D":"Aquel acto sexual dirigido contra la sexualidad de una persona, ejercido exclusivamente en el ámbito privado."},"c":"B"},{"id":490,"q":"Según la Ley Orgánica 10/2022, ¿qué conductas se consideran violencias sexuales?","o":{"A":"Actos sexuales no consentidos que condicionan el libre desarrollo de la vida sexual.","B":"La agresión sexual, el acoso sexual y la explotación de la prostitución propia.","C":"La agresión sexual y el abuso sexual, existiendo distinción entre ambos conceptos.","D":"Solo la agresión y abuso sexual con violencia física."},"c":"A/B"},{"id":491,"q":"Actualmente, la edad del consentimiento sexual en España es de:","o":{"A":"15 años.","B":"16 años.","C":"17 años.","D":"18 años."},"c":"B"},{"id":492,"q":"En la actuación ante las agresiones sexuales es necesaria la coordinación interinstitucional. Por ello, cuando una mujer acude al hospital declarando una agresión sexual,","o":{"A":"Desde el Hospital se pondrá en conocimiento del Juzgado de guardia y se avisará también a la Policía Local en caso de existir intención de interponer una denuncia por parte de la mujer.","B":"Desde el Hospital se pondrá en conocimiento del Juzgado de guardia y en caso de querer interponer una denuncia la mujer deberá en cualquier caso desplazarse al Juzgado o Comisaria.","C":"Desde el Hospital se pondrá en conocimiento del Juzgado de guardia independientemente de que la mujer haya interpuesto o no una denuncia.","D":"Desde el Hospital se pondrá en conocimiento del Juzgado de guardia la situación únicamente en caso de existir intención de interponer una denuncia por parte de la mujer."},"c":"C"},{"id":493,"q":"El intervalo de tiempo para considerar reciente una agresión sexual con penetración vaginal es:","o":{"A":"≤ 72 horas.","B":"≤ 5 días.","C":"≤ 10 días.","D":"≤ 15 días."},"c":"C/A"},{"id":494,"q":"¿Dónde debe realizarse la valoración de una paciente con sospecha de agresión sexual reciente cuya situación de gravedad no obligue a un tratamiento médico inmediato?","o":{"A":"En el Juzgado de guardia.","B":"En el domicilio de la víctima.","C":"En un centro de Atención Primaria.","D":"En un centro hospitalario."},"c":"D"},{"id":495,"q":"¿Está condicionada la recogida de muestras biológicas a la presentación de una denuncia por agresión sexual?","o":{"A":"Sí, en cualquier caso.","B":"Solo en mayores de edad.","C":"No, en ningún caso.","D":"Únicamente si lo autoriza el Juez o Jueza de guardia."},"c":"C"},{"id":496,"q":"¿Cuál es el orden correcto de recogida de muestras en una agresión sexual para evitar la contaminación de una zona a otra?","o":{"A":"Vulva, vagina, cérvix, región anal.","B":"Región anal, vulva, vagina, cérvix.","C":"Región anal, vagina, cérvix, vulva.","D":"Vulva, región anal, vagina, cérvix."},"c":"B/A"},{"id":497,"q":"¿Cuáles son los tres niveles de actuación del Sistema Sanitario frente a la violencia de género?","o":{"A":"Prevención primaria, secundaria y terciaria.","B":"Diagnóstico, tratamiento y seguimiento.","C":"Atención primaria, hospitalaria y urgente.","D":"Atención médica, jurídica y social."},"c":"A"},{"id":498,"q":"¿En relación a la violencia de género, cuál de los siguientes grupos NO se considera de especial vulnerabilidad?","o":{"A":"Trastorno mental leve.","B":"Residentes en municipios pequeños.","C":"Envejecimiento.","D":"Diversidad funcional."},"c":"A"},{"id":499,"q":"En la fase de precontemplación de la violencia de género, según el modelo de Prochaska y DiClemente, el objetivo principal es:","o":{"A":"Acompañar a la mujer para ayudar a determinar el mejor plan a seguir para poder introducir algunos cambios.","B":"Fomentar la duda sobre la aceptabilidad del maltrato.","C":"Aumentar la toma de conciencia y solucionar la incertidumbre a favor de establecer cambios.","D":"Acompañar a la mujer en sus acciones de cambio para que no se sienta sola y ayudarle a reafirmar s u proceso."},"c":"B"},{"id":500,"q":"¿Cuál de las siguientes actuaciones NO debe realizar el personal de Enfermería en la atención a mujeres en situación de violencia de género?","o":{"A":"Hacer una clara valoración del riesgo y asegurar un clima de confianza.","B":"Registrar la situación de violencia en la historia clínica y valorar, de forma individualizada, la necesidad de comunicación judicial en función del riesgo y del momento vital de la mujer.","C":"Proponer a la mujer la realización de terapi a de pareja o mediación familiar, interpretando la violencia como un conflicto relacional.","D":"Priorizar la intervención inicial básica y posponer derivaciones hasta consensuarlas con la mujer, garantizando confidencialidad y continuidad asistencial."},"c":"C"},{"id":501,"q":"De acuerdo con las normas generales de ordenación de las profesiones sanitarias, para poder ejercer una profesión sanitaria será requisito imprescindible:","o":{"A":"La colegiación, cuando una ley estatal establezca esta obligación para el ejercicio de una profesión titulada o algunas actividades propias de ésta.","B":"La inexistencia de inhabilitación o suspensión para el ejercicio profesional por sentencia judicial, aunque no sea firme, durante el periodo de tiempo que fije ésta; por resolución sancionadora impuesta por un colegio profesional sanitario, cuando una ley estatal establezca para este ejercicio la obligación de pertenecer al colegio profesional respectivo durante el periodo de tiempo que fije ésta; o por resolución administrativa sancionadora firme, durante el periodo de tiempo que fije ésta, cuando se ejerz a la profesión en el ámbito de la asistencia sanitaria pública.","C":"Tener suscrito y vigente un seguro de responsabilidad, un aval u otra garantía financiera, ya sean de protección personal o colectiva, que cubra las indemnizaciones que se puedan derivar de la responsabilidad profesional por un eventual daño a las personas , causado con ocasión de la prestación de tal asistencia o servicios, cuando se ejerza la profesión en el ámbito de la asistencia sanitaria pública.","D":"Todo lo anterior."},"c":"A"},{"id":502,"q":"Según lo establecido en la normativa vigente sobre ordenación de las profesiones sanitarias, para poder ejercer una profesión sanitaria:","o":{"A":"Se ha de tener suscrito y vigente un seguro de responsabilidad que cubra las indemnizaciones que se puedan derivar de la responsabilidad profesional por un eventual daño a las personas causado con ocasión de la prestación de tal asistencia o servicios cuan do se ejerza la profesión en el ámbito de la asistencia sanitaria privada, no siendo suficiente un aval u otra garantía financiera de protección colectiva.","B":"Se ha de tener suscrito y vigente un seguro de responsabilidad, un aval u otra garantía financiera, sean de protección personal o colectiva, que cubra las indemnizaciones que se puedan derivar de la responsabilidad profesional por un eventual daño a las pe rsonas causado con ocasión de la prestación de tal asistencia o servicios cuando se ejerza la profesión en el ámbito de la asistencia sanitaria privada.","C":"Se ha de tener suscrito y vigente un seguro de responsabilidad, un aval u otra garantía financiera, sean de protección personal o colectiva, que cubra las indemnizaciones que se puedan derivar de la responsabilidad profesional por un eventual daño a las personas causado con ocasión de la prestación de tal asistencia o servicios cuando se ejerza la profesión en el ámbito de la asistencia sanitaria pública.","D":"Todas las opciones son falsas."},"c":"B"},{"id":503,"q":"Según la normativa vigente, el órgano encargado del Registro Estatal de Profesionales Sanitarios podrá (indíquese la que sea correcta):","o":{"A":"Consultar los datos de carácter personal de la población profesional sanitaria contenidos en los archivos y ficheros del Documento Nacional de Identidad (DNI) y del Número de Identidad de Extranjero (NIE) competencia del Ministerio del Interior, para contr astar la veracidad de la información que consta en el registro.","B":"Consultar los datos de carácter personal de la población profesional sanitaria contenidos en los archivos y ficheros del Documento Nacional de Identidad (DNI) y del Número de Identidad de Extranjero (NIE) competencia del Ministerio del Interior, para contr astar la veracidad de la información que consta en el registro, pero solo si la persona titular no se ha opuesto explícitamente.","C":"Consultar los datos de carácter personal de los profesionales sanitarios contenidos en los archivos y ficheros del Documento Nacional de Identidad (DNI) y del Número de Identidad de Extranjero (NIE) competencia del Ministerio del Interior, para contrastar la veracidad de la información que consta en el registro, pero solo si el titular de los datos da su consentimiento expreso.","D":"Solo podrá consultar los datos de carácter personal de la población profesional sanitaria contenidos en los archivos y ficheros del Documento Nacional de Identidad (DNI) y del Número de Identidad de Extranjero (NIE) en el curso de una investigación sobre u na infracción administrativa."},"c":"A"},{"id":504,"q":"En el marco de la ordenación de las profesiones sanitarias, las personas pacientes:","o":{"A":"Tienen derecho a la libre elección del personal facultativo que debe atenderles, tanto si su ejercicio profesional se desarrolla en el sistema público como en el ámbito privado.","B":"Tienen derecho a la libre elección del personal facultativo que debe atenderles, pero solo si su ejercicio profesional se desarrolla en el sistema público.","C":"Tienen derecho a la libre elección del personal facultativo que debe atenderles, pero solo si su ejercicio profesional se desarrolla en el ámbito privado.","D":"Ninguna de las anteriores es correcta."},"c":"A"},{"id":505,"q":"Según la normativa de ordenación de las profesiones sanitarias, el personal profesional y las personas responsables de los centros sanitarios facilitarán a sus pacientes el ejercicio del derecho a conocer:","o":{"A":"El nombre, la titulación, la especialidad y la hoja de servicios del personal sanitario que les atiende, así como la categoría y función de dicho personal, si así estuvieran definidas en su centro o institución.","B":"El nombre, la titulación y la especialidad del personal sanitario que les atiende y su categoría, pero no su función en su centro o institución.","C":"El nombre, la titulación y la especialidad del personal sanitario que les atiende, así como la categoría y función de dicho personal, si así estuvieran definidas en su centro o institución.","D":"El nombre, la titulación y la especialidad del personal sanitario que les atiende, pero no su categoría y función en su centro o institución."},"c":"C"},{"id":506,"q":"De acuerdo con las normas generales de ordenación de las profesiones sanitarias, el ejercicio del derecho del personal profesional sanitario a la renuncia a la atención a una persona paciente queda condicionado a que (señálese la respuesta incorrecta):","o":{"A":"Su renuncia no conlleve desatención de la persona paciente.","B":"La renuncia se ejerza de acuerdo con procedimientos regulares.","C":"Quede constancia, aunque no sea formal, de la renuncia.","D":"La renuncia se ejerza de acuerdo con procedimientos establecidos y explícitos."},"c":"C"},{"id":507,"q":"Los centros sanitarios revisarán que el personal sanitario de su plantilla cumple los requisitos necesarios para ejercer la profesión conforme a lo previsto en la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias y en las demás n ormas aplicables:","o":{"A":"Cada cinco años como mínimo.","B":"Cada tres años como mínimo.","C":"Cada dos años como mínimo.","D":"Cada cuatro años como mínimo."},"c":"B"},{"id":508,"q":"Según dispone la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, cuando una actuación sanitaria se realice por un equipo de profesionales (señálese la respuesta incorrecta):","o":{"A":"Se articulará, preferentemente, de forma jerarquizada, atendiendo a los criterios de conocimientos y competencia y, en su caso, al de titulación del personal profesional que integra el equipo, en función de la actividad concreta a desarrollar, de la confia nza y conocimiento recíproco de las capacidades de quienes forman el equipo, y de los principios de accesibilidad y continuidad asistencial de las personas atendidas.","B":"Se articulará de forma jerarquizada o colegiada, atendiendo a los criterios de conocimientos y competencia y, en su caso, al de titulación del personal profesional que integra el equipo, en función de la actividad concreta a desarrollar, de la confianza y conocimiento recíproco de las capacidades de quienes forman el equipo, y de los principios de accesibilidad y continuidad asistencial de las personas atendidas.","C":"Se articulará de forma preferentemente colegiada, atendiendo a los criterios de conocimientos y competencia y, en su caso, al de titulación del personal profesional que integra el equipo, en función de la actividad concreta a desarrollar, de la confianza y conocimiento recíproco de las capacidades de quienes forman el equipo, y de los principios de accesibilidad y continuidad asistencial de las personas atendidas.","D":"Ninguna de las anteriores es correcta."},"c":"D/B/A"},{"id":509,"q":"De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, diga cuál de los siguientes principios generales de la relación entre las personas que ejercen profesiones sanitarias y las personas atendidas no es tal:","o":{"A":"El personal profesional tiene el deber de hacer un uso racional de los recursos diagnósticos y terapéuticos a su cargo, tomando en consideración, entre otros, los costes de sus decisiones y evitando la sobreutilización, la infrautilización y la inadecuada utilización de los mismos.","B":"El personal profesional tiene el deber de prestar una atención sanitaria técnica y profesional adecuada a las necesidades de salud de las personas que atiende, de acuerdo con el estado de desarrollo de los conocimientos científicos de cada momento y con lo s niveles de calidad y seguridad que se establecen en esta ley y el resto de normas legales y deontológicas aplicables.","C":"El personal profesional tiene el deber de proporcionar a las personas pacientes información precisa sobre su formación profesional, la forma en que han actualizado sus conocimientos y las demandas de responsabilidad que hayan podido derivar en responsabili dades administrativas.","D":"El personal profesional tiene el deber de respetar la personalidad, dignidad e intimidad de las personas a su cuidado y debe respetar su participación en las tomas de decisiones que les afecten. En todo caso, deben ofrecer una información suficiente y adecuada para que puedan ejercer su derecho al consentimiento sobre dichas decisiones."},"c":"C"},{"id":510,"q":"De acuerdo con la Ley 44/2003, de 21 de noviembre, de ordenación de las profesiones sanitarias, los centros sanitarios acreditados para desarrollar programas de formación continuada:","o":{"A":"Deberán contar con jefaturas de estudios, con la coordinación docente y con el personal tutor de la formación que resulten adecuados en función de las actividades a desarrollar, así como con una figura de defensoría del alumnado.","B":"Deberán contar una comisión de docencia, así como con jefaturas de estudios, coordinación docente y personal tutor de la formación que resulten adecuados en función de las actividades a desarrollar.","C":"Deberán contar una comisión de docencia y con una figura de defensoría del alumnado, así como con jefaturas de estudios, coordinación docente y personal tutor de la formación que resulten adecuados en función de las actividades a desarrollar.","D":"Todas las anteriores son incorrectas."},"c":"D"},{"id":511,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, sus disposiciones se aplicarán a:","o":{"A":"A los servicios sanitarios de financiación pública y a los privados, en los mismos términos.","B":"A los servicios sanitarios de financiación pública. También a los privados en lo que se refiere al control de las actividades de salud pública y en materia de garantías de información, seguridad y calidad.","C":"A los servicios sanitarios de financiación pública y a los privados concertados.","D":"Únicamente a los servicios sanitarios de financiación pública."},"c":"B"},{"id":512,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la ciudadanía tendrá los siguientes derechos en el conjunto del Sistema Nacional de Salud:","o":{"A":"A recibir asistencia sanitaria en su comunidad autónoma de residencia.","B":"A recibir el reembolso de los gastos derivados de la asistencia en la sanidad privada cuando se trate de servicios recogidos en el catálogo de prestaciones del Sistema Nacional de Salud.","C":"A recibir el reembolso de los gastos derivados de la asistencia sanitaria del catálogo de prestaciones del Sistema Nacional de Salud que pudiera requerir del servicio de salud de la comunidad autónoma en la que se encuentre desplazado/a.","D":"Ninguna de las respuestas anteriores es correcta."},"c":"A/D"},{"id":513,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la cartera común de servicios del Sistema Nacional de Salud se articula en torno a las siguientes modalidades:","o":{"A":"Cartera común básica de servicios asistenciales, cartera común suplementaria y cartera común de servicios accesorios.","B":"Cartera común básica nacional de servicios asistenciales y cartera común autonómica de servicios asistenciales.","C":"Cartera común nacional básica de servicios asistenciales, cartera común suplementaria autonómica y cartera común de servicios accesorios autonómicos.","D":"Cartera común nacional y autonómica básica de servicios asistenciales, cartera común nacional y autonómica suplementaria y cartera común nacional y autonómica de servicios accesorios."},"c":"A"},{"id":514,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la cartera común básica de servicios asistenciales del Sistema Nacional de Salud comprende:","o":{"A":"Todas las actividades asistenciales de prevención, diagnóstico, tratamiento y rehabilitación que se realicen en centros sanitarios o sociosanitarios, así como el transporte sanitario urgente, la prestación farmacéutica y la prestación ortoprotésica, cubier tos de forma completa por financiación pública.","B":"Todas las actividades asistenciales de prevención, diagnóstico, tratamiento y rehabilitación que se realicen en centros sanitarios o sociosanitarios, así como el transporte sanitario urgente y la prestación farmacéutica, cubiertos de forma completa por fin anciación pública.","C":"Todas las actividades asistenciales de prevención, diagnóstico, tratamiento y rehabilitación que se realicen en centros sanitarios o sociosanitarios, así como el transporte sanitario urgente, y la prestación ortoprotésica, cubiertos de forma completa por f inanciación pública.","D":"Todas las actividades asistenciales de prevención, diagnóstico, tratamiento y rehabilitación que se realicen en centros sanitarios o sociosanitarios, así como el transporte sanitario urgente, cubiertos de forma completa por financiación pública."},"c":"D"},{"id":515,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la cartera común suplementaria del Sistema Nacional de Salud incluirá las siguientes prestaciones:","o":{"A":"Únicamente la prestación farmacéutica.","B":"Únicamente la prestación ortoprotésica.","C":"Únicamente la prestación farmacéutica y la prestación ortoprotésica.","D":"La prestación farmacéutica, la prestación ortoprotésica y la prestación con productos dietéticos."},"c":"D"},{"id":516,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la prestación de atención primaria no comprenderá:","o":{"A":"La atención a la salud bucodental.","B":"La atención paliativa a personas enfermas terminales.","C":"La rehabilitación básica.","D":"Ninguna de las respuestas anteriores es correcta."},"c":"D"},{"id":517,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, para la elaboración del contenido de la cartera común de servicios del Sistema Nacional de Salud:","o":{"A":"Es preceptivo el informe favorable de la Red Española de Agencias de Evaluación de Tecnologías Sanitarias y Prestaciones del Sistema Nacional de Salud, en relación con la eficacia, eficiencia, efectividad, seguridad y utilidad terapéuticas, así como las ve ntajas y alternativas asistenciales, el cuidado de grupos menos protegidos o de riesgo y las necesidades sociales, así como su impacto económico y organizativo.","B":"Se contará con la participación de la Red Española de Agencias de Evaluación de Tecnologías Sanitarias y Prestaciones del Sistema Nacional de Salud, en la evaluación de la eficacia, eficiencia, efectividad, seguridad y utilidad terapéuticas, así como las v entajas y alternativas asistenciales, el cuidado de grupos menos protegidos o de riesgo y las necesidades sociales, así como su impacto económico y organizativo.","C":"Es preceptivo el informe favorable de las sociedades científicas implicadas, en relación con la eficacia, eficiencia, efectividad, seguridad y utilidad terapéuticas, así como las ventajas y alternativas asistenciales, el cuidado de grupos menos protegidos o de riesgo y las necesidades sociales, así como su impacto económico y organizativo.","D":"Se contará con la participación de las sociedades científicas implicadas, en la evaluación de la eficacia, eficiencia, efectividad, seguridad y utilidad terapéuticas, así como las ventajas y alternativas asistenciales, el cuidado de grupos menos protegidos o de riesgo y las necesidades sociales, así como su impacto económico y organizativo."},"c":"B"},{"id":518,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la exclusión de una técnica, tecnología o procedimiento actualmente incluido en la cartera de servicios se llevará a cabo cuando:","o":{"A":"Se evidencie su falta de eficacia, efectividad o eficiencia, o que el balance entre beneficio y riesgo sea significativamente desfavorable.","B":"Requiera una formación para la que no exista la especialidad médica correspondiente.","C":"Hayan cambiado las condiciones económicas de su implantación.","D":"Todas las respuestas anteriores son correctas."},"c":"A"},{"id":519,"q":"A los efectos de la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la competencia profesional es:","o":{"A":"La acreditación de formación continuada a lo largo del desempeño de su carrera profesional.","B":"La competencia acreditada por el título correspondiente acreditativo de la adquisición de conocimientos requeridos para el desempeño del puesto designado.","C":"La aptitud del personal profesional sanitario para integrar y aplicar los conocimientos, habilidades y actitudes asociados a las buenas prácticas de su profesión para resolver los problemas que se le plantean.","D":"La superación del proceso selectivo oficial convocado por la autoridad competente para la adquisición del vínculo estatutario con los servicios sanitarios."},"c":"C"},{"id":520,"q":"Según dispone la Ley 16/2003, de 28 de mayo, de cohesión y calidad del Sistema Nacional de Salud, la declaración de actuaciones coordinadas en salud pública y en seguridad alimentaria deberán encuadrarse en alguno de los supuestos siguientes:","o":{"A":"Responder a situaciones de especial riesgo o alarma para la salud pública.","B":"Establecer planes preventivos para hacer frente a situaciones de especial riesgo o alarma para la salud pública.","C":"Realizar análisis epidemiológicos que permitan establecer estructuras y recursos según las previsiones en materia de salud pública y seguridad alimentaria.","D":"Las respuestas a ) y b) son verdaderas y la c ) es falsa."},"c":"A"},{"id":521,"q":"Según dispone la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, la ordenación del régimen personal estatutario de los servicios de salud se rige por una serie de principios y criterios. Señale cuales no están entre los mencionados por esta ley.","o":{"A":"Sometimiento pleno a la ley y el derecho.","B":"Igualdad, mérito, capacidad y promoción en el acceso a la condición de personal estatutario.","C":"Integración en el régimen organizativo y funcional del servicio de salud y de sus centros e instituciones.","D":"Coordinación, cooperación y mutua información entre las Administraciones sanitarias públicas."},"c":"B"},{"id":522,"q":"La condición de personal estatutario fijo se adquiere, tal y como prevé la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, por el cumplimiento de los siguientes requisitos:","o":{"A":"Incorporación a una plaza de servicio, institución o centro que corresponda en el plazo fijado en la convocatoria tras la superación de las pruebas de selección.","B":"Superación de las pruebas de selección; nombramiento conferido por el órgano competente; e incorporación a una plaza del servicio, institución o centro que corresponda en el plazo de un mes.","C":"Superación de las pruebas de selección; nombramiento conferido por el órgano competente; e incorporación, previo cumplimiento de los requisitos formales en cada caso establecidos, a una plaza del servicio, institución o centro que corresponda en el plazo d eterminado en la convocatoria.","D":"Superación de las pruebas de selección; nombramiento conferido por el órgano competente; e incorporación a una plaza del servicio, institución o centro que corresponda en todo caso en el plazo determinado en la convocatoria."},"c":"C"},{"id":523,"q":"Según dice la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, en el proceso de la adquisición de la condición de personal estatutario fijo, no podrán recibir nombramiento y quedarán sin efecto las act uaciones de quienes:","o":{"A":"No acrediten que reúnen los requisitos y condiciones exigidos en la convocatoria, una vez superado el proceso selectivo.","B":"No acrediten que reúnen los requisitos y condiciones exigidos en la convocatoria, con carácter previo a la superación del proceso selectivo.","C":"No acrediten que reúnen los requisitos y condiciones exigidos en la convocatoria, una vez firmada la convocatoria.","D":"Una vez superado el proceso selectivo, automáticamente se procede al nombramiento por el órgano competente."},"c":"A"},{"id":524,"q":"La pérdida de la condición de personal estatutario regulada en la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, se produce:","o":{"A":"Siempre en caso de pena de inhabilitación especial para empleo o cargo público, afecte o no al correspondiente nombramiento.","B":"En caso de que se adopte la pena de inhabilitación absoluta sea firme o no.","C":"En caso de que se adopte la pena de inhabilitación especial para la correspondiente profesión, s
