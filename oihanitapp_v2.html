iempre que esta exceda de seis años.","D":"En caso de que se adopte la pena de inhabilitación especial para la correspondiente profesión, siempre que esta exceda de tres años."},"c":"C"},{"id":525,"q":"Conforme a la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, señale cuál de las siguientes afirmaciones no es correcta:","o":{"A":"La jubilación puede ser forzosa o voluntaria.","B":"Para que la persona interesada pueda prolongar su permanencia en servicio activo hasta cumplir los 70 años, bastará con que lo solicite voluntariamente.","C":"La jubilación forzosa se declarará al cumplir la persona interesada 65 años.","D":"Podrá optar a la jubilación voluntaria, total o parcial, el personal estatutario que reúna los requisitos establecidos en la legislación de Seguridad Social."},"c":"B"},{"id":526,"q":"Procede la extinción de la condición de personal estatutario fijo de los servicios de salud:","o":{"A":"Cuando se produzca la pérdida de la nacionalidad.","B":"En caso de recaer sanción firme disciplinaria de separación del servicio.","C":"Siempre que se imponga una pena principal o accesoria de inhabilitación especial para empleo o cargo público o para el ejercicio de la correspondiente profesión.","D":"Todas las anteriores respuestas son correctas."},"c":"D"},{"id":527,"q":"En materia de retribuciones, la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, prevé que:","o":{"A":"El sistema retributivo del personal estatutario se estructura en retribuciones básicas y retribuciones complementarias.","B":"La evaluación del personal estatutario a efectos de determinación de una parte de la retribuciones complementarias se establecerá a través de procedimientos fundados en los principios igualdad, objetividad y transparencia.","C":"El sistema retributivo del personal estatutario responde a los principios de cualificación técnica y profesional.","D":"Todas las respuestas son correctas."},"c":"D"},{"id":528,"q":"De acuerdo con la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud, señale la respuesta correcta respecto a las retribuciones del personal estatutario de los servicios de salud:","o":{"A":"Las retribuciones básicas son: el sueldo asignado a cada categoría en función del título exigido para su desempeño; los trienios; y las pagas extraordinarias.","B":"Las retribuciones básicas serán iguales en todos los servicios de salud independientemente de la anualidad en la que se perciban.","C":"El personal estatutario temporal percibirá la totalidad de las retribuciones que, en el correspondiente servicio de salud, correspondan a su nombramiento, con excepción del complemento de carrera.","D":"El complemento de atención continuada está destinado a retribuir la iniciativa continuada y permanente de la persona titular del puesto."},"c":"A"},{"id":529,"q":"La pérdida de la condición de personal estatutario de los servicios de salud se produce cuando la incapacidad permanente sea declarada:","o":{"A":"En grado de incapacidad permanente total para la profesión habitual.","B":"En grado de incapacidad absoluta para todo trabajo.","C":"En grado de gran invalidez.","D":"Todas las respuestas son correctas."},"c":"D"},{"id":530,"q":"En el supuesto del personal estatutario de los servicios de salud:","o":{"A":"El período de localización es aquel período de tiempo en el que el personal se encuentra únicamente en situación de disponibilidad.","B":"Se considera período de descanso todo período de tiempo que no sea tiempo de trabajo.","C":"El trabajo por turnos es una forma de organización del trabajo en equipo con arreglo al ritmo rotatorio y siempre de tipo continuo.","D":"El período de localización es aquel período de tiempo en el que el personal se encuentra en situación de disponibilidad a los solos efectos de asegurar su posible localización."},"c":"B"},{"id":531,"q":"Para el personal estatutario de los servicios de salud, el período nocturno tendrá la siguiente duración:","o":{"A":"Mínima de siete horas e incluirá necesariamente el período comprendido entre las cero y las cinco horas de cada día natural.","B":"Mínima de ocho horas e incluirá necesariamente el período comprendido entre las cero y las cinco horas de cada día natural.","C":"Mínima de ocho horas e incluirá necesariamente el período comprendido entre las doce y las cinco horas de cada día natural.","D":"Mínima de siete horas e incluirá necesariamente el período comprendido entre las doce y las cinco horas de cada día natural."},"c":"A"},{"id":532,"q":"Según establece la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud:","o":{"A":"Resulta incompatible para el personal estatutario de los servicios de salud el ejercicio de las funciones sanitarias con cualquier otro tipo de funciones.","B":"Al personal estatutario de los servicios de salud le resulta aplicable el mismo régimen de incompatibilidades establecido para el personal funcionario.","C":"Atendiendo a lo que establezca la legislación vigente, el personal estatutario de los servicios de salud podrá compatibilizar las funciones sanitarias y docente.","D":"Para el personal licenciado sanitario el complemento específico resulta irrenunciable."},"c":"C"},{"id":533,"q":"La Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud regula el descanso semanal. Señale la respuesta que no es correcta:","o":{"A":"El personal tendrá derecho a un período mínimo que siempre será fijo de descanso ininterrumpido con una duración media de 24 horas semanales.","B":"El período de referencia para el cálculo del período de descanso semanal será de tres meses.","C":"En el caso de que no se hubiera disfrutado del tiempo mínimo de descanso semanal en el período de tres meses se producirá una compensación a través del régimen de descansos alternativos.","D":"El período de referencia para el cálculo del período de descanso semanal será de dos meses."},"c":"B/D"},{"id":534,"q":"Conforme a la Ley 55/2003, de 16 de diciembre, del Estatuto Marco del personal estatutario de los servicios de salud:","o":{"A":"El personal tendrá derecho a una vacación retribuida cuya duración no será inferior en ningún caso a 30 días naturales.","B":"El personal estatutario de los servicios de salud podrá elegir sustituir el período de vacación por una compensación económica.","C":"Solo podrá ser sustituido por una compensación económica el período vacacional anual mediante la programación funcional de los centros, cuando así lo aconsejen razones organizativas.","D":"Anualmente, el personal tendrá derecho a una vacación retribuida cuya duración no será inferior a 30 días naturales, o al tiempo que proporcionalmente corresponda en función del tiempo de servicios."},"c":"D"},{"id":535,"q":"La excedencia voluntaria solicitada por el personal estatutario de los servicios de salud por interés particular exige haber prestado servicios efectivos en cualquiera de las Administraciones públicas durante:","o":{"A":"Los cinco años inmediatamente anteriores.","B":"Los cuatro años inmediatamente anteriores.","C":"Los dos años inmediatamente anteriores.","D":"Los tres años inmediatamente anteriores."},"c":"A"},{"id":536,"q":"La Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi, establece que la Administración sanitaria vasca debe garantizar la tutela general de la salud pública a través de:","o":{"A":"Medidas preventivas.","B":"Promoción de la salud.","C":"Prestaciones sanitarias individuales.","D":"Son correctas todas las respuestas."},"c":"D"},{"id":537,"q":"La Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi, reconoce la universalidad del derecho a la protección de la salud para:","o":{"A":"Todas las personas residentes en el territorio de Euskadi, así como para las personas transeúntes.","B":"Todas las personas residentes en Euskadi o fuera de Euskadi, así como para las personas transeúntes.","C":"Solo para las personas que tengan vecindad administrativa en Euskadi.","D":"Solo para las personas de quienes pueda predicarse la condición política de vascos."},"c":"A"},{"id":538,"q":"Señale cuál de los siguientes principios no se enuncian entre los principios informadores del sistema sanitario de Euskadi en la Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi:","o":{"A":"Universalidad.","B":"Solidaridad ciudadana.","C":"Equidad.","D":"Calidad de los servicios."},"c":"B"},{"id":539,"q":"La Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi, establece respecto a las áreas de salud que:","o":{"A":"La Comunidad Autónoma del País Vasco se divide territorialmente en áreas de salud de acuerdo con la situación socio -económica de cada demarcación geográfica.","B":"En cada área de salud pueden ponerse en práctica las actuaciones esenciales que requiere la tutela general de la salud pública y exclusivamente la asistencia sanitaria primaria .","C":"En cada área de salud se garantizará una adecuada ordenación de la atención primaria y su coordinación con la atención especializada.","D":"Son correctas la a) y la c)."},"c":"C"},{"id":540,"q":"La Ley 8/1997, de 26 de junio, de ordenación Sanitaria de Euskadi prevé la creación de sistemas de información necesarios para facilitar el ejercicio adecuado de los distintos niveles de responsabilidad en el sistema. A tal fin, los datos de carácter perso nal relativos a la salud podrán ser recabados y tratados siempre que se cumplan los siguientes requisitos:","o":{"A":"Siempre debe constar el previo consentimiento de la persona afectada.","B":"Si no consta el previo consentimiento de la persona afectada se requiere que la actuación se encuentre debidamente autorizada y se efectúe previo procedimiento de disociación que garantice el anonimato de la información.","C":"Que conste el previo consentimiento de la persona afectada por escrito y que se garantice el anonimato de la información.","D":"Basta con que la actuación se encuentre debidamente autorizada."},"c":"B"},{"id":541,"q":"La Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi al contemplar los derechos y deberes ciudadanos, alude a:","o":{"A":"La obligación de dejar constancia escrita de todo proceso diagnóstico o terapéutico.","B":"La obligación de dejar constancia por cualquier medio de todo proceso diagnóstico.","C":"La obligación de dejar constancia por cualquier medio de todo proceso diagnóstico o terapéutico.","D":"No existe en la Ley ninguna previsión a este respecto, de modo que será el personal facultativo el que decida si el proceso diagnóstico o terapéutico debe quedar registrado."},"c":"A"},{"id":542,"q":"El contrato -programa, tal y como establece la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi:","o":{"A":"Es el instrumento jurídico mediante el que se articulan las relaciones entre el Gobierno Vasco y las organizaciones del ente público Osakidetza -Servicio Vasco de Salud para la provisión de servicios sanitarios.","B":"Es el instrumento jurídico mediante el que se articulan de manera directa las relaciones entre el Departamento competente en materia de sanidad y las organizaciones del ente público Osakidetza -Servicio Vasco de Salud que tiene naturaleza jurídica de concie rto.","C":"Es el instrumento jurídico mediante el que se articulan de manera directa las relaciones entre el Departamento competente en materia de sanidad y las organizaciones del ente público Osakidetza -Servicio Vasco de Salud que tiene naturaleza jurídica de un con venio de carácter especial.","D":"Ninguna respuesta es correcta."},"c":"C"},{"id":543,"q":"El consejo de administración de Osakidetza -Servicio Vasco de Salud está integrado por:","o":{"A":"La persona titular de la presidencia y por un número no superior a cinco miembros en representación de la Administración de la Comunidad Autónoma de Euskadi.","B":"La persona titular de la presidencia y por un número no superior a tres miembros en representación de la Administración de la Comunidad Autónoma de Euskadi.","C":"La persona titular de la presidencia y por cinco miembros en representación del Departamento competente en materia de sanidad.","D":"La persona titular de la presidencia, la Consejería del Departamento competente en materia de sanidad y tres miembros en representación de la Administración de la Comunidad Autónoma de Euskadi."},"c":"A"},{"id":544,"q":"Según establece la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi:","o":{"A":"El Plan de Salud de Euskadi debe ser aprobado por el Parlamento Vasco.","B":"El Departamento competente en materia de sanidad debe elaborar semestralmente y remitir al Parlamento un informe con la evaluación de los objetivos y determinaciones del Plan de Salud de Euskadi.","C":"El Departamento competente en materia de sanidad debe elaborar anualmente y remitir al Parlamento un informe con la evaluación de los objetivos y determinaciones del Plan de Salud de Euskadi.","D":"Son correctas las respuestas a) y c)."},"c":"C/D"},{"id":545,"q":"A los efectos de la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, las plantillas de personal del ente público Osakidetza -Servicio Vasco de Salud:","o":{"A":"Serán aprobadas por la Presidencia a propuesta del consejo de administración.","B":"Se denomina así al número de efectivos de carácter estructural con que cuentan tanto su organización central de administración como las organizaciones de servicios dependientes de Osakidetza -Servicio Vasco de Salud.","C":"Deberán ajustarse al número máximo de efectivos, según grupos profesionales, que anualmente aprobará su consejo de administración a propuesta del Departamento de Sanidad.","D":"Deberán ajustarse al número máximo de efectivos, según grupos de titulación, que anualmente aprobará el Departamento de Sanidad."},"c":"B"},{"id":546,"q":"En el ámbito territorial de la Comunidad Autónoma de Euskadi, las inspecciones necesarias para asegurar el cumplimiento de lo previsto en la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi y en el resto de la legislación sanitaria correspond e:","o":{"A":"A la inspección de trabajo del País Vasco adscrita al Departamento de trabajo y empleo del Gobierno Vasco.","B":"En todos los casos a las corporaciones locales de la Comunidad Autónoma.","C":"Al Departamento competente en materia de sanidad.","D":"La inspección en materia sanitaria no es competencia de la Comunidad Autónoma de Euskadi."},"c":"C"},{"id":547,"q":"Señale cuál de los siguientes criterios no está contemplado en la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi para la clasificación de las infracciones en leves, graves o muy graves:","o":{"A":"La cuantía de la indemnización solicitada.","B":"Los riesgos para la salud.","C":"El grado de intencionalidad.","D":"La gravedad de la alteración sanitaria y social producida."},"c":"A"},{"id":548,"q":"Según establece la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, en materia de sanciones señale la respuesta correcta:","o":{"A":"Las infracciones serán sancionadas exclusivamente con sanción pecuniaria o económica.","B":"En los casos de infracciones muy graves, el Gobierno Vasco podrá acordar el cierre temporal del establecimiento, instalación o servicio por un plazo máximo de cinco años.","C":"Sin perjuicio de la multa que proceda imponer, en ciertos casos, la sanción económica que se imponga podrá ser incrementada hasta el triple de la cuantía del beneficio ilícito obtenido.","D":"En los casos de infracciones muy graves, el Gobierno Vasco podrá acordar el cierre temporal del establecimiento, instalación o servicio por un plazo máximo de tres años."},"c":"B"},{"id":549,"q":"Según la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, las organizaciones a través de las que se procede a la provisión de servicios sanitarios con medios adscritos al ente público Osakidetza -Servicio Vasco de Salud:","o":{"A":"Realizarán su actividad bajo el principio de autonomía económico -financiera y de gestión.","B":"Se configurarán como instituciones de titularidad privada y con personalidad jurídica propia.","C":"Se crearán por ley como entidades de titularidad pública y con personalidad jurídica propia.","D":"Para realizar su actividad dependen presupuestariamente del ente público Osakidetza - Servicio Vasco de Salud."},"c":"A"},{"id":550,"q":"Respecto al personal sujeto al régimen estatutario que establece la Ley 8/1997, de 26 de junio, de Ordenación Sanitaria de Euskadi, señale la respuesta correcta:","o":{"A":"Este vínculo estatutario se adquiere mediante el cumplimiento de los dos siguientes requisitos: superación del proceso selectivo correspondiente y nombramiento conferido por autoridad competente.","B":"Los principios que rigen el procedimiento selectivo para la adquisición del vínculo estatutario son exclusivamente el de igualdad, mérito y capacidad.","C":"Los instrumentos de clasificación del personal sujeto a este régimen estatutario son el grupo de titulación, el grupo profesional, la categoría y el puesto funcional que se desempeñe.","D":"El grupo de titulación constituye el instrumento de clasificación del personal en base al agrupamiento unitario de las aptitudes profesionales y contenido específico da las tareas propias de la prestación."},"c":"C"},{"id":551,"q":"Corresponderá la presidencia del ente p úblico Osakidetza -Servicio Vasco de Salud a:","o":{"A":"Quien ostente la presidencia del Gobierno (Lehendakari) de la Comunidad Autónoma del País Vasco.","B":"La Diputación General del Territorio Histórico en que esté situado el Ente.","C":"La presidencia a quien ostente la titularidad del Departamento de Sanidad y la presidencia de honor a quien ostente la presidencia del Gobierno (Lehendakari) de la Comunidad Autónoma del País Vasco.","D":"Quien ostente la titularidad de del Departamento de Sanidad."},"c":"D"},{"id":552,"q":"La función de nombrar y separar a quienes ocupen las Direcciones de División de la organización central del ente p úblico corresponde a:","o":{"A":"El Consejo de Administración del Ente.","B":"La Dirección General del Ente.","C":"La Presidencia del Ente.","D":"Ninguno de los anteriores."},"c":"A"},{"id":553,"q":"La composición del Consejo del ente público Osakidetza -Servicio Vasco de Salud contará, además de la persona que ejerza la Presidencia:","o":{"A":"Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: una persona a propuesta de la titularidad del Departamento de Hacienda y Administración Pública, otra a propuesta de quien ostente la titularid ad de Bienestar Social y las tres restantes a propuesta de la persona titular de Sanidad.","B":"Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: una persona a propuesta de la titularidad del Departamento de Hacienda y Administración Pública, otra a propuesta de la persona titular de la C onsejería de Presidencia y las tres restantes a propuesta de la persona titular de Sanidad.","C":"Con cinco integrantes en representación de la Administración de la Comunidad Autónoma, que nombrará el Gobierno: dos a propuesta de la persona titular del Departamento de Hacienda y Administración Pública y las tres restantes a propuesta de la persona titu lar de Sanidad.","D":"Ninguna de los anteriores."},"c":"C"},{"id":554,"q":"La pro puesta de Plan Estratégico del ente p úblico Osakidetza -Servicio Vasco de Salud :","o":{"A":"Será formulada por la Dirección General del Ente.","B":"Será aprobada por la Presidencia del Ente.","C":"Será sometida a informe del Consejo de Administración del Ente.","D":"Todas las anteriores son ciertas."},"c":"A"},{"id":555,"q":"La función de convocar, presidir, suspender y levantar las sesiones, arbitrar las deliberaciones del Consejo de Administración del ente público Osakidetza - Servicio vasco de salud y decidir los empates con su voto de calidad corresponderá a:","o":{"A":"La Dirección General.","B":"La Presidencia.","C":"La persona de mayor antigüedad del Consejo de Administración.","D":"Ninguna de las anteriores."},"c":"B"},{"id":556,"q":"La persona titul ar de la Dirección General del ente público Osakidetza - Servicio Vasco de Salud :","o":{"A":"No podrá asistir a las reuniones del Consejo de Administración del Ente.","B":"Presidirá las reuniones del Consejo de Administración del Ente.","C":"Asistirá a las reuniones del Consejo de Administración del Ente con voz y voto.","D":"Asistirá a las reuniones del Consejo de Administración del Ente con voz y sin voto."},"c":"D"},{"id":557,"q":"Corresponde a la organización central de administración y gestió n corporativa del ente público Osakidetza -Servicio Vasco de Salud , en materia de gestión asistencial (señálese la respuesta incorrecta):","o":{"A":"Supervisar el cumplimiento de las políticas generales de calidad y realizar auditorías.","B":"Definir criterios generales y proponer la política de precios correspondiente a la prestación de servicios sanitarios incluida en la cobertura pública.","C":"Coordinar los recursos y, en su caso, proponer medidas de intervención sobre las listas de espera.","D":"Promover protocolos de interés general."},"c":"B"},{"id":558,"q":"Corresponde a la organización central de administra ción y gestión corporativa del ente público Osakidetza -Servicio Vasco de Salud , en materia de gestión de recursos humanos (señálese la respuesta incorrecta):","o":{"A":"Supervisar, controlar y evaluar las políticas de personal del Ente.","B":"Promover acuerdos de cooperación con centros correspondientes a la sanidad privada.","C":"Dirigir el funcionamiento del registro de personal.","D":"Gestionar los procesos de selección y de provisión que el Consejo de Administración determine, por su carácter general, previsible número de aspirantes u otras circunstancias análogas, y, a tal fin, convocarlos, establecer sus bases, programas y contenidos , y designar a los tribunales calificadores de los mismos."},"c":"B"},{"id":559,"q":"Corresponde a cada organizaci ón de servicios sanitarios del ente público Osakidetza -Servicio Vasco de Sa lud el ejercicio de todas las facultades de gestión y administración que se requieran para el ejercicio de la actividad de provisión de servicios sanitarios que tengan encomendada, quedando excluidas únicamente:","o":{"A":"Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza -Servicio Vasco de Salud atribuyen expresamente a la organización central del Ente Público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.","B":"Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza -Servicio Vasco de Salud atribuyen expresamente a la Presidencia del Ente Público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.","C":"Aquellas facultades de gestión centralizada que los estatutos sociales del ente público Osakidetza -Servicio Vasco de Salud atribuyen expresamente al Consejo de Administración del Ente Público y las competencias propias de otras instancias de acuerdo con las Leyes y Reglamentos vigentes.","D":"Ninguna de las anteriores."},"c":"A"},{"id":560,"q":"El número de integrantes del equipo directivo de las organizaciones de servicios sanitarios del ente público Osakidetza -Servicio Vasco de Salud:","o":{"A":"Oscilará entre dos y tres.","B":"Oscilará entre tres y cuatro.","C":"Oscilará entre cuatro y cinco.","D":"La normativa que rige su estatuto jurídico no establece un número determinado sino un máximo de cinco."},"c":"D"},{"id":561,"q":"La función de Representar al ente público Osakidetza -Servicio Vasco de Salud en la negociación colectiva del Acuerdo Marco de Condiciones de Trabajo del Personal corresponde a:","o":{"A":"La organización central de administración y gestión corporativa del ente público Osakidetza -Servicio Vasco de Salud .","B":"La Presidencia del ente público Osakidetza -Servicio Vasco de Salud .","C":"El Consejo de Administración del ente público Osakidetza -Servicio Vasco de Salud .","D":"Ninguna de las anteriores."},"c":"A"},{"id":562,"q":"Para el desarrollo de funciones de propuesta y asesoramiento, así como de participación en las organizaciones de servicios sanitarios, existirá un Consejo de Dirección en cada una de ellas, integrado por:","o":{"A":"El equipo directivo, las jefaturas de unidad que se determinen y una representación de personas vocales electas que formen parte de los Consejos Técnicos de participación profesional respectivos.","B":"El equipo directivo, las jefaturas de unidad que se determinen, representantes sindicales y una representación de personas vocales electas que formen parte de los Consejos Técnicos de participación profesional respectivos.","C":"El equipo directivo y las jefaturas de unidad que se determinen.","D":"Todas las anteriores son falsas."},"c":"A"},{"id":563,"q":"Las organizaciones de servicios san itarios del ente público Osakidetza -Servicio Vasco de Salud podrán:","o":{"A":"Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión, aunque solo en materia de personal y siempre de acuerdo con el marco estratégico, los planes de gestión y el comp romiso del contrato -programa suscrito por la organización.","B":"Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión, pero solo en materia económica y siempre de acuerdo con el marco estratégico, los planes de gestión y el compromi so del contrato -programa suscrito por la organización.","C":"Descentralizar la organización y su funcionamiento operativo, delegando en quienes ostenten la responsabilidad clínica facultades de gestión tanto en materia económica como de personal, de acuerdo con el marco estratégico, los planes de gestión y el compr omiso del contrato -programa suscrito por la organización.","D":"Todas las anteriores son falsas."},"c":"C"},{"id":564,"q":"En materia específica de inversiones, la competencia para ejecutar las compras de suministros que se consideren centralizadas, así como definir y/o ejecutar, en su caso, las consideradas integradas corresponde a:","o":{"A":"El Consejo de Administración del ente público Osakidetza -Servicio Vasco de Salud .","B":"La organización central de administra ción y gestión corporativa del ente público Osakidetza -Servicio Vasco de Salud .","C":"La organización de servicios del ente público Osakidetza -Servicio Vasco de Salud .","D":"A quien ostente la titularidad de la Dirección -Gerencia de cada organizaci ón de servicios sanitarios del Osakidetza -Servicio Vasco de Salud ."},"c":"B"},{"id":565,"q":"En el ámbito de una organizaci ón de servicios sanitarios del ente público Osakidetza -Servicio Vasco de Salud , presidir los Consejos Técnicos de participación profesional y promover su eficaz funcionamiento es una tarea que corresponde a:","o":{"A":"La Dirección General del Ente.","B":"Quien ostente la titularidad de la Dirección -Gerencia del Ente.","C":"La Dirección Médica del Ente.","D":"Ninguna de las anteriores."},"c":"C"},{"id":566,"q":"Según el Artículo 1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿qué dos niveles asistenciales se integran en las Organizaciones Sanitarias Integradas (OSI) de Osakidetza?","o":{"A":"Atención especializada y Atención de Urgencias.","B":"Salud Pública y Servicios Sociosanitarios.","C":"Atención hospitalaria y Atención de Emergencias.","D":"Atención primaria y Atención hospitalaria."},"c":"D"},{"id":567,"q":"Según el Artículo 2.1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿qué objetivo último persigue la configuración de las OSI?","o":{"A":"Reducir el gasto farmacéutico mediante la unificación de compras.","B":"Favorecer la integración clínica de manera que la atención se articule en torno a la persona.","C":"Centralizar los servicios de atención primaria en las sedes hospitalarias.","D":"Eliminar las categorías profesionales de atención primaria para unificarlas con las hospitalarias."},"c":"B"},{"id":568,"q":"Según el Artículo 1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿bajo qué principio fundamental actuarán las Organizaciones Sanitarias Integradas (OSI) del ente público Osakidetza -Servicio Vasco de Salud ?","o":{"A":"Principio de coordinación territorial y sectorial.","B":"Principio de jerarquía funcional única.","C":"Principio de autonomía económico -financiera y de gestión.","D":"Principio de centralización de todos los recursos."},"c":"C"},{"id":569,"q":"De acuerdo con el Artículo 3 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿cómo se define una OSI de clase \"monográfica\"?","o":{"A":"Es aquella donde solo se integran servicios de atención hospitalaria especializada.","B":"Es aquella cuya actividad asistencial gira en torno a un ámbito específico, integrando sus servicios y dispositivos.","C":"Es una organización que solo atiende a una patología crónica específica.","D":"Es la organización que carece de servicios de atención primaria."},"c":"B"},{"id":570,"q":"Según el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, las OSI de Tipo I se caracterizan, entre otros aspectos, por tener hospitales de carácter universitario y, además, por disponer de:","o":{"A":"Una base poblacional adscrita inferior a 300.000 habitantes.","B":"Una Dirección de Gestión que asume todas las funciones asistenciales.","C":"Unidades o servicios calificados de referencia para el conjunto del sistema sanitario vasco.","D":"Ser organizaciones de servicios de carácter monográfico y de pequeño tamaño."},"c":"C"},{"id":571,"q":"Según el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, para que una OSI sea clasificada como de Tipo III debe integrar, junto con servicios de atención primaria, un hospital de carácter ge neral y tener una base poblacional atendida inferior a:","o":{"A":"500.000 habitantes.","B":"200.000 habitantes.","C":"300.000 habitantes.","D":"100.000 habitantes."},"c":"C"},{"id":572,"q":"Según el Artículo 5 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿cuáles son los tres órganos de participación que conforman la estructura organizativa de las OSI?","o":{"A":"El Consejo de Dirección, el Comité Ejecutivo y el Comité de Ética Asistencial.","B":"El Consejo Clínico Asistencial, el Consejo Social y la Comisión Sociosanitaria.","C":"La Comisión de Seguridad, la Comisión de Docencia y la Comisión de Investigación.","D":"El Consejo de Dirección, el Consejo Social y el Comité de Evaluación."},"c":"B"},{"id":573,"q":"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿qué órganos componen el equipo directivo de una OSI, según la estructura general del artículo 5.2?","o":{"A":"Solo la Dirección Gerencia y la Dirección Médica.","B":"Las Direcciones Médica, de Atención Integrada, de Enfermería, de Personas, Económico -Financiera y de Gestión.","C":"El Consejo de Dirección y el Consejo Social exclusivamente.","D":"La Dirección Gerencia y las Jefaturas de Servicio de cada centro de salud."},"c":"B"},{"id":574,"q":"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, en las OSI de Tipo IV, la Dirección Gerencia asume, con el apoyo de puestos funcionales asistenciales, las funciones que cor responden a:","o":{"A":"La Dirección de Personas y la Dirección Económico -Financiera.","B":"La Dirección de Personas y la Dirección de Atención Integrada.","C":"La Dirección Médica y la Dirección de Enfermería.","D":"La Dirección de Gestión y el Consejo de Dirección."},"c":"C"},{"id":575,"q":"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿cuál de los siguientes NO es un órgano de dirección encargado del gobierno y gestión de las OSI de Tipo I y II?","o":{"A":"La Dirección de Personas.","B":"El Consejo Clínico Asistencial.","C":"La Dirección de Atención Integrada.","D":"La Dirección Económico -Financiera."},"c":"B"},{"id":576,"q":"Según el Artículo 7.3 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿quién tiene la competencia para el nombramiento y cese de la persona titular de la Dirección Gerencia?","o":{"A":"El Consejero o la Consejera de Salud.","B":"La Dirección General del Ente Público Osakidetza.","C":"El Consejo de Administración a propuesta de Lehendakaritza.","D":"La Dirección de Personas de la propia OSI."},"c":"B"},{"id":577,"q":"Según los Artículos 7 y 9 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿cuál es un requisito obligatorio para el nombramiento de los cargos de dirección de una OSI?","o":{"A":"Haber pertenecido al Consejo Clínico Asistencial durante al menos dos años.","B":"Superar un examen de oposición específico para gerencia sanitaria.","C":"Previa convocatoria pública donde se acredite titulación, capacidad y experiencia profesional.","D":"Tener la condición de personal estatutario fijo en la categoría de técnico/a superior."},"c":"C"},{"id":578,"q":"Según el Artículo 8.m del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿a qué dirección corresponde \"orientar la gestión desde una visión integradora empoderando la atención primaria\"?","o":{"A":"Dirección de Atención Integrada.","B":"Dirección Gerencia.","C":"Dirección de Enfermería.","D":"Dirección Económico -Financiera."},"c":"B"},{"id":579,"q":"De acuerdo con el Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿con qué ámbito(s) adicional(es) debe coordinar su actividad la Dirección de Atención Integrada, además de con la atención p rimaria y hospitalaria?","o":{"A":"Con el ámbito de Recursos Humanos y con la Universidad.","B":"Con el ámbito comunitario y socio -sanitario.","C":"Únicamente con el sociosanitario.","D":"Con las entidades locales y las empresas privadas de gestión."},"c":"B"},{"id":580,"q":"Según el Artículo 19.1 del Decreto 100/2018 de las organizaciones sanitarias integradas del ente público Osakidetza -Servicio Vasco de Salud, ¿quién ejerce la presidencia del Consejo Clínico Asistencial?","o":{"A":"La persona titular de la Dirección Gerencia.","B":"La persona titular de la Dirección Médica.","C":"La persona titular de la Dirección de Enfermería.","D":"La persona de mayor antigüedad en la vocalía de Atención Primaria."},"c":"B"},{"id":581,"q":"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, son titulares de los derechos y deberes recogidos en esta Declaración:","o":{"A":"Todas las personas que accedan o utilicen las prestaciones y servicios sanitarios que se proporcionan por el sistema sanitario de Euskadi.","B":"Todas las personas nacidas en Euskadi.","C":"Todas las personas empadronadas en Euskadi.","D":"Todas las respuestas anteriores son correctas."},"c":"A"},{"id":582,"q":"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, todos los derechos y obligaciones establecidos son exigibles:","o":{"A":"En relación a todas las acciones de carácter sanitario, incluyendo docencia, que se desarrollen en los centros, servicios o establecimientos sanitarios de titularidad pública o privada o concertados de Euskadi. Las acciones relativas a la investigación biomédica quedan fuera de esta Declaración y se rigen por su normativa específica.","B":"En relación a todas las acciones de carácter sanitario, incluyendo docencia, que se desarrollen en los centros, servicios o establecimientos sanitarios de titularidad pública o concertados que integran el sistema sanitario de Euskadi. Las acciones relativa s a la investigación biomédica quedan fuera de esta Declaración y se rigen por su normativa específica.","C":"En relación a todas las acciones de carácter sanitario, incluyendo investigación y docencia, que se desarrollen en los centros, servicios o establecimientos sanitarios de titularidad pública o privada o concertados de Euskadi.","D":"En relación a todas las acciones de carácter sanitario, incluyendo investigación y docencia, que se desarrollen en los centros, servicios o establecimientos sanitarios de titularidad pública o concertados que integran el sistema sanitario de Euskadi."},"c":"D/C"},{"id":583,"q":"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, los principios que informan e inspiran el conjunto de acciones de carácter sanitario que se desarro llen en el sistema sanitario de Euskadi son:","o":{"A":"El respeto a la libertad de la persona, a su dignidad y a la autonomía en las decisiones que afecten a su salud.","B":"El respeto a todo el personal profesional que integra el sistema sanitario de Euskadi.","C":"La promoción de la investigación científica en el marco del sistema sanitario de Euskadi.","D":"Todas las respuestas anteriores son correctas."},"c":"A"},{"id":584,"q":"A los efectos de la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi recogida en el Decreto 147/2015, de 21 de julio, se configuran las siguientes fases de la vida en las que se concretan necesidades específicas:","o":{"A":"1. Neonatología, infancia y adolescencia. 2. Salud sexual y reproductiva, embarazo y parto. 3. Salud laboral. 4. Personas mayores y final de la vida.","B":"1. Infancia y adolescencia. 2. Salud sexual y reproductiva. 3. Salud laboral. 4. Personas mayores.","C":"1. Infancia. 2. Adolescencia, salud sexual y reproductiva. 3. Personas mayores. 4. Final de la vida.","D":"1. Infancia y adolescencia. 2. Salud sexual y reproductiva. 3. Personas mayores. 4. Final de la vida."},"c":"D"},{"id":585,"q":"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, las personas pacientes y usuarias del Sistema Sanitario de Euskadi, en relación con la asistencia s anitaria específica referida al final de la vida, tienen derecho a:","o":{"A":"Al acompañamiento de familiares y personas allegadas en los procesos con hospitalización.","B":"Al uso, con carácter general, de habitación individual.","C":"Al acompañamiento espiritual.","D":"Todas las respuestas anteriores son correctas."},"c":"D"},{"id":586,"q":"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, la persona paciente o usuaria:","o":{"A":"Debe dejar por escrito las decisiones cuando sea legalmente exigible o recomendable.","B":"Debe dejar por escrito las decisiones cuando se lo solicite el personal profesional que le atienda.","C":"Debe dejar por escrito las decisiones cuando la política del centro sanitario así lo establezca.","D":"Debe dejar por escrito las decisiones cuando puedan tener relevancia a efectos de responsabilidad legal."},"c":"A"},{"id":587,"q":"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, los Servicios de Atención a Pacientes y personas Usuarias:","o":{"A":"Estarán disponibles en las Organizaciones de Servicios Sanitarios de Osakidetza - Servicio Vasco de Salud, los centros sanitarios concertados, los centros privados y el departamento competente en materia de sanidad.","B":"Estarán disponibles en las Organizaciones de Servicios Sanitarios de Osakidetza - Servicio Vasco de Salud, los centros sanitarios concertados y el departamento competente en materia de sanidad, pero no existe previsión en relación con los centros privados.","C":"Estarán disponibles en las Organizaciones de Servicios Sanitarios de Osakidetza - Servicio Vasco de Salud, pero no existe previsión en relación con los centros concertados, ni con los privados ni con el departamento competente en materia de sanidad.","D":"Estarán disponibles en las Organizaciones de Servicios Sanitarios de Osakidetza - Servicio Vasco de Salud y en los centros sanitarios concertados y privados, pero no existe previsión en relación con el departamento competente en materia de sanidad."},"c":"B"},{"id":588,"q":"Según el Decreto 147/2015, de 21 de julio, por el que se aprueba la Declaración sobre Derechos y Deberes de las personas en el sistema sanitario de Euskadi, las reclamaciones contra actuaciones del personal:","o":{"A":"Se resolverán atendiendo a las normas disciplinarias específicas previa apertura, en su caso, del expediente informativo correspondiente, sin perjuicio de las responsabilidades que de los hechos pudieran derivarse.","B":"Se resolverán atendiendo a las normas disciplinarias generales previa apertura, en su caso, del expediente informativo correspondiente, sin perjuicio de las responsabilidades que de los hechos pudieran derivarse.","C":"Se resolverán atendiendo a las normas disciplinarias específicas previa apertura, en su caso, del expediente informativo y de expediente de mediación, sin perjuicio de las responsabilidades que de los hechos pudieran derivarse.","D":"Se resolverán atendiendo a las normas disciplinarias generales previa apertura, en su caso, del expediente informativo y de expediente de mediación, sin perjuicio de las responsabilidades que de los hechos pudieran derivarse."},"c":"A"},{"id":589,"q":"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, la documentación clínica es:","o":{"A":"La información contenida en la historia clínica.","B":"El soporte de cualquier tipo o clase que contiene un conjunto de datos e informaciones de carácter asistencial y la documentación relativa a las voluntades anticipadas.","C":"El soporte de cualquier tipo o clase que contiene un conjunto de datos e informaciones de carácter asistencial y de investigación biomédica.","D":"El soporte de cualquier tipo o clase que contiene un conjunto de datos e informaciones de carácter asistencial."},"c":"D"},{"id":590,"q":"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, la información asistencial:","o":{"A":"Como regla general se proporcionará verbalmente.","B":"Como regla general se proporcionará por escrito.","C":"Como regla general se proporcionará verbalmente y por escrito.","D":"Como regla general se proporcionará por escrito cuando se trate de pacientes menores de edad."},"c":"A"},{"id":591,"q":"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, la información asistencial contiene, como mínimo:","o":{"A":"La finalidad y la naturaleza de cada intervención.","B":"La finalidad y la naturaleza de cada intervención y sus riesgos.","C":"La finalidad y la naturaleza de cada intervención, sus riesgos y sus consecuencias.","D":"La finalidad y la naturaleza de cada intervención, sus riesgos, sus consecuencias y los derechos de las personas pacientes."},"c":"C"},{"id":592,"q":"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, garantiza el cumplimiento del derecho a la información asistencial:","o":{"A":"La persona facultativa responsable de la persona paciente","B":"La persona facultativa responsable de la persona paciente y el personal profesional que le atienda durante el proceso asistencial o le aplique una técnica o un procedimiento concreto.","C":"La persona facultativa responsable de la persona paciente y el personal de enfermería.","D":"El centro sanitario."},"c":"B"},{"id":593,"q":"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, la persona titular del derecho a la información asistencial es:","o":{"A":"La persona paciente. También serán informadas las personas vinculadas a ella, por razones familiares o de hecho, en la medida que la persona paciente lo permita de manera expresa o tácita.","B":"La persona paciente. También serán informadas las personas vinculadas a ella, por razones familiares o de hecho, en la medida que la persona paciente lo permita de manera expresa.","C":"La persona paciente. También serán informadas las personas vinculadas a ella, por razones familiares o de hecho, en la medida que la persona paciente lo permita por escrito.","D":"La persona paciente. También serán informadas las personas vinculadas a ella, por razones familiares o de hecho."},"c":"A"},{"id":594,"q":"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, cuando existe riesgo inmediato grave para la integridad física o psíquica de la persona enferma y no es posible conseguir su autorización:","o":{"A":"El personal facultativo podrá llevar a cabo las intervenciones clínicas indispensables en favor de la salud de la persona paciente, con el consentimiento de sus familiares.","B":"El personal facultativo podrá llevar a cabo las intervenciones clínicas indispensables en favor de la salud de la persona paciente, con el consentimiento de quien ostente la representación legal.","C":"El personal facultativo podrá llevar a cabo las intervenciones clínicas indispensables en favor de la salud de la persona paciente, con autorización judicial.","D":"El personal facultativo podrá llevar a cabo las intervenciones clínicas indispensables en favor de la salud de la persona paciente, sin necesidad de contar con su consentimiento."},"c":"D"},{"id":595,"q":"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, el personal facultativo proporcionará a la persona paciente, antes de recabar s u consentimiento escrito, la información básica siguiente:","o":{"A":"Todos los riesgos en condiciones normales, conforme a la experiencia y al estado de la ciencia o directamente relacionados con el tipo de intervención.","B":"Todos los riesgos, siempre que sean graves, en condiciones normales, conforme a la experiencia y al estado de la ciencia o directamente relacionados con el tipo de intervención.","C":"Todos los riesgos probables en condiciones normales, conforme a la experiencia y al estado de la ciencia o directamente relacionados con el tipo de intervención.","D":"Todos los riesgos, siempre que sean probables y graves, en condiciones normales, conforme a la experiencia y al estado de la ciencia o directamente relacionados con el tipo de intervención."},"c":"C"},{"id":596,"q":"Según dispone la Ley 41/2002, de 14 de noviembre, básica reguladora de la autonomía del paciente y de derechos y obligaciones en materia de información y documentación clínica, en caso de que la persona paciente no acepte el alta:","o":{"A":"El personal facultativo, previa comprobación del informe clínico correspondiente, oirá a la persona paciente y, si persiste en su negativa, lo pondrá en conocimiento de la dirección del centro para que confirme o revoque la decisión.","B":"El personal facultativo, previa comprobación del informe clínico correspondiente, oirá a la persona paciente y, si persiste en su negativa, lo pondrá en conocimiento de la autoridad judicial para que confirme o revoque la decisión.","C":"La dirección del centro, previa comprobación del informe clínico correspondiente, oirá a la persona paciente y, si persiste en su negativa, lo pondrá en conocimiento de la autoridad judicial para que confirme o revoque la decisión.","D":"La dirección del centro, previa comprobación del informe clínico correspondiente, oirá a la persona paciente y, si persiste en su negativa, lo pondrá en conocimiento de la autoridad administrativa competente para que confirme o revoque la decisión."},"c":"C"},{"id":597,"q":"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, la expresión de los objetivos vitales y valores personales tiene como fin:","o":{"A":"Conocer la voluntad de la persona paciente en relación con la administración de sedación.","B":"Conocer la voluntad de la persona paciente en relación con la finalización de tratamientos de soporte vital.","C":"Ayudar a interpretar las instrucciones y servir de orientación para la toma de decisiones clínicas.","D":"Documentar la actuación del personal profesional sanitario a efectos de responsabilidad legal en situaciones donde la persona paciente no puede expresar su voluntad por sí misma."},"c":"C"},{"id":598,"q":"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, en el documento de voluntades anticipadas:","o":{"A":"Se podrá designar una o varias personas representantes para que sean las interlocutoras válidas del personal facultativo o del equipo sanitario.","B":"Se podrá designar exclusivamente una persona representante para que sea la interlocutora válida del personal facultativo o del equipo sanitario.","C":"Se podrá designar una o varias personas representantes para que sean las interlocutoras válidas del personal facultativo o del equipo sanitario, si la persona paciente es menor de edad.","D":"Se podrá designar una o varias personas representantes para que sean las interlocutoras válidas del personal facultativo o del equipo sanitario y facultarles para interpretar sus valores e instrucciones, si la persona paciente está incapacitada judicialmen te."},"c":"A"},{"id":599,"q":"Según la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, si el nombramiento de representante en el documento de instrucciones previas ha recaído en favor de la persona cónyuge o pareja de hecho de la persona otorga nte:","o":{"A":"Se extingue a partir, bien de la interposición de la demanda de nulidad, separación matrimonial o divorcio, bien de la extinción formalizada de la pareja de hecho o unión libre. Para el mantenimiento de la designación será necesario, en caso de nulidad, se paración matrimonial o divorcio, que conste expresamente en la resolución judicial dictada al efecto.","B":"Se extingue a partir bien de la nulidad, separación matrimonial o divorcio, bien de la extinción formalizada de la pareja de hecho o unión libre. Para el mantenimiento de la designación será necesario, en caso de nulidad, separación matrimonial o divorcio, que conste expresamente en la resolución judicial dictada al efecto.","C":"Se extingue a partir, bien de la interposición de la demanda de nulidad, separación matrimonial o divorcio, bien de la extinción formalizada de la pareja de hecho o unión libre. Para el mantenimiento de la designación será necesario, en caso de nulidad, se paración matrimonial o divorcio, que conste expresamente en el documento de instrucciones previas.","D":"Se extingue bien a partir de la nulidad, separación matrimonial o divorcio, bien de la extinción formalizada de la pareja de hecho o unión libre. Para el mantenimiento de la designación será necesario, en caso de nulidad, separación matrimonial o divorcio, que conste expresamente en el documento de instrucciones previas."},"c":"A"},{"id":600,"q":"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, las instrucciones sobre el tratamiento pueden referirse:","o":{"A":"A una enfermedad o lesión que la persona otorgante ya padece o a las que eventualmente podría padecer en un futuro.","B":"Exclusivamente a una enfermedad o lesión que la persona otorgante ya padece.","C":"Exclusivamente a una enfermedad o lesión que la persona otorgante eventualmente podría padecer en un futuro","D":"Exclusivamente a una enfermedad o lesión que la persona otorgante eventualmente podría padecer en un futuro, siempre que sea de carácter grave."},"c":"A"},{"id":601,"q":"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, el documento de voluntades anticipadas:","o":{"A":"Se formaliza por escrito y mediante uno de los siguientes procedimientos a elección de la persona que lo otorga: ante una notaría; ante la persona funcionaria o empleada pública encargada del Registro Vasco de Voluntades Anticipadas; o ante dos testigos.","B":"Se formaliza por escrito y mediante uno de los siguientes procedimientos a elección de la persona que lo otorga: ante una notaría; ante la persona funcionaria o empleada pública encargada del Registro Vasco de Voluntades Anticipadas; o ante tres testigos.","C":"Se formaliza por escrito y mediante uno de los siguientes procedimientos a elección de la persona que lo otorga: ante una notaría; ante la persona funcionaria o empleada pública encargada del Registro Vasco de Voluntades Anticipadas o del servicio de documentación de un centro sanitario de la Comunidad Autónoma del País Vasco; o ante dos testigos.","D":"Se formaliza por escrito y mediante uno de los siguientes procedimientos a elección de la persona que lo otorga: ante una notaría; ante la persona funcionaria o empleada pública encargada del Registro Vasco de Voluntades Anticipadas o del servicio de docum entación de un centro sanitario de la Comunidad Autónoma del País Vasco; o ante tres testigos."},"c":"B"},{"id":602,"q":"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, el documento de voluntades anticipadas puede ser modificado, sustituido por otro o revocado en cualquier momento por la persona otorgante:","o":{"A":"Siempre que conserve la capacidad o actúe con la asistencia de su representante legal y actúe libremente.","B":"Siempre que conserve la capacidad o exista autorización judicial.","C":"Siempre que actúe libremente.","D":"Siempre que conserve la capacidad y actúe libremente."},"c":"D"},{"id":603,"q":"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, la voluntad de la persona prevalece sobre las instrucciones contenidas en el documento de voluntades anticipadas ante cualquier intervención clínica siempre que:","o":{"A":"La persona otorgante conserve su capacidad y su libertad de actuación.","B":"La persona otorgante conserve su capacidad, su libertad de actuación y la posibilidad de expresarse.","C":"La persona otorgante conserve su capacidad, su libertad de actuación y la posibilidad de expresarse de manera inequívoca.","D":"La persona otorgante conserve su capacidad, su libertad de actuación y la posibilidad de expresarse de manera inequívoca o a través de la persona interlocutora designada al efecto."},"c":"B"},{"id":604,"q":"Según dispone la Ley 7/2002, de 12 de diciembre, de las voluntades anticipadas en el ámbito de la sanidad, en el documento de voluntades anticipadas se tendrán por no puestas:","o":{"A":"Las instrucciones que en el momento de ser aplicadas resulten contrarias al ordenamiento jurídico.","B":"Las instrucciones que en el momento de ser otorgadas resulten contrarias al ordenamiento jurídico.","C":"Las respuestas a ) y b) son correctas.","D":"Las instrucciones que en el momento de ser aplicadas no se aprueben por el comité de ética del centro."},"c":"A"},{"id":605,"q":"Según dispone la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, podrán tener acceso a los datos personales de las personas fallecidas:","o":{"A":"Las personas vinculadas a la persona fallecida por razones familiares o de hecho así como quienes ostenten la condición de herederas, en todo caso.","B":"Solo las personas vinculadas a la persona fallecida por razones familiares siempre que lo hubiera autorizado expresamente la persona fallecida.","C":"Las personas vinculadas a la persona fallecida por razones familiares o de hecho así como quienes ostenten la condición de herederas, salvo que la persona fallecida lo hubiese prohibido expresamente.","D":"En caso de que la persona fallecida fuera menor de edad, el acceso podrá ejercerse también por sus representantes legales o por el Ministerio Fiscal que siempre actuará de oficio."},"c":"C"},{"id":606,"q":"Señale la respuesta que no es correcta. Según la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales a efectos del tratamiento de los datos, el consentimiento de la persona afectada tiene que ser u na manifestación de voluntad que cumpla las siguientes características:","o":{"A":"Libre.","B":"Verbal.","C":"Específica.","D":"Informada."},"c":"B"},{"id":607,"q":"Con relación al tratamiento de los datos personales de una persona menor de edad, señale la respuesta correcta:","o":{"A":"Únicamente podrá fundarse en su consentimiento cuando sea mayor de dieciséis años.","B":"La Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales no prevé que las personas menores de edad puedan dar su consentimiento válidamente a estos efectos.","C":"Únicamente podrá fundarse en su consentimiento cuando sea mayor de catorce años.","D":"El tratamiento de los datos de las personas menores de dieciséis años, fundado en el consentimiento, solo será lícito si consta el consentimiento de quienes ejercen la patria potestad o tutela, con el alcance que dichas personas determinen."},"c":"C"},{"id":608,"q":"La Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, en su artículo 9 considera categorías especiales de datos aquellos que permitan, respecto a la persona afectada, identificar:","o":{"A":"Su ideología y afiliación sindical.","B":"Su religión y orientación sexual .","C":"Sus creencias u origen racial o étnico.","D":"Todas las respuestas son correctas."},"c":"D"},{"id":609,"q":"La Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales establece que el tratamiento de datos de naturaleza penal podrá llevarse a cabo:","o":{"A":"Solo por profesionales de la abogacía y cuando tengan por objeto recoger la información facilitada por quienes les contraten para el ejercicio de sus funciones.","B":"Por profesionales de la abogacía y de la procura, cuando tengan por objeto recoger la información facilitada por quienes les contraten para el ejercicio de sus funciones.","C":"En los casos previstos por la propia Ley Orgánica 3/2018 y en otras normas de rango reglamentario.","D":"Exclusivamente en los supuestos amparados en una norma de Derecho de la Unión y en la propia Ley Orgánica 2/2018."},"c":"B"},{"id":610,"q":"Respecto al derecho de rectificación que regula la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, señale la respuesta correcta:","o":{"A":"La persona afectada deberá indicar en su solicitud a qué datos se refiere y deberá acompañar, en todo caso, la documentación justificativa de la inexactitud de los datos.","B":"La persona afectada deberá indicar en su solicitud a qué datos se refiere y la corrección que haya de realizarse, y cuando sea preciso, deberá acompañar la documentación justificativa de la inexactitud o carácter incompleto de los datos objeto de tratamien to.","C":"La persona afectada deberá indicar en su solicitud solo la corrección que haya de realizarse y debe siempre acompañar la documentación justificativa de la inexactitud de los datos.","D":"No es necesario que la persona afectada indique expresamente en su solicitud qué datos deben rectificarse."},"c":"B"},{"id":611,"q":"Con relación al tratamiento de datos con fines de videovigilancia, señale la respuesta correcta:","o":{"A":"Solo las personas físicas podrán llevar a cabo el tratamiento de imágenes a través de sistemas de cámaras o videocámaras con la finalidad de preservar la seguridad de las personas y bienes, así como sus instalaciones.","B":"Los datos serán suprimidos, en todo caso, en el plazo máximo de un mes desde su captación.","C":"Los datos serán suprimidos en el plazo máximo de un mes desde su captación, salvo cuando hubieran de ser conservados para acreditar la comisión de actos que atenten contra la integridad de personas, bienes o instalaciones.","D":"En el caso de que los datos hubieran de ser conservados más allá del plazo de un mes desde su captación para acreditar la comisión de actos que atenten contra la integridad de personas, bienes o instalaciones, deberán ser puestas a disposición de la autori dad competente en un plazo máximo de cuarenta y ocho horas desde que se tuviera conocimiento de la existencia de la grabación."},"c":"C"},{"id":612,"q":"Respecto a los sistemas de información de denuncias internas que contempla la Ley Orgánica 3/2018, de 5 de diciembre, de Protección de Datos Personales y garantía de los derechos digitales, es correcta la siguiente afirmación:","o":{"A":"En todo caso, transcurridos tres meses desde la introducción de los datos, deberá procederse a su supresión del sistema de denuncias, salvo que la finalidad de la conservación sea dejar evidencia del funcionamiento del modelo de prevención de la comisión d e delitos.","B":"En todo caso, transcurridos seis meses desde la introducción de los datos, deberá procederse a su supresión del sistema de denuncias, salvo que la finalidad de la conservación sea dejar evidencia del funcionamiento del modelo de prevención de la comisión d e delitos.","C":"En todo caso, y sin excepción, transcurridos seis meses desde la introducción de los datos, deberá procederse a su supresión del sistema de denuncias.","D":"La Ley no prevé plazo temporal alguno para la supresión de los datos del sistema de denuncias."},"c":"A/D"},{"id":613,"q":"El artículo 1 del Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, añade un concepto específico al objeto de la ley que refuerza el fin último de la norma, ¿cuál es?","o":{"A":"La igualdad de oportunidades.","B":"El empoderamiento de las mujeres.","C":"Lograr una sociedad libre de violencia machista.","D":"La eliminación de roles tradicionales."},"c":"C"},{"id":614,"q":"Según el artículo 2 del Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, ¿a qué entidades privadas les es exigible el cumplimiento de los principios generales de esta ley durante su relación con la administración?","o":{"A":"Solo a las que tengan una plantilla superior a 250 personas.","B":"A todas las empresas con sede en Euskadi.","C":"A las que suscriban contratos o convenios, estén participadas por poderes públicos o sean beneficiarias de ayudas.","D":"Ninguna entidad privada está sujeta a los principios de la ley."},"c":"C"},{"id":615,"q":"Según el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, ¿cuál de estos es un principio general de actuación de lo s poderes públicos vascos incorporado en la nueva redacción del artículo 3?","o":{"A":"El principio de jerarquía administrativa.","B":"La integración de la perspectiva interseccional.","C":"El principio de celeridad procesal.","D":"La centralización de recursos de acogida."},"c":"B"},{"id":616,"q":"Según el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, respecto al principio de representación equilibrada, ¿en qué caso se permite excepcionalmente una presencia de mujeres superior al 60%?","o":{"A":"En ningún caso.","B":"Solo si no hay hombres capacitados en el sector.","C":"Cuando sea acorde al objetivo de corregir la histórica situación de infrarrepresentación de las mujeres.","D":"Si el órgano tiene menos de cuatro integrantes."},"c":"C"},{"id":617,"q":"Según el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, ¿qué planes específicos deben someterse ahora, obligatori amente, a una evaluación previa de impacto en función del género?","o":{"A":"Solo los planes de formación interna.","B":"Los planes territoriales y urbanísticos.","C":"Los planes de marketing de empresas públicas.","D":"Ningún plan, solo los proyectos de ley."},"c":"B"},{"id":618,"q":"Según el Decreto Legislativo 1/2023, de 16 de marzo, por el que se aprueba el texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, ¿qué requisito nuevo deben cumplir las empresas de más de 50 personas trabajadoras para poder recibir subvenciones públicas?","o":{"A":"Tener paridad total en su directiva.","B":"Acreditar haber establecido medidas para prevenir y combatir el acoso sexual y las violencias sexuales.","C":"Tener un departamento exclusivo de igualdad.","D":"Estar inscritas en un registro internacional de igualdad."},"c":"B"},{"id":619,"q":"De acuerdo con lo establecido en el artículo 54 del texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, aprobado por el Decreto Legislativo 1/2023, de 16 de marzo, ¿cómo se define la \"vio lencia machista contra las mujeres\"?","o":{"A":"Solo la violencia física en el hogar.","B":"Una violación de los derechos humanos y un problema de salud pública de primer orden.","C":"Únicamente los delitos contra la libertad sexual.","D":"Un conflicto de convivencia familiar."},"c":"B"},{"id":620,"q":"De acuerdo con lo establecido en el artículo 54.3 del texto refundido de la Ley para la Igualdad de Mujeres y Hombres y Vidas Libres de Violencia Machista contra las Mujeres, aprobado por el Decreto Legislativo 1/2023, de 16 de marzo, ¿qué formas de violen cia se incorporan como casos constitutivos de violencia machista por estar específicamente recogidos en dicho apartado?","o":{"A":"Solo la violencia física y psicológica.","B":"La violencia obstétrica, la política de género y la violencia digital.","C":"Únicamente el acoso laboral.","D":"No se detallan formas, se remite al Código Penal."},"c":"B"},{"id":621,"q":"¿Cuántos Objetivos Generales, clasificados como finalistas e instrumentales, se definen en la estructura del Plan de Salud Euskadi 2030?","o":{"A":"Cinco Objetivos Generales.","B":"Seis Objetivos Generales.","C":"Siete Objetivos Generales.","D":"Ocho Objetivos Generales."},"c":"C"},{"id":622,"q":"Según el Plan de Salud Euskadi 2030, la VISIÓN que se aspira a lograr como país es:","o":{"A":"Convertirnos en el sistema de salud pública más sólido y resiliente de Europa.","B":"Liderar una Euskadi más saludable.","C":"Reducir la morbimortalidad evitable y disminuir las desigualdades en salud antes de 2030.","D":"Lograr la sostenibilidad y excelencia en los sistemas asistenciales sanitarios y sociosanitarios."},"c":"B"},{"id":623,"q":"¿Cuál de los siguientes NO es un principio rector en los que se apoya el Plan de Salud Euskadi 2030?","o":{"A":"La necesaria coordinación y colaboración interinstitucional, entre agentes y en todos los niveles.","B":"Enfoque de Salud en Todas las Políticas y 'Una Sola Salud' ('One Health').","C":"La autosuficiencia presupuestaria del Sistema Sanitario Público.","D":"Contribución al Desarrollo Sostenible."},"c":"C"},{"id":624,"q":"El Objetivo General 1 (OG1) del Plan de Salud Euskadi 2030 se enfoca en:","o":{"A":"Promover la salud de las mujeres y la salud reproductiva en la edad adulta.","B":"Lograr que niñas, niños y adolescentes nazcan, crezcan y se desarrollen con todo su potencial de salud.","C":"Mejorar la salud mental y reducir la morbimortalidad asociada a trastornos mentales.","D":"La prevención y el control de las enfermedades no transmisibles (ENT)."},"c":"B"},{"id":625,"q":"El Objetivo General 4 (OG4) del Plan de Salud Euskadi 2030 se define como “lograr la sostenibilidad y excelencia en los sistemas asistenciales sanitarios y sociosanitarios de Euskadi”, ¿en términos de qué tres conceptos clave?","o":{"A":"Eficiencia, accesibilidad e innovación.","B":"Calidad, humanización y seguridad.","C":"Equidad, intersectorialidad y coordinación.","D":"Investigación, formación y evaluación."},"c":"B"},{"id":626,"q":"¿A qué hace referencia el acrónimo AVAD en el Plan de Salud Euskadi 2030?","o":{"A":"Áreas de Valoración de la Atención al Dependiente.","B":"Años de Vida Activa Desaprovechados.","C":"Atención Vasca a la Adicción a Drogas.","D":"Años de Vida sana perdidos Ajustados por Discapacidad."},"c":"D"},{"id":627,"q":"¿Cuál es uno de los objetivos clave del Plan de Salud Euskadi 2030, reiterado en varias secciones, respecto a la equidad y la gestión de la enfermedad?","o":{"A":"Garantizar la participación de la empresa privada en la gestión de servicios hospitalarios.","B":"Aumentar la esperanza de vida en 5 años en todos los colectivos sociales.","C":"Reducir la morbimortalidad evitable y disminuir las desigualdades en salud.","D":"Implementar un programa de cribado universal para todos los tipos de cáncer."},"c":"C"},{"id":628,"q":"¿Qué enfoque de investigación prioriza el Plan de Salud Euskadi 2030 para asegurar que los avances científicos lleguen de forma efectiva a la práctica clínica y la salud de la población?","o":{"A":"Enfoque de investigación básica y fundamental.","B":"Enfoque de investigación traslacional.","C":"Enfoque de investigación puramente epidemiológica.","D":"Enfoque de investigación competitiva internacional."},"c":"B"},{"id":629,"q":"Según el modelo de evaluación del Plan de Salud Euskadi 2030, ¿cuáles son los cuatro criterios fundamentales para determinar el éxito de las intervenciones?","o":{"A":"Impacto, cobertura, equidad y transparencia.","B":"Relevancia, efectividad, eficiencia y sostenibilidad.","C":"Rentabilidad, participación, innovación y prestigio.","D":"Calidad, calidez, rapidez y ahorro presupuestario."},"c":"B"},{"id":630,"q":"En la lucha contra las desigualdades, ¿qué tipo de soluciones habitacionales promueve el Plan de Salud Euskadi 2030 para las diferentes etapas de la vida?","o":{"A":"Construcción de viviendas de protección oficial exclusivamente rurales.","B":"Soluciones habitacionales asequibles, accesibles y adaptadas al ciclo vital.","C":"Ayudas directas al alquiler únicamente para personas menores de 30 años","D":"Fomento de grandes centros residenciales para todas las personas con enfermedades crónicas."},"c":"B"},{"id":631,"q":"Según la comparativa de la Memoria Económica del Plan de Salud Euskadi 2030, ¿cuál es el programa presupuestario (fuera del gasto general de Osakidetza) con mayor dotación?","o":{"A":"Programa de Salud Pública.","B":"Programa de Farmacia.","C":"Programa de Adicciones.","D":"Programa de Investigación y Planificación."},"c":"B"},{"id":632,"q":"El Plan de Salud Euskadi 2030 busca lograr \"comunidades amigables\" para las personas mayores. ¿Cuál es la finalidad última de esta estrategia?","o":{"A":"Segregar los espacios públicos por franjas de edad.","B":"Adaptar el entorno físico y social para fomentar un envejecimiento activo y con sentido.","C":"Aumentar el número de plazas en residencias geriátricas de alta especialización.","D":"Limitar el acceso de vehículos a las zonas cercanas a los centros de salud."},"c":"B"},{"id":633,"q":"En el ámbito de la salud digital, ¿qué concepto destaca el Plan de Salud Euskadi 2030 para transformar la atención personalizada?","o":{"A":"La teleasistencia robótica obligatoria en todos los domicilios.","B":"La medicina de precisión y la integración de datos genómicos.","C":"La eliminación definitiva de la historia clínica en papel en favor del PDF.","D":"La creación de una red social exclusiva para pacientes crónicos/as."},"c":"B"},{"id":634,"q":"¿Cómo define el Plan de Salud Euskadi 2030 el concepto de \"Intersectorialidad\" en la gestión de la salud?","o":{"A":"La competencia entre diferentes sectores para obtener fondos públicos.","B":"La colaboración entre departamentos del Gobierno para que la salud esté en todas las políticas.","C":"La privatización de sectores sanitarios no críticos.","D":"La creación de un único departamento que gestione salud, educación y vivienda."},"c":"B"},{"id":635,"q":"¿Cuál es la visión del Plan de Salud Euskadi 2030 sobre el uso de la evidencia científica en la toma de decisiones políticas?","o":{"A":"Es un elemento opcional supeditado a la oportunidad política.","B":"Es la base fundamental para el diseño, implementación y evaluación de las políticas de salud.","C":"Solo se debe aplicar en casos de alertas sanitarias internacionales.","D":"Se reserva exclusivamente para el ámbito académico, no para el legislativo."},"c":"B"},{"id":636,"q":"Según el análisis del contexto social del documento de Diagnóstico del Pacto Vasco de Salud de Euskadi, ¿qué factor se identifica como un motor clave para que la ciudadanía del siglo XXI demande un papel más activo en su salud?","o":{"A":"El incremento exclusivo de la esperanza de vida al nacer.","B":"El acceso generalizado a la información y un mayor nivel educativo en la CAPV.","C":"La reducción drástica de las listas de espera en consultas externas.","D":"La implementación de la receta electrónica en todas las farmacias."},"c":"B"},{"id":637,"q":"El documento de Diagnóstico del Pacto Vasco de Salud de Euskadi señala que los flujos migratorios actuales en Euskadi:","o":{"A":"No tienen impacto relevante en el perfil epidemiológico de la comunidad.","B":"Revelan patologías anteriormente poco conocidas en nuestro entorno, pero prevalentes en otras latitudes.","C":"Se limitan exclusivamente a personas en edad laboral con excelente estado de salud inicial.","D":"Han provocado la saturación irreversible de los servicios de urgencias hospitalarias."},"c":"B"},{"id":638,"q":"¿Cuál es uno de los principales desafíos identificados en el documento de Diagnóstico del Pacto Vasco de Salud de Euskadi respecto a la formación y relevo del personal sanitario?","o":{"A":"La excesiva oferta de plazas MIR en todas las especialidades médicas.","B":"La falta de interés de las nuevas generaciones por las profesiones biosanitarias.","C":"La necesidad de planificar el relevo ante la jubilación de cohortes numerosas de profesionales.","D":"La prohibición de la formación continua dentro del horario laboral."},"c":"C"},{"id":639,"q":"Sobre el impacto del cambio global y climático, el documento de Diagnóstico del Pacto Vasco de Salud de Euskadi advierte de la aparición de:","o":{"A":"Patologías ligadas exclusivamente al consumo de alimentos ultraprocesados.","B":"Nuevos vectores y virus anteriormente inexistentes en nuestro entorno, como el virus del Nilo.","C":"Una disminución natural de las enfermedades respiratorias debido al aumento de temperaturas.","D":"La erradicación total de las enfermedades infecciosas estacionales."},"c":"B"},{"id":640,"q":"El documento de Diagnóstico del Pacto Vasco de Salud de Euskadi propone que los indicadores sanitarios para evaluar el sistema deben:","o":{"A":"Basarse exclusivamente en mediciones de actividad (número de consultas y cirugías).","B":"Ser confidenciales y accesibles únicamente para la alta dirección del Departamento de Salud.","C":"Ignorar la perspectiva de género para simplificar la toma de datos estadísticos.","D":"Reflejar resultados en salud y sostenibilidad, y no solo volumen de actividad."},"c":"D"},{"id":641,"q":"¿Cuál es la finalidad principal de los Valores Fundamentales del Pacto Vasco de Salud, según el Libro de Valores y principios?","o":{"A":"Ser la base para la elaboración del futuro Plan Estratégico de Osakidetza.","B":"Establecer la estructura financiera y la autonomía de gestión del sistema de salud.","C":"Ser el fundamento ético y social que soporta la actividad del Sistema Público de Salud de Euskadi.","D":"Garantizar la cobertura universal únicamente a la ciudadanía vasca empadronada."},"c":"C"},{"id":642,"q":"¿Cuál de los siguientes es un Valor Fundamental explícito del Pacto Vasco de Salud, además de la Universalidad y la Equidad?","o":{"A":"La Sostenibilidad del sistema.","B":"La Eficiencia en el gasto.","C":"La Corresponsabilidad.","D":"El Plurilingüismo como eje central de la atención."},"c":"C/A"},{"id":643,"q":"El principio de Innovación en el Pacto Vasco de Salud se aplica a:","o":{"A":"Exclusivamente a la aplicación de nuevas tecnologías de imagen médica.","B":"La I+D+i en todas las fases y dimensiones de la salud, incluyendo la organizativa y la asistencial.","C":"La importación de modelos de éxito de otros sistemas sanitarios europeos.","D":"La digitalización de la historia clínica en Osakidetza."},"c":"B"},{"id":644,"q":"En el marco del Pacto Vasco de Salud, dentro de los principios rectores, la \"Orientación al Valor\" significa que el sistema debe priorizar:","o":{"A":"Las intervenciones que generen los mejores resultados relevantes para la persona al menor coste posible.","B":"El valor de mercado de las acciones de las empresas proveedoras de tecnología.","C":"El incremento constante de las infraestructuras físicas sobre la inversión en personal.","D":"La compra masiva de medicamentos de marca sobre los genéricos."},"c":"A"},{"id":645,"q":"¿En qué grandes ámbitos se estructuran las Líneas Estratégicas del Pacto Vasco de Salud?","o":{"A":"Cinco Líneas Estratégicas. prevención y promoción de la salud; atención a la enfermedad; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y Gobernanza.","B":"Seis Líneas Estratégicas: prevención y promoción de la salud; atención a la enfermedad; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y transparencia y participación ciudadana.","C":"Seis Líneas Estratégicas: prevención y promoción de la salud; atención a la enfermedad; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y gobernanza.","D":"Seis Líneas Estratégicas: prevención y promoción de la salud; atención sociosanitaria; áreas prioritarias de salud; calidad, innovación y sostenibilidad; desarrollo de las y los profesionales; y gobernanza."},"c":"C"},{"id":646,"q":"¿Cuál es el papel de la Atención Primaria y Comunitaria dentro de las Líneas Estratégicas del Pacto Vasco de Salud?","o":{"A":"Actuar como un servicio de triaje rápido para derivar todos los casos al hospital.","B":"Ser un
