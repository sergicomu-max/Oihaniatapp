la clasificación del recién nacido según peso para la edad gestacional?","o":{"A":"La clasificación del recién nacido como pequeño para la edad gestacional (PEG), adecuado para la edad gestacional (AEG) o grande para la edad gestacional (GEG) se establece utilizando percentiles, considerando PEG < percentil 5 y GEG > percentil 95.","B":"La clasificación como pequeño para la edad gestacional (PEG), adecuado para la edad gestacional (AEG) o grande para la edad gestacional (GEG) se determina exclusivamente con el perímetro cefálico.","C":"La clasificación como PEG/AEG/GEG se determina en función del peso abs oluto al nacimiento, considerando PEG < 2.500 g y GEG > 4.000 g, independientemente de la edad gestacional.","D":"El recién nacido se clasifica como pequeño para la edad gestacional (PEG) si su peso está por debajo del percentil 10; esta categorización permite anticipar problemas fisiológicos y orientar el plan de cuidados."},"c":"D"},{"id":246,"q":"En el marco de los cuidados generales del recién nacido sano se establecen medidas relacionadas con seguridad y detección precoz antes del alta. ¿Cuál de las siguientes actuaciones es adecuada?","o":{"A":"Verificar la identidad del recién nacido mediante la coincidencia de brazaletes madre -hijo antes de entregarlo a uno de los progenitores.","B":"Administrar la vacuna de hepatitis A y realizar el cribado metabólico solo si existen antecedentes familiares de enfermedades congénitas.","C":"Priorizar la valoración física del recién nacido, dejando los cribados y medidas de seguridad para la primera visita en atención primaria.","D":"Priorizar el alta precoz con recomendaciones de educación sanitaria centradas en cuidados domiciliarios, programando la realización de cribados (audición y metabólico) y la verificación administrativa de identidad en la primera revisión en atención primaria."},"c":"A"},{"id":247,"q":"La dosis profiláctica habitual de vitamina K1 recomendada en el recién nacido es:","o":{"A":"10 mg vía intramuscular en las primeras 24 horas de vida.","B":"0,5-1 mg IM en la primera hora tras el nacimiento.","C":"5 mg vía oral durante 2 días consecutivos.","D":"0,5 mg/kg intravenoso en la primera hora de vida."},"c":"B"},{"id":248,"q":"En relación con las características fisiológicas del recién nacido pretérmino, señale la opción INCORRECTA:","o":{"A":"Presenta inmadurez de la pared torácica y de los músculos respiratorios.","B":"Tiene riesgo de anemia por inmadurez eritrocitaria.","C":"Suele presentar déficit de surfactante pulmonar.","D":"Mantiene un almacenamiento mineral de calcio y glucosa similar al del recién nacido a término."},"c":"D"},{"id":249,"q":"En el cuidado del recién nacido pretérmino con sospecha de enterocolitis necrotizante, la vigilancia clínica por parte de enfermería es fundamental para su detección precoz. ¿Cuál de los siguientes hallazgos clínicos NO es sugestivo de esta patología?","o":{"A":"Presencia de sangre visible u oculta en heces.","B":"Distensión abdominal leve asociada a enlentecimiento del vaciamiento gástrico, sin repercusión sistémica inicial.","C":"Residuo gástrico aumentado con vómitos biliosos.","D":"Distensión abdominal con asas intestinales prominentes."},"c":"B"},{"id":250,"q":"En relación con los cuidados del recién nacido con enfermedad de la membrana hialina, ¿cuál de las siguientes actuaciones enfermeras es prioritaria en el manejo inicial de estos pacientes?","o":{"A":"Administrar oxígeno humidificado y calentado, y mantener temperatura neutra en incubadora.","B":"Iniciar alimentación enteral precoz y monitorizar el equilibrio ácido -base.","C":"Mantener al neonato en ambiente frío (32 -34ºC) para reducir el consumo metabólico.","D":"Evitar la canalización de accesos vasculares para disminuir el riesgo infeccioso."},"c":"A"},{"id":251,"q":"En relación con la valoración enfermera del recién nacido que presenta vómitos, ¿cuál de las siguientes afirmaciones NO es correcta?","o":{"A":"Los vómitos de estos niños pueden asociarse con la ingestión de sangre o moco procedente del canal del parto.","B":"La aparición precoz de vómitos se asocia a obstrucción baja del tubo digestivo.","C":"A menudo, los vómitos se asocian a una sobrealimentación.","D":"Los vómitos pueden ser secundarios a procesos infecciosos locales fuera del tracto digestivo."},"c":"B"},{"id":252,"q":"En relación con la rehidratación intravenosa en un lactante con deshidratación isotónica que presenta signos de hipovolemia, ¿cuál de las siguientes pautas iniciales de sueroterapia es la más adecuada durante la primera hora?","o":{"A":"Suero glucosado al 5% a 10 ml/kg/hora.","B":"Suero salino hipertónico al 3% a 5 ml/kg/hora.","C":"Suero glucosado al 10% a 15 ml/kg/hora.","D":"Suero glucosalino 1/5 a 20 ml/kg/hora."},"c":"D"},{"id":253,"q":"En relación con la valoración clínica del lactante con sospecha de deshidratación leve, ¿cuál de los siguientes conjuntos de signos y síntomas es más compatible con este grado de deshidratación?","o":{"A":"Letargo y fontanelas hundidas.","B":"Mucosas muy secas y taquicardia leve.","C":"Pérdida de peso inferior al 5% y oliguria incipiente.","D":"Orina concentrada y somnolencia."},"c":"C"},{"id":254,"q":"En relación con los cuidados enfermeros dirigidos a la familia y personas cuidadoras de un recién nacido ingresado en la Unidad de Cuidados Intensivos Neonatales, señale la afirmación INCORRECTA:","o":{"A":"Proporcionar información homogénea y comprensible entre los distintos miembros del equipo multidisciplinar.","B":"Mantener una comunicación sincera, incluso cuando el pronóstico sea incierto.","C":"Favorecer el contacto familiar mediante la flexibilización de horarios.","D":"Limitar la información proporcionada a la familia para reducir su ansiedad."},"c":"D"},{"id":255,"q":"En relación con la valoración y los cuidados enfermeros del recién nacido con sospecha de síndrome de aspiración meconial, ¿cuál de los siguientes hallazgos debe alertar prioritariamente a la enfermera sobre la presencia de distrés respiratorio?","o":{"A":"Taquipnea, cianosis y tiraje subcostal.","B":"Bradipnea acompañada de hipotonía y episodios de apnea.","C":"Respiración irregular con respiraciones superficiales.","D":"Bradipnea, aleteo nasal y cianosis."},"c":"A"},{"id":256,"q":"En relación con los cuidados inmediatos del recién nacido prematuro en la sala de partos, ¿cuál de las siguientes actuaciones enfermeras es prioritaria respecto al uso de la incubadora?","o":{"A":"Mantener la temperatura corporal del recién nacido entre 36,7 y 37,2ºC para evitar hipotermia.","B":"Ajustar la temperatura de la incubadora según la edad gestacional y el peso.","C":"Colocar al recién nacido en incubadora con control térmico intermitente.","D":"Ajustar la temperatura de la incubadora entre 25 -29ºC."},"c":"B"},{"id":257,"q":"En relación con la administración de oxígeno en el recién nacido pretérmino durante la reanimación y los cuidados iniciales, ¿cuál de las siguientes actuaciones enfermeras es correcta?","o":{"A":"Administrar oxígeno al 80 -95% para prevenir episodios de hipoxia.","B":"Mantener concentraciones estables de oxígeno durante las primeras horas, ajustándolas solo ante cambios clínicos evidentes.","C":"Administrar oxígeno evitando concentraciones superiores al 40%.","D":"Suspender la administración de oxígeno en cuanto se estabilice la frecuencia respiratoria."},"c":"C"},{"id":258,"q":"Durante la monitorización de un recién nacido pretérmino ingresado en la Unidad de Cuidados Intensivos Neonatales, la enfermera observa episodios recurrentes de apnea sin causa orgánica aparente. En relación con la apnea idiopática del prematuro, ¿cuál de los siguientes hallazgos es más característico de este cuadro clínico?","o":{"A":"Pausas respiratorias asociadas a inestabilidad laríngea.","B":"Episodios de hipoventilación asociados a inmadurez del control respiratorio.","C":"Episodios de apnea exclusivamente durante el llanto.","D":"Apnea asociada a estridor espiratorio persistente."},"c":"B/A"},{"id":259,"q":"¿Cuál de las siguientes afirmaciones NO describe correctamente las convulsiones en el período neonatal?","o":{"A":"Pueden pasar desapercibidas por su presentación poco definida.","B":"Pueden corresponder a crisis ocasionales secundarias a agresiones agudas del sistema nervioso central.","C":"Suelen manifestarse mediante patrones motores claros y reconocibles.","D":"Pueden ser indicativas de disfunción del sistema nervioso central."},"c":"C"},{"id":260,"q":"Las epilepsias y síndromes epilépticos en el período neonatal pueden manifestarse fundamentalmente de dos formas. ¿Cuál de las siguientes opciones recoge correctamente su clasificación?","o":{"A":"Epilepsias reflejas y epilepsias metabólicas.","B":"Epilepsias ocasionales y verdaderas epilepsias.","C":"Epilepsias transitorias y epilepsias adaptativas.","D":"Epilepsias funcionales y epilepsias madurativas."},"c":"B/D"},{"id":261,"q":"Según las recomendaciones recogidas en el Programa de Salud Infantil de Osakidetza sobre seguridad vial , ¿cuál de las siguientes medidas es la más adecuada para reducir lesiones graves en un niño o una niña como pasajero/a?","o":{"A":"Usar un sistema de retención infantil (SRI) con arnés orientado hacia delante desde que no caben en el SRI a contramarcha hast a por lo menos los 6 años.","B":"Utilizar un sistema de retención infantil homologado, pudiendo utilizar el cinturón de seguridad de adulto en trayectos cortos.","C":"Utilizar cinturón de seguridad de tres puntos cuando ya no quepa en el sistema de retención infantil.","D":"Todos los menores de 15 años deben viajar en los asientos traseros."},"c":"C/A"},{"id":262,"q":"En relación con las recomendaciones de prevención de accidentes y lesiones en la infancia, ¿cuál de las siguientes opciones agrupa medidas preventivas correctas en el hogar y en la vía pública?","o":{"A":"Girar los mangos de las ollas lejos del borde y tener precaución al cocinar con niños alrededor; asegura r el uso de casco en bicicleta/patinete y enseñar seguridad vial.","B":"Enseñar a los niños a compartir y controlar su temperamento; enseñar a evitar animales que no conocen; y evitar el uso de puertas en escalones y escaleras.","C":"Mantener cerillas y mecheros fuera del alcance de los niños; incentivar el uso de andadores para bebes; y asegurar el uso del casco al andar en bicicleta/patinete.","D":"Girar los mangos de las ollas hacia el borde para facilitar el manejo; evitar el transporte de preescolare s en vehículos todo terreno; y enseñar a los niños a evitar los animales que no conocen."},"c":"A"},{"id":263,"q":"El Programa de Salud Infantil de Osakidetza 2021 contempla un total de 15 visitas programadas. De ellas, dos se realizan exclusivamente con finalidad vacunal. ¿A qué edades están establecidas dichas visitas?","o":{"A":"4 meses y 6 meses.","B":"12 meses y 12 años.","C":"12 meses y 15 meses.","D":"6 meses y 13 años."},"c":"B/D"},{"id":264,"q":"Según el Programa de Salud Infantil de Osakidetza 2021, ¿a qué edad se recomienda una visita con enfermería para el cribado de obesidad?","o":{"A":"Entre los 6 –8 años, coincidiendo con la incorporación a la Educación Primaria y el inicio de cambios en los hábitos alimentarios.","B":"Entre los 4 -6 años, ya que en ese periodo se produce el rebote adiposo.","C":"Entre los 6 y 10 años, dado que en esa edad se observa un riesgo elevado.","D":"A los 12 años, aprovechando la visita de vacunación para evaluar el IMC y orientar medidas preventivas frente al aumento ponderal puberal."},"c":"C/B"},{"id":265,"q":"Según el Programa de Salud Infantil de Osakidetza 2021, respecto a la salud bucodental en menores de 2 años, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Se considerará anormal la falta de erupción de la primera pieza a los 11 meses y la erupción de dientes malformados.","B":"Solamente si se pertenece a un grupo de riesgo de caries dental se darán suplementos de flúor por vía oral a partir de los 6 meses.","C":"En niños menores de 2 años el cepillado deben realizarlo los padres, con una pasta de dientes con 1200 ppm de flúor.","D":"No se considera necesario el cepillado dental hasta la erupción de todas las piezas dentarias temporales."},"c":"B/A"},{"id":266,"q":"¿Cuál de las siguientes opciones incluye factores de riesgo de maltrato infantil relacionados con el menor de edad?","o":{"A":"Separación o divorcio gravemente conflictivo.","B":"Inteligencia del menor superior a la media.","C":"Alta conflictividad parental y violencia doméstica.","D":"Nacimiento prematuro, anomalías al nacimiento o bajo peso al nacer."},"c":"D"},{"id":267,"q":"Dentro de la promoción de estilos de vida saludables en la infancia, ¿cuál de las siguientes recomendaciones se ajusta mejor al concepto de alimentación equilibrada?","o":{"A":"Priorizar un patrón dietético basado en el incremento de proteínas y la reducción marcada de hidratos de carbono, como estrategia principal para prevenir el exceso ponderal en la infancia.","B":"Promover una dieta variada y equilibrada, ajustada a la edad.","C":"Recomendar la incorporación sistemática de tentempiés entre comidas para evitar la sensación de hambre, aunque ello suponga aumentar el aporte calórico diario.","D":"Se deberá dar consejo alimentario únicamente cuando el IMC se encuentre fuera del rango normal."},"c":"B"},{"id":268,"q":"Dentro de la visita “hasta el mes de vida” del Programa de Salud Infantil de Osakidetza 2021, ¿cuál de las siguientes NO es una actividad realizada por enfermería?","o":{"A":"Maniobras de Ortolani y Barlow.","B":"Promoción de la lactancia materna.","C":"Valoración del cordón umbilical.","D":"Comprobar la realización de cribado de metabolopatías."},"c":"A"},{"id":269,"q":"En Osakidetza, la historia clínica utilizada para la valoración, seguimiento y registro del Progama de Salud Infantil se estructura por etapas que corresponden a 5 guías tipo faro. ¿Cuál de las siguientes opciones recoge correctamente dichas etapas?","o":{"A":"Neonatal (hasta el mes de vida), 2 –12 meses, 1–3 años, 3 –8 años y 9 –14 años.","B":"Neonatal (0 –28 días), 2 –9 meses, 12 –36 meses, 4 –7 años y 8 –15 años.","C":"Neonatal (hasta el mes de vida), 2 –6 meses, 11 –24 meses, 3 –6 años y 8 –13 años.","D":"Neonatal (0 –28 días), 2 –5 meses, 6 –24 meses, 2 –6 años y 7–13 años."},"c":"C/A"},{"id":270,"q":"En el ámbito de la Atención Primaria, el personal de enfermería debe tener en cuenta los factores de riesgo relacionados con el desarrollo de obesidad en la infancia. Señale la opción correcta:","o":{"A":"La obesidad en los progenitores no influye en el riesgo de obesidad infantil.","B":"La duración del sueño inferior a 7 horas se asocia a mayor riesgo de obesidad.","C":"El nivel socioeconómico no guarda relación con la obesidad infantil.","D":"La maduración puberal tardía se relaciona con un mayor riesgo de obesidad infantil."},"c":"B"},{"id":271,"q":"En el ámbito de la Atención Primaria, el personal de enfermería debe promover hábitos adecuados de higiene bucodental en niños de entre 3 y 6 años, con el fin de prevenir la caries y otras patologías orales. En relación con estas recomendaciones, señale la afirmación INCORRECTA:","o":{"A":"Se recomienda el cepillado dental al menos dos veces al día con pasta fluorada que contenga más de 1000 ppm de flúor.","B":"Uno de los cepillados debe realizarse siempre antes de dormir, utilizando una cantidad de dentífrico similar al tamaño de un guisante.","C":"El cepillado debe ser supervisado por los cuidadores y se debe reducir el consumo de alimentos y bebidas azucaradas.","D":"Tras el cepillado, se debe escupir el dentífrico y enjuagar con abundante agua para eliminar los restos."},"c":"D"},{"id":272,"q":"En el ámbito del Programa de Salud Infantil de Osakidetza 2021, la prevención del maltrato infantil constituye una línea prioritaria de actuación desde Atención Primaria. En relación con las recomendaciones para la prevención del maltrato infantil, señale la afirmación INCORRECTA:","o":{"A":"La detección sistemática de factores de riesgo en todas las edades permite identificar a familias v ulnerables.","B":"La promoción de la lactancia materna forma parte de las estrategias preventivas.","C":"Ante la sospecha de riesgo psicosocial leve, se debe adoptar una actitud de observación sin intervención hasta confirmar el diagnóstico.","D":"La realización de actuaciones preventivas frente a la mutilación genital femenina forma parte de las estrategias del PSI."},"c":"C"},{"id":273,"q":"En relación con las etapas del proceso de inicio, consumo y adicción a las drogas en adolescentes, señale la afirmación correcta:","o":{"A":"En la etapa 1 (aprendizaje) el adolescente adquiere sus propios suministros y consume de forma ocasional a diario.","B":"En la etapa 0 (curiosidad) el adolescente consume drogas únicamente en reuniones del grupo durante los fines de semana.","C":"En la etapa 3 (preocupación) el adolescente se siente dependiente y necesita las drogas para mantener su bienestar, pudiendo robar, mentir o faltar a clase para conseguirlas.","D":"En la etapa 4 (destrucción) las drogas producen máxi ma euforia y se mantiene un consumo elevado."},"c":"C/D"},{"id":274,"q":"En el cribado universal de dislipemia en población adolescente, ¿qué parámetro se recomienda calcular a partir del perfil lipídico sin ayunas?","o":{"A":"Colesterol no -HDL.","B":"Colesterol LDL.","C":"Triglicéridos.","D":"Colesterol VLDL."},"c":"A"},{"id":275,"q":"En relación con el cribado del consumo de tabaco (CT) en adolescentes, señale la afirmación correcta:","o":{"A":"Existe evidencia sólida de que el cribado del CT reduce el hábito y su intensidad.","B":"El cribado del CT ha demostrado producir cambios consistentes en la actitud del adolescente hacia el consumo.","C":"Aunque no hay evidencia de reducción del hábito, el beneficio potencial del consejo/intervención individual puede superar el riesgo.","D":"Las intervenciones breves de consejo individual se han demostrado moderadamente eficaces."},"c":"C"},{"id":276,"q":"En el abordaje del consumo de tabaco en adolescentes desde Atención Primaria, el modelo de intervención recomendado es el de las “5 Aes”. ¿Cuál de las siguientes opciones recoge correctamente sus componentes?","o":{"A":"(Assess) Evaluar actitud – Analizar – Actuar – Acompañar – Ajustar.","B":"(Ask) Interrogar – Aconsejar – (Assess) Evaluar actitud – Ayudar – Acordar seguimiento.","C":"(Ask) Interrogar – Alertar – Aplicar tratamiento – Aconsejar – Auditar.","D":"Aceptar – Animar – Aumentar motivación – (Assess) Evaluar actitud – Aplicar control."},"c":"B"},{"id":277,"q":"Respecto a las definiciones relacionadas con el consumo de alcohol en adolescentes, señale la opción INCORRECTA:","o":{"A":"Consumo de alcohol de riesgo: 20 –40 g/día en mujeres y 40 –60 g/día en hombres.","B":"Consumo excesivo episódico: implica un consumo ≥40 g de alcohol en una sola ocasión.","C":"Consumo perjudicial: >40 g/día en mujeres y >60 g/día en hombres, con consecuencias para la salud física y mental.","D":"Binge drinking: ≥4 bebidas en mujeres y ≥5 en hombres en un corto periodo (≈2 horas)."},"c":"B/A"},{"id":278,"q":"En relación con el consumo de cannabis durante la adolescencia, señale la afirmación correcta:","o":{"A":"Solo se asocia a cambios afectivos transitorios.","B":"No se han descrito cambios estructurales a nivel cerebral.","C":"Se relaciona principalmente con alteraciones del sueño.","D":"Se asocia a deterioro cognitivo y cambios cerebrales."},"c":"D"},{"id":279,"q":"En relación con las infecciones de transmisión sexual (ITS), señale la opción que incluye únicamente microorganismos causantes de ITS:","o":{"A":"VPH – Chlamydia – Neisseria gonorrhoeae.","B":"VHB – Escherichia coli – tricomona vaginal.","C":"VIH – Candida albicans – Gardnerella vaginalis.","D":"VHS – Mycoplasma hominis – Enterococcus faecalis."},"c":"A"},{"id":280,"q":"Según las recomendaciones del Programa de Salud Infantil de Osakidetza 2021 sobre sexualidad en la adolescencia, señale la afirmación correcta:","o":{"A":"A los 10 años se indica consejo directo al adolescente sobre ITS y métodos anticonceptivos.","B":"A los 13 años, en adolescentes sexualmente activos/as, se recomienda consejo moderado y valorar riesgo de ITS para posible cribado.","C":"La educación para la salud grupal se recomienda únicamente a partir de los 14 años.","D":"A los 13 años se recomienda consejo de alta intensidad al adolescente y consejo breve a padres y madres."},"c":"B"},{"id":281,"q":"Según las recomendaciones de Osakidetza para el cribado de hipercolesterolemia en infancia y adolescencia, ¿cuál es la conducta correcta en niños/as con antecedentes familiares de hipercolesterolemia genética?","o":{"A":"Perfil lipídico universal a los 7 años.","B":"Perfil lipídico selectivo a los 9 –11 años.","C":"Perfil lipídico selectivo entre los 12 –16 años por mayor sensibilidad.","D":"Perfil lipídico solo si existe obesidad."},"c":"B"},{"id":282,"q":"En la mayoría de los países europeos, incluida España, una Unidad de Bebida Estándar (UBE) equivale aproximadamente a:","o":{"A":"8 g de alcohol puro.","B":"5 g de alcohol puro.","C":"12 g de alcohol puro.","D":"10 g de alcohol puro."},"c":"D"},{"id":283,"q":"¿Cuál NO es una de las características de los Anticonceptivos Hormonales Gestágenos?","o":{"A":"Pueden usarse durante la lactancia a partir de las 4 semanas desde el parto.","B":"No interfieren en las relaciones coitales.","C":"Son compatibles con el uso de preservativos.","D":"Pueden usarlos mujeres que no deben usar estrógenos."},"c":"A"},{"id":284,"q":"En relación con el uso seguro de las Tecnologías de la Información y la Comunicación en adolescentes, señale la definición ERRÓNEA:","o":{"A":"Sharenting: práctica de padres y madres de publicar contenido sobre sus hijos/as en plataformas de internet.","B":"Ciberacoso/ciberbullying: daño intencional y repetido infligido por un/a menor o grupo de menores hacia otro/a menor mediante medios digitales.","C":"Grooming: situación en la que un/a menor difunde deliberadamente imágenes íntimas de otro/a menor a través de redes sociales para dañarle.","D":"Sexting: envío de fotografías o vídeos con contenido sexual realizados por la propia persona y enviados a través de medios digitales, pudiendo derivar en difusión no consentida y acoso."},"c":"C"},{"id":285,"q":"¿Cuál de los siguientes corresponde a un síntoma negativo característico de la esquizofrenia?","o":{"A":"Ideas delirantes de persecución","B":"Alucinaciones auditivas con contenido amenazante","C":"Aplanamiento afectivo","D":"Pensamiento tangencial"},"c":"C"},{"id":286,"q":"¿Cuál de las siguientes definiciones es CORRECTA?","o":{"A":"Trastorno esquizoafectivo: trastorno psicótico caracterizado por la presencia continua de síntomas negativos durante al menos seis meses, sin alteraciones del estado de ánimo asociadas.","B":"Trastorno esquizofreniforme: cuadro clínico con síntomas psicóticos similares a la esquizofrenia, cuya duración total es inferior a seis meses y que no requiere necesariamente deterioro social o laboral para su diagnóstico.","C":"Síndrome de Capgras: trastorno delirante en el que el paciente identifica a personas desconocidas como familiares cercanos que han cambiado de identidad.","D":"Síndrome de Fregoli: alteración psicótica en la que el sujeto cree que ha sido sustituido por un doble idéntico que ocupa su lugar."},"c":"B"},{"id":287,"q":"Durante el seguimiento de un paciente en tratamiento con antipsicóticos, la enfermera debe identificar correctamente las posibles complicaciones y sus manifestaciones clínicas. ¿Cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"La acatisia se caracteriza por somnolencia, apatía y síntomas antimuscarínicos.","B":"La discinesia tardía se manifiesta por una inquietud motora intensa con necesidad imperiosa de moverse, especialmente en reposo.","C":"El síndrome neuroléptico maligno cursa con rigidez muscular, hipertermia, disfunción autonómica y alteración del nivel de conciencia.","D":"La distonía aguda consiste en movimientos involuntarios orofaciales de aparición tardía tras años de tratamiento antipsicótico."},"c":"C"},{"id":288,"q":"Durante la valoración inicial de un paciente con esquizofrenia ingresado en la unidad, la enfermera observa que el paciente presenta risas inmotivadas, frases incomprensibles, fuga de ideas y tendencia al soliloquio. Según los patrones funcionales, ¿en cuál de los siguientes patrones se encuadran principalmente estos hallazgos?","o":{"A":"Patrón roles y relaciones.","B":"Patrón autopercepción y autoconcepto.","C":"Patrón cognición y percepción.","D":"Patrón afrontamiento y tolerancia al estrés."},"c":"C"},{"id":289,"q":"Desde la perspectiva psicológica, ¿qué teoría explica la etiología de los trastornos depresivos como el resultado de un estilo cognitivo alterado que surge a partir de hipótesis aprendidas en la infancia, relacionadas con experiencias de decepción, pérdida o rechazo, y que conduce a expectativas negativas persistentes sobre uno mismo, el mundo y el futuro?","o":{"A":"Teoría psicodinámica","B":"Teoría cognitiva","C":"Teoría conductista","D":"Teoría del déficit motivacional adquirido"},"c":"B"},{"id":290,"q":"Durante la valoración de un paciente con sospecha de trastorno bipolar, la enfermera identifica un período de estado de ánimo anormal y persistentemente elevado. ¿Cuál de los siguientes conjuntos de manifestaciones clínicas es más característico de un episodio maníaco?","o":{"A":"Ánimo deprimido, anhedonia, hipersomnia y sentimientos de inutilidad.","B":"Estado de ánimo elevado, disminución de la necesidad de dormir, verborrea y aumento de la actividad dirigida a objetivos.","C":"Irritabilidad leve, fatiga, enlentecimiento psicomotor y dificultad de concentración.","D":"Ansiedad persistente, insomnio inicial, preocupación excesiv a y síntomas somáticos."},"c":"B"},{"id":291,"q":"Durante la valoración de un paciente con trastorno bipolar, la enfermera debe diferenciar un episodio hipomaníaco de un episodio maníaco. ¿Cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"La hipomanía cursa con síntomas psicóticos, mientras que la manía no los presenta.","B":"En la hipomanía existe un deterioro social y laboral grave que suele requerir hospitalización.","C":"La manía implica un estado de ánimo elevado o irritable de mayor duración y gravedad, con deterioro funcional significativo o necesidad de hospitalización.","D":"La diferencia principal entre hipomanía y manía es exclusivamente la edad de inicio del episodio."},"c":"C"},{"id":292,"q":"En relación a los criterios diagnósticos de los subtipos del trastorno bipolar, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"Trastorno bipolar I: se caracteriza por la presencia de, al menos, un episodio maníaco, independientemente de que existan o no episodios depresivos mayores.","B":"Trastorno bipolar II: se define por la alternancia de episodios maníacos y episodios hipomaníacos sin depresión mayor.","C":"Trastorno bipolar III: incluye episodios depresivos recurrentes con activación maniforme inducida exclusivamente por antidepresivos.","D":"Trastorno bipolar IV: se diagnostica cuando existen síntomas subclínicos de manía asociados a trastornos de ansiedad crónico ."},"c":"A"},{"id":293,"q":"Durante la valoración enfermera, un paciente refiere pensamientos constantes de catástrofe, anticipa resultados negativos ante situaciones cotidianas y expresa dificultad para concentrarse. Además, durante la entrevista se observa inquietud motora, tensión muscular y conductas de evitación ante determinadas situaciones. ¿Cuál de las siguientes op ciones identifica de forma más adecuada los sistemas de respuesta predominantes en este caso?","o":{"A":"Componente emocional y componente interpersonal.","B":"Componente fisiológico y componente afectivo.","C":"Componente cognitivo y componente conductual.","D":"Componente neurovegetativo y componente perceptivo."},"c":"C"},{"id":294,"q":"¿Cuál de las siguientes NO es un principio de manejo general en la atención enfermera a pacientes con trastornos de ansiedad?","o":{"A":"Minimizar la ansiedad del paciente cuando no exista un motivo clínico objetivable que la justifique.","B":"Aceptar inicialmente las estrategias de afrontamiento del paciente, aunque no sean las más adaptativas.","C":"Proporcionar feedback al paciente sobre su conducta, las estrategias que utiliza y los factores de estrés identificados.","D":"Evitar que el paciente se aísle completamente durante el proceso asistencial."},"c":"A"},{"id":295,"q":"Durante la valoración de una paciente con sospecha de anorexia nerviosa, la enfermera identifica varias manifestaciones clínicas compatibles con este trastorno. ¿Cuál de las siguientes manifestaciones es MÁS característica de la anorexia nerviosa, según la clínica descrita?","o":{"A":"Episodios recurrentes de atracones seguidos de conductas purgativas repetidas.","B":"Restricción alimentaria mantenida con preocupación intensa por el peso corporal y necesidad de control.","C":"Sensación persistente de saciedad precoz acompañada de evitación progresiva de la ingesta.","D":"Conductas alimentarias impulsivas asociadas a estados emocionales fluctuantes."},"c":"B"},{"id":296,"q":"En relación con el pronóstico de la anorexia nerviosa, señale cuál de los siguientes factores se asocia a una evolución MÁS DESFAVORABLE:","o":{"A":"Detección temprana del trastorno.","B":"Índice de masa corporal superior a 17 en el momento del seguimiento.","C":"Adecuada motivación para el cambio.","D":"Persistencia prolongada de la enfermedad con recaídas repetidas."},"c":"D"},{"id":297,"q":"En relación con la evolución reciente del consumo y la demanda de sustancias adictivas en Euskadi, según el VIII Plan de Adicciones, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"En la población adolescente se observa un descenso generalizado del consumo de todas las sustancias, incluido el alcohol y el cannabis, acompañado de una menor aceptación social.","B":"El consumo de tabaco muestra una tendencia descendente en todos los grupos de edad, siendo el nivel educativo un factor poco relevante en su prevalencia.","C":"El consumo de alcohol se mantiene en niveles muy elevados y socialmente normalizados, con mayor consumo en hombres adultos, aunque sin un patrón claro de desigualdad social en el consumo actual.","D":"La pandemia de la COVID -19 no tuvo un impacto significa tivo en los consumos, pero sí redujo de forma notable el uso de videojuegos, internet y redes sociales."},"c":"C"},{"id":298,"q":"Según los datos recogidos en el VIII Plan de Adicciones de Euskadi, en relación con la venta de alcohol por habitante, ¿cuál fue el consumo aproximado en litros por persona en el año 2020?","o":{"A":"18,6 litros por habitante y año.","B":"28,4 litros por habitante y año.","C":"48,2 litros por habitante y año.","D":"62,8 litros por habitante y año."},"c":"B/D"},{"id":299,"q":"En el marco conceptual del VIII Plan de Adicciones de Euskadi, ¿cuál de los siguientes elementos se considera un determinante estructural del desarrollo de las adicciones?","o":{"A":"Estrategias individuales de afrontamiento del estrés.","B":"Entorno familiar.","C":"Políticas fiscales y de regulación de la oferta de sustancias.","D":"Habilidades personales para la toma de decisiones."},"c":"C"},{"id":300,"q":"En relación con los agentes implicados en el desarrollo del VIII Plan sobre Adicciones de Euskadi, señale cuál de las siguientes entidades NO forma parte de la estructura institucional del plan.","o":{"A":"Comisión Europea.","B":"Osakidetza.","C":"Diputaciones forales.","D":"Entidades del tercer sector y agentes sociales."},"c":"A"},{"id":301,"q":"En relación con el marco normativo estatal vinculado a la prevención, tratamiento y mitigación de las adicciones en el Estado español, indique cuál de las siguientes normas NO está directamente relacionada con este ámbito.","o":{"A":"Ley 14/1995, de 25 de abril, General de Sanidad.","B":"Ley 28/2005, de 26 de diciembre, de medidas sanitarias frente al tabaquismo.","C":"Ley 33/2011, de 4 de octubre, General de Salud Pública.","D":"Real Decreto 579/2017, de 9 de junio, por el que se regulan determinados aspectos relativos a la fabricación, presentación y comercialización de los productos del tabaco y los productos relacionados."},"c":"A"},{"id":302,"q":"Según el VIII Plan sobre Adicciones de Euskadi, el plan se alinea de manera explícita con varios Objetivos de Desarrollo Sostenible (ODS). Indique cuál de los siguientes ODS NO se encuentra alineado de forma directa con dicho plan:","o":{"A":"Objetivo 5: Igualdad de género.","B":"Objetivo 8: Trabajo decente y crecimiento económico.","C":"Objetivo 10: Reducción de las desigualdades.","D":"Objetivo 17: Alianzas para lograr los objetivos."},"c":"B"},{"id":303,"q":"Según los datos recogidos en el VIII Plan sobre Adicciones de Euskadi 2023 - 2027, en relación con la evolución y características del consumo de tabaco y cigarrillos electrónicos, ¿cuál de las siguientes afirmaciones es INCORRECTA?","o":{"A":"Cerca de dos tercios de la población fumadora habitual consume más de medio paquete diario, lo que refleja una intensidad de consumo elevada pese a la tendencia general al descenso.","B":"Aproximadamente un 5 % de las personas fumadoras declara consumir más de un paquete de tabaco al día, concentrándose este patrón en los consumos más intensivos.","C":"En la población joven se observa una tendencia ascendente en el uso de cigarrillos electrónicos, con alrede dor del 15 % del alumnado que ha fumado o utilizado alguno al menos una vez.","D":"La edad de inicio en el consumo de tabaco, se mantiene más o menos estable alrededor de los 15 años."},"c":"A/D/B"},{"id":304,"q":"Según los datos del VIII Plan sobre Adicciones de Euskadi 2023 -2027, en relación con el consumo de alcohol, señale la opción que describe de forma MÁS AJUSTADA la situación epidemiológica actual en Euskadi:","o":{"A":"La mayor prevalencia de consumo habitual se concentra en la población adolescente (15-19 años), con diferencias marcadas entre sexos.","B":"Más del 20 % de la población reconoce haberse emborrachado entre 1 y 12 veces en el último año, siendo este patrón más frecuente en mujeres jóvenes de 15 -24 años.","C":"La edad media de inicio del consumo de alcohol ha descendido progresivamente desde 2004 hasta 2018, situándose entre los 16 y 17 años.","D":"El consumo habitual de alcohol es significativamente mayor en mujeres que en hombres en todos los grupos de edad adulta."},"c":"B/C"},{"id":305,"q":"Respecto al consumo experimental de cocaína, anfetaminas y otras drogas estimulantes asociadas a contextos de ocio en Euskadi, señale la opción CORRECTA:","o":{"A":"El inicio del consumo se asocia principalmente a una alta percepción de riesgo y a contextos de exclusión social.","B":"El perfil de las personas consumidoras recientes es mayoritariamente femenino, menor de 25 años y con bajo nivel socioeconómico.","C":"El consumo reciente se relaciona con el consumo de cannabis, la cercanía a personas consumidoras y el consumo diario de tabaco, junto con una baja percepción de riesgo.","D":"La edad de inicio ha descendido de forma significativa en la última década y es más temprana en los hombres."},"c":"C"},{"id":306,"q":"En relación con el juego con dinero y el juego problemático en Euskadi, según los datos disponibles, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"Más del 70% de la población jugó con dinero en el último año, con porcentajes similares entre hombres y mujeres.","B":"El juego problemático afecta a porcentajes similares de hombres y mujeres, con una prevalencia patológica cercana al 5%.","C":"El juego con dinero es más frecuente en mujeres que en hombres y se asocia a menor gasto medio.","D":"La mayoría de las personas jóvenes se inicia en e l juego de forma individual y en edad adulta."},"c":"A"},{"id":307,"q":"En relación con el uso de videojuegos y tecnologías digitales entre adolescentes en Euskadi, según los datos más recientes disponibles, ¿cuál de las siguientes afirmaciones es CORRECTA?","o":{"A":"El 10% de los adolescentes refiere haber recibido un mensaje de contenido sexual.","B":"Desde la aparición del Smartphone el uso de videojuegos es marginal, ya que más de la mitad de los adolescentes declara no jugar nunca.","C":"El riesgo principal asocia do al uso de tecnologías digitales es el ciberacoso, con una prevalencia superior al 30%."},"c":"A/D"},{"id":308,"q":"Según la evidencia recogida en el VIII Plan sobre Adicciones de Euskadi, ¿cuál de las siguientes intervenciones en el ámbito comunitario presenta el MAYOR nivel de eficacia?","o":{"A":"Campañas de comunicación en medios tradicionales.","B":"Intervenciones breves o entrevistas motivacionales.","C":"Mentoría o intervención de pares.","D":"Intervenciones con mujeres embarazadas en la comunidad."},"c":"B"},{"id":309,"q":"La Organización Mundial de la salud, cuenta con un marco de trabajo de categorías clínicas de clasificación y fases de afección por VIH para adultos y mayores de 15 años. Corresponde a la fase clínica 4:","o":{"A":"Recuento de linfocitos CD4 (>500 células/μl).","B":"Individuos con herpes zóster, pérdida ponderal moderada inexplicable (<10%del peso corporal asumido) o queilitis angular.","C":"Individuos con síndrome de desgaste por VIH, neumonía por Pneumocystis jiroveci, neumonía bacteriana recurrente, el herpes simple, la tuberculosis extrapulmonar o la candidiasis esofágica.","D":"Individuos con diarrea crónica inexplicable con duración superior a un mes, la pérdida ponderal intensa inexplicable (>10% del peso corporal asumido) o la fiebre persistente inexplicable con duración mayor de un mes (>37,6 °C)."},"c":"C"},{"id":310,"q":"Desde el punto de vista enfermero, el sida es evidente cuando una persona presenta:","o":{"A":"Conteo de células CD4+ inferior a 200 células/μl.","B":"Padece alguna enfermedad definitoria de sida.","C":"a) y b) son incorrectas.","D":"a) y b) son correctas."},"c":"D"},{"id":311,"q":"¿Cuál de las siguientes infecciones oportunistas es la causa más frecuente de muerte en personas con VIH?","o":{"A":"Mycobacterium tuberculosis.","B":"Neumonía por Pneumocystis jirovecii.","C":"Mycobacterium avium -intracellulare.","D":"Bartonelosis."},"c":"A"},{"id":312,"q":"Una mujer de 29 años acude a su primera consulta con 10 semanas de embarazo. Se la ha realizado un aprueba con resultado de VIH positivo. ¿Qué debe hacer para disminuir el riesgo de transmisión de VIH a su hijo/a?","o":{"A":"Prepararse para la lactancia materna, ya que es un factor de protección.","B":"Iniciar inmediatamente el tratamiento antirretroviral con efavirenz.","C":"Iniciar inmediatamente el tratamiento antirretroviral con zidovudina.","D":"Esperar al momento de trabajo del parto para iniciar el tratamiento antirretroviral."},"c":"C"},{"id":313,"q":"Entre las causas de resultado negativo falso en el test de ELISA para VIH, esta:","o":{"A":"Trastornos hematológicos malignos.","B":"Tratamiento inmunosupresor.","C":"Trastornos autoinmunitarios.","D":"Transferencia pasiva de anticuerpos contra el VIH (madre a hijo)."},"c":"B/D/A"},{"id":314,"q":"La mejor alternativa para evitar infecciones por VIH y otras enfermedades de transmisión sexual es:","o":{"A":"Profilaxis preexposición (PrEP) para el VIH.","B":"La abstinencia y las relaciones monógamas entre personas sin infección.","C":"Uso sistemático y correcto de preservativos (masculinos o femeninos).","D":"Realización periódica de pruebas de VIH y otras ETS."},"c":"B/C"},{"id":315,"q":"¿Qué intervención enfermera es fundamental para prevenir infecciones oportunistas en personas con VIH?","o":{"A":"Vacunación antineumocócica una vez, tan pronto como sea posible, después del diagnóstico de la infección por VIH, y luego cada 5 años.","B":"Vacunación contra la influenza debe aplicarse cada 2 años.","C":"Vacunación con virus vivos anualmente.","D":"Vacunación contra sarampión, parotiditis y rubeola en personas asintomáticas y conteos de células CD4+ superiores a 200 células/μl."},"c":"D/A"},{"id":316,"q":"¿Qué son los factores de virulencia?","o":{"A":"Son los mecanismos de defensa del huésped que se activan frente a la infección para limitar la proliferación del microorganismo.","B":"Son sustancias o productos generados por los agentes infecciosos que potencian su capacidad para producir enfermedad.","C":"Son sustancias producidas por el organismo humano para neutralizar toxinas bacterianas.","D":"Son los factores ambientales que favorecen la transmisión de los microorganismos entre individuos."},"c":"B"},{"id":317,"q":"Es una inmunoglobulina secretora y su función principal es la inmunidad local en las superficies mucosas:","o":{"A":"IgG.","B":"IgM.","C":"IgD.","D":"IgA."},"c":"D"},{"id":318,"q":"El microorganismo aerobio que coloniza el intestino grueso con mayor frecuencia provocando enfermedades diarreicas es:","o":{"A":"Escherichia coli.","B":"Shigella.","C":"Salmonella.","D":"Campylobacter"},"c":"A"},{"id":319,"q":"Usted es parte del personal de enfermería que atiende a un varón de 75 años con múltiples afecciones en su domicilio. ¿Qué información debe proporcionar para prevenir el riesgo de infección al paciente, su familia y su cuidador?","o":{"A":"Asegurar de que los platos y vasos se laven con agua fria para que sean seguros de utilizar.","B":"Las sábanas y ropa del paciente, deben lavarse con ciclos programados en 30º.","C":"Establecer barreras razonables para evitar la transmisión de infecciones.","D":"Cocinar todos los alimentos por completo y almacenar lo a fruta y verdura separados de los otros grupos de alimentos."},"c":"C/D"},{"id":320,"q":"¿Cuál es el periodo de incubación del virus del Ébola?","o":{"A":"2-7 días.","B":"2-12 días.","C":"2-21 días","D":"24-72h"},"c":"C"},{"id":321,"q":"En el contexto de las precauciones de aislamiento, según el Manual INOZ, ¿en cuál de las siguientes situaciones está más indicada la habitación individual como medida prioritaria para prevenir la transmisión por contacto directo o indirecto?","o":{"A":"En pacientes infectados por el mismo microorganismo.","B":"En pacientes con microorganismos epidemiológicamente importantes o de alta transmisibilidad, la habitación individual es prescindible si el paciente colabora correctamente con las medidas.","C":"En pacientes fuente con hábitos higiénicos pobres, que contaminan el medio ambiente o en quienes no puede esperarse colaboración en el mantenimiento de las medidas.","D":"En pacientes con transmisión por gotas, dado que se requieren medidas estructurales específicas."},"c":"C"},{"id":322,"q":"Durante una aspiración de secreciones orofaríngeas, ¿qué equipo de protección está indicado si se prevé la posibilidad de generar salpicaduras o sprays?","o":{"A":"Doble mascarilla y protección ocular.","B":"Guantes y mascarilla.","C":"Bata y mascarilla.","D":"Mascarilla y gafas o protector facial."},"c":"D"},{"id":323,"q":"Según el Manual INOZ, respecto al manejo de lencería, utensilios de comida y limpieza ambiental en pacientes con Precauciones Basadas en la Transmisión, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Aunque la lencería pueda estar contaminada, el riesgo de transmisión se evita si se maneja, transporta y lava adecuadamente; el lavado de los utensilios con agua caliente y detergentes usados en los lavap latos de los hospitales es suficiente.","B":"En habitaciones con Precauciones Basadas en la Transmisión debe realizarse siempre una limpieza distinta a la de pacientes con Precauciones Estándar, usando productos desinfectantes específicos para todos los microorganismos.","C":"La lencería usada debe esterilizarse antes de su transporte y los utensilios del paciente en aislamiento deben ser exclusivamente desechables.","D":"La lencería utilizada requiere un manejo cuidadoso para evitar contaminación y los platos/utensilios del paciente deben eliminarse como residuos biosanitarios."},"c":"A"},{"id":324,"q":"La habitación de todo paciente con infección respiratoria de transmisión aérea, como tuberculosis o sarampión, deberá reunir las siguientes características:","o":{"A":"Habitación individual con vestíbulo, presión positiva respecto a áreas adyacentes y un mínimo de 8 renovaciones de aire a la hora.","B":"Habitación individual sin vestíbulo con extracciones de aire, filtros de alta eficacia (HEPA) y presión positiva respecto a áreas adyacentes.","C":"Habitación individual con vestíbulo, extracciones de aire, filtros de alta eficacia (HEPA) y un mínimo de 8 renovaciones de aire a la hora.","D":"Habitación individual con extracciones de aire, filtros de alta eficacia (HEPA) y un mínimo de 6 renovaciones de aire a la hora."},"c":"C/D"},{"id":325,"q":"Según la Guía -Manual de Uso Adecuado de los Guantes Sanitarios de Osakidetza, ¿en cuál de las siguientes situaciones NO es obligatorio el uso de guantes, siendo suficiente la higiene de manos?","o":{"A":"Realización de curas de heridas abiertas.","B":"Obtención de muestras sanguíneas por venopunción.","C":"Ajuste de la fluidoterapia intravenosa.","D":"Manipulación de material contaminado con fluidos biológicos."},"c":"C"},{"id":326,"q":"En relación con el agente infeccioso dentro de la cadena epidemiológica, ¿qué característica se define como la capacidad del microorganismo para producir enfermedad clínica una vez que el huésped ha sido infectado?","o":{"A":"Infectividad.","B":"Transmisibilidad.","C":"Patogenicidad.","D":"Virulencia."},"c":"C"},{"id":327,"q":"En relación con el concepto de inmunidad de grupo o inmunidad de rebaño, señale la afirmación correcta:","o":{"A":"Se alcanza únicamente cuando el 100% de la población está inmunizada frente a una enfermedad infecciosa.","B":"Impide la propagación epidémica gracias a un nivel elevado, aunque incompleto, de inmunización poblacional.","C":"Consiste en la protección individual exclusiva de las personas vacunadas.","D":"Solo es efectiva en enfermedades de transmisión no respiratoria."},"c":"B"},{"id":328,"q":"En relación con las medidas no farmacológicas para reducir el riesgo de transmisión del SARS -CoV -2 en la comunidad, señale la opción INCORRECTA:","o":{"A":"Mantener una distancia mínima aproximada de 2 metros contribuye a disminuir el riesgo de contagio.","B":"Evitar espacios cerrados y concurridos reduce la probabilidad de transmisión aérea.","C":"Los entornos ruidosos, donde es necesario elevar la voz, favorecen la emisión de aerosoles infecciosos.","D":"En espacios cerrados, el uso adecuado de mascarilla permite flexibilizar el mantenimiento estricto de la distancia interpersonal cuando existe una ventilación adecuada."},"c":"D"},{"id":329,"q":"Los factores de virulencia son sustancias o productos generados por los agentes infecciosos que potencian su capacidad para producir enfermedad. En relación con los factores de virulencia, señale cuál de las siguientes opciones NO constituye uno de sus principios fundamentales:","o":{"A":"Factores de resistencia antimicrobiana.","B":"Factores de invasión.","C":"Factores de adhesión.","D":"Factores de evasión."},"c":"A"},{"id":330,"q":"En relación con la cadena epidemiológica de la infección, señale cuál de las siguientes opciones recoge correctamente sus seis elementos fundamentales:","o":{"A":"Agente infeccioso, reservorio, puerta de salida, vía de transmisión, huésped susceptible, estado inmunitario.","B":"Agente infeccioso, reservorio, puerta de salida, vía de transmisión, huésped susceptible, puerta de entrada.","C":"Agente infeccioso, reservorio, puerta de salida, vía de transmisión, periodo de incubación, puerta de entrada.","D":"Agente infeccioso, reservorio, respuesta inflamatoria, vía de transmisión, huésped susceptible, puerta de entrada."},"c":"B"},{"id":331,"q":"En relación con la colocación del Equipo de Protección Individual por parte del personal de enfermería ante pacientes con enfermedades transmisibles, señale el orden correcto de colocación:","o":{"A":"Guantes → mascarilla → bata → protección ocular.","B":"Bata → mascarilla → protección ocular → guantes.","C":"Mascarilla → guantes → bata → protección ocular.","D":"Mascarilla → protección ocular → guantes → bata."},"c":"B"},{"id":332,"q":"Durante la actuación de la enfermera en el área quirúrgica, el mantenimiento del campo estéril es fundamental para prevenir infecciones del sitio quirúrgico. En relación con los principios de asepsia quirúrgica, señale la opción INCORRECTA:","o":{"A":"Utilizar únicamente material esterilizado en contacto con la herida quirúrgica.","B":"Considerar estériles las mangas de la bata quirúrgica desde aproximadamente 5 cm por encima del codo hasta el puño.","C":"Mantener el campo estéril permanentemente dentro del campo visual.","D":"Mantener una distancia de al menos 15 cm respecto al campo estéril."},"c":"D"},{"id":333,"q":"¿Cuál de las siguientes manifestaciones clínicas es más característica del golpe de calor y permite diferenciarlo del agotamiento o los calambres por calor?","o":{"A":"Diaforesis profusa, piel de gallina y calambres musculares en extremidades.","B":"Cefalea, ansiedad, síncope y ortostasis con temperatura elevada.","C":"Disfunción profunda del sistema nervioso central, piel caliente y seca, y temperatura corporal ≥ 40,6 ºC.","D":"Sed intensa, calambres musculares localizados y diaforesis profusa."},"c":"C"},{"id":334,"q":"¿Qué afirmación NO es correcta respecto a la valoración enfermera de pacientes con dolor torácico?","o":{"A":"La intensidad del dolor es el principal predictor de la gravedad del cuadro.","B":"La localización del dolor no permite identificar con precisión su etiología.","D":"La intensidad y la duración del dolor torácico no permiten predecir la gravedad del proceso. En la valoración enfermera es fundamental explorar síntomas asociados como náuseas, sudoración o disnea."},"c":"A"},{"id":335,"q":"Ante un paciente con sospecha de accidente cerebrovascular agudo que presenta disminución del nivel de conciencia, ¿cuál debe ser la prioridad inicial de la actuación enfermera en el ámbito de urgencias?","o":{"A":"Iniciar la reposición de líquidos hipotónicos para mejorar la perfusión cerebral.","B":"Valorar de forma inmediata la permeabilidad de la vía respiratoria y el estado cardiovascular.","C":"Administrar sedación para reducir la ansiedad y prevenir el aumento del consumo de oxígeno cerebral.","D":"Posicionar al paciente en decúbito supino estricto y administrar oxígeno a alto flujo."},"c":"B"},{"id":336,"q":"¿Cuál de las siguientes manifestaciones clínicas es característica de un ictus hemisférico derecho?","o":{"A":"Comportamiento lento y cauteloso, parálisis o debilidad del lado izquierdo del cuerpo y tendencia a distraerse.","B":"Alteración de la capacidad intelectual, déficit del campo visual izquierdo y déficits en la percepción espacial.","C":"Parálisis del lado izquierdo del cuerpo, alteración de la percepción espacial y comportamiento impulsivo.","D":"Afasia de expresión o recepción, parálisis del lado izquierdo del cuerpo, déficits del campo visual izquierdo."},"c":"C"},{"id":337,"q":"Señale la respuesta INCORRECTA en relación con la respuesta fisiológica inmediata del organismo tras un traumatismo múltiple.","o":{"A":"La mortalidad en los individuos con traumatismos múltiples se relaciona con la gravedad de las lesiones y el número de sistemas y órganos afectados.","B":"Los objetivos terapéuticos son determinar la extensión de las lesiones y establecer prioridades de tratamiento.","C":"Las prioridades iniciales en el tratamiento del paciente politraumatizado se centran en asegurar la ventilación y controlar la hemorragia como amenazas vitales inmediatas.","D":"Inmediatamente después de la lesión, el cuerpo se encuentra hipermetabólico, con disminución de la activación de la coagulación y sometido a una intensa respuesta al estrés."},"c":"D"},{"id":338,"q":"Señale la respuesta correcta en relación con el shock y su fisiopatología inicial.","o":{"A":"El shock se caracteriza por una perfusión tisular adecuada, con aumento del aporte de oxígeno a los tejidos para compensar la agresión inicial.","B":"En la fase inicial del shock se produce una disminución del metabolismo celular que protege a los órganos frente al daño tisular.","C":"La alteración principal en el shock es exclusivamente la disminución de la presión arterial, sin repercusión celular significativa en fases pr ecoces.","D":"El shock es un estado de hipoperfusión tisular generalizada que conduce a hipoxia celular, metabolismo anaerobio y acidosis metabólica."},"c":"D"},{"id":339,"q":"Señale la respuesta correcta en relación con la persona en situación de hipotermia.","o":{"A":"En la hipotermia moderada y grave pueden aparecer bradicardia, hipotensión, hipoxemia y disminución del nivel de conciencia.","B":"La hipotermia se define como una temperatura corporal central inferior a 36ºC y cursa inicialmente con vasodilatación periférica y disminución de la sudoración.","C":"Los métodos de recalentamiento activo interno se usan para la hipotermia leve a moderada e incluyen derivación cardiopulmonar, administración de líquidos intravenosos calientes y oxígeno caliente humectado, entre otros.","D":"La hipotermia se asocia habitualmente a alteraciones en el ritmo cardíaco, en especial a la Actividad Eléctrica Sin Pulso."},"c":"A"},{"id":340,"q":"¿Cuál es la intervención terapéutica prioritaria en la intoxicación por monóxido de carbono?","o":{"A":"Administrar aire ambiente y reposo absoluto, dado que el monóxido de carbono se elimina espontáneamente.","B":"Administrar oxígeno al 100% a presión atmosférica o de preferencia hiperbárica según cifras de carboxihemoglobina.","C":"Iniciar fluidoterapia intravenosa como tratamiento principal de la hipoxia tisular.","D":"Administrar oxígeno a bajo flujo mediante gafas nasales, ajustando la fracción inspirada según la saturación obtenida por pulsioximetría."},"c":"B"},{"id":341,"q":"¿Cuáles son signos y síntomas específicos que pueden indicar riesgo de suicidio potencial en una persona atendida en el ámbito sanitario?","o":{"A":"Expresión de ansiedad leve y preocupación situacional transitoria.","B":"Presencia de insomnio y llanto reactivo ante acontecimientos vitales estresantes recientes.","C":"Conducta retraída acompañada de tristeza persistente, sin verbalización de ideas relacionadas con la muerte.","D":"Pérdida de un padre a temprana edad y antecedentes familiares de suicidio."},"c":"D"},{"id":342,"q":"¿Cuál de las siguientes afirmaciones es correcta en relación con el infarto agudo de miocardio (IAM) y su manejo inicial?","o":{"A":"Desde el punto de vista fisiopatológico, el IAM se produce fundamentalmente por un espasmo coronario reversible sin necrosis miocárdica asociada.","B":"El tratamiento inicial del IAM se basa en la administración de líquidos intravenosos de forma sistemática para mejorar la perfusión coronaria.","C":"El paciente con sospecha de IAM debe recibir inmediatamente oxígeno suplementario, ácido acetilsalicílico, nitroglicerina y morfina.","D":"El tratamiento trombolítico presenta contraindicaciones absolutas, como el antecedente de ictus isquémico, anomalía de la coagulación conocida o la hipertensión no controlada."},"c":"C/D"},{"id":343,"q":"Señale la afirmación correcta en relación con la respuesta fisiopatológica de la persona con quemadura grave.","o":{"A":"Las quemaduras graves ocasionan un estado hipermetabólico con aumento del consumo de oxígeno y glucosa y una circulación hiperdinámica.","B":"Las quemaduras graves producen una disminución mantenida de la permeabilidad capilar, lo que favorece la retenció n de líquidos en el espacio intravascular.","C":"La respuesta fisiopatológica a las quemaduras graves se limita al tejido cutáneo lesionado y no tiene repercusión sistémica relevante.","D":"En las quemaduras graves no se producen alteraciones metabólicas significativas durante las primeras fases tras la lesión."},"c":"A"},{"id":344,"q":"En un paciente politraumatizado con antecedente de lesión por aplastamiento, ¿cuál de las siguientes manifestaciones NO forma parte de la tríada clínica característica de la rabdomiólisi s?","o":{"A":"Mialgias.","B":"Debilidad muscular.","C":"Orina oscura.","D":"Edema muscular."},"c":"D"},{"id":345,"q":"En el centro de la rueda del cambio de comportamiento de Michie et al., encontramos:","o":{"A":"La capacidad, la motivación y la oportunidad.","B":"La capacidad, la modelización y la oportunidad.","C":"La capacidad, la motivación y la educación.","D":"La capacidad, la modelización y la regulación."},"c":"A"},{"id":346,"q":"Entre los métodos o técnicas educativas orientadas al aprendizaje de contenidos, se distinguen aquellas de carácter bidireccional. ¿Cuál de las siguientes opciones corresponde a técnicas destinadas al desarrollo de habilidades?","o":{"A":"Carteles, vallas, folletos, cartas circulares, prensa…","B":"Tormenta de ideas, foto -palabra, dibujo -palabra….","C":"Casos, análisis de textos, discusiones, sesión de tribunal…","D":"Ejercicios y simulaciones, tales como role -playing…"},"c":"D"},{"id":347,"q":"No corresponde a un factor sobre el que planea incidir la Estrategia de Promoción de la Salud y Prevención en el Sistema Nacional de Salud:","o":{"A":"Alimentación saludable.","B":"Seguridad del entorno para prevenir lesiones no intencionales.","C":"Actividad física.","D":"Enfermedades de transmisión sexual."},"c":"D"},{"id":348,"q":"Una herramienta para la promoción de la salud en el nivel comunitario es el modelo de activos para la salud. ¿En que se basa este modelo?","o":{"A":"En la identificación de las capacidades de la comunidad de forma que estas sean empleadas como parte de un proceso de capacitación y participación.","B":"En una herramienta cooperativa de diagnóstico comunitario que identifica, localiza y visibiliza los recursos, fortalezas y capacidades existentes en un territorio histórico.","C":"En la identificación de las riquezas y pobrezas de la comunidad que generan salud entre sus integrantes a través de un proceso participativo y centrado en lo que nos hace estar sanos.","D":"En determinar las ubicaciones relativas de puntos de referencia o marcadores dentro de un cromosoma o genoma."},"c":"A"},{"id":349,"q":"¿Cuál es el tamaño idóneo para desarrollar procesos educativos de promoción para la salud a nivel grupal que puedan provocar un cambio de actitud?","o":{"A":"2 personas.","B":"Entre 2 y 9 personas.","C":"Entre 10 y 20 personas.","D":"Entre 21 y 30 personas."},"c":"C"},{"id":350,"q":"Entre las potencialidades del trabajo grupal en la promoción de la salud, encontramos:","o":{"A":"Aprovechamiento del recurso humano y material.","B":"Apoyo que las personas participantes se dan entre sí.","C":"Descubrimiento de que lo que viven es único.","D":"Ausencia de lazos afectivos entre participantes."},"c":"B"},{"id":351,"q":"NO es una característica asignada al papel de los profesionales sanitarios en promoción y educación para la salud:","o":{"A":"Mejorar el liderazgo y la gobernanza participativa para la salud.","B":"Mejorar la investigación.","C":"Impulsar estrategias encaminadas a conseguir que la salud se convierta en tema prioritario.","D":"Informar del estado de salud a individuos y comunidad."},"c":"D/A"},{"id":352,"q":"Señale la respuesta CORRECTA respecto a las principales etapas de la Evaluación del Impacto de la Salud.","o":{"A":"Screening: permite identificar si una política, un proyecto o un programa es relevante para la salud.","B":"Análisis: Permite identificar mapas de conexiones y definir los límites de los aspectos que van a ser valorados.","C":"Seguimiento: Cuantifica el impacto considerando la evidencia existente.","D":"Informar: Monitorizar y evaluar los impactos de la política para generar evidencia y favorecer su difusión."},"c":"A"},{"id":353,"q":"Se considera un consumo de riesgo moderado en función de la cantidad de alcohol consumido:","o":{"A":"Varones < 10 UBE/semana y Mujeres < 8 UBE/semana.","B":"Varones 10 -17 UBE/semana y Mujeres 8 -14 UBE/semana.","C":"Varones 17 -28 UBE/semana y Mujeres 11 -17 UBE/semana.","D":"Varones 18 -32 UBE/semana y Mujeres 12 -19 UBE/semana."},"c":"C/B"},{"id":354,"q":"A partir de la perspectiva del modelo salutogénico en la promoción de la salud, diversos autores han desarrollado el concepto de determinantes de la salud. ¿Cuál de los siguientes autores NO se asocia con este desarrollo?","o":{"A":"Lalonde.","B":"Diez Roux.","C":"Marmot.","D":"Brownson."},"c":"D/A"},{"id":355,"q":"En relación con la Evaluación de Impacto en Salud (E IS), señale la opción correcta:","o":{"A":"Prospectiva: identifica las consecuencias de las políticas ya implementadas","B":"Concurrente: analiza las consecuencias de una medida mientras se está implementando.","C":"Retrospectiva: identifica las consecuencias de una medida durante su implementación, especialmente cuando se sospecha un impacto negativo.","D":"Retrospectiva: predice los efectos de las políticas antes de su implementación."},"c":"B"},{"id":356,"q":"¿El concepto de Educación para la Salud según la OMS es?","o":{"A":"Una acción ejercida sobre los individuos para llevarles a modificar sus comportamientos.","B":"Es un proceso de enseñanza que busca capacitar a grupos de riesgo para adquirir conocimientos, desarrollar habilidades y adoptar actitudes que promuevan estilos de vida saludables y prevengan enfermedades, mejorando el bienestar físico, mental y social a través de la toma de decisiones informadas y la participación activa.","C":"Disciplina encargada de orientar y organizar procesos educativos con el propó sito de influir positivamente en conocimientos, aptitudes y costumbres de individuos y comunidades en relación con su enfermedad.","D":"Proceso de enseñanza para mejorar conocimientos, habilidades y aptitudes que promueven la salud y la enfermedad."},"c":"B/A"},{"id":357,"q":"El término “inmunización” hace referencia a:","o":{"A":"La provisión de inmunidad artificial activa o pasiva.","B":"La producción endógena de anticuerpos tras vacunación.","C":"La inducción de inmunidad natural tras pasar una infección.","D":"Exclusivamente a la administración de vacunas."},"c":"A"},{"id":358,"q":"La inmunidad pasiva natural se adquiere principalmente por:","o":{"A":"Vacunación materna.","B":"Lactancia artificial.","C":"Paso transplacentario de IgG y lactancia materna (IgA).","D":"Exposición ambiental temprana."},"c":"C"},{"id":359,"q":"Una vacuna se define como:","o":{"A":"Solución que contiene anticuerpos obtenida a partir de sangre humana y utilizada para mantener la inmunidad en personas inmunodeficientes o para conseguir inmunización pasiva.","B":"Toxinas bacterianas modificadas, convertidas en no tóxicas, pero con capacidad de estimular la formación de antitoxinas.","C":"Cualquier molécula capaz de ser reconocida por un anticuerpo o receptor de célula T. Los antígenos de las vacunas suelen ser bacterias o virus que a su vez pueden ser atenuados (vivos) o inactivados (muertos). Pueden ser enteros o una parte de ellos.","D":"Suspensión de microorganismos vivos, atenuados o porciones antigénicas de dichos agentes, que, introducidos en un huésped, producen respuesta inmunitaria adaptativa (especificidad + memoria) para p revenir la enfermedad causada por dichos microorganismos."},"c":"D"},{"id":360,"q":"¿Cuál de las siguientes vacunas induce inmunidad sin memoria inmunológica?","o":{"A":"Vacunas conjugadas.","B":"Vacunas de ARNm.","C":"Vacunas de polisacáridos puros.","D":"Vacunas atenuadas."},"c":"C"},{"id":361,"q":"En lactantes, el lugar anatómico recomendado para la vacunación intramuscular es:","o":{"A":"Vasto externo del muslo.","B":"Deltoides.","C":"Glúteo.","D":"Región escapular."},"c":"A"},{"id":362,"q":"La congelación de una vacuna puede provocar:","o":{"A":"Aumento de su inmunogenicidad.","B":"Pérdida visible del color.","C":"Contaminación bacteriana.","D":"Inactivación irreversible."},"c":"D"},{"id":363,"q":"“Dosis puesta, dosis que cuenta” significa que:","o":{"A":"Se reinicia la pauta vacunal independientemente del tiempo transcurrido.","B":"Se tendrán en cuenta los intervalos mínimos entre dosis de una misma vacuna.","C":"Se contabilizan todas las dosis recibidas y que hayan respetado los intervalos mínimos.","D":"Conocer los intervalos entre vacunas, las pautas según edad y pautas aceleradas de algunas vacunas nos facilitará diseñar el calendario vacunal."},"c":"C"},{"id":364,"q":"¿Cuál es una contraindicación permanente para la vacunación?","o":{"A":"Enfermedad leve con o sin febrícula.","B":"Reacción anafiláctica previa a un componente.","C":"Lactancia materna.","D":"Tratamiento antibiótico."},"c":"B"},{"id":365,"q":"Tras la administración de tratamiento sustitutivo con inmunoglobulinas mediante hemoderivados, se recomienda diferir la administración de vacunas vivas atenuadas:","o":{"A":"Al menos 1 mes.","B":"Al menos 2 meses.","C":"Al menos 3 meses.","D":"Al menos 6 meses."},"c":"C/D"},{"id":366,"q":"¿Qué tipo de vacuna puede administrarse en las personas con inmunodeficiencias humorales que reciben inmunoglobulinas de forma periódica?","o":{"A":"Inactivadas.","B":"Oral.","C":"Intradérmica.","D":"Viva atenuada."},"c":"A"},{"id":367,"q":"La administración simultánea de vacunas:","o":{"A":"Reduce las probabilidades de inmunización.","B":"Puede administrarse en idénticos lugares anatómicos.","C":"Deben mezclarse vacunas distintas en la misma jeringa.","D":"Es segura y recomendable."},"c":"D"},{"id":368,"q":"Según el calendario vacunal infantil de Euskadi, ¿Que vacunas corresponde administrar a los 11 meses? Calendario vacunal eus 2026","o":{"A":"Hepatitis B, difteria, tétanos, tosferina, Hib, poliomielitis), neumococo conjugada,Meningococo (B) y rotavirus.","B":"Hepatitis B, difteria, tétanos, tosferina, Hib, poliomielitis), neumococo conjugada.","C":"Sarampion, Rubeola, Parotiditis y Meningococo (B,ACWY).","D":"Hepatitis B, difteria, tétanos, tosferina, Hib, poliomielitis), neumococo conjugada,Meningococo (B,ACWY) y rotavirus."},"c":"B"},{"id":369,"q":"El concepto de polimedicación se define como:","o":{"A":"El consumo de menos de cinco fármacos de forma concomitante.","B":"El consumo de cinco o más fármacos de forma concomitante.","C":"El consumo de ocho o más fármacos de forma concomitante.","D":"El consumo de diez o más fármacos de forma concomitante."},"c":"B"},{"id":370,"q":"¿Qué criterios propuestos por la Sociedad Europea de Geriatría son los más utilizados para detectar prescripciones potencialmente inapropiadas en personas mayores de 65 años?","o":{"A":"AGS Beers.","B":"LESS -CHRON.","C":"STOPP/START.","D":"IPEC."},"c":"C"},{"id":371,"q":"¿Cuál de las siguientes, NO forma parte de las cuatro enfermedades no transmisibles responsables de morbilidad y mortalidad en el mundo?","o":{"A":"Cardiovasculares.","B":"Cáncer.","C":"Diabetes.","D":"Osteoarticulares."},"c":"D"},{"id":372,"q":"El termino comorbilidad hace referencia a:","o":{"A":"Es la ocurrencia simultanea de dos patologías en la misma persona, sin tener en cuenta ni el orden jerárquico entre ellos ni su gravedad.","B":"Es la existencia de otras enfermedades en una persona que ya tiene una enfermedad que consideramos principal.","C":"Es la aparición de otras enfermedades en una persona que ya tiene una enfermedad que consideramos secundaria.","D":"Es la ocurrencia simultanea de múltiples problemas de salud en la misma persona, sin tener en cuenta ni el orden jerárquico entre ellos ni su gravedad."},"c":"B"},{"id":373,"q":"¿Es un método indirecto validado para medir la adherencia al tratamiento farmacológico?","o":{"A":"Test de Morisky -Green.","B":"El Indice internacional normalizado (INR).","C":"Hemoglobina glicosilada.","D":"Test de Hemingway."},"c":"A"},{"id":374,"q":"Es un requisito que deben cumplir las rutas asistenciales que se establezcan para la atención de pacientes crónicos.","o":{"A":"No tienen por qué ser consensuadas entre los dos niveles (Gestores y profesionales de la salud).","B":"Abordar aspectos globales de un proceso asistencial y no aspectos demasiado concretos.","C":"Que las rutas de coordinación sean claras y concisas, con capacidad de ser modificadas fácilmente.","D":"Mantener contactos pasivos con la enfermera ref erente del/ de la paciente."},"c":"C/B"},{"id":375,"q":"Es una de las cinco cualificaciones básicas con las que deben contar todos los profesionales que atienden a pacientes con problemas de salud crónicos:","o":{"A":"Comprensión emocional.","B":"Sociabilidad.","C":"Disposición al optimismo.","D":"Atención centrada en el paciente."},"c":"D"},{"id":376,"q":"¿Cuál de las siguientes NO es una enfermedad crónica frecuente en la infancia?","o":{"A":"Trastorno de déficit de atención por hiperactividad (TDAH).","B":"Fibrosis quística.","C":"Cardiopatía isquemica.","D":"Desnutrición."},"c":"C"},{"id":377,"q":"Un factor en las intervenciones en procesos crónicos es:","o":{"A":"Se priorizan intervenciones preventivas, proactivas y rehabilitadoras frente al enfoque curativo de la enfermedad aguda.","B":"Se centra la atención en las necesidades globales del paciente a corto plazo, más allá de lo exclusivamente clínico.","C":"Se requiere una atención coordinada e integral con “visión individuo “desde la atención primaria a lo largo de la enfermedad.","D":"Se realiza una valoración global de la persona, incidiendo en síntomas agudos e incidiendo en su contexto social y funcional."},"c":"A"},{"id":378,"q":"Es un modelo poblacional de referencia e intervención de atención a crónicos:","o":{"A":"Modelo de Atención a crónicos.","B":"Piramide de King´s Fund.","C":"Modelo de Atención Innovadora a condiciones crónicas.","D":"Pirámide de Pagoda."},"c":"B/A"},{"id":379,"q":"Señale la respuesta INCORRECTA en relación con la Pirámide de Kaiser:","o":{"A":"En los pacientes de mayor complejidad con frecuente comorbilidad se hace necesaria una gestión integral del caso en su conjunto, con cuidados fundamentalmente profesionales.","B":"Los pacientes de alto riesgo, pero de menor complejidad en lo que respecta a su comorbilidad reciben una gestión de la enfermeda d que combina cuidados informales y cuidados profesionales.","C":"La mayoría de pacientes crónicos con condiciones todavía en estadios incipientes reciben apoyo para su autogestión.","D":"La población general es foco de intervenciones de prevención y promoción que tratan de controlar los factores de riesgo que puedan llevar a los individuos a la enfermedad crónica."},"c":"B/D"},{"id":380,"q":"Probablemente, la principal referencia internacional en el ámbito de la atención a las enfermedades crónicas es el Modelo de Atención a Crónicos. ¿Cuáles son los tres planos interrelacionados en los que se articula la atención a la cronicidad?","o":{"A":"La comunidad actúa como usuaria de los servicios, el sistema sanitario se organiza con proveedores y aseguramiento, y la inte racción con el paciente que tiene impacto clínico.","B":"Las políticas comunitarias sustituyen al sistema sanitario formal, las organizaciones proveedoras desaparecen en favor de la autogestión, y la práctica clínica se desarrolla sin comunicación directa con el paciente.","C":"La comunidad con sus recursos públicos y privados determinan por completo las decisiones clínicas, el sistema sanitario aporta estructuras organizativas propias, y la interacción con el paciente en la asistencia sanitaria.","D":"La comunidad con sus políticas y múltiples recursos públicos y privados, el sistema sanitario con sus organizaciones proveedoras y esquemas de aseguramiento, y la interacción con el paciente en la práctica clínica."},"c":"D"},{"id":381,"q":"¿Cuál de las siguientes afirmaciones respecto a la absorción de los fármacos es INCORRECTA?","o":{"A":"La biodisponibilidad indica la cantidad de fármaco inalterado que alcanza la circulación sistémica y también la velocidad a la que lo hace.","B":"La administración intravenosa presenta una biodisponibilidad del 100%, ya que el fármaco llega directamente a la circulación sistémica.","C":"El metabolismo presistémico puede disminuir la cantidad de fármaco que alcanza la circulación sistémica.","D":"El grado de ionización, la liposolubilidad y el volumen de distribución del fármaco son factores influyentes en el grado de absorción de los fármacos."},"c":"D"},{"id":382,"q":"¿Cuál de las siguientes afirmaciones respecto a la eliminación renal de los fármacos es correcta?","o":{"A":"La filtración glomerular permite el paso del fármaco desde la sangre al filtrado glomerular; se filtran con mayor facilidad las moléculas hidrosolubles y de pequeño tamaño.","B":"La filtración glomerular se realiza mediante transporte activo y depende principalmente del pH urinario.","C":"La reabsorción tubular ocurre fundamentalmente por filtración y es independiente de la liposolubilidad del fármaco.","D":"La reabsorción tubular se produce únicamente en fármacos ionizados, ya que atraviesan mejor las membranas tubulares."},"c":"A"},{"id":383,"q":"Según la clasificación por frecuencia de aparición, ¿cuál de las siguientes afirmaciones sobre las reacciones adversas a medicamentos (RAM) es correcta?","o":{"A":"Una RAM frecuente es aquella que aparece en ≥1/1.000 y <1/100.","B":"Una RAM muy frecuente es aquella que aparece en ≥1/100 y <1/10.","C":"Una RAM rara es aquella que aparece en ≥1/10.000 y <1/1.000.","D":"Una RAM muy rara es aquella que aparece en ≥1/10.000 y <1/1.000."},"c":"C"},{"id":384,"q":"¿Cuál de las siguientes afirmaciones está relacionada con las reacciones adversas a medicamentos de tipo B?","o":{"A":"Se trata de reacciones cuyos efectos están relacionados con el mecanismo de acción del fármaco.","B":"No se relacionan con la acción farmacológica del medicamento y, por tanto, son imprevisibles.","C":"Se trata de reacciones que se producen como consecuencia de la administración prolongada y continua de un fármaco.","D":"Son reacciones adversas que aparecen algún tiempo después de la administración del medicamento."},"c":"B"},{"id":385,"q":"En España, la notificación espontánea de sospechas de reacciones adversas a medicamentos es obligatoria para profesionales sanitarios y laboratorios farmacéuticos, y voluntaria para los ciudadanos, según la normativa reguladora de farmacovigilancia. ¿Cuál de las siguientes opciones identifica correctamente el Real Decreto y su fecha?","o":{"A":"Real Decreto 577/2013, de 26 de julio de 2013.","B":"Real Decreto 577/2012, de 26 de julio de 2012.","C":"Real Decreto 557/2013, de 26 de junio de 2013.","D":"Real Decreto 577/2014, de 26 de julio de 2014."},"c":"A/B"},{"id":386,"q":"¿Cuál de los siguientes signos o síntomas NO se considera una reacción adversa medicamentosa de las que con mayor frecuencia aparecen en las bases de datos de farmacovigilancia?","o":{"A":"Hipotensión.","B":"Urticaria.","C":"Prurito.","D":"Ictericia."},"c":"D/A"},{"id":387,"q":"Respecto a la vía inhalatoria de administración de fármacos, ¿cuál de las siguientes afirmaciones es INCORRECTA?","o":{"A":"Permite concentraciones elevadas en el lugar de acción y bajas en sangre.","B":"La absorción es rápida en los alvéolos por su alta permeabilidad e irrigación.","C":"Los fármacos pueden sufrir metabolismo presistémico.","D":"El mecanismo de absorción suele ser, mayoritariamente, por difusión pasiva para los fármacos hidrososolubles."},"c":"D"},{"id":388,"q":"Respecto a la excreción biliar y la circulación enterohepática de los fármacos, ¿cuál de las siguientes afirmaciones es correcta?","o":{"A":"Se eliminan por bilis fármacos de bajo peso molecular.","B":"La circulación enterohepática impide la reabsorción intestinal.","C":"La β -glucuronidasa bacteriana puede liberar fármaco activo desde metabolitos conjugados.","D":"Se reabsorben principalmente metabolitos conjugados sin modificación previa."},"c":"C"},{"id":389,"q":"En España, ¿cuál es el método de notificación de reacciones adversas a medicamentos más utilizado?","o":{"A":"Formulario electrónico de historias clínicas.","B":"Tarjeta amarilla.","C":"Registro de dispensación farmacéutica.","D":"Notificación a través del Centro Autonómico de Farmacovigilancia."},"c":"B"},{"id":390,"q":"Los medicamentos termolábiles requieren condiciones específicas de conservación para mantener su estabilidad y eficacia terapéutica. ¿Cuál es el rango de temperatura adecuado para la conservación de los medicamentos termolábiles?","o":{"A":"Entre 0 y 4 °C.","B":"Entre 2 y 8 °C.","C":"Entre 6 y 10 °C.","D":"Entre 8 y 12 °C."},"c":"B"},{"id":391,"q":"En relación con las revisiones periódicas de los lugares de almacenamiento de medicamentos en los centros sanitarios, señale la afirmación que NO es correcta:","o":{"A":"Comprobación de la adecuada conservación de los medicamentos en función de sus requerimientos térmicos y de protección frente a la luz.","B":"Revisión sistemática de las fechas de caducidad de los medicamentos almacenados.","C":"Establecimiento de un orden lógico de los medicamentos, ordenados alfabéticamente por nombre comercial.","D":"Verificación del adecuado almacenamiento de medicamentos sometidos a control especial, como los estupefacientes."},"c":"C"},{"id":392,"q":"En el manejo y conservación de los medicamentos termolábiles, el personal de enfermería debe tener en cuenta determinados aspectos para garantizar su estabilidad y eficacia terapéutica. ¿Cuál de las siguientes afirmaciones NO es correcta?","o":{"A":"El aumento de la temperatura puede acelerar el deterioro del medicamento y reducir su efectividad.","B":"Las temperaturas excesivamente bajas pueden provocar congelación y alteraciones físicas en algunos preparados.","C":"La ruptura de la cadena de frío puede favorecer la formación de productos tóxicos.","D":"La mayoría de los medicamentos termolábiles pueden permanecer durante varias horas a temperatura ambiente, hasta un máximo de 20 °C, sin perder sus propiedades fisicoquímicas."},"c":"D"},{"id":393,"q":"Una paciente ingresada en el servicio de urgencias precisa fluidoterapia intravenosa con suero fisiológico al 0,9 %, prescribiéndose un volumen total de 500 ml. ¿cuál es la cantidad total de cloruro sódico administrada en este volumen?","o":{"A":"2,25 gramos.","B":"3,5 gramos.","C":"4,5 gramos.","D":"9 gramos."},"c":"C"},{"id":394,"q":"En una consulta de atención primaria se prescribe una pomada dermatológica con una concentración del 5 % para el tratamiento de una dermatosis inflamatoria. Se dispensa un envase que contiene 20 g de pomada. ¿cuál es la cantidad de principio activo contenida en este envase?","o":{"A":"0,5 gramos.","B":"1 gramo.","C":"2 gramos.","D":"5 gramos."},"c":"B/C"},{"id":395,"q":"Se consideran soluciones isotónicas aquellas que pueden administrarse por vía venosa periférica sin producir flebitis significativa, al presentar una osmolaridad compatible con la del plasma. ¿Cuál de las siguientes soluciones se considera isotónica?","o":{"A":"160 mOsmol/l.","B":"420 mOsmol/l.","C":"690 mOsmol/l.","D":"870 mOsmol/l."},"c":"B"},{"id":396,"q":"En la práctica clínica, al elaborar una prescripción farmacológica es fundamental tener en cuenta determinados factores que pueden influir de manera significativa en la adherencia al tratamiento por parte del paciente. ¿Cuál de los siguientes factores NO se asocia habitu almente de manera directa con una disminución de la adherencia terapéutica?","o":{"A":"Bajo nivel educativo y analfabetismo.","B":"Dificultad de acceso a los centros sanitarios y elevado coste del transporte.","C":"Creencias culturales y percepciones erróneas sobre la enfermedad.","D":"Obesidad asociada a malos hábitos alimenticios."},"c":"D"},{"id":397,"q":"El Servicio Profesional Farmacéutico de Sistemas Personalizados de Dosificación en farmacia comunitaria consiste en la preparación individualizada de la medicación de pacientes, especialmente polimedicados, con el objetivo de mejorar la adherencia terapéutica y reducir errores en la administración. En relación con este servicio, señale la afirmación INCORRECTA:","o":{"A":"Puede ser
